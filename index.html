<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盤點工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f7f5f1;
    --card:#ffffff;
    --line:#e3ddd2;
    --accent:#c1572d;
    --accent-deep:#8f3f1f;
    --good:#2f6b4f;
    --muted:#8a8378;
    --shadow: 0 1px 2px rgba(27,31,35,0.04), 0 8px 24px rgba(27,31,35,0.06);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
  }
  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--paper);
    padding:14px 18px 10px;
    border-bottom:1px solid var(--line);
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .brand{
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .icon-btn{
    border:none; background:transparent; color:var(--muted);
    font-size:13px; padding:6px 10px; border-radius:8px; cursor:pointer;
    font-weight:600;
  }
  .icon-btn:active{ background:#ece7dd; }
  .progress-wrap{ margin-top:10px; }
  .progress-bar{
    height:6px; background:#e9e3d6; border-radius:4px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent);
    transition: width .25s ease;
    border-radius:4px;
  }
  .progress-label{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-top:6px;
    font-weight:600;
  }
  main{
    flex:1;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  /* ---- Setup screens ---- */
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }
  .panel h2{
    margin:0 0 4px;
    font-size:19px;
  }
  .panel p.sub{
    margin:0 0 14px;
    font-size:13.5px;
    color:var(--muted);
    line-height:1.5;
  }
  .list-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
    font-size:16px;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row .meta{
    font-size:12.5px; color:var(--muted); margin-top:2px;
  }
  .list-row .left{ flex:1; }
  .chev{ color:var(--muted); font-size:14px; }
  .btn{
    display:block; width:100%;
    background:var(--accent);
    color:#fff; border:none;
    font-size:16px; font-weight:700;
    padding:15px 18px;
    border-radius:12px;
    cursor:pointer;
    text-align:center;
  }
  .btn:active{ background:var(--accent-deep); }
  .btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--line);
  }
  .btn.secondary:active{ background:#ece7dd; }
  .btn.ghost{
    background:transparent;
    color:var(--accent-deep);
    font-weight:700;
    padding:10px;
  }
  .btn[disabled]{ opacity:.4; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12.5px; font-weight:700;
    color:var(--muted); margin-bottom:6px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .field input, .field textarea, .field select{
    width:100%;
    font-size:16px;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ min-height:90px; resize:vertical; line-height:1.5; }
  .row-gap{ display:flex; gap:10px; }
  .row-gap > *{ flex:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .tag{
    background:#efe9dc; color:var(--ink);
    border-radius:20px; padding:6px 12px;
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .tag button{
    border:none; background:transparent; color:var(--accent-deep);
    font-weight:700; cursor:pointer; font-size:14px; line-height:1;
    padding:0;
  }
  /* ---- Counting card ---- */
  .count-card{
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--line);
    padding:24px 20px 20px;
    box-shadow:var(--shadow);
  }
  .ctx-label{
    font-size:13px; color:var(--muted); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .style-name{
    font-size:15px; color:var(--accent-deep); font-weight:700;
    margin-top:2px;
  }
  .size-name{
    font-size:34px; font-weight:800; margin:10px 0 18px;
    letter-spacing:-0.01em;
  }
  .input-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-bottom:18px;
  }
  .num-box{
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:14px 12px 12px;
    background:#fcfbf8;
    min-width:0; /* 關鍵：避免 grid item 被內容撐到超出欄寬 */
    overflow:hidden;
  }
  .num-box label{
    font-size:12.5px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .num-box.focused{ border-color:var(--accent); background:#fff; }
  .warn-btn{
    color:var(--accent-deep) !important;
    border:1.5px solid #e0b8a8 !important;
    background:#fdf3ef !important;
    font-weight:700 !important;
  }
  .warning-banner{
    background:#fdecea;
    border:1.5px solid #e3a89a;
    border-radius:14px;
    padding:16px 18px;
    color:#7a2e1e;
  }
  .warning-banner strong{
    display:block;
    font-size:15px;
    margin-bottom:6px;
  }
  .warning-banner p{
    margin:0;
    font-size:13.5px;
    line-height:1.6;
  }
  /* 標籤式算式編輯器 */
  .expr-chips{
    display:flex; flex-wrap:wrap; gap:5px; align-items:center;
    min-height:48px; margin-top:6px;
    max-width:100%;
  }
  .expr-chiplist{
    display:contents; /* 讓裡面的標籤直接參與 flex 佈局 */
  }
  .expr-chip-num{
    background:#fdf3ef; color:var(--accent-deep);
    padding:7px 10px; border-radius:7px;
    font-size:18px; font-weight:800; font-family:inherit;
    border:1.5px solid #f0d8cd; cursor:pointer; line-height:1;
    flex:0 0 auto;
  }
  .expr-chip-num:active{ background:#f7e3d8; }
  .expr-chip-op{
    padding:7px 9px; border-radius:7px;
    font-size:16px; font-weight:800; line-height:1; cursor:pointer;
    flex:0 0 auto;
  }
  .expr-chip-op.op-plus{
    background:#fdf3ef; color:var(--accent-deep); border:1.5px solid #f0d8cd;
  }
  .expr-chip-op.op-times{
    background:#eef4fa; color:#2f5d8a; border:1.5px solid #b9cce0;
  }
  .expr-chip-op:active{ filter:brightness(0.94); }
  .expr-newinput{
    width:54px; font-size:18px; font-weight:800; text-align:center;
    border:1.5px dashed var(--line); border-radius:7px;
    padding:6px 4px; font-family:inherit; color:var(--ink);
    background:#fff; flex:0 0 auto;
  }
  .expr-newinput:focus{ outline:none; border-color:var(--accent); border-style:solid; }
  .expr-addbtns{ display:flex; gap:5px; margin-left:2px; flex:0 0 auto; }
  .expr-addbtn{
    width:30px; height:34px; border-radius:7px; font-size:16px; font-weight:800;
    line-height:1; cursor:pointer; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .expr-addbtn.add-plus{ background:#fff; border:1.5px solid #e0b8a8; color:var(--accent-deep); }
  .expr-addbtn.add-times{ background:#eef4fa; border:1.5px solid #b9cce0; color:#2f5d8a; }
  .expr-addbtn:active{ filter:brightness(0.94); }
  /* 點標籤後跳出的編輯彈窗 */
  .chip-editor{
    margin-top:10px; padding:12px;
    background:#faf7f1; border:1.5px solid var(--line); border-radius:10px;
  }
  .chip-editor .ce-label{ font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .chip-editor .ce-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .chip-editor input{
    width:80px; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--line); border-radius:8px; padding:8px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .chip-editor input:focus{ outline:none; border-color:var(--accent); }
  .chip-editor .ce-btn{
    font-size:14px; padding:9px 14px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--line); background:#fff; color:var(--ink); font-weight:700;
  }
  .chip-editor .ce-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip-editor .ce-btn.danger{ color:#a32d2d; border-color:#e3a89a; }
  .sum-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#f1ece1; border-radius:12px;
    padding:13px 16px; margin-bottom:18px;
  }
  .sum-row .sum-label{ font-size:14px; color:var(--muted); font-weight:700; }
  .sum-row .sum-val{ font-size:22px; font-weight:800; color:var(--good); }
  .nav-row{ display:flex; gap:10px; }
  .nav-row .btn{ font-size:15px; padding:14px; }
  .keypad-hint{
    text-align:center; font-size:12px; color:var(--muted); margin-top:10px;
  }
  /* color chip strip */
  .chip-strip{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px;
    -webkit-overflow-scrolling:touch;
  }
  .chip-strip::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto;
    padding:8px 14px; border-radius:20px;
    font-size:13px; font-weight:700;
    border:1.5px solid var(--line);
    background:#fff; color:var(--muted);
    white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.done{ border-color:var(--good); color:var(--good); }
  /* summary table */
  table.summary{
    width:100%; border-collapse:collapse; font-size:13.5px;
  }
  table.summary th, table.summary td{
    border-bottom:1px solid var(--line);
    padding:8px 6px; text-align:left;
  }
  table.summary th{ color:var(--muted); font-weight:700; font-size:12px; }
  table.summary td.num{ text-align:right; font-weight:600; }
  .mini-btn{
    font-size:11px; padding:4px 8px; border-radius:6px;
    border:1.5px solid #b9cce0; background:#eef4fa; color:#2f5d8a;
    font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .mini-btn:active{ background:#2f5d8a; color:#fff; }
  .mini-btn.marked{
    border-color:#2f7a3e; background:#e8f5ec; color:#2f7a3e;
  }
  /* 複盤清單項目 */
  .recount-item{
    border:1px solid var(--line); border-radius:12px;
    padding:14px; margin-bottom:12px; background:#fff;
  }
  .recount-item.done{ background:#fafcfb; border-color:#cfe6d7; }
  .recount-item .ri-top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px; gap:8px;
  }
  .recount-item .ri-title{ font-size:15px; font-weight:800; color:var(--ink); }
  .recount-item .ri-assignee{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#eef4fa; color:#2f5d8a; white-space:nowrap; flex:0 0 auto;
  }
  .recount-item .ri-assignee.unassigned{ background:#f1ece1; color:var(--muted); }
  .recount-item .ri-nums{
    display:flex; align-items:flex-end; gap:10px;
  }
  .recount-item .ri-num{ flex:1; text-align:center; }
  .recount-item .ri-num-label{ font-size:11px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .recount-item .ri-num-val{ font-size:20px; font-weight:800; }
  .recount-item .ri-arrow{ color:var(--muted); font-size:16px; padding-bottom:6px; }
  .recount-item .ri-input{
    width:100%; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--accent); border-radius:8px; padding:6px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .recount-item .ri-input:focus{ outline:none; background:#fffdf9; }
  .recount-item .ri-calc-hint{
    font-size:12px; color:var(--good); font-weight:700; text-align:center; margin-top:3px;
  }
  .recount-item .ri-actions{ margin-top:10px; text-align:right; }
  /* 彙總頁面：品牌分組摺疊 */
  .brand-group{
    border:1px solid var(--line); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
    background:#fcfbf8;
  }
  .brand-group.has-missing{
    border-left:4px solid #e87a3e;
  }
  .brand-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer;
    background:#fcfbf8; user-select:none;
  }
  .brand-group-header:active{ background:#f5efe3; }
  .brand-group-header .bg-left{
    display:flex; align-items:center; gap:10px;
  }
  .brand-group-header .bg-name{
    font-size:16px; font-weight:800; color:var(--ink);
  }
  .brand-group-header .bg-meta{
    font-size:12px; color:var(--muted); font-weight:600;
  }
  .brand-group-header .bg-totals{
    font-size:13px; font-weight:700; color:var(--accent-deep);
  }
  .brand-group-header .bg-arrow{
    margin-left:8px; color:var(--muted); font-size:14px;
    transition:transform 0.18s ease;
  }
  .brand-group.expanded .bg-arrow{ transform:rotate(90deg); }
  .brand-group-body{
    display:none;
    padding:0 12px 12px;
    background:#fff;
    border-top:1px solid var(--line);
  }
  .brand-group.expanded .brand-group-body{ display:block; }
  /* 型號小卡片（品牌底下） */
  .style-group{
    border:1px solid var(--line); border-radius:8px;
    margin:10px 0; overflow:hidden; background:#fff;
  }
  .style-group.has-missing{ border-left:3px solid #e87a3e; }
  .style-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; cursor:pointer; user-select:none;
    background:#fcfbf8;
  }
  .style-group-header:active{ background:#f5efe3; }
  .style-group-header .sg-name{
    font-size:14px; font-weight:800; color:var(--accent-deep);
  }
  .style-group-header .sg-meta{
    font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px;
  }
  .style-group-header .sg-arrow{
    color:var(--muted); font-size:13px; margin-left:8px;
    transition:transform 0.18s ease;
  }
  .style-group.expanded .sg-arrow{ transform:rotate(90deg); }
  .style-group-body{ display:none; padding:0 10px 10px; }
  .style-group.expanded .style-group-body{ display:block; }
  .empty-state{
    text-align:center; padding:40px 16px; color:var(--muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:8px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px;
    border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:var(--shadow); z-index:50;
    opacity:0; transition:opacity .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
  .footer-note{
    text-align:center; font-size:11.5px; color:var(--muted); padding:6px 18px 0;
  }
  .loading{
    display:flex; align-items:center; justify-content:center;
    min-height:60vh; color:var(--muted); font-size:14px;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">載入中…</div></div>
<div class="toast" id="toast"></div>

<script>
(function(){

// ---------- Default seed data ----------
var DEFAULT_SIZES_A = ["#6(JS)","#8(JM)","#10(JL)","JXL","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];

var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmO5IsfDIufHan6YCyML-TLBDV4XIiIOmbEuZn6W_TJza6zba5W6s5ht2WUsPnY7XU/exec";

// 管理員密碼（按右上角「管理用設定」時會詢問）。需要修改密碼時，直接改這一行的引號內文字即可
var ADMIN_PASSWORD = "6666";

var state = {
  structure: null,
  counts: {},           // key "style|color|size" -> {shelf, stock}
  recounts: {},         // key "style|color|size" -> {recount, assignee, markedAt} 複盤任務
  recountFilter: "",    // 複盤清單的負責人篩選（空=全部）
  view: "home",         // home | brandModels | setup | counting | summary | recount
  curBrandName: "",
  curStyleIdx: 0,
  curColorIdx: 0,
  curSizeIdx: 0,
  exprShelf: "",        // 目前格位「架上」的算式字串（標籤編輯器的資料來源）
  exprStock: ""         // 目前格位「庫存」的算式字串
};

function keyFor(style, color, size){ return style + "|" + color + "|" + size; }

function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1600);
}

// ---------- API helpers ----------
async function apiGet(action){
  var url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();
  var res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("API GET failed: " + res.status);
  return await res.json();
}
async function apiPost(payload){
  var res;
  try{
    res = await fetch(APPS_SCRIPT_URL, {
      method:"POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
  }catch(networkErr){
    throw new Error("網路連線失敗：" + networkErr.message);
  }
  if(!res.ok){
    var bodyText = "";
    try{ bodyText = await res.text(); }catch(e){}
    throw new Error("伺服器回應錯誤 " + res.status + (bodyText ? "：" + bodyText.slice(0,200) : ""));
  }
  var json;
  try{
    json = await res.json();
  }catch(e){
    throw new Error("伺服器回應格式錯誤（不是有效的 JSON）");
  }
  if(json && json.ok === false){
    throw new Error("伺服器拒絕：" + (json.error || "未知原因"));
  }
  return json;
}

// ---------- Storage (backed by Google Sheet via Apps Script) ----------
async function loadStructure(){
  try{
    var data = await apiGet("structure");
    if(data && data.length){ return data; }
  }catch(e){ console.error("loadStructure failed", e); showToast("讀取結構失敗，請檢查網路"); }
  return null;
}
async function saveStructure(structure){
  try{
    await apiPost({ action:"saveStructure", structure: structure });
    return true;
  }catch(e){
    console.error("save structure failed", e);
    showToast("儲存結構失敗：" + (e && e.message ? e.message : "未知錯誤"));
    return false;
  }
}
async function loadAllCounts(structure){
  try{
    var counts = await apiGet("counts");
    return counts || {};
  }catch(e){ console.error("loadAllCounts failed", e); showToast("讀取盤點資料失敗，請檢查網路"); }
  return {};
}
async function saveCount(style, color, size, shelfRaw, stockRaw){
  var key = keyFor(style, color, size);
  // 空白就維持空字串（代表沒填），有填才換算成數字（這樣才能區分「沒填」跟「填 0」）
  var shelfEmpty = (shelfRaw === "" || shelfRaw === null || shelfRaw === undefined);
  var stockEmpty = (stockRaw === "" || stockRaw === null || stockRaw === undefined);
  var shelfNum = shelfEmpty ? "" : parseExpr(shelfRaw);
  var stockNum = stockEmpty ? "" : parseExpr(stockRaw);
  var total = (shelfEmpty && stockEmpty) ? "" : (parseExpr(shelfRaw) + parseExpr(stockRaw));
  var val = {
    shelf: shelfNum, stock: stockNum, total: total,
    shelfExpr: shelfRaw, stockExpr: stockRaw // 原始算式文字，僅保留在本次開啟工具的記憶體中
  };
  state.counts[key] = val; // optimistic local update so UI feels instant
  try{
    await apiPost({ action:"saveCount", style:style, color:color, size:size, shelf:shelfNum, stock:stockNum });

// ---------- Init ----------
// 品牌顯示順序：從後端載入（管理員可在設定頁調整）。後端還沒設定時用這個預設順序。
var BRAND_ORDER = ["SR","CP","AG短袖","AG冬衣","KY","PL","TH","CAP"];

// 動態計算「品牌分組」：完全根據 state.structure 裡每個款式的 brand 屬性，不再寫死任何款式名稱
// 沒有設定品牌的款式 → 各自獨立顯示一格在首頁
// 設定相同品牌的款式 → 自動聚集到該品牌底下
// 回傳格式：[{brand: "CP"或null, styles: [款式名稱陣列]}, ...]
function computeBrandGroups(){
  if(!state.structure) return [];
  var brandMap = {};  // brand -> [style names]
  var standalone = []; // 沒品牌的，獨立顯示
  state.structure.forEach(function(st){
    var b = (st.brand || "").trim();
    if(b){
      if(!brandMap[b]) brandMap[b] = [];
      brandMap[b].push(st.style);
    } else {
      standalone.push(st.style);
    }
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });

  var groups = [];
  // 1) 先放「獨立顯示」（沒品牌）的款式
  standalone.forEach(function(s){ groups.push({brand:null, styles:[s]}); });
  // 2) 再依 BRAND_ORDER 順序、再依字母順序，放品牌分組
  var brandNames = Object.keys(brandMap).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  brandNames.forEach(function(name){
    groups.push({brand:name, styles:brandMap[name]});
  });
  return groups;
}

function findBrandGroupForStyle(styleName){
  var groups = computeBrandGroups();
  for(var i=0;i<groups.length;i++){
    if(groups[i].styles.indexOf(styleName) !== -1) return groups[i];
  }
  return null;
}

function sortStructureByStyle(structure){
  // 改成依 BRAND_ORDER 排序：同品牌的款式聚在一起，沒品牌的放最前面（獨立顯示）
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  return structure.slice().sort(function(a, b){
    var ab = (a.brand || "").trim();
    var bb = (b.brand || "").trim();
    // 沒品牌的優先
    if(!ab && bb) return -1;
    if(ab && !bb) return 1;
    if(!ab && !bb) return a.style.localeCompare(b.style, 'zh-Hant');
    var ai = orderMap.hasOwnProperty(ab) ? orderMap[ab] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(bb) ? orderMap[bb] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.style.localeCompare(b.style, 'zh-Hant');
  });
}

// 把後端讀進來的結構正規化：強制 style、顏色名稱、尺寸都是字串型別
// 因為 Google Sheet 會自動把純數字內容存成 number，前端比對會失敗（"76000" !== 76000）
function normalizeStructure(structure){
  if(!Array.isArray(structure)) return structure;
  return structure.map(function(st){
    return {
      style: String(st.style),
      brand: st.brand ? String(st.brand) : "",
      colors: (st.colors || []).map(function(c){
        return {
          name: String(c.name),
          sizes: (c.sizes || []).map(function(s){ return String(s); })
        };
      })
    };
  });
}

// counts 的 key 也要正規化（因為 key 裡含款式名稱，如果存成數字也會對不起來）
function normalizeCounts(counts){
  if(!counts || typeof counts !== 'object') return counts || {};
  var out = {};
  Object.keys(counts).forEach(function(k){
    out[String(k)] = counts[k];
  });
  return out;
}

async function init(){
  renderLoadingScreen();
  startLoadTimer();

  var structure = null;
  var counts = {};
  var fetchFailed = false;
  try{
    setLoadStage("連線到雲端資料庫…");
    var all = await apiGet("all");
    setLoadStage("整理款式與盤點資料…");
    if(all && Array.isArray(all.structure)){
      structure = all.structure; // 即使是空陣列也算合法（代表這個 Sheet 還沒設定任何款式）
      counts = all.counts || {};
      if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
      if(all.recounts){ state.recounts = all.recounts; }
    } else {
      fetchFailed = true;
    }
  }catch(e){
    console.error("init load failed", e);
    fetchFailed = true;
  }

  stopLoadTimer();

  if(fetchFailed || structure === null){
    renderLoadError();
    return;
  }

  state.structure = sortStructureByStyle(normalizeStructure(structure));
  state.counts = normalizeCounts(counts);
  state.view = "home";
  render();
  startAutoSync(); // 啟動背景自動同步
}

// 自動同步：每 SYNC_INTERVAL_MS 毫秒去後端拉一次最新資料，更新其他人填的數字到本地畫面
var SYNC_INTERVAL_MS = 30000; // 30 秒同步一次
var autoSyncTimer = null;
var isSyncing = false;
var lastSyncTime = null;

function getSyncStatusText(){
  if(!isPageVisible) return "💤 已暫停（切回前景自動恢復）";
  if(isIdle) return "💤 閒置中已暫停（碰一下畫面即恢復）";
  if(isSyncing) return "🔄 同步中...";
  if(!lastSyncTime) return "每 30 秒自動同步一次";
  var diff = Math.floor((Date.now() - lastSyncTime) / 1000);
  if(diff < 5) return "✓ 剛剛已同步";
  if(diff < 60) return "✓ " + diff + " 秒前更新";
  return "✓ " + Math.floor(diff/60) + " 分鐘前更新";
}

// 在 summary 畫面右上角顯示「有新資料 點此刷新」提示，不會強制重畫
function showSummaryUpdateHint(){
  var hint = document.getElementById('summary-update-hint');
  if(hint){
    hint.style.display = 'inline-flex';
  }
}

// 追蹤頁面是否在前景（被使用者實際看著）
var isPageVisible = true;
// 追蹤是否處於閒置狀態（畫面雖然開著但長時間沒操作）
var isIdle = false;
var IDLE_THRESHOLD_MS = 5 * 60 * 1000; // 5 分鐘沒操作就視為閒置
var lastActivityTime = Date.now();
var idleCheckTimer = null;

function startAutoSync(){
  if(autoSyncTimer) clearInterval(autoSyncTimer);
  autoSyncTimer = setInterval(function(){
    // 只有頁面在前景且使用者有在操作時才同步，背景或閒置時跳過以節省 Apps Script 配額
    if(isPageVisible && !isIdle) syncFromBackend();
  }, SYNC_INTERVAL_MS);

  // 每分鐘檢查一次是否進入閒置狀態
  if(idleCheckTimer) clearInterval(idleCheckTimer);
  idleCheckTimer = setInterval(function(){
    if(!isIdle && (Date.now() - lastActivityTime > IDLE_THRESHOLD_MS)){
      isIdle = true;
    }
  }, 60000);

  if(!window._visibilityBound){
    window._visibilityBound = true;

    // 監聽頁面可見性變化（手機鎖屏、切到其他 App、切到其他分頁都會觸發）
    document.addEventListener('visibilitychange', function(){
      var nowVisible = !document.hidden;
      if(nowVisible && !isPageVisible){
        // 從背景回到前景，立刻同步一次，讓使用者馬上看到最新資料
        isPageVisible = true;
        lastActivityTime = Date.now();
        isIdle = false;
        syncFromBackend();
      } else if(!nowVisible){
        isPageVisible = false;
      }
    });

    // 監聽使用者操作：點擊、觸控、滑動、按鍵、滾動都算「有在用」
    function markActivity(){
      var wasIdle = isIdle;
      lastActivityTime = Date.now();
      if(wasIdle){
        isIdle = false;
        if(isPageVisible) syncFromBackend(); // 從閒置恢復，立刻同步一次
      }
    }
    document.addEventListener('click', markActivity, true);
    document.addEventListener('touchstart', markActivity, {passive:true, capture:true});
    document.addEventListener('keydown', markActivity, true);
    document.addEventListener('scroll', markActivity, {passive:true, capture:true});
  }
}

async function syncFromBackend(){
  if(isSyncing) return; // 上次還沒跑完就跳過這次
  // 在「管理用設定」畫面時完全不同步，避免背景資料覆蓋正在進行的品牌/結構編輯
  if(state.view === "setup") return;
  isSyncing = true;
  try{
    var all = await apiGet("all");
    if(!all || !Array.isArray(all.structure)) return;
    if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
    if(all.recounts){ state.recounts = all.recounts; }

    // 比對：跟目前的 state 比，看資料有沒有真的變動（避免無謂的「有新資料」提示）
    var newStructure = normalizeStructure(all.structure);
    var newCountsRaw = normalizeCounts(all.counts || {});
    var hasChange = false;
    // 比 counts：先比 key 數量，再逐個比 total
    var oldKeys = Object.keys(state.counts);
    var newKeys = Object.keys(newCountsRaw);
    if(oldKeys.length !== newKeys.length){
      hasChange = true;
    } else {
      for(var i=0;i<newKeys.length;i++){
        var k = newKeys[i];
        if(!state.counts.hasOwnProperty(k)){ hasChange = true; break; }
        if(Number(state.counts[k].total) !== Number(newCountsRaw[k].total)){ hasChange = true; break; }
      }
    }
    // 比結構（款式名稱數量）
    if(!hasChange && newStructure.length !== state.structure.length){
      hasChange = true;
    }

    // 更新結構（如果有人新增/刪除款式也會同步）
    state.structure = sortStructureByStyle(newStructure);

    // 更新盤點數字：合併最新後端資料，但保留「目前正在編輯這一格」的本地暫存算式（避免覆蓋使用者正在打的字）
    var newCounts = newCountsRaw;
    var currentEditingKey = null;
    if(state.view === "counting" && state.structure[state.curStyleIdx]){
      var st = state.structure[state.curStyleIdx];
      if(st.colors[state.curColorIdx]){
        var col = st.colors[state.curColorIdx];
        var size = col.sizes[state.curSizeIdx];
        if(size) currentEditingKey = keyFor(st.style, col.name, size);
      }
    }
    // 如果使用者正在編輯某格、且本地 state 有未送出的算式，保留本地版本
    if(currentEditingKey && state.counts[currentEditingKey]){
      var localCurrent = state.counts[currentEditingKey];
      newCounts[currentEditingKey] = localCurrent;
    }
    state.counts = newCounts;
    lastSyncTime = Date.now();

    // 重畫畫面（但不重畫 counting 跟 summary，避免破壞使用者操作狀態）
    if(state.view === "home"){
      if(hasChange) render();
    } else if(state.view === "brandModels"){
      if(hasChange) render();
    } else if(state.view === "summary"){
      // 只有資料真的有變動時才顯示「有新資料」提示，避免無謂打擾
      if(hasChange) showSummaryUpdateHint();
    }
    // counting 畫面下故意不重畫，等使用者切換尺寸/顏色或按下一項時才會自然更新
  }catch(e){
    console.error("auto sync failed", e);
    // 同步失敗就靜默略過，下一輪會再試
  }finally{
    isSyncing = false;
  }
}

// 讀取失敗時顯示這個畫面，絕對不會自動清空或覆蓋任何已存在 Google Sheet 裡的款式設定

// ---------- Progress helpers ----------
function totalSizeSlots(structure){
  var n = 0;
  structure.forEach(function(st){ st.colors.forEach(function(c){ n += c.sizes.length; }); });
  return n;
}
// 判斷某一格是否「完整填寫」：架上跟庫存兩格都要有值（含 0）才算完成，任一格空白都算未完成
function slotComplete(c){
  if(!c) return false;
  var shelfFilled = (c.shelf !== "" && c.shelf !== null && c.shelf !== undefined);
  var stockFilled = (c.stock !== "" && c.stock !== null && c.stock !== undefined);
  return shelfFilled && stockFilled;
}
function doneSizeSlots(structure, counts){
  var n = 0;
  structure.forEach(function(st){
    st.colors.forEach(function(c){
      c.sizes.forEach(function(sz){
        var k = keyFor(st.style, c.name, sz);
        if(slotComplete(counts[k])){ n++; }
      });
    });
  });
  return n;
}
function colorDone(style, color, counts){
  return color.sizes.every(function(sz){ return slotComplete(counts[keyFor(style.style, color.name, sz)]); });
}
function styleProgress(style, counts){
  var total=0, done=0;
  style.colors.forEach(function(c){
    c.sizes.forEach(function(sz){
      total++;
      if(slotComplete(counts[keyFor(style.style, c.name, sz)])) done++;
    });
  });
  return {total:total, done:done};
}

// ---------- Render root ----------
function render(){
  var app = document.getElementById("app");
  if(state.view === "home") app.innerHTML = renderHome();
  else if(state.view === "brandModels") app.innerHTML = renderBrandModels();
  else if(state.view === "setup") app.innerHTML = renderSetup();
  else if(state.view === "counting") app.innerHTML = renderCounting();
  else if(state.view === "summary") app.innerHTML = renderSummary();
  else if(state.view === "recount") app.innerHTML = renderRecount();
  bindEvents();
}

// ---------- HOME ----------
function findStyleIdx(styleName){
  for(var i=0;i<state.structure.length;i++){
    if(state.structure[i].style === styleName) return i;
  }
  return -1;
}

function groupProgress(group, counts){
  var total=0, done=0;
  group.styles.forEach(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return;
    var p = styleProgress(state.structure[idx], counts);
    total += p.total; done += p.done;
  });
  return {total:total, done:done};
}

function renderHome(){
  var structure = state.structure;
  var total = totalSizeSlots(structure);
  var done = doneSizeSlots(structure, state.counts);
  var pct = total ? Math.round(done/total*100) : 0;

  // 複盤任務入口：算出待複盤筆數
  var recountKeys = Object.keys(state.recounts || {});
  var recountCount = recountKeys.length;
  var recountEntryHtml = recountCount > 0
    ? '<button class="btn secondary" data-action="goto-recount" style="border-color:#e0b8a8; color:var(--accent-deep); margin-top:10px;">📋 複盤任務（'+recountCount+' 筆待處理）</button>'
    : '';

  var brandGroups = computeBrandGroups();
  var rows = brandGroups.map(function(g){
    if(g.brand === null){
      // 獨立顯示：直接點進去盤點，不用先選品牌
      var styleName = g.styles[0];
      var idx = findStyleIdx(styleName);
      if(idx === -1) return ""; // 該款式尚未建立在結構裡，先不顯示
      var p = styleProgress(structure[idx], state.counts);
      var pct2 = p.total ? Math.round(p.done/p.total*100) : 0;
      return '<div class="list-row" data-action="open-style" data-style-idx="'+idx+'">'+
        '<div class="left">'+escapeHtml(styleName)+
        '<div class="meta">'+structure[idx].colors.length+' 色 · 已完成 '+p.done+'/'+p.total+'（'+pct2+'%）</div>'+
        '</div><div class="chev">›</div></div>';
    } else {
      var gp = groupProgress(g, state.counts);
      var pct3 = gp.total ? Math.round(gp.done/gp.total*100) : 0;
      var existCount = g.styles.filter(function(s){ return findStyleIdx(s) !== -1; }).length;
      return '<div class="list-row" data-action="open-brand" data-brand-name="'+escapeHtml(g.brand)+'">'+
        '<div class="left">'+escapeHtml(g.brand)+
        '<div class="meta">'+existCount+' 個型號 · 已完成 '+gp.done+'/'+gp.total+'（'+pct3+'%）</div>'+
        '</div><div class="chev">›</div></div>';
    }
  }).join("");

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<div class="brand">盤點工具</div>'+
      '<button class="icon-btn warn-btn" data-action="goto-setup">🔒 管理用設定</button>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>整體進度 '+done+' / '+total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
    '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 16px 10px; font-size:12px; color:var(--muted);">'+
      '<span id="sync-status">'+getSyncStatusText()+'</span>'+
      '<button class="icon-btn" data-action="manual-sync" style="font-size:12px; padding:4px 10px;">🔄 立即更新</button>'+
    '</div>'+
  '</div>'+
  '<main>'+

// ---------- COUNTING ----------

// 把算式字串拆成 token 陣列，例如 "12×6+8" -> [{t:'num',v:'12'},{t:'op',v:'×'},{t:'num',v:'6'},{t:'op',v:'+'},{t:'num',v:'8'}]
function tokenizeExpr(str){
  if(!str) return [];
  var s = String(str).trim().replace(/[xX]/g, "×");
  if(s === "") return [];
  var tokens = [];
  var num = "";
  for(var i=0;i<s.length;i++){
    var ch = s[i];
    if(ch === "+" || ch === "×"){
      if(num !== ""){ tokens.push({t:'num', v:num}); num=""; }
      tokens.push({t:'op', v:ch});
    } else if(ch !== " "){
      num += ch;
    }
  }
  if(num !== "") tokens.push({t:'num', v:num});
  return tokens;
}

// 把 token 陣列組回字串
function tokensToStr(tokens){
  return tokens.map(function(tk){ return tk.v; }).join("");
}

// 產生「標籤式算式編輯器」的 HTML。field 為 "shelf" 或 "stock"
function renderExprEditor(field){
  var html = '<div class="expr-chips" id="'+field+'-chips">';
  html += renderTokenChips(field); // 前面的數字/運算符標籤（這塊會被就地更新）
  // 固定不動的新增區：輸入框 + 加號/乘號按鈕（DOM 不重建，鍵盤不收起）
  html += '<input class="expr-newinput" id="'+field+'-newinput" type="text" inputmode="decimal" placeholder="0">';
  html += '<div class="expr-addbtns">'+
    '<button class="expr-addbtn add-plus" data-action="add-token" data-field="'+field+'" data-op="+" type="button">+</button>'+
    '<button class="expr-addbtn add-times" data-action="add-token" data-field="'+field+'" data-op="×" type="button">×</button>'+
  '</div>';
  html += '</div>';
  html += '<div id="'+field+'-editor"></div>'; // 點標籤後的編輯彈窗會放這裡
  return html;
}

// 只產生前面那串數字/運算符標籤（不含輸入框），供就地更新用
function renderTokenChips(field){
  var exprStr = field === 'shelf' ? state.exprShelf : state.exprStock;
  var tokens = tokenizeExpr(exprStr);
  var html = '<span id="'+field+'-chiplist" class="expr-chiplist">';
  tokens.forEach(function(tk, idx){
    if(tk.t === 'num'){
      html += '<span class="expr-chip-num" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    } else {
      var opcls = tk.v === '×' ? 'op-times' : 'op-plus';
      html += '<span class="expr-chip-op '+opcls+'" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    }
  });
  html += '</span>';
  return html;
}

function renderCounting(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key] || {shelf:"", stock:""};
  var p = styleProgress(st, state.counts);
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;

  var chips = col.sizes.map(function(sz, i){
    var k = keyFor(st.style, col.name, sz);
    var cls = "chip";
    if(i === state.curSizeIdx) cls += " active";
    else if(slotComplete(state.counts[k])) cls += " done";
    return '<button class="'+cls+'" data-action="jump-size" data-size-idx="'+i+'">'+escapeHtml(sz)+'</button>';
  }).join("");

  var colorChips = st.colors.map(function(c, i){
    var cls = "chip";
    if(i === state.curColorIdx) cls += " active";
    else if(colorDone(st, c, state.counts)) cls += " done";
    return '<button class="'+cls+'" data-action="jump-color" data-color-idx="'+i+'">'+escapeHtml(c.name)+'</button>';
  }).join("");

  // 優先顯示原始算式文字（同一次開啟工具期間都會保留），沒有的話才顯示已存的數字
  var shelfVal = existing.shelfExpr !== undefined ? existing.shelfExpr : (existing.shelf !== undefined ? String(existing.shelf) : "");
  var stockVal = existing.stockExpr !== undefined ? existing.stockExpr : (existing.stock !== undefined ? String(existing.stock) : "");
  // 把目前格位的算式同步到 state，標籤編輯器以 state 為準
  state.exprShelf = shelfVal;
  state.exprStock = stockVal;
  var total = (existing.total !== undefined ? existing.total : (parseExpr(shelfVal) + parseExpr(stockVal)));

  var isFirst = state.curStyleIdx === 0 && state.curColorIdx === 0 && state.curSizeIdx === 0;
  var isLast = isLastSlot();
  var parentGroup = findBrandGroupForStyle(st.style);
  var backAction = (parentGroup && parentGroup.brand !== null) ? 'back-to-brand' : 'goto-home';
  var backLabel = (parentGroup && parentGroup.brand !== null) ? ('‹ '+escapeHtml(parentGroup.brand)) : '‹ 品牌';

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="'+backAction+'">'+backLabel+'</button>'+
      '<div class="brand">盤點中</div>'+
      '<span style="width:70px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(st.style)+' 進度 '+p.done+'/'+p.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="chip-strip">'+colorChips+'</div>'+
    '<div class="count-card">'+
      '<div class="ctx-label">款式 / 顏色</div>'+
      '<div class="style-name">'+escapeHtml(st.style)+' · '+escapeHtml(col.name)+'</div>'+
      '<div class="size-name">'+escapeHtml(size)+'</div>'+
      '<div class="input-grid">'+
        '<div class="num-box" id="shelf-box">'+
          '<label>架上</label>'+
          renderExprEditor('shelf')+
        '</div>'+
        '<div class="num-box" id="stock-box">'+
          '<label>庫存</label>'+
          renderExprEditor('stock')+
        '</div>'+
      '</div>'+
      '<div class="sum-row"><span class="sum-label">加總</span><span class="sum-val" id="sum-val">'+total+'</span></div>'+
      '<div class="nav-row">'+
        '<button class="btn secondary" data-action="prev-slot" '+(isFirst?'disabled':'')+'>‹ 上一項</button>'+
        '<button class="btn" data-action="next-slot">'+(isLast?'完成 ✓':'下一項 ›')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="chip-strip" style="margin-top:-6px;">'+chips+'</div>'+
  '</main>';
}

function isLastSlot(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  return state.curStyleIdx === state.structure.length - 1 &&
         state.curColorIdx === st.colors.length - 1 &&
         state.curSizeIdx === col.sizes.length - 1;
}

// ---------- SUMMARY ----------
function renderSummary(){
  var structure = state.structure;
  var tsvLines = ["款式\t顏色\t尺寸\t架上\t庫存\t加總"];

  // 先把所有資料按品牌分組
  function buildStyleTableHtml(st){
    var html = '<div style="overflow-x:auto;">'+
      '<table class="summary"><thead><tr><th><span style="display:inline-block; width:7px; height:7px; border-radius:50%; background:#e87a3e; margin-right:4px; vertical-align:middle;"></span>顏色</th><th>尺寸</th><th>架上</th><th>庫存</th><th>加總</th><th>複盤</th></tr></thead><tbody>';
    var styleShelf=0, styleStock=0, styleTotal=0, missingCount=0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
        var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
        var isMissing = !(shelfFilled && stockFilled); // 任一格沒填都算未完成
        if(isMissing) missingCount++;
        var shelf = shelfFilled ? c.shelf : "";
        var stock = stockFilled ? c.stock : "";
        var total = (shelfFilled || stockFilled) ? ((Number(c.shelf)||0)+(Number(c.stock)||0)) : "";
        var rowStyle = isMissing ? ' style="background:#fff4e6;"' : '';
        var colorCell = isMissing
          ? '<td style="color:#c45a1e; font-weight:700; white-space:nowrap;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#e87a3e; margin-right:6px; vertical-align:middle;"></span>'+escapeHtml(col.name)+'</td>'
          : '<td>'+escapeHtml(col.name)+'</td>';
        // 架上、庫存欄：沒填的那格顯示紅色「未填」，有填顯示數字
        var shelfCell = shelfFilled
          ? '<td class="num">'+shelf+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        var stockCell = stockFilled
          ? '<td class="num">'+stock+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        // 複盤標記欄：已標記顯示藍勾(點可取消)，未標記顯示標記鈕
        var isMarked = !!state.recounts[key];
        var recountCell = isMarked
          ? '<td class="num" style="white-space:nowrap;"><button class="mini-btn marked" data-action="unmark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">✓已標記</button></td>'
          : '<td class="num" style="white-space:nowrap;"><button class="mini-btn" data-action="mark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">標記複盤</button></td>';
        html += '<tr'+rowStyle+'>'+colorCell+'<td>'+escapeHtml(sz)+'</td>'+
          shelfCell + stockCell +
          '<td class="num"><strong>'+(total===""?'—':total)+'</strong></td>'+
          recountCell + '</tr>';
        tsvLines.push([st.style, col.name, sz, shelf, stock, total].join("\t"));
        if(c){ styleShelf+=Number(c.shelf)||0; styleStock+=Number(c.stock)||0; styleTotal+=(Number(c.shelf)||0)+(Number(c.stock)||0); }
      });
    });
    html += '<tr style="background:#faf7f1;"><td colspan="2"><strong>小計</strong></td>'+
      '<td class="num"><strong>'+styleShelf+'</strong></td>'+
      '<td class="num"><strong>'+styleStock+'</strong></td>'+
      '<td class="num"><strong>'+styleTotal+'</strong></td><td></td></tr>';
    html += '</tbody></table></div>';
    return {html:html, total:styleTotal, missing:missingCount};
  }

  // 計算單一款式的總計（彙總用，不依賴上面那個函式）
  function calcStyleTotal(st){
    var t = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var c = state.counts[keyFor(st.style, col.name, sz)];
        if(c) t += Number(c.total)||0;
      });
    });
    return t;
  }

  // 依動態計算的品牌分組組裝畫面（從 state.structure 即時算出）
  var groupsHtml = "";
  var grandMissing = 0;
  computeBrandGroups().forEach(function(g){
    var groupStyles = g.styles
      .map(function(name){ return structure.find(function(s){ return s.style === name; }); })
      .filter(function(s){ return s; });
    if(groupStyles.length === 0) return;

    var groupName = g.brand === null ? groupStyles[0].style : g.brand;
    var styleCount = groupStyles.length;
    var groupTotal = 0;
    var groupMissing = 0;
    var bodyHtml = "";

    groupStyles.forEach(function(st){
      var built = buildStyleTableHtml(st);
      groupTotal += built.total;
      groupMissing += built.missing;
      if(g.brand !== null){
        // 品牌底下多個型號：每個型號做成可摺疊的小卡片
        var styleMissingTag = built.missing > 0 ? ' <span style="background:#e87a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">未輸入 '+built.missing+'</span>' : '';

              '<div class="sg-name">'+escapeHtml(st.style)+styleMissingTag+'</div>'+
              '<div class="sg-meta">'+st.colors.length+' 色'+styleTotalText+'</div>'+
            '</div>'+
            '<div class="sg-arrow">›</div>'+
          '</div>'+
          '<div class="style-group-body">'+built.html+'</div>'+
        '</div>';
      } else {
        // 獨立款式（品牌只有一個型號）直接顯示明細
        bodyHtml += built.html;
      }
    });

    grandMissing += groupMissing;
    var metaParts = [];
    if(g.brand !== null) metaParts.push(styleCount + ' 個型號');
    if(groupMissing > 0) metaParts.push('<span style="color:#e87a3e; font-weight:700;">未輸入 '+groupMissing+' 筆</span>');
    var metaText = metaParts.join(' · ');
    groupsHtml += '<div class="brand-group'+(groupMissing > 0 ? ' has-missing' : '')+'" data-brand-name="'+escapeHtml(groupName)+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+escapeHtml(groupName)+'</div>'+
            (metaText ? '<div class="bg-meta">'+metaText+'</div>' : '')+
          '</div>'+
        '</div>'+
        '<div style="display:flex; align-items:center; gap:6px;">'+
          '<div class="bg-totals">合計 '+groupTotal+'</div>'+
          '<div class="bg-arrow">›</div>'+
        '</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  });

  // 整體總計
  var grandTotal = 0;
  structure.forEach(function(st){ grandTotal += calcStyleTotal(st); });

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
    '<div class="brand">彙總 / 匯出</div>'+
    '<button class="icon-btn" data-action="refresh-summary" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
  '</div>'+
    '<div id="summary-update-hint" data-action="refresh-summary" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
      '🔔 有新資料，點此刷新明細'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>更新 Google Sheet 彙總分頁</h2>'+
      '<p class="sub">會在你的 Google Sheet 裡自動產生「彙總_款式名稱」分頁（不會動到原本既有的分頁），每個品項一個分頁，內容是該品項所有顏色、尺寸的架上／庫存／加總明細與總計。需要重新整理 Sheet 才會看到新分頁。</p>'+
      '<button class="btn" data-action="regenerate-sheets">更新 Google Sheet 彙總分頁</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>備用：下載 Excel 快照</h2>'+
      '<p class="sub">如果想要一份獨立的 Excel 檔（不在 Google Sheet 裡），可以用這個，結構跟上面的彙總分頁一樣。</p>'+
      '<button class="btn secondary" data-action="download-xlsx">下載 Excel（.xlsx）</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>明細（依品牌分組）</h2>'+
      '<p class="sub">點品牌標題展開或收合該品牌的明細。整體加總：<strong style="color:var(--accent-deep);">'+grandTotal+'</strong>'+
        (grandMissing > 0 ? ' · <strong style="color:#e87a3e;">尚有 '+grandMissing+' 筆未輸入</strong>' : ' · <strong style="color:#2f7a3e;">已全部輸入完成 ✓</strong>')+

}

// ---------- 複盤清單畫面 ----------
function renderRecount(){
  var keys = Object.keys(state.recounts || {});

  // 收集所有負責人(用於篩選)
  var assignees = [];
  keys.forEach(function(k){
    var a = (state.recounts[k].assignee || "").trim();
    if(a && assignees.indexOf(a) === -1) assignees.push(a);
  });
  assignees.sort(function(a,b){ return a.localeCompare(b, 'zh-Hant'); });

  // 篩選器按鈕
  var filterBtns = '<button class="chip'+(state.recountFilter===""?" active":"")+'" data-action="recount-filter" data-assignee="">全部</button>';
  assignees.forEach(function(a){
    filterBtns += '<button class="chip'+(state.recountFilter===a?" active":"")+'" data-action="recount-filter" data-assignee="'+escapeHtml(a)+'">'+escapeHtml(a)+'</button>';
  });
  // 未指派的也給一個篩選
  var hasUnassigned = keys.some(function(k){ return !(state.recounts[k].assignee || "").trim(); });
  if(hasUnassigned){
    filterBtns += '<button class="chip'+(state.recountFilter==="__none__"?" active":"")+'" data-action="recount-filter" data-assignee="__none__">未指派</button>';
  }

  // 依篩選條件列出項目
  var rowsHtml = "";
  var shownCount = 0;
  keys.forEach(function(k){
    var r = state.recounts[k];
    var assignee = (r.assignee || "").trim();
    // 篩選
    if(state.recountFilter === "__none__"){
      if(assignee) return;
    } else if(state.recountFilter !== ""){
      if(assignee !== state.recountFilter) return;
    }
    shownCount++;
    var parts = k.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    var c = state.counts[k];
    // 第一次的加總
    var firstShelf = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined ? (Number(c.shelf)||0) : null;
    var firstStock = c && c.stock !== "" && c.stock !== null && c.stock !== undefined ? (Number(c.stock)||0) : null;
    var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;
    // 複盤值：r.recount 現在存的是算式文字（可能是純數字或 "50+30+12"）
    var recountRaw = (r.recount !== null && r.recount !== undefined) ? String(r.recount) : "";
    var hasRecount = recountRaw.trim() !== "";
    var recountVal = hasRecount ? parseExpr(recountRaw) : null;
    // 差異
    var diffHtml = "";
    if(firstTotal !== null && recountVal !== null){
      var diff = recountVal - firstTotal;
      var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
      var diffText = diff === 0 ? "一致 ✓" : (diff > 0 ? "+"+diff : ""+diff);
      diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
    } else if(recountVal === null){
      diffHtml = '<span style="color:var(--muted);">待複盤</span>';
    }
    // 若複盤是算式（含 + 或 ×），在輸入框下方顯示算出的合計
    var recountCalcHint = (hasRecount && /[+×xX*]/.test(recountRaw))
      ? '<div class="ri-calc-hint">= '+recountVal+'</div>'
      : '';

    rowsHtml += '<div class="recount-item'+(recountVal!==null?' done':'')+'">'+
      '<div class="ri-top">'+
        '<div class="ri-title">'+escapeHtml(style)+' · '+escapeHtml(color)+' · '+escapeHtml(size)+'</div>'+
        (assignee ? '<span class="ri-assignee">'+escapeHtml(assignee)+'</span>' : '<span class="ri-assignee unassigned">未指派</span>')+
      '</div>'+
      '<div class="ri-nums">'+
        '<div class="ri-num"><div class="ri-num-label">第一次</div><div class="ri-num-val">'+(firstTotal!==null?firstTotal:'—')+'</div></div>'+
        '<div class="ri-arrow">→</div>'+
        '<div class="ri-num"><div class="ri-num-label">複盤（可加可乘）</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(recountRaw)+'" placeholder="如 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-action="recount-input">'+
          recountCalcHint+'</div>'+
        '<div class="ri-num"><div class="ri-num-label">差異</div><div class="ri-num-val">'+diffHtml+'</div></div>'+
      '</div>'+
      '<div class="ri-actions">'+
        '<button class="mini-btn" data-action="unmark-recount" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" style="border-color:#e3a89a; background:#fdf3ef; color:var(--accent-deep);">移除此項</button>'+
      '</div>'+
    '</div>';
  });

  if(shownCount === 0){
    rowsHtml = emptyStateHtml('沒有複盤項目', keys.length === 0 ? '到彙總頁的明細，點「標記複盤」把要複盤的品項加進來' : '這個篩選條件下沒有項目');
  }

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
    '<div class="brand">複盤任務</div>'+
    '<button class="icon-btn" data-action="manual-sync-recount" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
  '</div></div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>複盤清單</h2>'+
      '<p class="sub">共 '+keys.length+' 筆。填入複盤重數的數字，會自動跟第一次盤點的加總對照差異。可依負責人篩選。</p>'+
      '<div class="chip-strip" style="margin-bottom:14px;">'+filterBtns+'</div>'+
      rowsHtml+
    '</div>'+
    (keys.length > 0 ? '<button class="btn secondary" data-action="clear-recounts" style="color:var(--accent-deep);border-color:var(--accent-deep)">清空所有複盤任務</button>' : '')+
  '</main>';
}

// ---------- Excel export (one worksheet per 款式) ----------
function sanitizeSheetName(name, usedNames){
  var clean = String(name).replace(/[\\\/\?\*\[\]:]/g, "_").slice(0,31);
  if(!clean) clean = "Sheet";
  var base = clean, n = 1;
  while(usedNames[clean]){
    n++;
    var suffix = "_" + n;
    clean = base.slice(0, 31 - suffix.length) + suffix;
  }
  usedNames[clean] = true;
  return clean;
}

function buildWorkbook(){
  var wb = XLSX.utils.book_new();
  var usedNames = {};
  state.structure.forEach(function(st){
    var rows = [["顏色","尺寸","架上","庫存","加總"]];
    var sumShelf = 0, sumStock = 0, sumTotal = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelf = c && c.shelf !== "" ? Number(c.shelf)||0 : (c ? 0 : "");
        var stock = c && c.stock !== "" ? Number(c.stock)||0 : (c ? 0 : "");
        var total = c ? Number(c.total)||0 : "";
        rows.push([col.name, sz, shelf, stock, total]);
        if(c){
          sumShelf += Number(c.shelf)||0;
          sumStock += Number(c.stock)||0;
          sumTotal += Number(c.total)||0;
        }
      });
    });
    rows.push(["總計", "", sumShelf, sumStock, sumTotal]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:8},{wch:8},{wch:8}];
    var sheetName = sanitizeSheetName(st.style, usedNames);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  return wb;
}

function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

function downloadWorkbook(){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var wb = buildWorkbook();
  XLSX.writeFile(wb, "盤點結果_" + dateStr() + ".xlsx");
}

// ---------- Helpers ----------
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

// ---------- Events ----------
function bindEvents(){
  var app = document.getElementById("app");

  if(!app._delegated){
    app._delegated = true;
    app.addEventListener('click', async function(ev){
      var el = ev.target.closest('[data-action]');
      if(!el || !app.contains(el)) return;
      var action = el.getAttribute('data-action');

      if(action === 'goto-home'){ state.view = "home"; render(); }
      else if(action === 'back-to-brand'){
        var st2 = state.structure[state.curStyleIdx];
        var g2 = findBrandGroupForStyle(st2.style);
        if(g2 && g2.brand !== null){
          state.curBrandName = g2.brand;
          state.view = "brandModels";
        } else {
          state.view = "home";
        }
        render();
      }
      else if(action === 'manual-sync'){
        var statusEl = document.getElementById('sync-status');
        if(statusEl) statusEl.textContent = "🔄 同步中...";
        await syncFromBackend();
        showToast("已更新");
      }

      else if(action === 'refresh-summary'){
        // 記住目前展開的品牌跟型號，刷新後重新展開（不破壞使用者的操作狀態）
        var expandedBrands = [];
        var expandedStyles = [];
        document.querySelectorAll('.brand-group.expanded').forEach(function(g){
          expandedBrands.push(g.getAttribute('data-brand-name'));
        });
        document.querySelectorAll('.style-group.expanded').forEach(function(sg){
          var nameEl = sg.querySelector('.sg-name');
          if(nameEl) expandedStyles.push(nameEl.textContent.trim().split(' ')[0]);
        });
        await syncFromBackend();
        render();
        // 重新展開原本展開的區塊
        expandedBrands.forEach(function(name){
          document.querySelectorAll('.brand-group').forEach(function(g){
            if(g.getAttribute('data-brand-name') === name) g.classList.add('expanded');
          });
        });
        expandedStyles.forEach(function(name){
          document.querySelectorAll('.style-group').forEach(function(sg){
            var nameEl = sg.querySelector('.sg-name');
            if(nameEl && nameEl.textContent.trim().split(' ')[0] === name){
              sg.classList.add('expanded');
            }
          });
        });
        showToast("明細已更新");
      }

      else if(action === 'goto-setup'){
        var pwd = prompt('請輸入管理員密碼：');
        if(pwd === null) return; // 使用者按取消
        if(pwd !== ADMIN_PASSWORD){
          showToast("密碼錯誤");
          return;
        }
        state.view = "setup";
        render();
      }
      else if(action === 'goto-summary'){ state.view = "summary"; render(); }

      else if(action === 'goto-recount'){ state.view = "recount"; state.recountFilter = ""; render(); }

      else if(action === 'mark-recount'){
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        var assignee = prompt('要指派給誰複盤？（可留空，之後在複盤清單也能改）\n\n'+style+' · '+color+' · '+size);
        if(assignee === null) return; // 取消
        await markRecountRemote(style, color, size, assignee.trim());
        showToast('已標記複盤'+(assignee.trim()?('，指派給 '+assignee.trim()):''));
        render();
      }

      else if(action === 'unmark-recount'){
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        await unmarkRecountRemote(style, color, size);
        showToast('已移除複盤標記');
        render();
      }

      else if(action === 'recount-filter'){
        state.recountFilter = el.getAttribute('data-assignee');
        render();
      }

      else if(action === 'manual-sync-recount'){
        await syncFromBackend();
        render();
        showToast('已更新');
      }

      else if(action === 'clear-recounts'){
        if(!confirm('⚠️ 確定要清空所有複盤任務嗎？\n\n這會移除所有複盤標記跟已填的複盤數字（不影響第一次盤點的資料）。此動作無法復原。')){
          return;
        }
        await clearRecountsRemote();
        showToast('已清空複盤任務');
        render();
      }

      else if(action === 'open-brand'){
        state.curBrandName = el.getAttribute('data-brand-name');
        state.view = "brandModels";
        render();
      }

      else if(action === 'open-style'){
        state.curStyleIdx = Number(el.getAttribute('data-style-idx'));
        state.curColorIdx = 0;
        state.curSizeIdx = 0;
        state.view = "counting";
        render();
      }

      else if(action === 'jump-color'){
        await persistCurrentInputs(); // 先存目前這格的資料
        state.curColorIdx = Number(el.getAttribute('data-color-idx'));
        state.curSizeIdx = 0;
        render();
      }
      else if(action === 'jump-size'){
        await persistCurrentInputs();
        state.curSizeIdx = Number(el.getAttribute('data-size-idx'));
        render();
      }

      else if(action === 'add-token'){
        var field = el.getAttribute('data-field');
        var op = el.getAttribute('data-op');
        addTokenToExpr(field, op);
      }

      else if(action === 'edit-token'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        openTokenEditor(field, idx);
      }

      else if(action === 'apply-token-num'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        applyTokenNum(field, idx);
      }

      else if(action === 'apply-token-op'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        var op = el.getAttribute('data-op');
        applyTokenOp(field, idx, op);
      }

      else if(action === 'delete-token'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        deleteToken(field, idx);
      }

      else if(action === 'cancel-token-edit'){
        var field = el.getAttribute('data-field');
        document.getElementById(field+'-editor').innerHTML = "";
      }

      else if(action === 'next-slot'){
        await persistCurrentInputs();
        advanceSlot(1);
      }
      else if(action === 'prev-slot'){
        await persistCurrentInputs();
        advanceSlot(-1);
      }

      else if(action === 'bulk-import'){
        var raw = document.getElementById('bulk-import-data').value.trim();
        if(!raw){ showToast("請先貼上資料"); return; }
        var parsed;
        try{
          parsed = JSON.parse(raw);
        }catch(e){
          showToast("JSON 格式錯誤，請確認這一段有完整複製（開頭要有 [ 結尾要有 ]）");
          return;
        }
        if(!Array.isArray(parsed) || parsed.length===0){
          showToast("資料格式不正確（應該是一個陣列）");
          return;
        }

        // 合併：同名款式覆蓋更新，其他款式不受影響
        var merged = state.structure.slice();
        var nameToIdx = {};
        merged.forEach(function(item, idx){ nameToIdx[item.style] = idx; });
        var addedNames = [];
        parsed.forEach(function(item){
          if(nameToIdx.hasOwnProperty(item.style)){
            merged[nameToIdx[item.style]] = item;
          } else {
            nameToIdx[item.style] = merged.length;
            merged.push(item);
          }
          addedNames.push(item.style);
        });

        if(!confirm('這一段有 '+parsed.length+' 個款式（'+addedNames.slice(0,5).join('、')+(addedNames.length>5?'...':'')+'），會加入或更新到現有清單，合併後總共 '+merged.length+' 個款式。確定繼續嗎？')){
          return;
        }
        el.disabled = true;
        el.textContent = "匯入中…";
        var ok = false;
        try{
          ok = await saveStructure(merged);
        }catch(e){
          console.error("bulk-import unexpected error", e);
          ok = false;
        }
        el.disabled = false;
        el.textContent = "匯入這一段（加入現有款式）";
        if(ok){
          state.structure = sortStructureByStyle(merged);
          document.getElementById('bulk-import-data').value = "";
          showToast("已加入這段，目前共 "+merged.length+" 個款式");
          render();
        }else{
          showToast("匯入失敗，資料沒有寫入，請重試或檢查網路");
        }
        return;
      }

      else if(action === 'add-style'){
        var name = document.getElementById('new-style-name').value.trim();
        var colorsRaw = document.getElementById('new-style-colors').value;
        var sizesRaw = document.getElementById('new-style-sizes').value;
        var colors = colorsRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean);
        var sizes = sizesRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean);
        if(!name || colors.length===0 || sizes.length===0){
          showToast("請填入款式名稱、至少一個顏色與一個尺寸");
          return;
        }
        state.structure.push({
          style: name,
          colors: colors.map(function(cn){ return {name: cn, sizes: sizes.slice()}; })
        });
        state.structure = sortStructureByStyle(state.structure);
        await saveStructure(state.structure);
        showToast("已新增「"+name+"」");
        render();
      }

      else if(action === 'delete-style'){
        var idx = Number(el.getAttribute('data-style-idx'));
        var styleName = state.structure[idx].style;
        var colorCount = state.structure[idx].colors.length;
        if(!confirm('⚠️ 確定要刪除「'+styleName+'」嗎？\n\n這個款式有 '+colorCount+' 個顏色，刪除後畫面上會看不到（已輸入過的盤點數字會保留在後端）。')){
          return;
        }
        state.structure.splice(idx,1);
        await saveStructure(state.structure);
        showToast("已刪除「"+styleName+"」");
        render();
      }

      else if(action === 'move-brand-up' || action === 'move-brand-down'){
        var brand = el.getAttribute('data-brand');
        // 取得目前實際使用中的品牌順序
        var activeBrands = [];
        computeBrandGroups().forEach(function(g){
          if(g.brand !== null && activeBrands.indexOf(g.brand) === -1) activeBrands.push(g.brand);
        });
        var pos = activeBrands.indexOf(brand);
        if(pos === -1) return;
        var swapWith = action === 'move-brand-up' ? pos - 1 : pos + 1;
        if(swapWith < 0 || swapWith >= activeBrands.length) return;
        // 交換
        var tmp = activeBrands[pos];
        activeBrands[pos] = activeBrands[swapWith];
        activeBrands[swapWith] = tmp;
        BRAND_ORDER = activeBrands;
        render(); // 先即時更新畫面
        try{
          await apiPost({ action:"saveBrandOrder", order: BRAND_ORDER });
        }catch(e){
          console.error("save brand order failed", e);
          showToast("順序已更新，但儲存到雲端失敗，請檢查網路");
        }
      }

      else if(action === 'set-style-brand'){
        var styleName = document.getElementById('set-brand-style').value;
        var brandName = document.getElementById('set-brand-name').value.trim();
        if(!styleName){ showToast("請選擇要設定的款式"); return; }
        var item = state.structure.find(function(s){ return s.style === styleName; });
        if(!item){ showToast("找不到該款式"); return; }
        item.brand = brandName;
        el.disabled = true;
        el.textContent = "儲存中…";
        var ok = false;
        try{
          ok = await saveStructure(state.structure);
        }catch(e){
          console.error("set-style-brand failed", e);
          ok = false;
        }
        el.disabled = false;
        el.textContent = "套用品牌設定";
        if(ok){
          state.structure = sortStructureByStyle(state.structure);
          showToast(brandName ? ('已將「'+styleName+'」設為品牌「'+brandName+'」') : ('「'+styleName+'」已設為獨立顯示'));
          render();
        } else {
          // 儲存失敗，回復原本的設定
          showToast("儲存失敗，請重試");
        }
      }

      else if(action === 'rename-style'){
        var oldName = document.getElementById('rename-old').value.trim();
        var newName = document.getElementById('rename-new').value.trim();
        if(!oldName || !newName){ showToast("請填入目前名稱跟新名稱"); return; }
        if(!confirm('確定要把「'+oldName+'」改名成「'+newName+'」嗎？已填過的盤點數字會一起搬過去。')){
          return;
        }
        el.disabled = true;
        el.textContent = "處理中…";
        try{
          var result = await apiPost({ action:"renameStyle", oldName:oldName, newName:newName });
          if(result && result.ok){
            var item = state.structure.find(function(s){ return s.style === oldName; });
            if(item) item.style = newName;
            state.structure = sortStructureByStyle(state.structure);
            var newCounts = {};
            Object.keys(state.counts).forEach(function(k){
              if(k.indexOf(oldName+"|") === 0){
                newCounts[newName+"|"+k.slice(oldName.length+1)] = state.counts[k];
              } else {
                newCounts[k] = state.counts[k];
              }
            });
            state.counts = newCounts;
            showToast("已改名，結構 "+result.structChanged+" 筆、盤點記錄 "+result.rawChanged+" 筆");
            render();
          } else {
            showToast("改名失敗：" + (result && result.error ? result.error : "未知原因"));
          }
        }catch(e){
          console.error("rename style failed", e);
          showToast("改名失敗：" + (e && e.message ? e.message : "未知錯誤"));
        }
        el.disabled = false;
        el.textContent = "重新命名";
      }

      else if(action === 'compact-raw'){
        el.disabled = true;
        el.textContent = "整理中…";
        try{
          await apiPost({ action:"compactRaw" });
          showToast("已整理完成，表格已變小");
        }catch(e){
          console.error("compact raw failed", e);
          showToast("整理失敗：" + (e && e.message ? e.message : "未知錯誤"));
        }
        el.disabled = false;
        el.textContent = "整理原始資料";
      }

      else if(action === 'clear-counts'){
        if(!confirm('⚠️ 確定要清空所有人已經輸入的盤點數字嗎？\n\n這個動作無法復原。')){
          return;
        }
        await clearAllCountsRemote();
        state.counts = {};
        showToast("已清空所有盤點數字");
        render();
      }

      else if(action === 'download-xlsx'){
        downloadWorkbook();
      }

      else if(action === 'toggle-brand-group'){
        var group = el.closest('.brand-group');
        if(group){
          group.classList.toggle('expanded');
        }
      }

      else if(action === 'toggle-style-group'){
        var sgroup = el.closest('.style-group');
        if(sgroup){
          sgroup.classList.toggle('expanded');
        }
      }

      else if(action === 'regenerate-sheets'){
        el.disabled = true;
        el.textContent = "更新中…";
        var ok = await regenerateSummarySheetsRemote();
        if(ok){ showToast("已在 Google Sheet 產生彙總分頁"); }
        el.disabled = false;
        el.textContent = "更新 Google Sheet 彙總分頁";
      }

      else if(action === 'copy-tsv'){
        var data = document.getElementById('tsv-data').textContent;
        try{
          await navigator.clipboard.writeText(data);
          showToast("已複製，到 Sheet 貼上即可");
        }catch(e){
          showToast("複製失敗，請手動選取文字");
        }
      }
    });

    // 標籤編輯器：用事件委派處理「最後新增輸入框」的 Enter 鍵（動態新增也有效）
    app.addEventListener('keydown', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput') && ev.key === 'Enter'){
        var field = t.id === 'shelf-newinput' ? 'shelf' : (t.id === 'stock-newinput' ? 'stock' : null);
        if(field){ ev.preventDefault(); commitNewInput(field); }
      }
    });

    // 每打一個字就即時更新加總，連「還沒按+、還沒換格」的最後一個數字也算進去
    app.addEventListener('input', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        refreshSum();
      }
      // 複盤算式輸入時，即時在輸入框下方顯示算出的合計
      if(t && t.classList && t.classList.contains('ri-input')){
        var raw = t.value.trim();
        var wrap = t.parentNode; // .ri-num
        var hint = wrap.querySelector('.ri-calc-hint');
        var isExpr = /[+×xX*]/.test(raw);
        if(isExpr && raw !== ""){
          if(!hint){
            hint = document.createElement('div');
            hint.className = 'ri-calc-hint';
            wrap.appendChild(hint);
          }
          hint.textContent = '= ' + parseExpr(raw);
        } else if(hint){
          hint.textContent = "";
        }
      }
    });

    // 安全網：輸入框失焦時（切到別的地方、收起鍵盤）自動把最後一個數字收進去並存檔
    app.addEventListener('blur', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        persistCurrentInputs();
      }
      // 複盤算式輸入框失焦時存檔並更新差異
      if(t && t.classList && t.classList.contains('ri-input')){
        var style = t.getAttribute('data-style');
        var color = t.getAttribute('data-color');
        var size = t.getAttribute('data-size');
        var val = t.value.trim(); // 直接存算式文字（如 "50+30"），對照時用 parseExpr 算
        (async function(){
          await saveRecountValueRemote(style, color, size, val);
          if(state.view === "recount") render();
        })();
      }
    }, true); // 用 capture，因為 blur 不會冒泡

    // 批次匯入：選了檔案後自動讀取內容，填進文字框
    app.addEventListener('change', function(ev){
      var t = ev.target;
      if(t && t.id === 'bulk-import-file' && t.files && t.files[0]){
        var reader = new FileReader();
        reader.onload = function(e){
          document.getElementById('bulk-import-data').value = e.target.result;
          showToast("已讀取檔案「"+t.files[0].name+"」，按下面的「匯入這一段」即可");
        };
        reader.onerror = function(){
          showToast("讀取檔案失敗，請改用貼上文字的方式");
        };
        reader.readAsText(t.files[0], 'utf-8');
      }
    });
  }

  refreshSum();
}

// 重新計算並顯示加總：已收進算式的部分 + 兩個欄位「還沒送出」的當前輸入內容
function refreshSum(){
  var sumEl = document.getElementById('sum-val');
  if(!sumEl) return;
  var shelfPending = document.getElementById('shelf-newinput');
  var stockPending = document.getElementById('stock-newinput');
  var shelfTotal = parseExpr(state.exprShelf) + (shelfPending ? parseExpr(shelfPending.value) : 0);
  var stockTotal = parseExpr(state.exprStock) + (stockPending ? parseExpr(stockPending.value) : 0);
  sumEl.textContent = shelfTotal + stockTotal;
}

function getExpr(field){ return field === 'shelf' ? state.exprShelf : state.exprStock; }
function setExpr(field, val){ if(field === 'shelf') state.exprShelf = val; else state.exprStock = val; }

// 就地更新：只換前面的標籤串，輸入框 DOM 不動，清空內容並維持焦點（手機鍵盤不會收起）
function updateChipsInPlace(field, keepFocus){
  var list = document.getElementById(field+'-chiplist');
  if(list){
    list.outerHTML = renderTokenChips(field);
  }
  var inp = document.getElementById(field+'-newinput');
  if(inp){
    inp.value = "";
    if(keepFocus){ inp.focus(); }
  }
  // 點標籤的編輯彈窗若開著，關掉
  var editor = document.getElementById(field+'-editor');
  if(editor) editor.innerHTML = "";
  refreshSum();
}

// 把最後輸入框裡的數字，先收進算式（如果有打東西的話）
function commitNewInput(field){
  var inp = document.getElementById(field+'-newinput');
  if(!inp) return;
  var v = inp.value.trim();
  if(v === "") return;
  var tokens = tokenizeExpr(getExpr(field));
  // 如果目前結尾是運算符或空的，直接接數字；否則預設用 + 連接
  if(tokens.length === 0){
    tokens.push({t:'num', v:v});
  } else if(tokens[tokens.length-1].t === 'op'){
    tokens.push({t:'num', v:v});
  } else {
    tokens.push({t:'op', v:'+'});
    tokens.push({t:'num', v:v});
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// 按了 + 或 × 新增：先把輸入框內容收進去，再補上運算符，等待下一個數字
function addTokenToExpr(field, op){
  var inp = document.getElementById(field+'-newinput');
  var pending = inp ? inp.value.trim() : "";
  var tokens = tokenizeExpr(getExpr(field));
  if(pending !== ""){
    if(tokens.length > 0 && tokens[tokens.length-1].t === 'num'){
      tokens.push({t:'op', v:'+'});
    }
    if(tokens.length === 0 || tokens[tokens.length-1].t === 'op'){
      tokens.push({t:'num', v:pending});
    }
  }
  // 結尾若已是運算符就先移除，避免連續兩個運算符
  if(tokens.length > 0 && tokens[tokens.length-1].t === 'op'){
    tokens.pop();
  }
  if(tokens.length === 0) return; // 還沒有任何數字，不能先放運算符
  tokens.push({t:'op', v:op});
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// 點某個 token 打開編輯彈窗
function openTokenEditor(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  var tk = tokens[idx];
  var editor = document.getElementById(field+'-editor');
  if(!editor) return;
  var html = '<div class="chip-editor">';
  if(tk.t === 'num'){
    html += '<div class="ce-label">修改這個數字</div>';
    html += '<div class="ce-row">';
    html += '<input id="'+field+'-edit-input" type="text" inputmode="decimal" value="'+escapeHtml(tk.v)+'">';
    html += '<button class="ce-btn primary" data-action="apply-token-num" data-field="'+field+'" data-idx="'+idx+'">改好</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  } else {
    var other = tk.v === '×' ? '+' : '×';
    html += '<div class="ce-label">這個運算符（目前是 '+escapeHtml(tk.v)+'）</div>';
    html += '<div class="ce-row">';
    html += '<button class="ce-btn primary" data-action="apply-token-op" data-field="'+field+'" data-idx="'+idx+'" data-op="'+other+'">改成 '+other+'</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除（連同後面數字）</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  }
  html += '</div>';
  editor.innerHTML = html;
  var inp = document.getElementById(field+'-edit-input');
  if(inp){ inp.focus(); inp.select(); }
}

function applyTokenNum(field, idx){
  var inp = document.getElementById(field+'-edit-input');
  if(!inp) return;
  var v = inp.value.trim();
  var tokens = tokenizeExpr(getExpr(field));
  if(v === ""){ deleteToken(field, idx); return; }
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'num'){
    tokens[idx].v = v;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

function applyTokenOp(field, idx, op){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'op'){
    tokens[idx].v = op;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

// 刪除 token：刪數字時連同它前面的運算符一起拿掉；刪運算符時連同後面的數字一起拿掉
function deleteToken(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  if(tokens[idx].t === 'num'){
    // 刪數字：若前面有運算符一起刪，否則若後面有運算符也一起刪
    if(idx > 0 && tokens[idx-1].t === 'op'){
      tokens.splice(idx-1, 2);
    } else if(idx+1 < tokens.length && tokens[idx+1].t === 'op'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  } else {
    // 刪運算符：連同後面那個數字一起刪
    if(idx+1 < tokens.length && tokens[idx+1].t === 'num'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, false);
}

// 把像 "65+65+96" 或 "12×6+8" 這種算式換算成總和，× 的運算優先於 +（例如 12×6+8 = 80）
function parseExpr(str){
  if(str === null || str === undefined) return 0;
  var s = String(str).trim().replace(/[xX]/g, "×"); // 容許用英文字母 x 代替 ×
  if(s === "") return 0;
  var terms = s.split("+");
  var sum = 0;
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("×");
    var product = null;
    for(var j=0;j<factors.length;j++){
      var n = parseFloat(factors[j].trim());
      if(isNaN(n)) continue;
      product = (product === null) ? n : product * n;
    }
    if(product !== null) sum += product;
  }
  return sum;
}

async function persistCurrentInputs(){
  if(state.view !== "counting") return;
  // 先把兩個欄位「最後輸入框」尚未送出的數字收進算式
  commitNewInput('shelf');
  commitNewInput('stock');
  var shelfRaw = state.exprShelf || "";
  var stockRaw = state.exprStock || "";
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key];
  // 兩格都空、而且之前也沒存過東西 → 略過（避免送出毫無意義的空白記錄）
  // 但若之前有存過東西、現在被清空 → 必須送出，把後端的舊值蓋掉
  if(shelfRaw === "" && stockRaw === "" && !existing) return;
  await saveCount(st.style, col.name, size, shelfRaw, stockRaw);
}

function advanceSlot(dir){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  state.curSizeIdx += dir;

  if(state.curSizeIdx >= col.sizes.length){
    state.curColorIdx++;
    state.curSizeIdx = 0;
    if(state.curColorIdx >= st.colors.length){
      state.curStyleIdx++;
      state.curColorIdx = 0;
      if(state.curStyleIdx >= state.structure.length){
        // finished everything
        state.curStyleIdx = state.structure.length - 1;
        state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
        state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
        showToast("這個款式已經盤完了 🎉");
        state.view = "home";
        render();
        return;
      }
    }
  } else if(state.curSizeIdx < 0){
    state.curColorIdx--;
    if(state.curColorIdx < 0){
      state.curStyleIdx--;
      if(state.curStyleIdx < 0){ state.curStyleIdx = 0; state.curColorIdx = 0; state.curSizeIdx = 0; render(); return; }
      state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
    }
    state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
  }
  render();
}

init();
})();
