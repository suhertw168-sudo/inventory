// ---------- 算式共用邏輯（初盤標籤編輯器、複盤輸入框都用同一套） ----------

// 把可能的運算符號統一正規化成標準的 + 和 ×：
// 乘號同時接受 × * x X ＊（全形星號）；加號同時接受 + ＋（全形加號）
function normalizeExprSymbols(str){
  return String(str).replace(/[×xX*＊]/g, "×").replace(/＋/g, "+");
}

// 驗證一個算式字串是否合法（可加可乘，例如 "12×6+8"）。
// 空字串（或只有空白）視為合法，代表「還沒填」，回傳 null；
// 格式有問題（看不懂的符號、運算符前後沒有數字）回傳錯誤訊息文字。
function validateExpr(str){
  if(str === null || str === undefined) return null;
  var s = normalizeExprSymbols(str).replace(/\s+/g, "");
  if(s === "") return null;
  if(/[^0-9.+×]/.test(s)){
    return "「"+str+"」有看不懂的符號，只能用數字、加號（+）或乘號（×／*／x）";
  }
  var terms = s.split("+");
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("×");
    for(var j=0;j<factors.length;j++){
      var f = factors[j];
      if(f === "" || isNaN(Number(f))){
        return "「"+str+"」算式沒打完整，請確認每個 + 或 × 前後都有數字";
      }
    }
  }
  return null;
}

// 把算式字串拆成 token 陣列，例如 "12×6+8" -> [{t:'num',v:'12'},{t:'op',v:'×'},{t:'num',v:'6'},{t:'op',v:'+'},{t:'num',v:'8'}]
function tokenizeExpr(str){
  if(!str) return [];
  var s = normalizeExprSymbols(str).replace(/\s+/g, "");
  if(s === "") return [];
  var tokens = [];
  var num = "";
  for(var i=0;i<s.length;i++){
    var ch = s[i];
    if(ch === "+" || ch === "×"){
      if(num !== ""){ tokens.push({t:'num', v:num}); num=""; }
      tokens.push({t:'op', v:ch});
    } else {
      num += ch;
    }
  }
  if(num !== "") tokens.push({t:'num', v:num});
  return tokens;
}

// 把 token 陣列組回字串
function tokensToStr(tokens){
  return tokens.map(function(tk){ return tk.v; }).join("");
}

// 產生「標籤式算式編輯器」的 HTML。field 為 "shelf" 或 "stock"
function renderExprEditor(field){
  var html = '<div class="expr-chips" id="'+field+'-chips">';
  html += renderTokenChips(field); // 前面的數字/運算符標籤（這塊會被就地更新）
  // 固定不動的新增區：輸入框 + 加號/乘號按鈕（DOM 不重建，鍵盤不收起）
  html += '<input class="expr-newinput" id="'+field+'-newinput" type="text" inputmode="decimal" placeholder="0">';
  html += '<div class="expr-addbtns">'+
    '<button class="expr-addbtn add-plus" data-action="add-token" data-field="'+field+'" data-op="+" type="button">+</button>'+
    '<button class="expr-addbtn add-times" data-action="add-token" data-field="'+field+'" data-op="×" type="button">×</button>'+
  '</div>';
  html += '</div>';
  html += '<div id="'+field+'-editor"></div>'; // 點標籤後的編輯彈窗會放這裡
  return html;
}

// 只產生前面那串數字/運算符標籤（不含輸入框），供就地更新用
function renderTokenChips(field){
  var exprStr = field === 'shelf' ? state.exprShelf : state.exprStock;
  var tokens = tokenizeExpr(exprStr);
  var html = '<span id="'+field+'-chiplist" class="expr-chiplist">';
  tokens.forEach(function(tk, idx){
    if(tk.t === 'num'){
      html += '<span class="expr-chip-num" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    } else {
      var opcls = tk.v === '×' ? 'op-times' : 'op-plus';
      html += '<span class="expr-chip-op '+opcls+'" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    }
  });
  html += '</span>';
  return html;
}

function renderCounting(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key] || {shelf:"", stock:""};
  var p = styleProgress(st, state.counts);
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;

  var chips = col.sizes.map(function(sz, i){
    var k = keyFor(st.style, col.name, sz);
    var cls = "chip";
    if(i === state.curSizeIdx) cls += " active";
    else if(state.failedSaveKeys[k]) cls += " save-failed";
    else if(slotComplete(state.counts[k])) cls += " done";
    return '<button class="'+cls+'" data-action="jump-size" data-size-idx="'+i+'">'+escapeHtml(sz)+'</button>';
  }).join("");

  var colorChips = st.colors.map(function(c, i){
    var cls = "chip";
    if(i === state.curColorIdx) cls += " active";
    else if(colorDone(st, c, state.counts)) cls += " done";
    return '<button class="'+cls+'" data-action="jump-color" data-color-idx="'+i+'">'+escapeHtml(c.name)+'</button>';
  }).join("");

  // 優先顯示原始算式文字（同一次開啟工具期間都會保留），沒有的話才顯示已存的數字
  var shelfVal = existing.shelfExpr !== undefined ? existing.shelfExpr : (existing.shelf !== undefined ? String(existing.shelf) : "");
  var stockVal = existing.stockExpr !== undefined ? existing.stockExpr : (existing.stock !== undefined ? String(existing.stock) : "");
  // 把目前格位的算式同步到 state，標籤編輯器以 state 為準
  state.exprShelf = shelfVal;
  state.exprStock = stockVal;
  var total = (existing.total !== undefined ? existing.total : (parseExpr(shelfVal) + parseExpr(stockVal)));

  var isFirst = state.curStyleIdx === 0 && state.curColorIdx === 0 && state.curSizeIdx === 0;
  var isLast = isLastSlot();
  var parentGroup = findBrandGroupForStyle(st.style);
  var backAction = (parentGroup && parentGroup.brand !== null) ? 'back-to-brand' : 'goto-home';
  var backLabel = (parentGroup && parentGroup.brand !== null) ? ('‹ '+escapeHtml(parentGroup.brand)) : '‹ 品牌';

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="'+backAction+'">'+backLabel+'</button>'+
      '<div class="brand">盤點中</div>'+
      '<span style="width:70px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(st.style)+' 進度 '+p.done+'/'+p.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 14px; margin-bottom:10px; background:#fcfbf8; border:1px solid var(--line); border-radius:10px; font-size:12px;">'+
      '<span style="color:var(--muted);">你的盤點身分：<strong style="color:var(--ink);">'+(getRecountUserName() ? escapeHtml(getRecountUserName()) : '尚未設定')+'</strong></span>'+
      '<button class="mini-btn" data-action="change-recount-username">'+(getRecountUserName() ? '改名字' : '設定名字')+'</button>'+
    '</div>'+
    '<div class="chip-strip">'+colorChips+'</div>'+
    '<div class="count-card">'+
      '<div class="ctx-label">款式 / 顏色</div>'+
      '<div class="style-name">'+escapeHtml(st.style)+' · '+escapeHtml(col.name)+'</div>'+
      '<div class="size-name">'+escapeHtml(size)+'</div>'+
      '<div class="input-grid">'+
        '<div class="num-box" id="shelf-box">'+
          '<label>架上</label>'+
          renderExprEditor('shelf')+
        '</div>'+
        '<div class="num-box" id="stock-box">'+
          '<label>庫存</label>'+
          renderExprEditor('stock')+
        '</div>'+
      '</div>'+
      '<div class="sum-row"><span class="sum-label">加總</span><span class="sum-val" id="sum-val">'+total+'</span></div>'+
      '<div class="nav-row">'+
        '<button class="btn secondary" data-action="prev-slot" '+(isFirst?'disabled':'')+'>‹ 上一項</button>'+
        '<button class="btn" data-action="next-slot">'+(isLast?'完成 ✓':'下一項 ›')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="chip-strip" style="margin-top:-6px;">'+chips+'</div>'+
  '</main>';
}

function isLastSlot(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  return state.curStyleIdx === state.structure.length - 1 &&
         state.curColorIdx === st.colors.length - 1 &&
         state.curSizeIdx === col.sizes.length - 1;
}

// ---------- SUMMARY ----------
function renderSummary(){
  var structure = state.structure;
  var tsvLines = ["款式\t顏色\t尺寸\t架上\t庫存\t加總"];

  // ERP 匯出用的款式下拉選單
  var erpStyleOptions = structure.map(function(st){
    return '<option value="'+escapeHtml(st.style)+'">'+escapeHtml(st.style)+'</option>';
  }).join("");

  // 先把所有資料按品牌分組
  function buildStyleTableHtml(st){
    var html = '<div style="overflow-x:auto;">'+
      '<table class="summary"><thead><tr><th><span style="display:inline-block; width:7px; height:7px; border-radius:50%; background:#e87a3e; margin-right:4px; vertical-align:middle;"></span>顏色</th><th>尺寸</th><th>架上</th><th>庫存</th><th>加總</th><th>複盤</th></tr></thead><tbody>';
    var styleShelf=0, styleStock=0, styleTotal=0, missingCount=0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
        var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
        var isMissing = !(shelfFilled && stockFilled); // 任一格沒填都算未完成
        if(isMissing) missingCount++;
        var shelf = shelfFilled ? c.shelf : "";
        var stock = stockFilled ? c.stock : "";
        var total = (shelfFilled || stockFilled) ? ((Number(c.shelf)||0)+(Number(c.stock)||0)) : "";
        var rowStyle = isMissing ? ' style="background:#fff4e6;"' : '';
        var colorCell = isMissing
          ? '<td style="color:#c45a1e; font-weight:700; white-space:nowrap;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#e87a3e; margin-right:6px; vertical-align:middle;"></span>'+escapeHtml(col.name)+'</td>'
          : '<td>'+escapeHtml(col.name)+'</td>';
        // 架上、庫存欄：沒填的那格顯示紅色「未填」，有填顯示數字
        var shelfCell = shelfFilled
          ? '<td class="num">'+shelf+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        var stockCell = stockFilled
          ? '<td class="num">'+stock+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        // 複盤標記欄：要不要複盤是 key in 人員依 ERP 比對在這裡決定的，所以標記/取消都在這裡做（toggle）。
        // 已標記時同一顆按鈕變成「取消」，點了會跳確認（見 unmark-recount 的 click handler）。
        var isMarked = !!state.recounts[key];
        var recountCell;
        if(isMarked){
          // key in 人員是唯一知道 ERP 差異線索的人（例如「差1箱，可能庫存漏點」），這裡讓他能直接記下來。
          // 備註編輯走置中彈出的視窗（見 openRecountNoteModal），不是格子內展開——表格有橫向捲動，
          // 展開在格子裡常常會落在螢幕外找不到，改用 fixed 定位的彈窗就不受橫向捲動位置影響。
          var rNote = String((state.recounts[key] && state.recounts[key].note) || "").trim();
          var noteBtnHtml = '<button class="mini-btn'+(rNote?' marked':'')+'" data-action="open-recount-note-modal" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">'+(rNote?'✎有備註':'✎備註')+'</button>';
          // 按鈕文字盡量短：欄寬是由這欄最寬的子元素撐出來的，文字越短欄位越窄，橫向捲動距離越少
          recountCell = '<td class="num" style="white-space:nowrap;">'+
            '<div style="display:flex; flex-direction:column; gap:4px; align-items:flex-end;">'+
              '<button class="mini-btn marked" data-action="unmark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">已標記</button>'+
              noteBtnHtml+
            '</div>'+
          '</td>';
        } else {
          recountCell = '<td class="num" style="white-space:nowrap;"><button class="mini-btn" data-action="mark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">標記</button></td>';
        }
        html += '<tr'+rowStyle+'>'+colorCell+'<td>'+escapeHtml(sz)+'</td>'+
          shelfCell + stockCell +
          '<td class="num"><strong>'+(total===""?'—':total)+'</strong></td>'+
          recountCell + '</tr>';
        tsvLines.push([st.style, col.name, sz, shelf, stock, total].join("\t"));
        if(c){ styleShelf+=Number(c.shelf)||0; styleStock+=Number(c.stock)||0; styleTotal+=(Number(c.shelf)||0)+(Number(c.stock)||0); }
      });
    });
    html += '<tr style="background:#faf7f1;"><td colspan="2"><strong>小計</strong></td>'+
      '<td class="num"><strong>'+styleShelf+'</strong></td>'+
      '<td class="num"><strong>'+styleStock+'</strong></td>'+
      '<td class="num"><strong>'+styleTotal+'</strong></td><td></td></tr>';
    html += '</tbody></table></div>';
    return {html:html, total:styleTotal, missing:missingCount};
  }

  // 計算單一款式的總計（彙總用，不依賴上面那個函式）
  function calcStyleTotal(st){
    var t = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var c = state.counts[keyFor(st.style, col.name, sz)];
        if(c) t += Number(c.total)||0;
      });
    });
    return t;
  }

  // 型號認領進度：品牌層級「已完成」判定用，key 是品牌名稱("" = 未分組)
  var claimProgressByBrand = {};
  computeClaimBrandProgress().forEach(function(cg){ claimProgressByBrand[cg.brand] = cg; });

  // 依動態計算的品牌分組組裝畫面（從 state.structure 即時算出）
  var groupsHtml = "";
  var grandMissing = 0;
  computeBrandGroups().forEach(function(g){
    var groupStyles = g.styles
      .map(function(name){ return structure.find(function(s){ return s.style === name; }); })
      .filter(function(s){ return s; });
    if(groupStyles.length === 0) return;

    var groupName = g.brand === null ? groupStyles[0].style : g.brand;
    var styleCount = groupStyles.length;
    var groupTotal = 0;
    var groupMissing = 0;
    var bodyHtml = "";

    groupStyles.forEach(function(st){
      var built = buildStyleTableHtml(st);
      groupTotal += built.total;
      groupMissing += built.missing;
      if(g.brand !== null){
        // 品牌底下多個型號：每個型號做成可摺疊的小卡片
        var styleMissingTag = built.missing > 0 ? ' <span style="background:#e87a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">未輸入 '+built.missing+'</span>' : '';
        var styleTotalText = ' · 合計 '+built.total;
        var styleClaimed = !!state.claims[st.style];
        var styleConfirmStatusHtml = buildConfirmStatusBadgeHtml(st.style);
        bodyHtml += '<div class="style-group'+(built.missing > 0 ? ' has-missing' : '')+'">'+
          '<div class="style-group-header" data-action="toggle-style-group">'+
            '<div class="sg-left">'+
              '<div class="sg-name">'+escapeHtml(st.style)+styleMissingTag+'</div>'+
              '<div class="sg-meta">'+st.colors.length+' 色'+styleTotalText+'</div>'+
            '</div>'+
            '<div class="hdr-right">'+
              styleConfirmStatusHtml+
              '<button class="mini-btn'+(styleClaimed?' marked':'')+'" data-action="toggle-claim" data-style="'+escapeHtml(st.style)+'">'+(styleClaimed?'✓ 已認領':'未認領')+'</button>'+
              '<div class="sg-arrow">›</div>'+
            '</div>'+
          '</div>'+
          '<div class="style-group-body">'+built.html+'</div>'+
        '</div>';
      } else {
        // 獨立款式（品牌只有一個型號）直接顯示明細
        bodyHtml += built.html;
      }
    });

    grandMissing += groupMissing;
    var metaParts = [];
    if(g.brand !== null) metaParts.push(styleCount + ' 個型號');
    if(groupMissing > 0) metaParts.push('<span style="color:#e87a3e; font-weight:700;">未輸入 '+groupMissing+' 筆</span>');
    var metaText = metaParts.join(' · ');
    // 沒有品牌分組的獨立款式：這一層 brand-group 其實就代表單一型號，所以認領按鈕跟登錄狀態放在這裡；
    // 有品牌分組的話，這兩個都已經放在上面每個型號各自的 style-group-header 裡，這裡不重複放
    var groupClaimBtnHtml = g.brand === null
      ? (function(){ var c = !!state.claims[groupName]; return '<button class="mini-btn'+(c?' marked':'')+'" data-action="toggle-claim" data-style="'+escapeHtml(groupName)+'">'+(c?'✓ 已認領':'未認領')+'</button>'; })()
      : '';
    var groupConfirmStatusHtml = g.brand === null ? buildConfirmStatusBadgeHtml(groupName) : '';
    // 品牌層「已完成」標籤：只有真的有品牌分組(底下不只一個型號)才顯示，判定沿用 computeClaimBrandProgress
    // (跟原本認領總覽頁用的同一套邏輯)——品牌底下所有型號都認領了才算完成
    var brandClaimProgress = g.brand !== null ? claimProgressByBrand[g.brand] : null;
    var brandAllClaimed = !!(brandClaimProgress && brandClaimProgress.totalCount > 0 && brandClaimProgress.doneCount === brandClaimProgress.totalCount);
    var brandClaimTag = brandAllClaimed
      ? ' <span style="background:#2f7a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">✅ 已完成</span>'
      : '';
    groupsHtml += '<div class="brand-group'+(groupMissing > 0 ? ' has-missing' : '')+'" data-brand-name="'+escapeHtml(groupName)+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+escapeHtml(groupName)+brandClaimTag+'</div>'+
            (metaText ? '<div class="bg-meta">'+metaText+'</div>' : '')+
          '</div>'+
        '</div>'+
        '<div class="hdr-right">'+
          '<div class="bg-totals">合計 '+groupTotal+'</div>'+
          groupConfirmStatusHtml+
          groupClaimBtnHtml+
          '<div class="bg-arrow">›</div>'+
        '</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  });

  // 整體總計
  var grandTotal = 0;
  structure.forEach(function(st){ grandTotal += calcStyleTotal(st); });

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
    '<div class="brand">彙總 / 匯出</div>'+
    '<button class="icon-btn" data-action="refresh-summary" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
  '</div>'+
    '<div id="summary-update-hint" data-action="refresh-summary" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
      '🔔 有新資料，點此刷新明細'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>匯出 ERP 匯入格式（品號／數量／倉別）</h2>'+
      '<p class="sub">選一個款式，匯出成 ERP 可匯入的格式。品號會自動組成（如 101-01#XS），數量用第一次盤點的架上+庫存加總，倉別依款式自動帶入（AG1000/2000/3000、TH 系列為 A02，其餘 A01）。只匯出有盤過的格。</p>'+
      '<div class="field">'+
        '<label>選擇款式</label>'+
        '<select id="erp-export-style">'+erpStyleOptions+'</select>'+
      '</div>'+
      '<button class="btn secondary" data-action="download-erp">匯出這個款式（ERP 格式）</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>明細（依品牌分組）</h2>'+
      '<p class="sub">點品牌標題展開或收合該品牌的明細。整體加總：<strong style="color:var(--accent-deep);">'+grandTotal+'</strong>'+
        (grandMissing > 0 ? ' · <strong style="color:#e87a3e;">尚有 '+grandMissing+' 筆未輸入</strong>' : ' · <strong style="color:#2f7a3e;">已全部輸入完成 ✓</strong>')+
      '</p>'+
      groupsHtml+
    '</div>'+
    '<div class="panel">'+
      '<h2>更新 Google Sheet 彙總分頁</h2>'+
      '<p class="sub">會在你的 Google Sheet 裡自動產生「彙總_款式名稱」分頁（不會動到原本既有的分頁），每個品項一個分頁，內容是該品項所有顏色、尺寸的架上／庫存／加總明細與總計。需要重新整理 Sheet 才會看到新分頁。</p>'+
      '<button class="btn" data-action="regenerate-sheets">更新 Google Sheet 彙總分頁</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>備用：下載 Excel 快照</h2>'+
      '<p class="sub">如果想要一份獨立的 Excel 檔（不在 Google Sheet 裡），可以用這個，結構跟上面的彙總分頁一樣。</p>'+
      '<button class="btn secondary" data-action="download-xlsx">下載 Excel（.xlsx）</button>'+
    '</div>'+
  '</main>'+
  '<div id="tsv-data" style="display:none;">'+escapeHtml(tsvLines.join("\n"))+'</div>';
}

// ---------- 複盤進度總覽（依品牌/款式彙總，只讀 state，不影響複盤存檔/樂觀更新/自動同步） ----------
// 複盤是否已填完成：架上、庫存兩格都要填才算完成（跟第一次盤點的完成判斷邏輯一致），
// 備註欄不算在內——沒填備註不影響完成進度。
function isRecountFilled(r){
  if(!r) return false;
  var shelfFilled = r.shelf !== null && r.shelf !== undefined && String(r.shelf).trim() !== "";
  var stockFilled = r.stock !== null && r.stock !== undefined && String(r.stock).trim() !== "";
  return shelfFilled && stockFilled;
}

// 取得某個複盤 key（"款式|顏色|尺寸"）所屬的品牌名稱(沒品牌回傳空字串)
// 跟 renderRecount() 內部的 brandOfKey 是同一套邏輯，這裡另外開一個全域版本給就地更新用
function brandOfRecountKey(key){
  var style = key.split("|")[0];
  var g = findBrandGroupForStyle(style);
  return (g && g.brand) ? g.brand : "";
}

// 就地更新單一複盤項目的「複盤加總」「差異」顯示，跟初盤 updateChipsInPlace() 同一套精神：
// 輸入框 DOM 完全不動、不整頁重畫，手機鍵盤不會因為重畫而收起。
// wasDone/isDoneNow 是這格「架上+庫存是否都已填」在這次修改前後的狀態，用來同步調整
// 品牌標題那一行「（X/Y 已複盤）」的計數（只有跨越「完成/未完成」門檻時才需要調整）。
function patchRecountItemDisplay(itemEl, key, wasDone, isDoneNow){
  if(!itemEl) return;
  var r = state.recounts[key];
  if(!r) return;
  var c = state.counts[key];
  var firstShelf = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined ? (Number(c.shelf)||0) : null;
  var firstStock = c && c.stock !== "" && c.stock !== null && c.stock !== undefined ? (Number(c.stock)||0) : null;
  var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;
  var countedBy = (c && c.countedBy) ? String(c.countedBy).trim() : "";

  var shelfRaw = (r.shelf !== null && r.shelf !== undefined) ? String(r.shelf) : "";
  var stockRaw = (r.stock !== null && r.stock !== undefined) ? String(r.stock) : "";
  var noteRaw = (r.note !== null && r.note !== undefined) ? String(r.note) : "";
  var recountVal = isDoneNow ? (parseExpr(shelfRaw) + parseExpr(stockRaw)) : null;

  // 就地更新架上／庫存／備註三個輸入框本身：同一套迴圈邏輯，不要各寫各的（備註沒有算式提示，
  // 用 hasCalcHint 開關跳過那段就好，邏輯還是共用同一份）。
  // 如果這個輸入框現在剛好是使用者正在打字的那一格（document.activeElement），就跳過不動它，
  // 避免背景同步把打到一半的內容蓋掉；沒在打字的那一格才同步成最新值——包含同步成空字串，
  // 這樣 A 機刪掉備註之後，B 機才會真的跟著清空，不會被「空字串是 falsy」擋下來。
  [
    {field:'shelf', raw:shelfRaw, selector:'.ri-input[data-field="shelf"]', hasCalcHint:true},
    {field:'stock', raw:stockRaw, selector:'.ri-input[data-field="stock"]', hasCalcHint:true},
    {field:'note',  raw:noteRaw,  selector:'.ri-note-input',                hasCalcHint:false}
  ].forEach(function(entry){
    var inputEl = itemEl.querySelector(entry.selector);
    if(!inputEl || document.activeElement === inputEl) return;
    if(inputEl.value !== entry.raw) inputEl.value = entry.raw;
    if(!entry.hasCalcHint) return;
    // 算式提示（例如「= 80」）跟著同步：有算式符號才顯示，沒有就把提示拿掉
    var numEl = inputEl.closest('.ri-num');
    var hintEl = numEl ? numEl.querySelector('.ri-calc-hint') : null;
    var hasCalc = entry.raw.trim() !== "" && /[+×xX*＊＋]/.test(entry.raw);
    if(hasCalc){
      if(!hintEl && numEl){
        hintEl = document.createElement('div');
        hintEl.className = 'ri-calc-hint';
        numEl.appendChild(hintEl);
      }
      if(hintEl) hintEl.textContent = '= ' + parseExpr(entry.raw);
    } else if(hintEl){
      hintEl.remove();
    }
  });

  // 「第一次」跟「初盤：OO」都是唯讀顯示（沒有輸入框，不用防呆保護），直接同步成最新值即可，
  // 避免 A 機重新初盤或改了初盤人之後，B 機這裡還卡著舊資料。
  var firstValEl = itemEl.querySelector('.ri-first-val');
  if(firstValEl) firstValEl.textContent = (firstTotal !== null ? firstTotal : '—');
  var countedByEl = itemEl.querySelector('.ri-countedby');
  if(countedByEl) countedByEl.textContent = '初盤：' + (countedBy || '未記錄');

  var diffHtml = "";
  if(firstTotal !== null && recountVal !== null){
    var diff = recountVal - firstTotal;
    var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
    var diffText = diff === 0 ? "一致 ✓" : (diff > 0 ? "+"+diff : ""+diff);
    diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
  } else if(recountVal === null){
    diffHtml = '<span style="color:var(--muted);">待複盤</span>';
  }

  itemEl.classList.toggle('done', isDoneNow);
  var totalEl = itemEl.querySelector('.ri-total-val');
  if(totalEl) totalEl.textContent = (recountVal !== null ? recountVal : '—');
  var diffEl = itemEl.querySelector('.ri-diff-val');
  if(diffEl) diffEl.innerHTML = diffHtml;

  // 就地更新狀態小標籤（尚無人複盤／OO 處理中／OO 複盤中／已由 OO 複盤）
  var badge = computeRecountBadge(r, isDoneNow);
  var badgeEl = itemEl.querySelector('.ri-assignee');
  if(badgeEl){
    badgeEl.className = 'ri-assignee' + (badge.cls ? ' '+badge.cls : '');
    badgeEl.textContent = badge.text;
  }

  // 這格從「未完成→完成」或「完成→未完成」時，順便把所屬品牌標題的計數 +1/-1（不用整段重算）
  if(wasDone !== isDoneNow){
    var brand = brandOfRecountKey(key);
    if(brand){
      var headEls = document.querySelectorAll('.recount-brand-head');
      for(var i=0;i<headEls.length;i++){
        if(headEls[i].getAttribute('data-brand') === brand){
          var doneN = (parseInt(headEls[i].getAttribute('data-done'),10) || 0) + (isDoneNow ? 1 : -1);
          var totalN = parseInt(headEls[i].getAttribute('data-total'),10) || 0;
          headEls[i].setAttribute('data-done', doneN);
          var countEl = headEls[i].querySelector('.rb-count');
          if(countEl) countEl.textContent = '（'+doneN+'/'+totalN+' 已複盤）';
          break;
        }
      }
    }
  }
}

// 依款式彙總複盤進度：只統計「有標記複盤格子」且「自己看得到」的款式（非主管只算指派給自己的格子，
// 跟複盤清單看到的範圍一致，避免總覽區塊透露出跟自己無關的其他人格子）。
// confirmed 是額外附加的統計（已確認回寫的格數），不影響 done/total 這個完成度定義本身。
// 回傳 { 款式名: { total, done, confirmed, missing:[{color,size},...] } }
function computeRecountStyleProgress(){
  var byStyle = {};
  visibleRecountKeys().forEach(function(key){
    var parts = key.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    if(!byStyle[style]) byStyle[style] = { total:0, done:0, confirmed:0, missing:[] };
    var entry = byStyle[style];
    entry.total++;
    if(isRecountFilled(state.recounts[key])){ entry.done++; }
    else { entry.missing.push({color:color, size:size}); }
    if(state.recounts[key].confirmed){ entry.confirmed++; }
  });
  return byStyle;
}

// 把款式進度依品牌分組：[{brand, styles:[{style,total,done,complete,missing}], doneCount, totalCount}, ...]
// brand === "" 代表未分組，排最前面；其餘依 BRAND_ORDER 排序。每組內未完成款式排前面、已完成排後面。
function computeRecountBrandProgress(){
  var styleProgress = computeRecountStyleProgress();
  var byBrand = {};
  Object.keys(styleProgress).forEach(function(styleName){
    var g = findBrandGroupForStyle(styleName);
    var brandLabel = (g && g.brand) ? g.brand : "";
    if(!byBrand[brandLabel]) byBrand[brandLabel] = [];
    var p = styleProgress[styleName];
    byBrand[brandLabel].push({
      style: styleName,
      total: p.total,
      done: p.done,
      confirmed: p.confirmed,
      complete: p.done === p.total,
      missing: p.missing
    });
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  var brandNames = Object.keys(byBrand).filter(function(b){ return b !== ""; }).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var result = [];
  if(byBrand[""]) result.push({ brand:"", styles: byBrand[""] });
  brandNames.forEach(function(b){ result.push({ brand:b, styles: byBrand[b] }); });
  result.forEach(function(g){
    g.styles.sort(function(a,b){
      if(a.complete !== b.complete) return a.complete ? 1 : -1; // 未完成優先
      return a.style.localeCompare(b.style, 'zh-Hant');
    });
    g.doneCount = g.styles.filter(function(s){ return s.complete; }).length;
    g.totalCount = g.styles.length;
  });
  return result;
}

// 把某款式「還差哪些格子」組成顯示文字，同色的尺寸合併，例如「藏青色 M、L」，多色用「；」分隔
function formatMissingSlots(missing){
  var byColor = {};
  var colorOrder = [];
  missing.forEach(function(m){
    if(!byColor[m.color]){ byColor[m.color] = []; colorOrder.push(m.color); }
    byColor[m.color].push(m.size);
  });
  return colorOrder.map(function(c){
    return escapeHtml(c) + ' ' + byColor[c].map(escapeHtml).join('、');
  }).join('；');
}

function renderRecountProgressOverview(){
  var groups = computeRecountBrandProgress();
  if(groups.length === 0) return "";

  var groupsHtml = groups.map(function(g){
    var label = g.brand === "" ? "未分組" : g.brand;
    var allDone = g.totalCount > 0 && g.doneCount === g.totalCount;

    var pendingStyles = g.styles.filter(function(s){ return !s.complete; });
    var doneStyles = g.styles.filter(function(s){ return s.complete; });

    var pendingHtml = pendingStyles.map(function(s){
      return '<div class="rp-pending-item">'+
        '<div class="rp-pending-top">'+
          '<span class="rp-pending-name">'+escapeHtml(s.style)+'</span>'+
          '<span class="rp-pending-count">'+s.done+'/'+s.total+(s.confirmed>0?'（已確認 '+s.confirmed+'）':'')+'</span>'+
        '</div>'+
        '<div class="rp-pending-missing">還差：'+formatMissingSlots(s.missing)+'</div>'+
      '</div>';
    }).join("");

    // 已完成（填完）不等於已確認回寫，兩者分開標示，方便主管一眼看出哪些款式雖然填完但還沒回寫彙總
    var doneHtml = doneStyles.length === 0 ? "" :
      '<div class="rp-done-wrap">'+
        '<div class="rp-done-header" data-action="toggle-rp-done">✓ 已完成 '+doneStyles.length+' 款（點此展開/收合）<span class="sg-arrow">›</span></div>'+
        '<div class="rp-done-body">'+
          doneStyles.map(function(s){
            var confirmTag = s.confirmed === s.total ? '（已確認 '+s.confirmed+'/'+s.total+'）' : '（已確認 '+s.confirmed+'/'+s.total+'，尚未全部回寫）';
            return '<div class="rp-done-item">✓ '+escapeHtml(s.style)+' <span style="color:var(--muted); font-weight:600;">'+confirmTag+'</span></div>';
          }).join("")+
        '</div>'+
      '</div>';

    return '<div class="brand-group rp-brand-group'+(allDone ? '' : ' has-missing')+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+(allDone ? '✅ ' : '')+escapeHtml(label)+'</div>'+
            '<div class="bg-meta">'+g.doneCount+'/'+g.totalCount+' 款完成</div>'+
          '</div>'+
        '</div>'+
        '<div class="bg-arrow">›</div>'+
      '</div>'+
      '<div class="brand-group-body">'+pendingHtml+doneHtml+'</div>'+
    '</div>';
  }).join("");

  return '<div class="panel">'+
    '<h2>複盤進度總覽</h2>'+
    '<p class="sub">依品牌統計「已標記複盤」的款式完成情形（分母只計入有標記複盤格子的款式）。點品牌可展開查看細項。</p>'+
    groupsHtml+
  '</div>';
}

// ---------- 型號登錄狀態判定（給彙總明細頁看，判斷這個型號要不要提醒 key in 人員處理） ----------
// 實際流程是「key in 登 ERP → 差距大才標記複盤 → 複盤確認回寫 → 通知 key in 重登」，複盤是登錄後的
// 例外處理，不是登錄前的門檻，所以這裡刻意分成三態，「沒有複盤任務」跟「複盤任務都處理完了」是兩種不同狀態：
//   "none"       - 這個型號沒有任何複盤任務：正常，初登完就結束，不用顯示徽章
//   "pending"    - 有複盤任務還沒確認回寫：「⚠ 複盤處理中」，附上還差幾格
//   "needsRelog" - 複盤任務全部確認回寫完畢，但還有格子沒標記重登：「🔔 可重新登錄」，通知 key in 重登 ERP
//   (全部確認且全部重登 = 沒有徽章，等於 key in 已經處理完這一輪)
// 跟複盤頁的 visibleRecountKeys() 是不同用途：彙總頁是給任何要登 ERP 的人看整體狀態，
// 所以這裡故意讀「全部」複盤任務（不套用複盤頁「指派給自己才看得到」的過濾）。
// confirmed/relogged 都是「格子等級」的旗標（見後端 Code.gs 的說明），不是型號等級的單一狀態——
// 這樣「取消複盤=整列刪除」「重新標記複盤=全新一列」這兩個既有機制，就能讓下一輪複盤時徽章自然重新出現，
// 不需要額外寫「重置」邏輯。
function computeStyleConfirmStatus(styleName){
  var pending = 0;
  var hasAny = false;
  var needsRelog = false;
  Object.keys(state.recounts).forEach(function(key){
    if(key.split("|")[0] !== styleName) return;
    hasAny = true;
    var r = state.recounts[key];
    if(!r.confirmed){ pending++; }
    else if(!r.relogged){ needsRelog = true; }
  });
  if(!hasAny) return { status:"none" };
  if(pending > 0) return { status:"pending", pending:pending };
  if(needsRelog) return { status:"needsRelog" };
  return { status:"done" };
}

// 把型號登錄狀態組成徽章 HTML，"none"/"done" 都不顯示徽章（正常狀態，不用打擾 key in 人員）。
// "needsRelog" 是一顆可點擊的按鈕，點了問過確認才會標記重登、消掉這顆徽章。
function buildConfirmStatusBadgeHtml(styleName){
  var cs = computeStyleConfirmStatus(styleName);
  if(cs.status === "pending"){
    return '<span class="confirm-status-badge pending">⚠ 複盤處理中(差'+cs.pending+'格)</span>';
  }
  if(cs.status === "needsRelog"){
    return '<button type="button" class="confirm-status-badge relog" data-action="relog-style-confirm" data-style="'+escapeHtml(styleName)+'">🔔 可重新登錄</button>';
  }
  return "";
}

// ---------- 型號認領進度判定（依品牌彙總「型號」層級的認領情形，避免多人同時把同一型號登入 ERP） ----------
// 給彙總明細頁的品牌標題用：品牌底下所有型號都認領了才算該品牌「已完成」。
// 沒有獨立的認領總覽頁面，這個判定函式直接接到 renderSummary 的品牌標題層。
function computeClaimBrandProgress(){
  var groups = computeBrandGroups(); // [{brand: 名稱或null, styles:[型號名稱,...]}, ...]
  var byBrand = {}; // 品牌標籤("" = 未分組) -> [型號名稱,...]
  groups.forEach(function(g){
    var label = g.brand || "";
    if(!byBrand[label]) byBrand[label] = [];
    g.styles.forEach(function(s){
      if(findStyleIdx(s) === -1) return; // 型號還沒建立在結構裡，跳過
      byBrand[label].push(s);
    });
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  var brandNames = Object.keys(byBrand).filter(function(b){ return b !== ""; }).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var result = [];
  if(byBrand[""] && byBrand[""].length > 0) result.push({ brand:"", styles: byBrand[""] });
  brandNames.forEach(function(b){ if(byBrand[b].length > 0) result.push({ brand:b, styles: byBrand[b] }); });
  result.forEach(function(g){
    g.doneCount = g.styles.filter(function(s){ return !!state.claims[s]; }).length;
    g.totalCount = g.styles.length;
  });
  return result;
}


// ---------- 複盤清單畫面 ----------
function renderRecount(){
  var manager = isManager();
  // 唯一的過濾點：主管看全部格子，非主管只看指派給自己的格子。下面的認領人篩選、品牌篩選、
  // 清單內容、空狀態訊息全部從這個已過濾好的 keys 往下算，不用各自重複判斷。
  var keys = visibleRecountKeys();
  // 記錄這次真的把清單畫出來時，畫面上有哪些品項，當作之後判斷「清單有沒有變動」的基準點
  recountRenderedKeys = keys.slice();

  // 收集所有認領人(用於篩選)。認領人姓名都是英文字母，不分大小寫視為同一人
  // （例如 "Amy" 跟 "amy" 歸類成同一個篩選項目），顯示用大小寫取第一次出現的那個寫法。
  var assigneeCanonical = {}; // 小寫 -> 顯示用原始大小寫
  keys.forEach(function(k){
    var a = String(state.recounts[k].assignee || "").trim();
    if(a){
      var lower = a.toLowerCase();
      if(!assigneeCanonical.hasOwnProperty(lower)) assigneeCanonical[lower] = a;
    }
  });
  var assignees = Object.keys(assigneeCanonical).map(function(lower){ return assigneeCanonical[lower]; });
  assignees.sort(function(a,b){ return a.localeCompare(b, 'zh-Hant'); });

  // 取得某個複盤項目所屬的品牌名稱(沒品牌回傳空字串)
  function brandOfKey(k){
    var style = k.split("|")[0];
    var g = findBrandGroupForStyle(style);
    return (g && g.brand) ? g.brand : "";
  }

  // 收集所有品牌(用於品牌篩選)
  var brands = [];
  keys.forEach(function(k){
    var b = brandOfKey(k);
    if(b && brands.indexOf(b) === -1) brands.push(b);
  });
  // 依 BRAND_ORDER 排序品牌
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  brands.sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var hasNoBrand = keys.some(function(k){ return !brandOfKey(k); });

  // 認領人篩選器：順序固定「全部」→「尚無人複盤」→ 其他人名，
  // 尚無人複盤排第二個是刻意的，不跟著人名數量往後擠，才好找
  var filterBtns = '<button class="chip'+(state.recountFilter===""?" active":"")+'" data-action="recount-filter" data-assignee="">全部</button>';
  var hasUnassigned = keys.some(function(k){ return !String(state.recounts[k].assignee || "").trim(); });
  if(hasUnassigned){
    filterBtns += '<button class="chip'+(state.recountFilter==="__none__"?" active":"")+'" data-action="recount-filter" data-assignee="__none__">尚無人複盤</button>';
  }
  assignees.forEach(function(a){
    var isActive = state.recountFilter !== "" && state.recountFilter !== "__none__" && state.recountFilter.toLowerCase() === a.toLowerCase();
    filterBtns += '<button class="chip'+(isActive?" active":"")+'" data-action="recount-filter" data-assignee="'+escapeHtml(a)+'">'+escapeHtml(a)+'</button>';
  });

  // 品牌篩選器
  var brandFilterBtns = '<button class="chip'+(state.recountBrandFilter===""?" active":"")+'" data-action="recount-brand-filter" data-brand="">全部品牌</button>';
  brands.forEach(function(b){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter===b?" active":"")+'" data-action="recount-brand-filter" data-brand="'+escapeHtml(b)+'">'+escapeHtml(b)+'</button>';
  });
  if(hasNoBrand){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter==="__nobrand__"?" active":"")+'" data-action="recount-brand-filter" data-brand="__nobrand__">未分組</button>';
  }

  // 產生單一複盤項目的 HTML
  function buildRecountItem(k){
    var r = state.recounts[k];
    var parts = k.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    var c = state.counts[k];
    var firstShelf = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined ? (Number(c.shelf)||0) : null;
    var firstStock = c && c.stock !== "" && c.stock !== null && c.stock !== undefined ? (Number(c.stock)||0) : null;
    var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;

    var shelfRaw = (r.shelf !== null && r.shelf !== undefined) ? String(r.shelf) : "";
    var stockRaw = (r.stock !== null && r.stock !== undefined) ? String(r.stock) : "";
    var noteRaw = (r.note !== null && r.note !== undefined) ? String(r.note) : "";
    var shelfFilled = shelfRaw.trim() !== "";
    var stockFilled = stockRaw.trim() !== "";
    var recountShelfVal = shelfFilled ? parseExpr(shelfRaw) : null;
    var recountStockVal = stockFilled ? parseExpr(stockRaw) : null;
    // 兩格都填了才算複盤完成，跟第一次盤點的完成判斷邏輯一致；備註不算在內
    var recountVal = (shelfFilled && stockFilled) ? (recountShelfVal + recountStockVal) : null;

    var diffHtml = "";
    if(firstTotal !== null && recountVal !== null){
      var diff = recountVal - firstTotal;
      var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
      var diffText = diff === 0 ? "一致 ✓" : (diff > 0 ? "+"+diff : ""+diff);
      diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
    } else if(recountVal === null){
      diffHtml = '<span style="color:var(--muted);">待複盤</span>';
    }
    var shelfCalcHint = (shelfFilled && /[+×xX*＊＋]/.test(shelfRaw)) ? '<div class="ri-calc-hint">= '+recountShelfVal+'</div>' : '';
    var stockCalcHint = (stockFilled && /[+×xX*＊＋]/.test(stockRaw)) ? '<div class="ri-calc-hint">= '+recountStockVal+'</div>' : '';
    var badge = computeRecountBadge(r, recountVal !== null);
    var countedBy = (c && c.countedBy) ? String(c.countedBy).trim() : "";
    // 指派標籤：只有主管看得到（非主管看到的本來就只有指派給自己的格子，不用再標一次）
    var assignedTo = String(state.assignments[k] || "").trim();
    var assignBadgeHtml = manager
      ? '<span class="ri-assign-badge'+(assignedTo?'':' unassigned')+'">'+(assignedTo?'已派：'+escapeHtml(assignedTo):'未指派')+'</span>'
      : '';

    // 確認回寫：只有主管看得到，且架上/庫存複盤都填完才能確認；已確認的格子改顯示狀態，不再顯示按鈕
    var confirmSectionHtml = "";
    if(r.confirmed){
      var confirmedAtText = r.confirmedAt ? formatConfirmedAt(r.confirmedAt) : "";
      confirmSectionHtml = '<div class="ri-confirmed-status">✓ 已確認（'+escapeHtml(r.confirmedBy || "")+(confirmedAtText ? '，'+confirmedAtText : '')+'）</div>';
    } else if(manager && recountVal !== null){
      confirmSectionHtml = '<button class="btn secondary ri-confirm-btn" data-action="confirm-recount" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'">確認更新（回寫彙總）</button>';
    }

    // 取消複盤的入口權責在彙總明細（key in 人員依 ERP 比對決定要不要複盤），複盤清單這裡只留給主管當例外處理的後路
    var unmarkBtnHtml = manager
      ? '<button class="mini-btn" data-action="unmark-recount-confirm" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" style="border-color:#e3a89a; background:#fdf3ef; color:var(--accent-deep);">取消複盤</button>'
      : '';

    return '<div class="recount-item'+(recountVal!==null?' done':'')+'" data-key="'+escapeHtml(k)+'">'+
      '<div class="ri-top">'+
        '<div class="ri-title">'+escapeHtml(style)+' · '+escapeHtml(color)+' · '+escapeHtml(size)+
          '<span class="ri-countedby" style="font-weight:400; color:var(--muted); font-size:12px; margin-left:8px;">初盤：'+escapeHtml(countedBy || '未記錄')+'</span>'+
        '</div>'+
        '<div class="hdr-right">'+
          assignBadgeHtml+
          '<span class="ri-assignee'+(badge.cls?' '+badge.cls:'')+'">'+escapeHtml(badge.text)+'</span>'+
          unmarkBtnHtml+
        '</div>'+
      '</div>'+
      '<div class="ri-nums">'+
        '<div class="ri-num"><div class="ri-num-label">第一次</div><div class="ri-num-val ri-first-val">'+(firstTotal!==null?firstTotal:'—')+'</div></div>'+
        '<div class="ri-arrow">→</div>'+
        '<div class="ri-num"><div class="ri-num-label">複盤加總</div><div class="ri-num-val ri-total-val">'+(recountVal!==null?recountVal:'—')+'</div></div>'+
        '<div class="ri-arrow">=</div>'+
        '<div class="ri-num"><div class="ri-num-label">差異</div><div class="ri-num-val ri-diff-val">'+diffHtml+'</div></div>'+
      '</div>'+
      confirmSectionHtml+
      '<div class="ri-fields">'+
        '<div class="ri-num"><div class="ri-num-label">架上（可加可乘）</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(shelfRaw)+'" placeholder="如 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-field="shelf" data-action="recount-input">'+
          shelfCalcHint+'</div>'+
        '<div class="ri-num"><div class="ri-num-label">庫存（可加可乘）</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(stockRaw)+'" placeholder="如 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-field="stock" data-action="recount-input">'+
          stockCalcHint+'</div>'+
      '</div>'+
      '<div class="ri-note">'+
        '<span class="ri-claim-label">備註：</span>'+
        '<input class="ri-note-input" type="text" value="'+escapeHtml(noteRaw)+'" placeholder="" '+
          'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-action="recount-note">'+
      '</div>'+
    '</div>';
  }

  // 單一格位的資料如果格式異常，這裡擋下來，只讓那一格顯示錯誤卡片，不要讓整頁複盤清單畫不出來
  function safeBuildRecountItem(k){
    try{
      return buildRecountItem(k);
    }catch(e){
      console.error("buildRecountItem failed for key", k, e);
      return '<div class="recount-item" data-key="'+escapeHtml(k)+'">'+
        '<div class="ri-top"><div class="ri-title">'+escapeHtml(k)+'</div></div>'+
        '<div style="color:#c0392b; font-size:13px;">⚠️ 這一格資料格式異常，暫時無法顯示，不影響其他品項</div>'+
      '</div>';
    }
  }

  // 判斷某 key 是否通過目前的篩選條件
  function passFilter(k){
    var assignee = String(state.recounts[k].assignee || "").trim();
    // 認領人篩選：姓名不分大小寫視為同一人
    if(state.recountFilter === "__none__"){ if(assignee) return false; }
    else if(state.recountFilter !== ""){ if(assignee.toLowerCase() !== state.recountFilter.toLowerCase()) return false; }
    // 品牌篩選
    var b = brandOfKey(k);
    if(state.recountBrandFilter === "__nobrand__"){ if(b) return false; }
    else if(state.recountBrandFilter !== ""){ if(b !== state.recountBrandFilter) return false; }
    return true;
  }

  // 把通過篩選的 key 依品牌分組
  var shownCount = 0;
  var byBrand = {}; // brand -> [keys]
  var noBrandKeys = [];
  keys.forEach(function(k){
    if(!passFilter(k)) return;
    shownCount++;
    var b = brandOfKey(k);
    if(b){ if(!byBrand[b]) byBrand[b]=[]; byBrand[b].push(k); }
    else noBrandKeys.push(k);
  });

  // 依品牌順序組裝分組區塊
  var rowsHtml = "";
  if(shownCount === 0){
    rowsHtml = emptyStateHtml('沒有複盤項目', keys.length === 0 ? '到彙總頁的明細，點「標記複盤」把要複盤的品項加進來' : '這個篩選條件下沒有項目');
  } else {
    // 沒品牌的排最前
    if(noBrandKeys.length > 0){
      noBrandKeys.forEach(function(k){ rowsHtml += safeBuildRecountItem(k); });
    }
    brands.forEach(function(b){
      if(!byBrand[b]) return;
      // 這個品牌有幾筆、幾筆已複盤
      var total = byBrand[b].length;
      var doneN = byBrand[b].filter(function(k){
        return isRecountFilled(state.recounts[k]);
      }).length;
      rowsHtml += '<div class="recount-brand-head" data-brand="'+escapeHtml(b)+'" data-done="'+doneN+'" data-total="'+total+'">'+escapeHtml(b)+
        ' <span class="rb-count" style="font-weight:600; color:var(--muted); font-size:12px;">（'+doneN+'/'+total+' 已複盤）</span></div>';
      byBrand[b].forEach(function(k){ rowsHtml += safeBuildRecountItem(k); });
    });
  }

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
      '<div class="brand">複盤任務</div>'+
      '<button class="icon-btn" data-action="manual-sync-recount" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
    '</div>'+
    '<div id="recount-update-hint" data-action="refresh-recount-list" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 14px; margin-bottom:12px; background:#fcfbf8; border:1px solid var(--line); border-radius:10px; font-size:13px;">'+
      '<span style="color:var(--muted);">你的盤點身分：<strong style="color:var(--ink);">'+(getRecountUserName() ? escapeHtml(getRecountUserName()) : '尚未設定')+'</strong></span>'+
      '<div style="display:flex; gap:6px;">'+
        (isManager() ? '<button class="mini-btn" data-action="recount-assign">複盤分配</button>' : '')+
        '<button class="mini-btn" data-action="change-recount-username">'+(getRecountUserName() ? '改名字' : '設定名字')+'</button>'+
      '</div>'+
    '</div>'+
    renderRecountProgressOverview()+
    '<div class="panel">'+
      '<h2>複盤清單</h2>'+
      '<p class="sub">共 '+keys.length+' 筆。填入架上、庫存的複盤數字（都可以加可以乘），兩格都填了會自動跟第一次盤點的加總對照差異。備註為選填，沒填不影響完成進度。誰實際填了數字，複盤人就自動記成誰，不用手動輸入；打字時如果別人也在盤同一格，旁邊會提醒「OO 複盤中」（僅提醒，不會鎖住輸入）。</p>'+
      '<div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;">依品牌篩選</div>'+
      '<div class="chip-strip" style="margin-bottom:12px;">'+brandFilterBtns+'</div>'+
      '<div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;">依複盤人篩選</div>'+
      '<div class="chip-strip" style="margin-bottom:16px;">'+filterBtns+'</div>'+
      rowsHtml+
    '</div>'+
  '</main>';
}

// ---------- Excel export (one worksheet per 款式) ----------
function sanitizeSheetName(name, usedNames){
  var clean = String(name).replace(/[\\\/\?\*\[\]:]/g, "_").slice(0,31);
  if(!clean) clean = "Sheet";
  var base = clean, n = 1;
  while(usedNames[clean]){
    n++;
    var suffix = "_" + n;
    clean = base.slice(0, 31 - suffix.length) + suffix;
  }
  usedNames[clean] = true;
  return clean;
}

function buildWorkbook(){
  var wb = XLSX.utils.book_new();
  var usedNames = {};
  state.structure.forEach(function(st){
    var rows = [["顏色","尺寸","架上","庫存","加總"]];
    var sumShelf = 0, sumStock = 0, sumTotal = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelf = c && c.shelf !== "" ? Number(c.shelf)||0 : (c ? 0 : "");
        var stock = c && c.stock !== "" ? Number(c.stock)||0 : (c ? 0 : "");
        var total = c ? Number(c.total)||0 : "";
        rows.push([col.name, sz, shelf, stock, total]);
        if(c){
          sumShelf += Number(c.shelf)||0;
          sumStock += Number(c.stock)||0;
          sumTotal += Number(c.total)||0;
        }
      });
    });
    rows.push(["總計", "", sumShelf, sumStock, sumTotal]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:8},{wch:8},{wch:8}];
    var sheetName = sanitizeSheetName(st.style, usedNames);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  return wb;
}

function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

// ---------- ERP 品牌規則設定表 ----------
// 每一列＝一個品牌／款式群組的 ERP 匯出規則，欄位都可省略，沒填就套用 ERP_RULE_DEFAULTS。
//   match       — {prefix: /正則/}：款式名稱開頭比對；或 {styles:["精確款式名",...]}：精確比對
//   styleNumber — 品號前綴轉換方式：
//                   "asis"（預設，原樣不變）
//                   "digitsOnly"（只留數字，CP103 → 103）
//                   "dashToUnderscore"（橫線換底線，CAP-510 → CAP_510）
//                   "insertUnderscoreAfterPrefix"（在符合 match.prefix 那段文字後插底線，PL01 → PL_01；已有底線就不重複插）
//   colorWidth  — 顏色編號補零位數（預設 2）
//   colorMap    — 顏色編號對照表，優先於補零規則使用（例如 76000 系列查表；查不到就回傳原始數字、不補零）
//   warehouse   — 倉別代碼（預設 "A01"）
//
// 比對順序：先掃全表找「精確款式名稱（match.styles）」符合的列，找不到才依序找「前綴（match.prefix）」符合的列。
// 所以像 TH02/03/04 這種「屬於 TH 系列、但倉別是例外」的列，放在陣列裡的前後順序不影響結果。
//
// 新增品牌只要在這個陣列加一列即可，不用改下面任何函式。
var ERP_BRAND_RULES = [
  { name:"76000",   match:{prefix:/^76000/i},                 colorMap: ERP_76000_COLOR },
  { name:"CP",      match:{prefix:/^CP/i},                     styleNumber:"digitsOnly" },
  { name:"CAP/T",   match:{prefix:/^(CAP|T[-_])/i},            styleNumber:"dashToUnderscore" },
  { name:"PL",      match:{prefix:/^PL/i},                     styleNumber:"insertUnderscoreAfterPrefix" },
  { name:"UA2350",  match:{prefix:/^UA2350/i},                 colorWidth:3 },
  { name:"TH02-04", match:{styles:["TH02","TH03","TH04"]},     colorWidth:3, warehouse:"A02" },
  { name:"TH",      match:{prefix:/^TH/i},                     colorWidth:3 },
  { name:"AG倉別",   match:{styles:["AG1000","AG2000","AG3000"]}, warehouse:"A02" }
];
var ERP_RULE_DEFAULTS = { styleNumber:"asis", colorWidth:2, warehouse:"A01", colorMap:null };

// 依款式名稱找出對應的規則列（缺的欄位補上預設值；完全找不到就回傳純預設值）
function resolveErpRule(style){
  var s = String(style);
  for(var i=0;i<ERP_BRAND_RULES.length;i++){
    var r = ERP_BRAND_RULES[i];
    if(r.match.styles && r.match.styles.indexOf(s) !== -1) return mergeErpRule(r);
  }
  for(var j=0;j<ERP_BRAND_RULES.length;j++){
    var r2 = ERP_BRAND_RULES[j];
    if(r2.match.prefix && r2.match.prefix.test(s)) return mergeErpRule(r2);
  }
  return mergeErpRule({});
}
function mergeErpRule(rule){
  return {
    name: rule.name || "(預設)",
    match: rule.match || null,
    styleNumber: rule.styleNumber || ERP_RULE_DEFAULTS.styleNumber,
    colorWidth: rule.colorWidth || ERP_RULE_DEFAULTS.colorWidth,
    colorMap: rule.colorMap || ERP_RULE_DEFAULTS.colorMap,
    warehouse: rule.warehouse || ERP_RULE_DEFAULTS.warehouse
  };
}

// 依規則列的 styleNumber 類型，把款式名稱轉成 ERP 品號前綴
function applyStyleNumberTransform(style, rule){
  var s = String(style);
  if(rule.styleNumber === "digitsOnly"){
    return s.replace(/[^0-9]/g, ""); // CP103 → 103
  }
  if(rule.styleNumber === "dashToUnderscore"){
    return s.replace(/-/g, "_"); // CAP-510 → CAP_510、T-24 → T_24
  }
  if(rule.styleNumber === "insertUnderscoreAfterPrefix"){
    if(s.indexOf("_") !== -1) return s; // 已有底線就不重複插
    var prefixRe = (rule.match && rule.match.prefix) || /^[A-Za-z]+/;
    var m = s.match(prefixRe);
    if(m) return s.slice(0, m[0].length) + "_" + s.slice(m[0].length); // PL01 → PL_01
    return s;
  }
  return s; // "asis"：原樣保留
}

// 從顏色名稱尾巴抽出 ERP 編號。
//  - 有 colorMap：抽數字後查對照表（查不到就回傳原始數字，不補零）
//  - 數字+字母尾（工具顏色名本身就帶字母）：整段原樣抽出
//  - 純數字尾：補到指定位數
function erpColorCode(colorName, rule){
  var s = String(colorName);
  if(rule.colorMap){
    var mm = s.match(/(\d+)\s*$/);
    if(mm){
      var num = mm[1];
      return rule.colorMap.hasOwnProperty(num) ? rule.colorMap[num] : num;
    }
    return "";
  }
  var m2 = s.match(/(\d+[A-Za-z]+)\s*$/);
  if(m2) return m2[1]; // 顏色名本身帶字母
  var m1 = s.match(/(\d+)\s*$/);
  if(m1){
    var n = m1[1];
    while(n.length < rule.colorWidth) n = "0" + n;
    return n;
  }
  return "";
}

// 組合 ERP 品號：款式前綴 - 顏色編號 # 尺寸(ERP寫法)
function erpItemCode(style, colorName, size){
  var rule = resolveErpRule(style);
  var s = applyStyleNumberTransform(style, rule);
  var cc = erpColorCode(colorName, rule);
  var sz = erpSize(size);
  return s + "-" + cc + "#" + sz;
}

// 產生單一款式的 ERP 匯入格式工作表資料(品號/數量/倉別)。數量=第一次盤點加總
// 依款式決定倉別：規則表裡沒設 warehouse 的一律是 A01
function erpWarehouse(style){
  return resolveErpRule(style).warehouse;
}

function buildErpRows(st){
  var rows = [["品號","數量","倉別"]];
  var wh = erpWarehouse(st.style);
  st.colors.forEach(function(col){
    col.sizes.forEach(function(sz){
      var key = keyFor(st.style, col.name, sz);
      var c = state.counts[key];
      // 只匯出有填過的格(架上或庫存至少一格有值)
      var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
      var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
      if(!shelfFilled && !stockFilled) return; // 沒盤過的不匯出
      var total = (Number(c.shelf)||0) + (Number(c.stock)||0);
      rows.push([erpItemCode(st.style, col.name, sz), total, wh]);
    });
  });
  return rows;
}

// 匯出單一款式的 ERP 格式 Excel
function downloadErpWorkbook(styleName){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var st = state.structure.find(function(s){ return s.style === styleName; });
  if(!st){ showToast("找不到款式 "+styleName); return; }
  var rows = buildErpRows(st);
  if(rows.length <= 1){ showToast("這個款式還沒有盤點資料，無法匯出"); return; }
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws, "工作表1");
  XLSX.writeFile(wb, styleName + "-匯入盤點表.xlsx");
}

function downloadWorkbook(){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var wb = buildWorkbook();
  XLSX.writeFile(wb, "盤點結果_" + dateStr() + ".xlsx");
}

// ---------- Helpers ----------
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

// 把確認時間的 ISO 字串格式化成簡短的「月/日 時:分」，格式異常就回傳空字串（不擋畫面）
function formatConfirmedAt(iso){
  try{
    var d = new Date(iso);
    if(isNaN(d.getTime())) return "";
    var hh = String(d.getHours()).padStart(2,'0');
    var mi = String(d.getMinutes()).padStart(2,'0');
    return (d.getMonth()+1)+'/'+d.getDate()+' '+hh+':'+mi;
  }catch(e){ return ""; }
}

// ---------- Events ----------
function bindEvents(){
  var app = document.getElementById("app");

  if(!app._delegated){
    app._delegated = true;
    app.addEventListener('click', async function(ev){
      var el = ev.target.closest('[data-action]');
      if(!el || !app.contains(el)) return;
      var action = el.getAttribute('data-action');

      if(action === 'goto-home'){ state.view = "home"; render(); }
      else if(action === 'back-to-brand'){
        var st2 = state.structure[state.curStyleIdx];
        var g2 = findBrandGroupForStyle(st2.style);
        if(g2 && g2.brand !== null){
          state.curBrandName = g2.brand;
          state.view = "brandModels";
        } else {
          state.view = "home";
        }
        render();
      }
      else if(action === 'manual-sync'){
        var statusEl = document.getElementById('sync-status');
        if(statusEl) statusEl.textContent = "🔄 同步中...";
        await syncFromBackend();
        showToast("已更新");
      }

      else if(action === 'refresh-summary'){
        await syncFromBackend();
        render_keepExpanded(); // 記住目前展開的品牌跟型號，刷新後重新展開（不破壞使用者的操作狀態）
        showToast("明細已更新");
      }

      else if(action === 'goto-setup'){
        var pwd = prompt('請輸入管理員密碼：');
        if(pwd === null) return; // 使用者按取消
        if(pwd !== ADMIN_PASSWORD){
          showToast("密碼錯誤");
          return;
        }
        state.view = "setup";
        render();
      }
      else if(action === 'goto-summary'){ state.view = "summary"; render(); }

      else if(action === 'goto-recount'){
        state.view = "recount"; state.recountFilter = ""; state.recountBrandFilter = "";
        ensureRecountUserName();
        render();
      }

      else if(action === 'change-recount-username'){
        if(state.people && state.people.length > 0){
          // 名單非空：走選單重選，選完（或按「返回」取消）都會回到目前這個畫面
          state.pickIdentityReturn = state.view;
          state.view = "pickIdentity";
          render();
        } else {
          // 名單是空的，維持原本的手動輸入
          var currentName = getRecountUserName();
          var newName = prompt('請輸入你的名字（用來標記「這格是誰盤的」，之後這台手機的初盤／複盤操作都會自動帶上這個名字）：', currentName || '');
          if(newName === null) return; // 取消
          setRecountUserName(newName);
          showToast(newName.trim() ? '已設定盤點身分為「'+newName.trim()+'」' : '已清空盤點身分');
          render();
        }
      }

      else if(action === 'recount-assign'){
        if(!isManager()) return; // 按鈕本來就只有主管看得到，這裡多擋一次防呆
        // 每次重新進頁面都重設勾選跟展開狀態，避免帶著上次沒送出的殘留選擇；固定從 Step 1（選人）開始
        state.assignChecked = {};
        state.assignExpandedBrands = {};
        state.assignExpandedStyles = {};
        state.assignStep = "target";
        state.view = "assign";
        render();
      }

      else if(action === 'assign-pick-target'){
        // 換人就清空勾選，避免搞混「這幾格是勾給誰的」
        state.assignSelectedName = el.getAttribute('data-name');
        state.assignChecked = {};
        state.assignStep = "checklist";
        render();
      }

      else if(action === 'assign-change-target'){
        state.assignStep = "target";
        render();
      }

      else if(action === 'assign-toggle-brand'){
        var toggleBrand = el.getAttribute('data-brand');
        state.assignExpandedBrands[toggleBrand] = !state.assignExpandedBrands[toggleBrand];
        render();
      }

      else if(action === 'assign-toggle-style'){
        var toggleStyle = el.getAttribute('data-style');
        state.assignExpandedStyles[toggleStyle] = !state.assignExpandedStyles[toggleStyle];
        render();
      }

      else if(action === 'assign-toggle-check'){
        var toggleKey = el.getAttribute('data-key');
        state.assignChecked[toggleKey] = !state.assignChecked[toggleKey];
        render();
      }

      else if(action === 'assign-reassign-confirm'){
        var aKey = el.getAttribute('data-key');
        var assignedTo = el.getAttribute('data-assigned');
        var aParts = aKey.split("|");
        var target = state.assignSelectedName;
        if(target){
          if(confirm('此格已派給「'+assignedTo+'」，要改派給「'+target+'」嗎？')){
            await assignRecountRemote(aParts[0], aParts[1], aParts[2], target);
            showToast('已改派給「'+target+'」');
            render();
            return;
          }
        }
        if(confirm('要取消「'+assignedTo+'」在這一格的指派嗎？')){
          await unassignRecountRemote(aParts[0], aParts[1], aParts[2]);
          showToast('已取消指派');
          render();
        }
      }

      else if(action === 'assign-submit'){
        if(!state.assignSelectedName){ showToast('請先選擇要指派的人'); return; }
        var keysToAssign = Object.keys(state.assignChecked).filter(function(k){ return state.assignChecked[k]; });
        if(keysToAssign.length === 0){ showToast('請勾選要指派的格子'); return; }
        el.disabled = true;
        el.textContent = '指派中…';
        await Promise.all(keysToAssign.map(function(k){
          var kParts = k.split("|");
          return assignRecountRemote(kParts[0], kParts[1], kParts[2], state.assignSelectedName);
        }));
        showToast('已指派 '+keysToAssign.length+' 格給「'+state.assignSelectedName+'」');
        state.assignChecked = {};
        render();
      }

      else if(action === 'pick-identity-select'){
        var pickedName = el.getAttribute('data-name');
        setRecountUserName(pickedName);
        state.view = state.pickIdentityReturn || "home";
        state.pickIdentityReturn = null;
        showToast('已設定盤點身分為「'+pickedName+'」');
        render();
      }

      else if(action === 'pick-identity-cancel'){
        // 取消不變更身分，回到原本要去的畫面（跟舊版 prompt 按取消的行為一致：不擋住繼續使用）
        state.view = state.pickIdentityReturn || "home";
        state.pickIdentityReturn = null;
        render();
      }

      else if(action === 'toggle-claim'){
        var claimStyleName = el.getAttribute('data-style');
        if(state.claims[claimStyleName]){
          unclaimStyleRemote(claimStyleName);
          showToast('已取消認領「'+claimStyleName+'」');
        } else {
          claimStyleRemote(claimStyleName);
          showToast('已認領「'+claimStyleName+'」');
        }
        // 用 render_keepExpanded：認領按鈕現在放在彙總明細頁的品牌/型號摺疊區塊裡，
        // 點認領不該把使用者原本展開看的明細收合掉
        render_keepExpanded();
      }

      else if(action === 'mark-recount'){
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        // 不問指派,直接加入清單(認領制:之後有空的人自己填名字)
        // 不 await：markRecountRemote 內部本地狀態已經樂觀更新過了，畫面立刻反映，網路請求在背景送出
        markRecountRemote(style, color, size, "");
        showToast('已加入複盤清單');
        render_keepExpanded(); // 停留原畫面，不收合目前展開的品牌／型號
        // 標記成功順勢彈出備註視窗：key in 人員是唯一知道 ERP 差異線索的人（例如「差1箱，可能庫存漏點」），
        // 讓他可以當下直接記下來，關閉不儲存也沒關係。備註走既有的 saveRecountNote，複盤頁自然看得到。
        openRecountNoteModal(style, color, size);
      }

      else if(action === 'unmark-recount'){
        // 彙總明細的「已標記」按鈕：要不要複盤是 key in 人員依 ERP 比對在這裡決定的，
        // 所以取消也在這裡做（點擊即取消），需要二次確認避免手滑誤按（見 buildUnmarkRecountConfirmMessage）
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        if(!confirm(buildUnmarkRecountConfirmMessage(style, color, size))){
          return;
        }
        unmarkRecountRemote(style, color, size);
        showToast('已取消複盤標記');
        render_keepExpanded();
      }

      else if(action === 'open-recount-note-modal'){
        // 只是打開一個獨立於 #app 之外的 fixed 彈窗，不觸發任何重畫，
        // 表格的橫向捲動位置、展開狀態都完全不受影響（見 openRecountNoteModal）
        openRecountNoteModal(el.getAttribute('data-style'), el.getAttribute('data-color'), el.getAttribute('data-size'));
      }

      else if(action === 'unmark-recount-confirm'){
        // 複盤清單頁的「取消複盤」按鈕：只有主管看得到(當作例外處理的後路)，一般成員不該在這裡取消
        // ——要不要複盤是 key in 人員在彙總明細依 ERP 比對決定的。需要二次確認避免手滑誤按。
        var ucStyle = el.getAttribute('data-style');
        var ucColor = el.getAttribute('data-color');
        var ucSize = el.getAttribute('data-size');
        if(!confirm(buildUnmarkRecountConfirmMessage(ucStyle, ucColor, ucSize))){
          return;
        }
        unmarkRecountRemote(ucStyle, ucColor, ucSize);
        showToast('已移出複盤清單');
        render_keepExpanded();
      }

      else if(action === 'confirm-recount'){
        var cfStyle = el.getAttribute('data-style');
        var cfColor = el.getAttribute('data-color');
        var cfSize = el.getAttribute('data-size');
        var cfKey = keyFor(cfStyle, cfColor, cfSize);
        var cfR = state.recounts[cfKey];
        if(!cfR) return;
        var cfShelfVal = parseExpr(String(cfR.shelf || ""));
        var cfStockVal = parseExpr(String(cfR.stock || ""));
        var cfC = state.counts[cfKey];
        var cfFirstShelfText = (cfC && cfC.shelf !== "" && cfC.shelf !== null && cfC.shelf !== undefined) ? cfC.shelf : "—";
        var cfFirstStockText = (cfC && cfC.stock !== "" && cfC.stock !== null && cfC.stock !== undefined) ? cfC.stock : "—";
        if(!confirm('將以複盤數字（架上'+cfShelfVal+'／庫存'+cfStockVal+'）更新彙總，原初盤（架上'+cfFirstShelfText+'／庫存'+cfFirstStockText+'）將被取代。\n\n確定要確認嗎？')){
          return;
        }
        try{
          await confirmRecountRemote(cfStyle, cfColor, cfSize);
          showToast('已確認並更新彙總');
        }catch(e){
          // confirmRecountRemote 內部已經還原樂觀更新並顯示錯誤 toast，這裡不用重複處理
        }
        render_keepExpanded();
      }

      else if(action === 'relog-style-confirm'){
        var relogStyleName = el.getAttribute('data-style');
        if(!confirm('確認已完成「'+relogStyleName+'」型號的 ERP 重新登錄嗎？\n\n確認後這個提醒會消失；如果之後這個型號又有新的複盤被確認回寫，提醒會再次出現。')){
          return;
        }
        try{
          await relogStyleRemote(relogStyleName);
          showToast('已標記「'+relogStyleName+'」完成重登');
        }catch(e){
          // relogStyleRemote 內部已經顯示錯誤 toast，這裡不用重複處理
        }
        render_keepExpanded();
      }

      else if(action === 'recount-filter'){
        state.recountFilter = el.getAttribute('data-assignee');
        render();
      }

      else if(action === 'recount-brand-filter'){
        state.recountBrandFilter = el.getAttribute('data-brand');
        render();
      }

      else if(action === 'manual-sync-recount'){
        await syncFromBackend();
        render();
        showToast('已更新');
      }
      else if(action === 'refresh-recount-list'){
        // 使用者主動點了「清單有變動」提示才重畫：資料在背景同步當下就已經寫進 state.recounts，
        // 這裡單純把清單重新畫出來，重畫時 renderRecount() 會自動重設變動基準點，橫幅跟著消失
        render();

      else if(action === 'clear-recounts'){
        if(!confirm('⚠️ 確定要清空所有複盤任務嗎？\n\n這會移除所有複盤標記跟已填的複盤數字（不影響第一次盤點的資料）。此動作無法復原。')){
          return;

        await clearRecountsRemote();
        showToast('已清空複盤任務');
        render();

          state.curColorIdx = Number(el.getAttribute('data-color-idx'));
