<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盤點工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f7f5f1;
    --card:#ffffff;
    --line:#e3ddd2;
    --accent:#c1572d;
    --accent-deep:#8f3f1f;
    --good:#2f6b4f;
    --muted:#8a8378;
    --shadow: 0 1px 2px rgba(27,31,35,0.04), 0 8px 24px rgba(27,31,35,0.06);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
  }
  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--paper);
    padding:14px 18px 10px;
    border-bottom:1px solid var(--line);
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .brand{
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .icon-btn{
    border:none; background:transparent; color:var(--muted);
    font-size:13px; padding:6px 10px; border-radius:8px; cursor:pointer;
    font-weight:600;
  }
  .icon-btn:active{ background:#ece7dd; }
  /* 更新按鈕按下後的轉圈動畫：跟按鈕文字同一行內顯示，比純文字「更新中…」更明顯是進行中，不是卡住 */
  .btn-spinner{
    display:inline-block; width:11px; height:11px; margin-right:5px; vertical-align:-2px;
    border:2px solid rgba(0,0,0,.15); border-top-color:var(--accent); border-radius:50%;
    animation:btnspin .7s linear infinite;
  }
  @keyframes btnspin{ to{ transform:rotate(360deg); } }
  .progress-wrap{ margin-top:10px; }
  .progress-bar{
    height:6px; background:#e9e3d6; border-radius:4px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent);
    transition: width .25s ease;
    border-radius:4px;
  }
  .progress-label{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-top:6px;
    font-weight:600;
  }
  main{
    flex:1;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  /* ---- Setup screens ---- */
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }
  .panel h2{
    margin:0 0 4px;
    font-size:19px;
  }
  .panel p.sub{
    margin:0 0 14px;
    font-size:13.5px;
    color:var(--muted);
    line-height:1.5;
  }
  .list-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
    font-size:16px;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row .meta{
    font-size:12.5px; color:var(--muted); margin-top:2px;
  }
  .list-row .left{ flex:1; }
  .chev{ color:var(--muted); font-size:14px; }
  .identity-row{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; text-align:left;
    padding:15px 14px;
    margin-bottom:8px;
    border:1.5px solid var(--line);
    border-radius:12px;
    background:var(--card);
    color:var(--ink);
    font-size:16px; font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .identity-row:active{ background:#f1ece1; border-color:var(--accent); }
  .identity-row-selected{ border-color:var(--accent); background:#fdf3ef; }
  .assign-row{
    display:flex; align-items:center; gap:10px;
    width:100%; text-align:left;
    padding:12px 14px;
    margin-bottom:6px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:var(--card);
    color:var(--ink);
    font-size:14.5px; font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .assign-row:active{ background:#f1ece1; }
  .assign-row.checked{ border-color:var(--accent); background:#fdf3ef; }
  .assign-check{ font-size:18px; flex:0 0 auto; }
  .assign-row-locked{
    background:#f1ece1; color:var(--muted);
    justify-content:space-between; flex-wrap:wrap; row-gap:6px;
  }
  .assign-badge{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#e7e1d3; color:var(--muted); white-space:nowrap; flex:0 0 auto;
  }
  .assign-confirm-tag{
    display:inline-block; margin-left:6px;
    font-size:11px; font-weight:700; padding:1px 7px; border-radius:10px;
    background:#e8f5ec; color:#2f7a3e; white-space:nowrap;
  }
  /* 第二輪格子不再走指派，改用這個徽章顯示「已自動歸品牌負責人」；沒設定負責人時用 .no-owner 標紅 */
  .assign-badge-second-round{ background:#f0e9fb; color:#6a3fa0; }
  .assign-badge-second-round.no-owner{ background:#fdecea; color:#c0392b; }
  /* 已確認/已定案的格子不能再被指派，跟彙總明細那顆按鈕(.mini-btn.marked/.locked-final)同一套配色，
     全站對這兩個狀態的顏色保持一致：已確認=綠色，已定案=深灰(封存感) */
  .assign-badge.confirmed{ background:#e8f5ec; color:#2f7a3e; }
  .assign-badge.locked-final{ background:#e5e8eb; color:#434b56; }
  .assign-footer{
    position:sticky; bottom:0;
    padding:12px 18px;
    background:var(--paper);
    border-top:1px solid var(--line);
  }
  .assign-footer .btn{ width:100%; }
  .btn{
    display:block; width:100%;
    background:var(--accent);
    color:#fff; border:none;
    font-size:16px; font-weight:700;
    padding:15px 18px;
    border-radius:12px;
    cursor:pointer;
    text-align:center;
  }
  .btn:active{ background:var(--accent-deep); }
  .btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--line);
  }
  .btn.secondary:active{ background:#ece7dd; }
  .btn.ghost{
    background:transparent;
    color:var(--accent-deep);
    font-weight:700;
    padding:10px;
  }
  .btn[disabled]{ opacity:.4; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12.5px; font-weight:700;
    color:var(--muted); margin-bottom:6px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .field input, .field textarea, .field select{
    width:100%;
    font-size:16px;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ min-height:90px; resize:vertical; line-height:1.5; }
  .row-gap{ display:flex; gap:10px; }
  .row-gap > *{ flex:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .tag{
    background:#efe9dc; color:var(--ink);
    border-radius:20px; padding:6px 12px;
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .tag button{
    border:none; background:transparent; color:var(--accent-deep);
    font-weight:700; cursor:pointer; font-size:14px; line-height:1;
    padding:0;
  }
  /* ---- Counting card ---- */
  .count-card{
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--line);
    padding:24px 20px 20px;
    box-shadow:var(--shadow);
  }
  .ctx-label{
    font-size:13px; color:var(--muted); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .style-name{
    font-size:15px; color:var(--accent-deep); font-weight:700;
    margin-top:2px;
  }
  .size-name{
    font-size:34px; font-weight:800; margin:10px 0 18px;
    letter-spacing:-0.01em;
  }
  .input-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-bottom:18px;
  }
  .num-box{
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:14px 12px 12px;
    background:#fcfbf8;
    min-width:0; /* 關鍵：避免 grid item 被內容撐到超出欄寬 */
    overflow:hidden;
  }
  .num-box label{
    font-size:12.5px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .num-box.focused{ border-color:var(--accent); background:#fff; }
  .warn-btn{
    color:var(--accent-deep) !important;
    border:1.5px solid #e0b8a8 !important;
    background:#fdf3ef !important;
    font-weight:700 !important;
  }
  .warning-banner{
    background:#fdecea;
    border:1.5px solid #e3a89a;
    border-radius:14px;
    padding:16px 18px;
    color:#7a2e1e;
  }
  .warning-banner strong{
    display:block;
    font-size:15px;
    margin-bottom:6px;
  }
  .warning-banner p{
    margin:0;
    font-size:13.5px;
    line-height:1.6;
  }
  /* 標籤式算式編輯器 */
  .expr-chips{
    display:flex; flex-wrap:wrap; gap:5px; align-items:center;
    min-height:48px; margin-top:6px;
    max-width:100%;
  }
  .expr-chiplist{
    display:contents; /* 讓裡面的標籤直接參與 flex 佈局 */
  }
  .expr-chip-num{
    background:#fdf3ef; color:var(--accent-deep);
    padding:7px 10px; border-radius:7px;
    font-size:18px; font-weight:800; font-family:inherit;
    border:1.5px solid #f0d8cd; cursor:pointer; line-height:1;
    flex:0 0 auto;
  }
  .expr-chip-num:active{ background:#f7e3d8; }
  .expr-chip-op{
    padding:7px 9px; border-radius:7px;
    font-size:16px; font-weight:800; line-height:1; cursor:pointer;
    flex:0 0 auto;
  }
  .expr-chip-op.op-plus{
    background:#fdf3ef; color:var(--accent-deep); border:1.5px solid #f0d8cd;
  }
  .expr-chip-op.op-times{
    background:#eef4fa; color:#2f5d8a; border:1.5px solid #b9cce0;
  }
  .expr-chip-op:active{ filter:brightness(0.94); }
  .expr-newinput{
    width:54px; font-size:18px; font-weight:800; text-align:center;
    border:1.5px dashed var(--line); border-radius:7px;
    padding:6px 4px; font-family:inherit; color:var(--ink);
    background:#fff; flex:0 0 auto;
  }
  .expr-newinput:focus{ outline:none; border-color:var(--accent); border-style:solid; }
  .expr-addbtns{ display:flex; gap:5px; margin-left:2px; flex:0 0 auto; }
  .expr-addbtn{
    width:30px; height:34px; border-radius:7px; font-size:16px; font-weight:800;
    line-height:1; cursor:pointer; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .expr-addbtn.add-plus{ background:#fff; border:1.5px solid #e0b8a8; color:var(--accent-deep); }
  .expr-addbtn.add-times{ background:#eef4fa; border:1.5px solid #b9cce0; color:#2f5d8a; }
  .expr-addbtn:active{ filter:brightness(0.94); }
  /* 點標籤後跳出的編輯彈窗 */
  .chip-editor{
    margin-top:10px; padding:12px;
    background:#faf7f1; border:1.5px solid var(--line); border-radius:10px;
  }
  .chip-editor .ce-label{ font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .chip-editor .ce-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .chip-editor input{
    width:80px; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--line); border-radius:8px; padding:8px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .chip-editor input:focus{ outline:none; border-color:var(--accent); }
  .chip-editor .ce-btn{
    font-size:14px; padding:9px 14px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--line); background:#fff; color:var(--ink); font-weight:700;
  }
  .chip-editor .ce-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip-editor .ce-btn.danger{ color:#a32d2d; border-color:#e3a89a; }
  /* 彙總明細的複盤備註視窗：fixed 置中，跟表格的橫向捲動位置完全無關，不管使用者橫拉到哪都出現在螢幕正中央 */
  .modal-overlay{
    position:fixed; top:0; right:0; bottom:0; left:0; z-index:50;
    background:rgba(27,31,35,0.5);
    display:none; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-box{
    background:var(--card); border-radius:16px; padding:20px;
    width:100%; max-width:420px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
  }
  .modal-title{ font-size:15px; font-weight:800; color:var(--ink); margin-bottom:12px; }
  .modal-textarea{
    display:block; width:100%; min-height:130px; font-size:15px; padding:12px;
    border:1.5px solid var(--line); border-radius:10px; font-family:inherit;
    color:var(--ink); background:#fff; resize:vertical;
  }
  .modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .modal-actions .btn{ flex:1; }
  .sum-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#f1ece1; border-radius:12px;
    padding:13px 16px; margin-bottom:18px;
  }
  .sum-row .sum-label{ font-size:14px; color:var(--muted); font-weight:700; }
  .sum-row .sum-val{ font-size:22px; font-weight:800; color:var(--good); }
  .nav-row{ display:flex; gap:10px; }
  .nav-row .btn{ font-size:15px; padding:14px; }
  .keypad-hint{
    text-align:center; font-size:12px; color:var(--muted); margin-top:10px;
  }
  /* color chip strip */
  .chip-strip{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
  }
  .chip-strip::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto;
    padding:8px 14px; border-radius:20px;
    font-size:13px; font-weight:700;
    border:1.5px solid var(--line);
    background:#fff; color:var(--muted);
    white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.done{ border-color:var(--good); color:var(--good); }
  /* summary table */
  table.summary{
    width:100%; border-collapse:collapse; font-size:13.5px;
  }
  table.summary th, table.summary td{
    border-bottom:1px solid var(--line);
    padding:8px 6px; text-align:left;
  }
  table.summary th{ color:var(--muted); font-weight:700; font-size:12px; }
  table.summary td.num{ text-align:right; font-weight:600; }
  .mini-btn{
    font-size:11px; padding:4px 8px; border-radius:6px;
    border:1.5px solid #b9cce0; background:#eef4fa; color:#2f5d8a;
    font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .mini-btn:active{ background:#2f5d8a; color:#fff; }
  .mini-btn.marked{
    border-color:#2f7a3e; background:#e8f5ec; color:#2f7a3e;
  }
  /* 彙總明細「已認領」用獨立的藍色系，跟「已確認」的綠色(.marked)拉開區隔——這兩個是完全不同的
     狀態(ERP登錄 vs 複盤回寫)，之前共用同一個綠色 class 容易混淆。實心深藍，跟「未認領」的空心灰
     拉開對比，兩態一眼可辨。 */
  .mini-btn.claimed{
    border-color:#2f6fb0; background:#e3edf9; color:#1f5185;
  }
  /* 「未認領」改成灰色描邊空心樣式，呈現「中性待辦」的觀感，跟已認領的實心深藍明顯不同；
     這個空心灰也要跟「已定案」(.locked-final，深灰實心不可點標籤)在質感上明顯不同——
     這裡是可點的空心按鈕(邊框淺、底色透明)，那裡是不可點的深色實心標籤，一眼就能分出可不可以點。 */
  .mini-btn.unclaimed{
    border-color:#c2c8cf; background:#fff; color:#8a929c;
  }
  .mini-btn.unclaimed:active{ background:#f1f3f5; color:#5a6472; }
  /* 第二輪(或之後)確認回寫的最終定案：故意不跟「已確認」共用綠色，改用深灰/深藍，視覺上明顯是
     「封存」的顏色，一眼就能跟還能繼續操作的綠色「已確認」分開。改成不可點的 <span>，游標跟按下去
     的回饋都改成「不是按鈕」的樣子，避免使用者以為點了會有動作 */
  .mini-btn.locked-final{
    cursor:default; border-color:#5a6472; background:#e5e8eb; color:#434b56;
  }
  .mini-btn.locked-final:active{ background:#e5e8eb; color:#434b56; }
  /* 已標記但尚未確認回寫的中繼狀態，跟「已確認」的綠色拉開區隔，避免兩顆按鈕看起來一樣 */
  .mini-btn.pending-mark{
    border-color:#c45a1e; background:#fdf0e4; color:#c45a1e;
  }
  /* 「✓ 已核對」用獨立的青色系，不跟已認領(藍)/已確認(綠)/已定案(深灰) 任何一個共用，
     避免「認領」跟「核對」這兩個獨立動作被誤認成同一件事——這正是這次要修的混淆問題 */
  .mini-btn.verified{
    border-color:#0d8a8a; background:#e0f5f5; color:#0d6e6e;
  }
  /* 彙總明細頁的型號登錄狀態徽章 */
  .confirm-status-badge{
    font-size:11px; font-weight:700; padding:4px 9px; border-radius:6px;
    white-space:nowrap; border:none; font-family:inherit;
  }
  .confirm-status-badge.pending{ background:#fdf0e4; color:#c45a1e; cursor:pointer; }
  .confirm-status-badge.pending:active{ background:#fae2cb; }
  .confirm-status-badge.relog{ background:#f0e9fb; color:#6a3fa0; cursor:pointer; }
  .confirm-status-badge.relog:active{ background:#e2d4f5; }
  .confirm-status-badge.done{ background:#e8f5ec; color:#2f7a3e; }
  /* 複盤進度細節彈窗（唯讀）：每一格複盤任務一行，左邊顏色-尺寸、右邊即時狀態 */
  .recount-progress-list{ max-height:55vh; overflow-y:auto; margin-top:4px; }
  .recount-progress-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:9px 0; border-bottom:1px solid var(--line); font-size:14px;
  }
  .recount-progress-row:last-child{ border-bottom:none; }
  .recount-progress-row .rp-cell{ color:var(--ink); font-weight:700; }
  .recount-progress-row .rp-status{ color:var(--muted); font-size:13px; text-align:right; white-space:nowrap; }
  /* 複盤清單項目 */
  .recount-item{
    border:1px solid var(--line); border-radius:12px;
    padding:14px; margin-bottom:12px; background:#fff;
  }
  .recount-item.done{ background:#fafcfb; border-color:#cfe6d7; }
  .recount-item .ri-top{
    display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
    margin-bottom:12px; gap:8px;
  }
  .recount-item .ri-title{ font-size:15px; font-weight:800; color:var(--ink); min-width:0; overflow-wrap:break-word; }
  .recount-item .ri-assignee{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#eef4fa; color:#2f5d8a; white-space:nowrap; flex:0 0 auto;
  }
  .recount-item .ri-assignee.unassigned{ background:#f1ece1; color:var(--muted); }
  .recount-item .ri-assignee.active{ background:#fdf0e4; color:#c45a1e; }
  .recount-item .ri-assignee.done{ background:#e8f5ec; color:#2f7a3e; }
  .recount-item .ri-assign-badge{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#f0e9fb; color:#6a3fa0; white-space:nowrap; flex:0 0 auto;
  }
  .recount-item .ri-assign-badge.unassigned{ background:#f1ece1; color:var(--muted); }
  /* 第二輪格子沒設定品牌負責人：無主格，標紅提醒主管去綁定，跟一般「未指派」的灰色區隔開 */
  .recount-item .ri-assign-badge.no-owner{ background:#fdecea; color:#c0392b; }
  .recount-item .ri-second-round-tag{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#fdecea; color:#c0392b; white-space:nowrap; flex:0 0 auto;
  }
  /* 主管視角下這裡會同時擠進指派徽章、第二輪標籤、狀態小標籤，容易比一般成員視角寬很多，
     這裡讓 hdr-right 自己允許換行、靠右對齊，避免整排被撐開而讓按鈕或文字超出卡片邊框 */
  .recount-item .hdr-right{ flex-wrap:wrap; justify-content:flex-end; row-gap:6px; }
  /* 上面幾個徽章／按鈕原本是 white-space:nowrap + 不可縮小，多語系名字一長、或手機螢幕一窄，
     單一元素自己就比卡片寬，光靠 hdr-right 換行救不了——這裡讓它們允許自己內部換行＋可縮小，
     文字短的時候外觀完全不變(還是一行)，只有真的太長才會在自己的圓角框內換行，不會撐出邊框 */
  .recount-item .hdr-right .ri-assignee,
  .recount-item .hdr-right .ri-assign-badge,
  .recount-item .hdr-right .ri-second-round-tag,
  .recount-item .hdr-right .mini-btn{
    white-space:normal; flex:0 1 auto; max-width:100%; overflow-wrap:break-word; text-align:center;
  }
  .recount-item .ri-nums{
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:10px; row-gap:12px;
  }
  /* 第二輪進行中會多插一塊「初盤」，變成 4 塊數字＋3 個箭頭，窄螢幕放不下一整排時
     靠 .ri-nums 的 flex-wrap 換成兩排，這裡給每塊一個最小寬度，換行後排版才不會擠壓變形 */
  .recount-item .ri-num{ flex:1 1 70px; min-width:70px; text-align:center; }
  .recount-item .ri-num-label{ font-size:11px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .recount-item .ri-num-val{ font-size:20px; font-weight:800; }
  .recount-item .ri-num-sub{ font-size:11px; color:var(--muted); font-weight:600; margin-top:2px; }
  .recount-item .ri-arrow{ color:var(--muted); font-size:16px; padding-bottom:6px; }
  .recount-item .ri-input{
    width:100%; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--accent); border-radius:8px; padding:6px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .recount-item .ri-input:focus{ outline:none; background:#fffdf9; }
  /* 第二輪格子鎖給非負責人：輸入框反灰、不可點，跟一般可填寫的白底輸入框明顯不同 */
  .recount-item .ri-input:disabled{
    background:#f1ece1; color:var(--muted); border-color:var(--line); cursor:not-allowed;
  }
  .recount-item .ri-calc-hint{
    font-size:12px; color:var(--good); font-weight:700; text-align:center; margin-top:3px;
  }
  .recount-item .ri-calc-hint.ri-calc-hint-error{ color:#c0392b; }
  .recount-item .ri-lock-note{
    grid-column:1 / -1; font-size:12px; color:#c45a1e; font-weight:700;
    text-align:center; margin-top:4px;
  }
  .recount-item .ri-actions{ margin-top:10px; text-align:right; }
  .recount-item .ri-confirm-btn{ margin-top:12px; width:auto; padding:9px 16px; font-size:13.5px; border-color:var(--good); color:var(--good); }
  .recount-item .ri-confirmed-status{
    margin-top:12px; padding:8px 12px;
    background:#e8f5ec; color:#2f7a3e; border-radius:8px;
    font-size:13px; font-weight:700; text-align:center;
  }
  /* 已完結格子被主管修正過(見 r.corrected)的稽核標記，跟第二輪標籤同一套警示色系，一眼看出「這格數字動過」 */
  .recount-item .ri-corrected-tag{
    display:inline-block; margin-left:6px; padding:2px 8px; border-radius:10px;
    background:#fdecea; color:#c0392b; font-size:12px; font-weight:700;
  }
  /* 修正過的格子雙行呈現：外框沿用 .ri-confirmed-status 既有底色，這裡只調整成靠左對齊(單行版本
     置中比較好看，雙行置中反而不好讀)，兩行之間留一點距離 */
  .recount-item .ri-confirmed-status-corrected{ text-align:left; }
  .recount-item .ri-confirmed-line{ line-height:1.5; }
  .recount-item .ri-confirmed-line + .ri-confirmed-line{ margin-top:2px; }
  .recount-item .ri-fields{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
  }
  .recount-item .ri-note{
    margin-top:12px; display:flex; align-items:center; gap:6px;
  }
  .recount-item .ri-claim-label{ font-size:13px; color:var(--muted); font-weight:700; flex:0 0 auto; }
  .recount-item .ri-claim-input, .recount-item .ri-note-input{
    flex:1; font-size:14px; padding:8px 10px;
    border:1.5px solid var(--line); border-radius:8px;
    font-family:inherit; color:var(--ink); background:#fff; min-width:0;
  }
  .recount-item .ri-claim-input:focus, .recount-item .ri-note-input:focus{ outline:none; border-color:var(--accent); }
  .recount-brand-head{
    font-size:15px; font-weight:800; color:var(--accent-deep);
    padding:10px 0 8px; margin-top:6px;
    border-bottom:2px solid #f0d8cd; margin-bottom:12px;
  }
  /* 同一品牌(或無品牌)分組內，「未完成」跟「已回寫完成」兩批之間的分隔線——
     故意用比品牌標題更淡的樣式，避免被誤認成另一個品牌 */
  .recount-divider{
    font-size:12px; font-weight:700; color:var(--muted);
    padding:6px 0; margin:4px 0 10px; border-top:1px dashed var(--line);
    text-align:center;
  }
  /* 複盤進度總覽 */
  .rp-brand-group{ margin-bottom:10px; }
  .rp-pending-item{
    border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; margin-bottom:8px; background:#fff;
  }
  .rp-pending-top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:4px;
  }
  .rp-pending-name{ font-size:13.5px; font-weight:800; color:var(--ink); }
  .rp-pending-count{ font-size:12px; font-weight:700; color:var(--accent-deep); }
  .rp-pending-missing{ font-size:12.5px; color:#c45a1e; line-height:1.5; }
  .rp-done-wrap{ margin-top:4px; }
  .rp-done-header{
    display:flex; align-items:center; gap:4px;
    font-size:12.5px; font-weight:700; color:#2f7a3e;
    cursor:pointer; padding:8px 4px; user-select:none;
  }
  .rp-done-header .sg-arrow{ font-size:12px; transition:transform 0.18s ease; }
  .rp-done-wrap.expanded .rp-done-header .sg-arrow{ transform:rotate(90deg); }
  .rp-done-body{ display:none; padding:0 4px 4px; }
  .rp-done-wrap.expanded .rp-done-body{ display:block; }
  .rp-done-item{ font-size:12.5px; color:var(--good); padding:4px 0; font-weight:600; }
  /* 彙總頁面：品牌分組摺疊 */
  .brand-group{
    border:1px solid var(--line); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
    background:#fcfbf8;
  }
  .brand-group.has-missing{
    border-left:4px solid #e87a3e;
  }
  .brand-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer;
    background:#fcfbf8; user-select:none;
  }
  .brand-group-header:active{ background:#f5efe3; }
  .brand-group-header .bg-left{
    display:flex; align-items:center; gap:10px;
  }
  .brand-group-header .bg-name{
    font-size:16px; font-weight:800; color:var(--ink);
  }
  .brand-group-header .bg-meta{
    font-size:12px; color:var(--muted); font-weight:600;
  }
  .brand-group-header .bg-totals{
    font-size:13px; font-weight:700; color:var(--accent-deep);
  }
  .brand-group-header .bg-arrow{
    margin-left:8px; color:var(--muted); font-size:14px;
    transition:transform 0.18s ease;
  }
  .brand-group.expanded .bg-arrow{ transform:rotate(90deg); }
  /* 彙總明細頁：型號列標題右側「認領按鈕 + 展開箭頭」放一起，共用給品牌標題跟型號標題 */
  .hdr-right{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .brand-group-body{
    display:none;
    padding:0 12px 12px;
    background:#fff;
    border-top:1px solid var(--line);
  }
  .brand-group.expanded .brand-group-body{ display:block; }
  /* 型號小卡片（品牌底下） */
  .style-group{
    border:1px solid var(--line); border-radius:8px;
    margin:10px 0; overflow:hidden; background:#fff;
  }
  .style-group.has-missing{ border-left:3px solid #e87a3e; }
  .style-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; cursor:pointer; user-select:none;
    background:#fcfbf8;
  }
  .style-group-header:active{ background:#f5efe3; }
  .style-group-header .sg-name{
    font-size:14px; font-weight:800; color:var(--accent-deep);
  }
  .style-group-header .sg-meta{
    font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px;
  }
  .style-group-header .sg-arrow{
    color:var(--muted); font-size:13px; margin-left:8px;
    transition:transform 0.18s ease;
  }
  .style-group.expanded .sg-arrow{ transform:rotate(90deg); }
  .style-group-body{ display:none; padding:0 10px 10px; }
  .style-group.expanded .style-group-body{ display:block; }
  .empty-state{
    text-align:center; padding:40px 16px; color:var(--muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:8px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px;
    border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:var(--shadow); z-index:50;
    opacity:0; transition:opacity .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
  /* 存檔失敗提示：不會自動消失，跟上面的 toast 不同 */
  .save-error-panel{
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    width:calc(100% - 24px); max-width:480px;
    z-index:60; display:flex; flex-direction:column; gap:8px;
    pointer-events:none;
  }
  .save-error-card{
    background:#fdecea; border:1.5px solid #e3a89a; border-radius:12px;
    padding:12px 14px; box-shadow:var(--shadow);
    color:#7a2e1e; pointer-events:auto;
  }
  .save-error-card .sec-title{ font-size:14px; font-weight:800; margin-bottom:3px; }
  .save-error-card .sec-msg{ color:#8a5548; font-size:12.5px; line-height:1.5; margin-bottom:10px; }
  .save-error-card .sec-actions{ display:flex; gap:8px; justify-content:flex-end; }
  .save-error-card button{
    font-size:12.5px; padding:6px 14px; border-radius:8px; cursor:pointer;
    font-weight:700; font-family:inherit;
  }
  .save-error-card .sec-retry{ background:var(--accent-deep); color:#fff; border:none; }
  .save-error-card .sec-dismiss{ background:transparent; color:#7a2e1e; border:1.5px solid #e3a89a; }
  .chip.save-failed{ border-color:#c0392b; color:#c0392b; background:#fdecea; }
  .footer-note{
    text-align:center; font-size:11.5px; color:var(--muted); padding:6px 18px 0;
  }
  .loading{
    display:flex; align-items:center; justify-content:center;
    min-height:60vh; color:var(--muted); font-size:14px;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">載入中…</div></div>
<div class="toast" id="toast"></div>
<div class="save-error-panel" id="save-error-panel"></div>

<!-- 彙總明細的複盤備註視窗：獨立放在 #app 之外，render() 只會替換 #app 的內容，
     所以這個彈窗完全不受表格重畫、橫向捲動位置影響，開關都是直接操作這裡的 DOM，不觸發 render() -->
<div class="modal-overlay" id="summary-note-modal">
  <div class="modal-box">
    <div class="modal-title" id="summary-note-modal-title"></div>
    <textarea class="modal-textarea" id="summary-note-modal-textarea" rows="5"></textarea>
    <div class="modal-actions">
      <button type="button" class="btn secondary" id="summary-note-modal-close">關閉</button>
      <button type="button" class="btn" id="summary-note-modal-save">儲存</button>
    </div>
  </div>
</div>

<!-- 彙總明細的複盤進度細節視窗：點「⚠ 複盤處理中」「🔔 可重新登錄」徽章開啟，完全唯讀（見
     computeRecountCellStatusText），只有 needsRelog 狀態才會多顯示「完成重登」按鈕。跟備註視窗
     一樣獨立放在 #app 之外，不受表格橫向捲動影響、開關不觸發 render() -->
<div class="modal-overlay" id="recount-progress-modal">
  <div class="modal-box">
    <div class="modal-title" id="recount-progress-modal-title"></div>
    <div class="recount-progress-list" id="recount-progress-modal-body"></div>
    <div class="modal-actions">
      <button type="button" class="btn secondary" id="recount-progress-modal-close">關閉</button>
      <button type="button" class="btn" id="recount-progress-modal-relog-btn" style="display:none;">完成重登</button>
    </div>
  </div>
</div>

<script>
(function(){

// ---------- Default seed data ----------
var DEFAULT_SIZES_A = ["#6(JS)","#8(JM)","#10(JL)","JXL","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];

var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmO5IsfDIufHan6YCyML-TLBDV4XIiIOmbEuZn6W_TJza6zba5W6s5ht2WUsPnY7XU/exec";

// 管理員密碼（按右上角「管理用設定」時會詢問）。需要修改密碼時，直接改這一行的引號內文字即可
var ADMIN_PASSWORD = "6666";

// 第二輪複盤／品牌負責人功能總開關：關閉時只隱藏「開新一輪」的入口跟「品牌負責人」設定面板，
// 不刪除任何程式碼或資料——既有的第二輪資料照樣能被主管填完、回寫收尾（唯讀的意思是一般成員
// 仍被鎖住不能填，不是連主管都不能收尾）。改回 true 立即全數恢復。
var ENABLE_SECOND_ROUND = false;

var state = {
  structure: null,
  counts: {},           // key "style|color|size" -> {shelf, stock}
  recounts: {},         // key "style|color|size" -> {shelf, stock, note, assignee, markedAt, editingBy, editingAt} 複盤任務
  recountFilter: "",    // 複盤清單的認領人篩選（空=全部）
  recountBrandFilter: "", // 複盤清單的品牌篩選（空=全部）
  recountStyleFilter: "", // 複盤清單的型號篩選（第二層，空=全部；切換/重置品牌篩選時要跟著清空）
  showFinalizedRecounts: false, // 主管專用：預設不列出「已定案」的格子，開了才查閱得到(唯讀查閱用途)
  claims: {},            // key 型號名稱 -> true（已認領，避免多人同時把同一型號登入ERP）。沒有這個 key = 未認領
  verified: {},          // key 型號名稱 -> true（key in 已核對 ERP 資料無差異）。認領≠核對，兩個獨立狀態，
                          // 沒有這個 key = 未核對；沒有複盤任務時，要「認領+核對」才算完成(見 computeStyleConfirmStatus)
  people: [],            // 人員名單（姓名陣列），供「複盤/盤點身分」選單使用
  managers: [],          // 主管名單（姓名陣列），從人員名單中挑選，判定 isManager() 用
  keyinUsers: [],        // key in 人員名單（姓名陣列），從人員名單中挑選，判定 isKeyinUser() 用——
                          // 彙總明細頁認領/核對/標記複盤/備註/完成重登這幾個操作按鈕的權限名單，主管自動豁免
  assignments: {},       // key "style|color|size" -> 指派給的姓名，複盤分配用，跟「複盤人」(recounts[key].assignee) 是不同概念
  brandOwners: {},       // 品牌名稱 -> [負責人1, 負責人2]（固定兩格，沒設定是空字串），第二輪複盤導向指派用
  assignSelectedName: "", // 指派頁目前選定要指派的對象（暫存，離開頁面不特別清除，方便連續指派給同一人）
  assignChecked: {},     // 指派頁目前勾選要指派的格子 key -> true（暫存，進頁面時會重設）
  assignStep: "target",  // 指派頁目前在哪一步："target"=選人 | "checklist"=勾格子
  assignExpandedBrands: {}, // 指派頁勾選清單目前展開的品牌 -> true（用 state 記，checkbox 勾選會整頁重畫，DOM class 記不住）
  assignExpandedStyles: {}, // 指派頁勾選清單目前展開的型號 -> true
  pickIdentityReturn: null, // 從 pickIdentity 頁選完（或取消）後要回去的畫面名稱
  view: "home",         // home | brandModels | setup | counting | summary | recount | claims | pickIdentity | assign
  curBrandName: "",
  curStyleIdx: 0,
  curColorIdx: 0,
  curSizeIdx: 0,
  exprShelf: "",        // 目前格位「架上」的算式字串（標籤編輯器的資料來源）
  exprStock: "",        // 目前格位「庫存」的算式字串
  pendingSaveKeys: {},  // key -> true，還在背景存檔中（包含自動重試階段）
  failedSaveKeys: {},   // key -> 存檔失敗的原始資料，重試多次仍失敗、已還原畫面數字，等待手動重試
  validationErrors: {}  // key -> {style,color,size,message}，算式格式錯誤、被擋下沒有存檔
};

function keyFor(style, color, size){ return style + "|" + color + "|" + size; }

function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1600);
}

// ---------- API helpers ----------
async function apiGet(action){
  var url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();
  var res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("API GET failed: " + res.status);
  return await res.json();
}
async function apiPost(payload){
  var res;
  try{
    res = await fetch(APPS_SCRIPT_URL, {
      method:"POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
  }catch(networkErr){
    throw new Error("網路連線失敗：" + networkErr.message);
  }
  if(!res.ok){
    var bodyText = "";
    try{ bodyText = await res.text(); }catch(e){}
    throw new Error("伺服器回應錯誤 " + res.status + (bodyText ? "：" + bodyText.slice(0,200) : ""));
  }
  var json;
  try{
    json = await res.json();
  }catch(e){
    throw new Error("伺服器回應格式錯誤（不是有效的 JSON）");
  }
  if(json && json.ok === false){
    throw new Error("伺服器拒絕：" + (json.error || "未知原因"));
  }
  return json;
}

// ---------- Storage (backed by Google Sheet via Apps Script) ----------
async function loadStructure(){
  try{
    var data = await apiGet("structure");
    if(data && data.length){ return data; }
  }catch(e){ console.error("loadStructure failed", e); showToast("讀取結構失敗，請檢查網路"); }
  return null;
}
async function saveStructure(structure){
  try{
    await apiPost({ action:"saveStructure", structure: structure });
    return true;
  }catch(e){
    console.error("save structure failed", e);
    showToast("儲存結構失敗：" + (e && e.message ? e.message : "未知錯誤"));
    return false;
  }
}
async function loadAllCounts(structure){
  try{
    var counts = await apiGet("counts");
    return counts || {};
  }catch(e){ console.error("loadAllCounts failed", e); showToast("讀取盤點資料失敗，請檢查網路"); }
  return {};
}
// ---------- 盤點數字存檔（樂觀更新＋背景重試） ----------
var SAVE_RETRY_DELAYS_MS = [1500, 4000, 9000]; // 存檔失敗時的自動重試間隔（毫秒），共重試 3 次

// 空白就維持空字串（代表沒填），有填才換算成數字（這樣才能區分「沒填」跟「填 0」）
function buildCountVal(shelfRaw, stockRaw, countedBy){
  var shelfEmpty = (shelfRaw === "" || shelfRaw === null || shelfRaw === undefined);
  var stockEmpty = (stockRaw === "" || stockRaw === null || stockRaw === undefined);
  var shelfNum = shelfEmpty ? "" : parseExpr(shelfRaw);
  var stockNum = stockEmpty ? "" : parseExpr(stockRaw);
  var total = (shelfEmpty && stockEmpty) ? "" : (parseExpr(shelfRaw) + parseExpr(stockRaw));
  return {
    shelf: shelfNum, stock: stockNum, total: total,
    shelfExpr: shelfRaw, stockExpr: stockRaw, // 原始算式文字，僅保留在本次開啟工具的記憶體中
    countedBy: countedBy || "" // 存這一格的人（跟複盤共用同一套「我是誰」身分機制）
  };
}

// 樂觀更新：立刻把新數字寫進畫面，背景送出存檔。呼叫端不用 await，畫面不會被網路卡住。
function saveCountOptimistic(style, color, size, shelfRaw, stockRaw){
  var key = keyFor(style, color, size);
  var prevSnapshot = state.counts.hasOwnProperty(key) ? state.counts[key] : null;
  var editor = getRecountUserName();
  state.counts[key] = buildCountVal(shelfRaw, stockRaw, editor); // 立刻反映在畫面上
  clearFailedSave(key); // 這格若之前標記過失敗，現在重新嘗試，先清掉舊的失敗提示
  state.pendingSaveKeys[key] = true;
  attemptSaveCount({style:style, color:color, size:size, shelfRaw:shelfRaw, stockRaw:stockRaw, prevSnapshot:prevSnapshot, editor:editor}, 0);
}

async function attemptSaveCount(payload, attemptIdx){
  var key = keyFor(payload.style, payload.color, payload.size);
  var val = buildCountVal(payload.shelfRaw, payload.stockRaw, payload.editor);
  try{
    await apiPost({ action:"saveCount", style:payload.style, color:payload.color, size:payload.size, shelf:val.shelf, stock:val.stock, editor:payload.editor });
    delete state.pendingSaveKeys[key];
  }catch(e){
    console.error("save count failed (attempt "+(attemptIdx+1)+")", e);
    if(attemptIdx < SAVE_RETRY_DELAYS_MS.length){
      setTimeout(function(){ attemptSaveCount(payload, attemptIdx+1); }, SAVE_RETRY_DELAYS_MS[attemptIdx]);
    } else {
      delete state.pendingSaveKeys[key];
      handleSaveFailure(payload, e);
    }
  }
}

// 自動重試多次仍失敗：把畫面數字還原成存檔前的值，並跳出不會自動消失的提示（不能默默吞掉）
function handleSaveFailure(payload, err){
  var key = keyFor(payload.style, payload.color, payload.size);
  if(payload.prevSnapshot){ state.counts[key] = payload.prevSnapshot; }
  else { delete state.counts[key]; }
  state.failedSaveKeys[key] = payload;
  renderSaveErrorPanel();
  // 使用者若還停留在這一格，重畫讓數字立刻變回還原後的值；已切到別格的話，該尺寸的標籤會標紅提示
  if(state.view === "counting"){ render(); }
}

function clearFailedSave(key){
  if(state.failedSaveKeys[key]){
    delete state.failedSaveKeys[key];
    renderSaveErrorPanel();
  }
}

// 手動或斷線恢復後重試：用當初失敗那份資料重新走一次樂觀更新＋存檔流程
function retryFailedSave(key){
  var payload = state.failedSaveKeys[key];
  if(!payload) return;
  saveCountOptimistic(payload.style, payload.color, payload.size, payload.shelfRaw, payload.stockRaw);
}

function dismissFailedSave(key){
  delete state.failedSaveKeys[key];
  renderSaveErrorPanel();
}

// 算式格式錯誤、被擋下沒有存檔時顯示的提示（跟存檔失敗共用同一個提示區塊）

        '<button class="sec-dismiss" data-action="dismiss-save-error" data-key="'+escapeHtml(key)+'">關閉</button>'+

// ---------- 彙總明細的複盤進度細節視窗（唯讀） ----------
// 判定單一複盤格「現在該顯示什麼狀態」，優先序（由高到低）：已定案／已回寫 這兩個是終態，最先判斷；
// 第二輪(isSecondRoundRecount)雖然 shelf/stock 會被後端清空，但要顯示「第二輪處理中」而不是「未盤」，
// 所以排在「⏳複盤中／已填寫待回寫／未盤」這三個第一輪中繼狀態之前。
// 狀態後面附的人名來源分兩種：「填了數字的人」用 r.assignee（已填寫待回寫／已回寫／已定案）；
// 「誰該負責這格」用 recountResponsibleNames()（未盤／第二輪處理中）——沿用複盤清單既有的
// 歸屬判斷（第一輪看指派紀錄、第二輪看品牌負責人），不另寫一套。
// 已回寫/已定案且被主管修正過(r.corrected)是例外：主管改動架上/庫存數字時，r.assignee 會被
// 覆蓋成主管本人（見 saveRecountValueRemote，誰存的數字就記誰），這裡如果還顯示 assignee 會把
// 最初真正回寫的人洗掉，所以改用「已回寫(原OO/修XX)」——OO/XX 讀跟複盤清單卡片同一組欄位
// (originalConfirmedBy/confirmedBy)，判定邏輯完全共用，不另寫一套。
function computeRecountCellStatusText(key){
  var r = state.recounts[key];
  if(!r) return "";
  var assignee = String(r.assignee || "").trim();
  if(r.confirmed){
    var statusWord = r.everReopened ? "已定案" : "已回寫";
    if(r.corrected){
      var origBy = String(r.originalConfirmedBy || "").trim() || "—";
      var curBy = String(r.confirmedBy || "").trim() || "—";
      return statusWord + "(原"+origBy+"/修"+curBy+")";
    }
    return statusWord + (assignee ? "("+assignee+")" : "");
  }
  if(isSecondRoundRecount(r)){
    var owners = recountResponsibleNames(key);
    return owners.length ? ("第二輪處理中(負責人:"+owners.join("、")+")") : "第二輪處理中";
  }
  var editingBy = String(r.editingBy || "").trim();
  var editingAt = r.editingAt ? new Date(r.editingAt).getTime() : 0;
  var isEditingFresh = !!editingBy && (Date.now() - editingAt) < RECOUNT_EDITING_TTL_MS;
  if(isEditingFresh) return "⏳ "+editingBy+" 複盤中";
  var shelfFilled = String(r.shelf || "").trim() !== "";
  var stockFilled = String(r.stock || "").trim() !== "";
  if(shelfFilled && stockFilled) return "已填寫待回寫" + (assignee ? "("+assignee+")" : "");
  var responsible = recountResponsibleNames(key);
  return responsible.length ? ("未盤(已派:"+responsible.join("、")+")") : "未盤(尚未指派)";
}
// 開啟時直接用當下 state 現算列表，不打 API（見需求：彈窗開著時不強求即時刷新，關掉重開就是新的）。
// 只列「已標記」的格子（state.recounts 有資料的），依款式結構的顏色/尺寸順序排列，找不到結構
// （理論上不會發生，防禦性寫法）才退回照 state.recounts 既有的 key 順序列。
function openRecountProgressModal(styleName){
  var modal = document.getElementById('recount-progress-modal');
  var title = document.getElementById('recount-progress-modal-title');
  var body = document.getElementById('recount-progress-modal-body');
  var relogBtn = document.getElementById('recount-progress-modal-relog-btn');
  if(!modal || !body) return;
  modal.dataset.style = styleName;
  if(title) title.textContent = styleName;
  var rows = [];
  var st = state.structure.find(function(s){ return s.style === styleName; });
  if(st){
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(styleName, col.name, sz);
        if(!state.recounts[key]) return;
        rows.push({ label: col.name+' - '+sz, status: computeRecountCellStatusText(key) });
      });
    });
  } else {
    Object.keys(state.recounts).forEach(function(key){
      var parts = key.split("|");
      if(parts[0] !== styleName) return;
      rows.push({ label: parts[1]+' - '+parts[2], status: computeRecountCellStatusText(key) });
    });
  }
  body.innerHTML = rows.length
    ? rows.map(function(row){
        return '<div class="recount-progress-row"><span class="rp-cell">'+escapeHtml(row.label)+'</span><span class="rp-status">'+escapeHtml(row.status)+'</span></div>';
      }).join("")
    : '<div class="sub">目前沒有已標記的複盤格。</div>';
  // 「完成重登」按鈕只在這個型號目前正是 needsRelog 狀態、且身分是 key in(或主管)時才顯示，
  // 跟徽章本身共用同一套判定（見 computeStyleConfirmStatus），避免彈窗跟徽章對不起來；徽章跟這個
  // 彈窗本身全員都能開（純檢視），只有裡面這顆「完成重登」實際動作按鈕才受權限管控。
  if(relogBtn) relogBtn.style.display = (computeStyleConfirmStatus(styleName).status === "needsRelog" && canOperateSummary()) ? "" : "none";
  modal.style.display = 'flex';
}
function closeRecountProgressModal(){
  var modal = document.getElementById('recount-progress-modal');
  if(modal) modal.style.display = 'none';
}
(function(){
  var modal = document.getElementById('recount-progress-modal');
  var closeBtn = document.getElementById('recount-progress-modal-close');
  var relogBtn = document.getElementById('recount-progress-modal-relog-btn');
  if(closeBtn){

    // 避免「點徽號看細節」跟「點徽章完成重登」這兩種點擊意圖打架。
    relogBtn.addEventListener('click', async function(){

        return;
      }
      try{
        await relogStyleRemote(styleName);
        showToast('已標記「'+styleName+'」完成重登');
      }catch(e){
        // relogStyleRemote 內部已經顯示錯誤 toast，這裡不用重複處理

})();

// ---------- 「我是誰」身分（存這台手機的 localStorage，初盤／複盤共用同一個身分，避免每格重打名字） ----------
var RECOUNT_USERNAME_KEY = "recountUserName";
function getRecountUserName(){
  try{ return (localStorage.getItem(RECOUNT_USERNAME_KEY) || "").trim(); }catch(e){ return ""; }
}
function setRecountUserName(name){
  try{ localStorage.setItem(RECOUNT_USERNAME_KEY, (name || "").trim()); }catch(e){}
}
// 目前這台手機的身分是否為主管：跟人員名單相容性檢查同一套比對邏輯，字面完全相符才算
function isManager(){
  var current = getRecountUserName();
  if(!current) return false;
  return (state.managers || []).indexOf(current) !== -1;
}
// 目前這台手機的身分是否在 key in 名單裡：判定邏輯跟 isManager() 同一套比對方式
function isKeyinUser(){
  var current = getRecountUserName();
  if(!current) return false;
  return (state.keyinUsers || []).indexOf(current) !== -1;
}
// 彙總明細頁「認領/取消認領、核對完成/取消、標記複盤/取消(含已複盤)、複盤備註編輯、完成重登」
// 這幾個操作按鈕能不能點的統一判定——key in 名單內的身分，或主管（主管一律豁免，不用額外把自己
// 加進 key in 名單）。全站只有這一個判定點，五個位置都呼叫這裡，不各自重複判斷。
function canOperateSummary(){
  return isManager() || isKeyinUser();
}
// 目前這台手機「看得到」的複盤格子 key 清單：主管預設看全部，但「已完結」(已回寫或已定案，
// 兩種都是 r.confirmed=true)的格子預設濾掉，避免清單一直堆積已經結束的格子——開啟
// state.showFinalizedRecounts 開關(複盤清單頁「顯示已完結」)才會列出來供查閱／主管修正回寫。
// 非主管看得到的分兩種——第一輪格子看「指派給自己」的；第二輪格子(isSecondRoundRecount)不走指派，
// 直接看「自己是不是這格品牌的負責人之一」，等同「自動被指派」的效果，不用主管手動再派一次。
// 不管哪一種，只要這格「已經確認回寫過」(r.confirmed)，複盤人視角就立刻退場，不用等 key in 開
// 第二輪才消失——這一條同時涵蓋「已回寫」(第一輪確認)跟「已定案」(第二輪或之後定案)兩種已完結狀態，
// 事情做完的格子就該從相關人的清單移除。
// 這是唯一的過濾點——複盤清單、款式進度總覽、首頁徽章數字、背景同步的「清單有變動」比對都共用這份邏輯，
// 不在各處各自重複判斷，也確保「指派資料同步回來後，變動提示橫幅算得出來」（見 syncFromBackend）。
function visibleRecountKeys(){
  var allKeys = Object.keys(state.recounts || {});
  if(isManager()){
    if(state.showFinalizedRecounts) return allKeys;
    return allKeys.filter(function(k){
      var r = state.recounts[k];
      return !r.confirmed;
    });
  }
  var myName = getRecountUserName();
  if(!myName) return [];
  return allKeys.filter(function(k){
    var r = state.recounts[k];
    if(isSecondRoundRecount(r)){
      return brandOwnersForKey(k).indexOf(myName) !== -1;
    }
    if(r.confirmed) return false;
    return String(state.assignments[k] || "").trim() === myName;
  });
}
// 進盤點中／複盤頁前先確認這台手機有沒有設定過身分。呼叫前呼叫端會先把 state.view 設成想去的畫面：
// 身分有效就留在原地；名單非空但沒身分（或身分是名單裡找不到的舊資料，例如手打的錯字/大小寫不符）就跳去
// pickIdentity 選單重選一次，選完會自動回到這個畫面；名單是空的才退回原本的手動輸入，避免一開始被鎖死。
function ensureRecountUserName(){
  var nextView = state.view;
  var current = getRecountUserName();
  var hasPeople = state.people && state.people.length > 0;
  if(current && (!hasPeople || state.people.indexOf(current) !== -1)) return;
  if(hasPeople){
    state.pickIdentityReturn = nextView;
    state.view = "pickIdentity";
    return;
  }
  var name = prompt('請先輸入你的名字。\n\n之後這台手機的盤點操作（初盤、複盤填數字、正在複盤中）都會自動帶上這個名字，不用每格重打，之後也能隨時修改。');
  if(name !== null) setRecountUserName(name);
}

// 「複盤中」提醒超過這麼久沒更新就視為過期，畫面上不再顯示（純前端計算，後端不用另外清）
var RECOUNT_EDITING_TTL_MS = 3 * 60 * 1000; // 3 分鐘

// 算出單一複盤品項現在該顯示的狀態小標籤：
// 已完成 → 「✓ 由 X 複盤」；有人正在打字且不是自己 → 「⏳ X 複盤中」；
// 有人填過但還沒完成 → 「X 處理中」；都沒有 → 「尚無人複盤」
// 複盤人只有一個名字：實際存了架上/庫存數字的人，直接寫進 assignee，不再另外手動輸入
function computeRecountBadge(r, isDoneNow){
  var assignee = String(r.assignee || "").trim();
  var editingBy = String(r.editingBy || "").trim();
  var editingAt = r.editingAt ? new Date(r.editingAt).getTime() : 0;
  // 第二輪格子不顯示「複盤中」提醒：後端開第二輪時已經會清 I/J 欄，這裡是前端雙保險，
  // 避免舊資料還沒同步完的空窗期誤顯示上一輪殘留的「⏳ OO 複盤中」
  var isEditingFresh = !!editingBy && (Date.now() - editingAt) < RECOUNT_EDITING_TTL_MS && !isSecondRoundRecount(r);
  var myName = getRecountUserName();

  if(isDoneNow && assignee){
    return { cls:'done', text:'✓ 由 '+assignee+' 複盤' };
  }
  if(isEditingFresh && editingBy.toLowerCase() !== myName.toLowerCase()){
    return { cls:'active', text:'⏳ '+editingBy+' 複盤中' };
  }
  if(assignee){
    return { cls:'', text: assignee+' 處理中' };
  }
  return { cls:'unassigned', text:'尚無人複盤' };
}

  var key = keyFor(style, color, size);
  // 本地先更新(樂觀更新)
  var existing = state.recounts[key] || {};
  state.recounts[key] = {
    shelf: existing.shelf !== undefined ? existing.shelf : "",
    stock: existing.stock !== undefined ? existing.stock : "",
    note: existing.note !== undefined ? existing.note : "",
    assignee: assignee || "",
    markedAt: existing.markedAt || "",
    editingBy: existing.editingBy || "",
    editingAt: existing.editingAt || ""
  };
  try{
    await apiPost({ action:"markRecount", style:style, color:color, size:size, assignee:assignee || "" });
  }catch(e){ console.error("mark recount failed", e); showToast("標記失敗，請檢查網路"); }
}
// 對一個「已確認回寫過」的格子開啟第二輪：清空這一輪的複盤數字/負責人/已確認/已重登狀態，
// 但保留確認人/確認時間/快照(confirmedBy/confirmedAt/beforeShelf/beforeStock/beforeCountedBy)不動——
// 這樣「有快照但還沒確認」才能拿來判斷「這格是第二輪」，稽核紀錄也不會不見。跟後端 markRecount()
// 開啟第二輪的那段邏輯是同一套規則，這裡是樂觀更新版本，呼叫的 API 動作(markRecount)完全相同。
async function remarkRecountForNextRoundRemote(style, color, size){
  var key = keyFor(style, color, size);
  var existing = state.recounts[key] || {};
  var prevRecount = existing;
  var prevAssignment = state.assignments[key];
  state.recounts[key] = Object.assign({}, existing, {
    shelf: "", stock: "", assignee: "", confirmed: false, relogged: false, relogBy: "", relogAt: ""
  });
  // 同步清掉上一輪的指派（樂觀更新）：第一輪指派的人不該在畫面重新整理前，還在複盤清單看得到這一格，
  // 要等主管重新指派（畫面會提示優先派給品牌負責人）才會有人能再填這一格。後端 markRecount() 開第二輪
  // 那段也會清指派，這裡只是讓本機畫面立刻反映，不用等網路來回。
  delete state.assignments[key];
  try{
    await apiPost({ action:"markRecount", style:style, color:color, size:size, assignee:"" });
  }catch(e){
    console.error("remark recount for next round failed", e);
    state.recounts[key] = prevRecount;
    if(prevAssignment !== undefined) state.assignments[key] = prevAssignment;
    showToast("開始第二輪失敗，請檢查網路");
  }
}
// 取消複盤標記前的確認訊息：依這一格目前的狀態(已確認回寫／已填數字但未確認／都還沒填)給不同警告，
// 避免使用者手滑刪掉已經完成的工作。已確認的格子刪掉的只是「_複盤任務」這筆紀錄本身，
// 已經回寫進彙總的數字不受影響(saveCount 是 append，不會因為這裡刪列就消失)；
// 已填但未確認的格子刪掉就真的會遺失那些數字，需要更明確的警告。
function buildUnmarkRecountConfirmMessage(style, color, size){
  var key = keyFor(style, color, size);
  var r = state.recounts[key] || {};
  var hasData = String(r.shelf || "").trim() !== "" || String(r.stock || "").trim() !== "";
  var msg = '確定要取消「'+style+' · '+color+' · '+size+'」的複盤標記嗎？';
  if(r.confirmed){
    msg += '\n\n⚠️ 這一格複盤已經確認回寫過彙總，取消只會刪除這筆複盤紀錄本身，不影響已經回寫進彙總的數字。';
  } else if(isSecondRoundRecount(r)){
    msg += '\n\n⚠️ 這一格是第二輪複盤，上一輪已確認回寫的紀錄（含原始快照）也會一併刪除——不影響已經回寫進彙總的數字，但這份稽核紀錄會消失。';
  } else if(hasData){
    msg += '\n\n⚠️ 這一格已經填過複盤數字（還沒確認回寫），取消將一併刪除這些數字，無法復原。';
  } else {
    msg += '\n\n這只會移除複盤標記，不影響第一次盤點的資料。';
  }
  return msg + '\n\n此動作無法復原。';
}

// 「開始複盤這一格」的提醒：架上/庫存輸入框一聚焦就送出，讓別人的手機看到「OO 複盤中」。
// 純提醒、不是鎖，格子本身還是可以照樣輸入。同一格 20 秒內只送一次，避免頻繁點來點去洗網路請求；
// 本地也不用因為這個 ping 重畫畫面──因為自己看不到自己的「複盤中」提醒（見 computeRecountBadge）。
var recountEditingPingCache = {}; // key -> 上次送出 ping 的時間戳記(本地執行期記憶，重新整理就重置，沒關係)
function startEditingRecountRemote(style, color, size){
  var editor = getRecountUserName();
  if(!editor) return; // 沒設定身分就不送提醒，不影響輸入
  var key = keyFor(style, color, size);
  var now = Date.now();
  if(recountEditingPingCache[key] && (now - recountEditingPingCache[key]) < 20000) return;
  recountEditingPingCache[key] = now;
  var existing = state.recounts[key];
  if(existing){
    existing.editingBy = editor;
    existing.editingAt = new Date().toISOString();
  }
  apiPost({ action:"startEditingRecount", style:style, color:color, size:size, editor:editor })
    .catch(function(e){ console.error("start editing ping failed", e); });
}

// 主管確認複盤結果、回寫進彙總。架上/庫存複盤存的是算式文字（例如"50+30"），這裡先用既有的
// parseExpr() 算成數字才送給後端——後端不重新解析算式，直接信任前端算好的結果，跟平常存檔（saveCount）
// 收到的 shelf/stock 是同一套慣例。樂觀更新同時更新 recounts(已確認狀態)跟 counts(讓「第一次」欄位、
// 差異立刻反映新值)，失敗就兩個都還原。
// isCorrection：這格「已經回寫過」還再呼叫一次，代表是主管在複盤清單修正錯誤數字(見
// buildRecountConfirmSectionHtml 的修正按鈕)，帶給後端讓 confirmRecount() 放行重複確認的擋修，
// 並在複盤分頁標記「已修正」欄位留稽核痕跡；不是修正流程就照舊不帶(undefined 等同 false)。
async function confirmRecountRemote(style, color, size, isCorrection){
  var key = keyFor(style, color, size);
  var r = state.recounts[key];
  if(!r) return;
  var shelfVal = parseExpr(String(r.shelf || ""));
  var stockVal = parseExpr(String(r.stock || ""));
  if(isNaN(shelfVal) || isNaN(stockVal)){
    showToast("架上或庫存複盤的算式格式異常，無法確認，請先修正");
    return;
  }
  var confirmedBy = getRecountUserName();
  var prevRecount = r;
  var prevCount = state.counts[key];
  // 快照確認「前」的初盤現值，讓已確認卡片還能看出「當初差了多少」——counts 馬上就會被複盤值蓋掉，
  // 不先存起來這段歷史就查不到了（後端 confirmRecount 也會存一份，這裡是讓畫面立刻反映，不用等下次同步）
  var beforeShelf = (prevCount && prevCount.shelf !== "" && prevCount.shelf !== null && prevCount.shelf !== undefined) ? prevCount.shelf : "";
  var beforeStock = (prevCount && prevCount.stock !== "" && prevCount.stock !== null && prevCount.stock !== undefined) ? prevCount.stock : "";
  var beforeCountedBy = (prevCount && prevCount.countedBy) ? prevCount.countedBy : "";
  // 原回寫人/原回寫時間快照：只在「這一格第一次被修正」才需要存(r.originalConfirmedBy 還空的時候)，
  // 存的是這次即將被覆蓋掉的 confirmedBy/confirmedAt(也就是上一次真正回寫的人/時間)，之後不管修正
  // 幾次都不再覆蓋——跟後端 confirmRecount() 的 Y,Z 欄快照邏輯一致，這裡是樂觀更新版本，讓主管按下
  // 修正回寫的當下畫面就能立刻呈現雙行，不用等下次同步。
  var hasOrigSnapshot = r.originalConfirmedBy !== undefined && r.originalConfirmedBy !== null && r.originalConfirmedBy !== "";
  var originalConfirmedBy = hasOrigSnapshot ? r.originalConfirmedBy : (isCorrection ? (r.confirmedBy || "") : (r.originalConfirmedBy || ""));
  var originalConfirmedAt = hasOrigSnapshot ? r.originalConfirmedAt : (isCorrection ? (r.confirmedAt || "") : (r.originalConfirmedAt || ""));
  state.recounts[key] = Object.assign({}, r, {
    confirmed: true, confirmedBy: confirmedBy, confirmedAt: new Date().toISOString(),
    beforeShelf: beforeShelf, beforeStock: beforeStock, beforeCountedBy: beforeCountedBy,
    corrected: !!isCorrection,
    originalConfirmedBy: originalConfirmedBy, originalConfirmedAt: originalConfirmedAt
  });
  state.counts[key] = { shelf: shelfVal, stock: stockVal, total: shelfVal + stockVal, countedBy: confirmedBy };
  try{
    await apiPost({ action:"confirmRecount", style:style, color:color, size:size, shelf:shelfVal, stock:stockVal, confirmedBy:confirmedBy, isCorrection: !!isCorrection });
  }catch(e){
    console.error("confirm recount failed", e);
    state.recounts[key] = prevRecount;
    state.counts[key] = prevCount;
    showToast("確認失敗：" + (e && e.message ? e.message : "請檢查網路"));
    throw e;
  }
}
// key in 人員完成某型號的 ERP 重新登錄後呼叫：把這個型號目前「已確認但還沒重登」的格子在本地一次標記已重登，
// 讓彙總頁的「🔔 可重新登錄」徽章立刻消失。失敗只顯示 toast、不逐格還原（風險低，下次同步會自動修正）。
async function relogStyleRemote(styleName){
  var relogBy = getRecountUserName();
  var relogAtIso = new Date().toISOString();
  Object.keys(state.recounts).forEach(function(key){
    if(key.split("|")[0] !== styleName) return;
    var r = state.recounts[key];
    if(r.confirmed && !r.relogged){
      state.recounts[key] = Object.assign({}, r, { relogged: true, relogBy: relogBy, relogAt: relogAtIso });
    }
  });
  try{
    await apiPost({ action:"relogStyle", style:styleName, relogBy:relogBy });
  }catch(e){
    console.error("relog style failed", e);
    showToast("標記重登失敗，請檢查網路");
    throw e;
  }
}

  try{
    await apiPost({ action:"deleteBrandOwner", brand:brand, slot:slot });
  }catch(e){ console.error("delete brand owner failed", e); showToast("移除品牌負責人失敗，請檢查網路"); }
}

// ---------- 複盤指派 API ----------
// 指派是「主管要誰去做這一格」，跟「複盤人」(誰實際存了架上/庫存數字，見 saveRecountValueRemote)
// 是兩個獨立的概念，分開存放，互不覆蓋。走樂觀更新，寫法比照複盤標記 API。
async function assignRecountRemote(style, color, size, assignee){
  var key = keyFor(style, color, size);
  state.assignments[key] = assignee; // 本地先更新(樂觀更新)
  try{
    await apiPost({ action:"assignRecount", style:style, color:color, size:size, assignee:assignee });
  }catch(e){ console.error("assign recount failed", e); showToast("指派失敗，請檢查網路"); }
}
async function unassignRecountRemote(style, color, size){
  var key = keyFor(style, color, size);
  delete state.assignments[key];
  try{
    await apiPost({ action:"unassignRecount", style:style, color:color, size:size });
  }catch(e){ console.error("unassign recount failed", e); showToast("取消指派失敗，請檢查網路"); }
}

// ---------- Init ----------
// 品牌顯示順序：從後端載入（管理員可在設定頁調整）。後端還沒設定時用這個預設順序。
var BRAND_ORDER = ["SR","CP","AG短袖","AG冬衣","KY","PL","TH","CAP"];

// 動態計算「品牌分組」：完全根據 state.structure 裡每個款式的 brand 屬性，不再寫死任何款式名稱
// 沒有設定品牌的款式 → 各自獨立顯示一格在首頁
// 設定相同品牌的款式 → 自動聚集到該品牌底下
// 回傳格式：[{brand: "CP"或null, styles: [款式名稱陣列]}, ...]
function computeBrandGroups(){
  if(!state.structure) return [];
  var brandMap = {};  // brand -> [style names]
  var standalone = []; // 沒品牌的，獨立顯示
  state.structure.forEach(function(st){
    var b = (st.brand || "").trim();
    if(b){
      if(!brandMap[b]) brandMap[b] = [];
      brandMap[b].push(st.style);
    } else {
      standalone.push(st.style);
    }
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });

  var groups = [];
  // 1) 先放「獨立顯示」（沒品牌）的款式
  standalone.forEach(function(s){ groups.push({brand:null, styles:[s]}); });
  // 2) 再依 BRAND_ORDER 順序、再依字母順序，放品牌分組
  var brandNames = Object.keys(brandMap).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  brandNames.forEach(function(name){
    groups.push({brand:name, styles:brandMap[name]});
  });
  return groups;
}

function findBrandGroupForStyle(styleName){
  var groups = computeBrandGroups();
  for(var i=0;i<groups.length;i++){
    if(groups[i].styles.indexOf(styleName) !== -1) return groups[i];
  }
  return null;
}

function sortStructureByStyle(structure){
  // 改成依 BRAND_ORDER 排序：同品牌的款式聚在一起，沒品牌的放最前面（獨立顯示）
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  return structure.slice().sort(function(a, b){
    var ab = (a.brand || "").trim();
    var bb = (b.brand || "").trim();
    // 沒品牌的優先
    if(!ab && bb) return -1;
    if(ab && !bb) return 1;
    if(!ab && !bb) return a.style.localeCompare(b.style, 'zh-Hant');
    var ai = orderMap.hasOwnProperty(ab) ? orderMap[ab] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(bb) ? orderMap[bb] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.style.localeCompare(b.style, 'zh-Hant');
  });
}

// 把後端讀進來的結構正規化：強制 style、顏色名稱、尺寸都是字串型別
// 因為 Google Sheet 會自動把純數字內容存成 number，前端比對會失敗（"76000" !== 76000）
function normalizeStructure(structure){
  if(!Array.isArray(structure)) return structure;
  return structure.map(function(st){
    return {
      style: String(st.style),
      brand: st.brand ? String(st.brand) : "",
      colors: (st.colors || []).map(function(c){
        return {
          name: String(c.name),
          sizes: (c.sizes || []).map(function(s){ return String(s); })
        };
      })
    };
  });
}

// counts 的 key 也要正規化（因為 key 裡含款式名稱，如果存成數字也會對不起來）
function normalizeCounts(counts){
  if(!counts || typeof counts !== 'object') return counts || {};
  var out = {};
  Object.keys(counts).forEach(function(k){
    out[String(k)] = counts[k];
  });
  return out;
}

// 複盤任務的文字欄位一律強制轉成字串型別，避免 Google Sheet 把某格內容存成 number
// （例如身分名字剛好打成純數字）時，前端對這些欄位做 .trim()/.toLowerCase() 直接炸掉整頁。
// 數字格位（架上複盤/庫存複盤）維持原樣，使用處本來就會另外用 String()/parseExpr 處理。
var RECOUNT_TEXT_FIELDS = ["note","assignee","editingBy","lastEditBy","confirmedBy","relogBy","beforeCountedBy","veryFirstCountedBy","originalConfirmedBy"];
function normalizeRecounts(recounts){
  if(!recounts || typeof recounts !== 'object') return recounts || {};
  var out = {};
  Object.keys(recounts).forEach(function(k){
    var r = recounts[k] || {};
    var nr = {};
    Object.keys(r).forEach(function(field){
      var v = r[field];
      nr[field] = (RECOUNT_TEXT_FIELDS.indexOf(field) !== -1 && v !== null && v !== undefined) ? String(v) : v;
    });
    out[String(k)] = nr;
  });
  return out;
}

// 指派名單的 key 跟值都強制轉字串，理由同 RECOUNT_TEXT_FIELDS：避免姓名剛好是純數字
// （或款式/顏色/尺寸剛好是純數字組成的 key）被 Google Sheet 存成 number 型別，比對時整頁掛掉。
function normalizeAssignments(assignments){
  if(!assignments || typeof assignments !== 'object') return assignments || {};
  var out = {};
  Object.keys(assignments).forEach(function(k){
    var v = assignments[k];
    out[String(k)] = (v !== null && v !== undefined) ? String(v) : v;
  });
  return out;
}

// 品牌負責人的 key(品牌)/值(姓名)都強制轉字串，理由同 normalizeAssignments：避免品牌或姓名
// 剛好是純數字，被 Google Sheet 存成 number 型別，比對時整頁掛掉
// 每個品牌對應一個固定兩格的陣列 [負責人1, 負責人2]，沒設定的那格是空字串——保留「位置」才能分辨
// 第一位/第二位分別是誰，管理設定頁的「移除第一位/第二位」才能各自獨立操作。強制轉字串理由同其他
// normalize 函式：避免姓名剛好是純數字被 Google Sheet 存成 number 型別，比對時整頁掛掉。
function normalizeBrandOwners(brandOwners){
  if(!brandOwners || typeof brandOwners !== 'object') return brandOwners || {};
  var out = {};
  Object.keys(brandOwners).forEach(function(k){
    var v = brandOwners[k];
    var arr = Array.isArray(v) ? v : (v !== null && v !== undefined ? [v] : []);
    out[String(k)] = [
      (arr[0] !== null && arr[0] !== undefined) ? String(arr[0]) : "",
      (arr[1] !== null && arr[1] !== undefined) ? String(arr[1]) : ""
    ];
  });
  return out;
}

// 載入畫面的計時器與階段控制
var loadStartTime = null;
var loadTimerInterval = null;
var loadStage = "";

function renderLoadingScreen(){
  var app = document.getElementById("app");
  app.innerHTML =
    '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:70vh; padding:0 32px;">'+
      '<div style="font-size:36px; margin-bottom:16px;">📦</div>'+
      '<div id="load-stage" style="font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px;">連線中…</div>'+
      '<div id="load-elapsed" style="font-size:13px; color:var(--muted); margin-bottom:20px;">已等待 0.0 秒</div>'+
      '<div style="width:100%; max-width:280px; height:8px; background:#e9e3d6; border-radius:5px; overflow:hidden;">'+
        '<div id="load-bar" style="height:100%; width:30%; background:var(--accent); border-radius:5px; animation:loadslide 1.2s ease-in-out infinite;"></div>'+
      '</div>'+
    '</div>'+
    '<style>@keyframes loadslide{0%{margin-left:-30%}100%{margin-left:100%}}</style>';
}

function setLoadStage(text){
  loadStage = text;
  var el = document.getElementById("load-stage");
  if(el) el.textContent = text;
}

function startLoadTimer(){
  loadStartTime = Date.now();
  if(loadTimerInterval) clearInterval(loadTimerInterval);
  loadTimerInterval = setInterval(function(){
    var el = document.getElementById("load-elapsed");
    if(el){
      var secs = ((Date.now() - loadStartTime) / 1000).toFixed(1);
      el.textContent = "已等待 " + secs + " 秒";
    }
  }, 100);
}

function stopLoadTimer(){
  if(loadTimerInterval){ clearInterval(loadTimerInterval); loadTimerInterval = null; }
}

async function init(){
  renderLoadingScreen();
  startLoadTimer();

  var structure = null;
  var counts = {};
  var fetchFailed = false;
  try{
    setLoadStage("連線到雲端資料庫…");
    var all = await apiGet("all");
    setLoadStage("整理款式與盤點資料…");
    if(all && Array.isArray(all.structure)){
      structure = all.structure; // 即使是空陣列也算合法（代表這個 Sheet 還沒設定任何款式）
      counts = all.counts || {};
      if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
      if(all.recounts){ state.recounts = normalizeRecounts(all.recounts); }
      if(all.claims){ state.claims = all.claims; }
      if(all.verified){ state.verified = all.verified; }
      if(Array.isArray(all.people)){ state.people = all.people.map(String); }
      if(Array.isArray(all.managers)){ state.managers = all.managers.map(String); }
      if(Array.isArray(all.keyinUsers)){ state.keyinUsers = all.keyinUsers.map(String); }
      if(all.assignments){ state.assignments = normalizeAssignments(all.assignments); }
      if(all.brandOwners){ state.brandOwners = normalizeBrandOwners(all.brandOwners); }
    } else {
      fetchFailed = true;
    }
  }catch(e){
    console.error("init load failed", e);
    fetchFailed = true;
  }

  stopLoadTimer();

  if(fetchFailed || structure === null){
    renderLoadError();
    return;
  }

  state.structure = sortStructureByStyle(normalizeStructure(structure));
  state.counts = normalizeCounts(counts);
  state.view = "home";
  render();
  startAutoSync(); // 啟動背景自動同步
}

// 自動同步：每 SYNC_INTERVAL_MS 毫秒去後端拉一次最新資料，更新其他人填的數字到本地畫面
var SYNC_INTERVAL_MS = 30000; // 30 秒同步一次
var autoSyncTimer = null;
var isSyncing = false;
var lastSyncTime = null;
// 複盤頁「目前畫面上實際畫出來的清單」有哪些 key，只在 renderRecount() 真的重畫清單時更新。
// 拿來跟每輪自動同步後的最新清單比對，算出「跟畫面上看到的」差幾筆，藉此決定要不要顯示變動提示橫幅。
var recountRenderedKeys = null;

function getSyncStatusText(){
  if(!isPageVisible) return "💤 已暫停（切回前景自動恢復）";
  if(isIdle) return "💤 閒置中已暫停（碰一下畫面即恢復）";
  if(isSyncing) return "🔄 同步中...";
  if(!lastSyncTime) return "每 30 秒自動同步一次";
  var diff = Math.floor((Date.now() - lastSyncTime) / 1000);
  if(diff < 5) return "✓ 剛剛已同步";
  if(diff < 60) return "✓ " + diff + " 秒前更新";
  return "✓ " + Math.floor(diff/60) + " 分鐘前更新";
}

// 在 summary 畫面右上角顯示「有新資料 點此刷新」提示，不會強制重畫
function showSummaryUpdateHint(){
  var hint = document.getElementById('summary-update-hint');
  if(hint){
    hint.style.display = 'inline-flex';
  }
}

// 在複盤頁頂端顯示「清單有 N 筆變動，點此更新」提示，只改這個既有 DOM 元素的文字跟顯示狀態，
// 完全不碰清單本身、不呼叫 render()，使用者要自己點了才會真正重畫清單（見 refresh-recount-list）
function showRecountListChangedHint(n){
  var hint = document.getElementById('recount-update-hint');
  if(!hint) return;
  hint.textContent = '🔔 複盤清單有 ' + n + ' 筆變動，點此更新';
  hint.style.display = 'block';
}

// 追蹤頁面是否在前景（被使用者實際看著）
var isPageVisible = true;
// 追蹤是否處於閒置狀態（畫面雖然開著但長時間沒操作）
var isIdle = false;
var IDLE_THRESHOLD_MS = 5 * 60 * 1000; // 5 分鐘沒操作就視為閒置
var lastActivityTime = Date.now();
var idleCheckTimer = null;

function startAutoSync(){
  if(autoSyncTimer) clearInterval(autoSyncTimer);
  autoSyncTimer = setInterval(function(){
    // 只有頁面在前景且使用者有在操作時才同步，背景或閒置時跳過以節省 Apps Script 配額
    if(isPageVisible && !isIdle) syncFromBackend();
  }, SYNC_INTERVAL_MS);

  // 每分鐘檢查一次是否進入閒置狀態
  if(idleCheckTimer) clearInterval(idleCheckTimer);
  idleCheckTimer = setInterval(function(){
    if(!isIdle && (Date.now() - lastActivityTime > IDLE_THRESHOLD_MS)){
      isIdle = true;
    }
  }, 60000);

  if(!window._visibilityBound){
    window._visibilityBound = true;

    // 監聽頁面可見性變化（手機鎖屏、切到其他 App、切到其他分頁都會觸發）
    document.addEventListener('visibilitychange', function(){
      var nowVisible = !document.hidden;
      if(nowVisible && !isPageVisible){
        // 從背景回到前景，立刻同步一次，讓使用者馬上看到最新資料
        isPageVisible = true;
        lastActivityTime = Date.now();
        isIdle = false;
        syncFromBackend();
      } else if(!nowVisible){
        isPageVisible = false;
      }
    });

    // 監聽使用者操作：點擊、觸控、滑動、按鍵、滾動都算「有在用」
    function markActivity(){
      var wasIdle = isIdle;
      lastActivityTime = Date.now();
      if(wasIdle){
        isIdle = false;
        if(isPageVisible) syncFromBackend(); // 從閒置恢復，立刻同步一次
      }
    }
    document.addEventListener('click', markActivity, true);
    document.addEventListener('touchstart', markActivity, {passive:true, capture:true});
    document.addEventListener('keydown', markActivity, true);
    document.addEventListener('scroll', markActivity, {passive:true, capture:true});
  }
}

// 記錄「目前正在跑」的那次同步的 promise：如果呼叫的當下已經有一次在跑(例如背景每 30 秒的自動同步
// 剛好撞上使用者手動點「更新」)，不能無聲跳過什麼都不做——之前複盤頁「🔄 更新」點了沒反應、要退回
// 首頁重進才看得到新指派任務，就是這裡：舊寫法撞上就直接 return，外層的 render() 只能拿舊 state 重畫。
// 改成回傳同一個 in-flight promise，讓所有呼叫端(不管是背景 tick 還是手動點按鈕)都保證等到一次真正
// 跑完、資料真的抓回來merge 進 state 之後才繼續，不會再有「按了沒用」的情況。
var syncFromBackendPromise = null;
async function syncFromBackend(){
  if(syncFromBackendPromise) return syncFromBackendPromise;
  // 在「管理用設定」畫面時完全不同步，避免背景資料覆蓋正在進行的品牌/結構編輯
  if(state.view === "setup") return;
  isSyncing = true;
  syncFromBackendPromise = (async function(){
  try{
    var all = await apiGet("all");
    if(!all || !Array.isArray(all.structure)) return;
    if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
    var prevRecounts = state.recounts; // 存複盤頁就地更新用：跟同步前的舊資料比對哪些格子完成狀態有變
    // 存首頁「有沒有變動」判斷用：主管指派新任務、或有人標記/確認複盤，都只會改到這兩份資料，
    // 不會動到 counts/structure，舊寫法完全沒比對這兩個，導致首頁「複盤任務」徽章不會自動更新
    // （見 manual-sync 呼叫端的說明）。資料量小，直接比 JSON 字串，不用另外寫一套深層 diff。
    var prevRecountsJSON = JSON.stringify(state.recounts);
    var prevAssignmentsJSON = JSON.stringify(state.assignments);
    // 認領/核對狀態改變(有人剛認領、核對完成、或取消核對)也要能讓彙總頁的「有新資料」提示跳出來，
    // 不然品牌層狀態(全部認領/核對中/已完成)明明變了，畫面卻靜悄悄的沒反應，理由同上面 recounts/assignments。
    var prevClaimsJSON = JSON.stringify(state.claims);
    var prevVerifiedJSON = JSON.stringify(state.verified);
    if(all.recounts){ state.recounts = normalizeRecounts(all.recounts); }
    if(all.claims){ state.claims = all.claims; }
    if(all.verified){ state.verified = all.verified; }
    if(Array.isArray(all.people)){ state.people = all.people.map(String); }
    if(Array.isArray(all.managers)){ state.managers = all.managers.map(String); }
    if(Array.isArray(all.keyinUsers)){ state.keyinUsers = all.keyinUsers.map(String); }
    if(all.assignments){ state.assignments = normalizeAssignments(all.assignments); }
    if(all.brandOwners){ state.brandOwners = normalizeBrandOwners(all.brandOwners); }

    // 比對：跟目前的 state 比，看資料有沒有真的變動（避免無謂的「有新資料」提示）
    var newStructure = normalizeStructure(all.structure);
    var newCountsRaw = normalizeCounts(all.counts || {});
    var hasChange = false;
    if(JSON.stringify(state.recounts) !== prevRecountsJSON) hasChange = true;
    if(JSON.stringify(state.assignments) !== prevAssignmentsJSON) hasChange = true;
    if(JSON.stringify(state.claims) !== prevClaimsJSON) hasChange = true;
    if(JSON.stringify(state.verified) !== prevVerifiedJSON) hasChange = true;
    // 比 counts：先比 key 數量，再逐個比 total
    var oldKeys = Object.keys(state.counts);
    var newKeys = Object.keys(newCountsRaw);
    if(oldKeys.length !== newKeys.length){
      hasChange = true;
    } else {
      for(var i=0;i<newKeys.length;i++){
        var k = newKeys[i];
        if(!state.counts.hasOwnProperty(k)){ hasChange = true; break; }
        if(Number(state.counts[k].total) !== Number(newCountsRaw[k].total)){ hasChange = true; break; }
      }
    }
    // 比結構（款式名稱數量）
    if(!hasChange && newStructure.length !== state.structure.length){
      hasChange = true;
    }

    // 更新結構（如果有人新增/刪除款式也會同步）
    state.structure = sortStructureByStyle(newStructure);

    // 更新盤點數字：合併最新後端資料，但保留「目前正在編輯這一格」的本地暫存算式（避免覆蓋使用者正在打的字）
    var newCounts = newCountsRaw;
    var currentEditingKey = null;
    if(state.view === "counting" && state.structure[state.curStyleIdx]){
      var st = state.structure[state.curStyleIdx];
      if(st.colors[state.curColorIdx]){
        var col = st.colors[state.curColorIdx];
        var size = col.sizes[state.curSizeIdx];
        if(size) currentEditingKey = keyFor(st.style, col.name, size);
      }
    }
    // 保留「目前正在編輯這一格」「還在背景存檔中」「存檔失敗等待重試」這幾種本地版本，
    // 避免這次同步抓到的舊資料蓋掉還沒存成功（或剛還原）的樂觀更新
    var keysToKeepLocal = Object.keys(state.pendingSaveKeys).concat(Object.keys(state.failedSaveKeys));
    if(currentEditingKey) keysToKeepLocal.push(currentEditingKey);
    keysToKeepLocal.forEach(function(k){
      if(state.counts.hasOwnProperty(k)){ newCounts[k] = state.counts[k]; }
    });
    state.counts = newCounts;
    lastSyncTime = Date.now();

    // 重畫畫面（但不重畫 counting 跟 summary，避免破壞使用者操作狀態）
    if(state.view === "home"){
      if(hasChange) render();
    } else if(state.view === "brandModels"){
      if(hasChange) render();
    } else if(state.view === "summary"){
      // 只有資料真的有變動時才顯示「有新資料」提示，避免無謂打擾
      if(hasChange) showSummaryUpdateHint();
    } else if(state.view === "recount"){
      // 複盤頁不整頁重畫（避免打斷正在輸入的鍵盤），只針對畫面上已經存在的品項卡片，
      // 用跟輸入框失焦時同一套 patchRecountItemDisplay() 局部更新差異/狀態小標籤，
      // 讓「OO 複盤中」「由 OO 複盤」這類提醒能自然浮現，不用等使用者手動按「更新」。
      // 新加入或被移出複盤清單的品項不會在這裡出現/消失，要手動更新或重新整理頁面才會反映。
      document.querySelectorAll('.recount-item[data-key]').forEach(function(itemEl){
        var key = itemEl.getAttribute('data-key');
        var newR = state.recounts[key];
        if(!newR) return;
        var wasDone = isRecountFilled(prevRecounts[key]);
        var isDoneNow = isRecountFilled(newR);
        try{
          patchRecountItemDisplay(itemEl, key, wasDone, isDoneNow);
        }catch(e){
          // 單一格位資料異常就跳過那一格，不要讓其他格位的就地更新也一起中斷
          console.error("patchRecountItemDisplay failed for key", key, e);
        }
      });
      // 清單本身（有沒有新增/被移除的品項）不在上面的局部 patch 範圍內，故意留給使用者自己決定何時重畫，
      // 免得正在複盤中清單忽然變動、打斷操作。這裡只是拿「目前畫面上實際看到的清單」(recountRenderedKeys，
      // 只有真的重畫過清單才會更新，見 renderRecount()) 跟「用最新資料重算一次現在該看到哪些格子」做差集比對，
      // 算出跟畫面上看到的差幾筆，有差就顯示提示橫幅，完全不觸發任何重畫。
      // 用 visibleRecountKeys() 而不是直接 Object.keys(state.recounts)：非主管只看得到指派給自己的格子，
      // 兩邊一定要用同一套過濾邏輯比對，否則非主管會被一堆「跟自己無關的格子」洗出一堆假的變動提示；
      // 這同時也是「成員被指派新任務時怎麼得知」的機制——新被指派的格子在這裡會被算成一筆新增，跟現有
      // 「別人新增/移除複盤標記」用同一顆橫幅提示，使用者點了才刷新，不是即時 push。
      if(recountRenderedKeys){
        var curRecountKeys = visibleRecountKeys();
        var addedN = curRecountKeys.filter(function(k){ return recountRenderedKeys.indexOf(k) === -1; }).length;
        var removedN = recountRenderedKeys.filter(function(k){ return curRecountKeys.indexOf(k) === -1; }).length;
        var changedN = addedN + removedN;
        if(changedN > 0) showRecountListChangedHint(changedN);
      }
    }
    // counting 畫面下故意不重畫，等使用者切換尺寸/顏色或按下一項時才會自然更新
  }catch(e){
    console.error("auto sync failed", e);
    // 同步失敗就靜默略過，下一輪會再試
  }finally{
    isSyncing = false;
    syncFromBackendPromise = null;
  }
  })();
  return syncFromBackendPromise;
}

// ---------- Progress helpers ----------
function totalSizeSlots(structure){
  var n = 0;
  structure.forEach(function(st){ st.colors.forEach(function(c){ n += c.sizes.length; }); });
  return n;
}
// 判斷某一格是否「完整填寫」：架上跟庫存兩格都要有值（含 0）才算完成，任一格空白都算未完成
function slotComplete(c){
  if(!c) return false;
  var shelfFilled = (c.shelf !== "" && c.shelf !== null && c.shelf !== undefined);
  var stockFilled = (c.stock !== "" && c.stock !== null && c.stock !== undefined);
  return shelfFilled && stockFilled;
}
function doneSizeSlots(structure, counts){
  var n = 0;
  structure.forEach(function(st){
    st.colors.forEach(function(c){
      c.sizes.forEach(function(sz){
        var k = keyFor(st.style, c.name, sz);
        if(slotComplete(counts[k])){ n++; }
      });
    });
  });
  return n;
}
function colorDone(style, color, counts){
  return color.sizes.every(function(sz){ return slotComplete(counts[keyFor(style.style, color.name, sz)]); });
}
function styleProgress(style, counts){
  var total=0, done=0;
  style.colors.forEach(function(c){
    c.sizes.forEach(function(sz){
      total++;
      if(slotComplete(counts[keyFor(style.style, c.name, sz)])) done++;
    });
  });
  return {total:total, done:done};
}

}

// Step 2／2：頂端固定顯示指派對象，下面是兩層收合的勾選清單，底部固定送出按鈕
function renderAssignChecklistStep(){
  var allKeys = Object.keys(state.recounts || {});

  function brandOfKey(k){
    var style = k.split("|")[0];
    var g = findBrandGroupForStyle(style);
    return (g && g.brand) ? g.brand : "";
  }

  // 依品牌、再依型號分組："" = 未分組，排最前面
  var byBrandStyle = {};
  allKeys.forEach(function(k){
    var b = brandOfKey(k);
    var style = k.split("|")[0];
    if(!byBrandStyle[b]) byBrandStyle[b] = {};
    if(!byBrandStyle[b][style]) byBrandStyle[b][style] = [];
    byBrandStyle[b][style].push(k);
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  var brandLabels = Object.keys(byBrandStyle).sort(function(a,b){
    if(a === "") return -1;
    if(b === "") return 1;
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });

  // 產生單一格子的勾選列／已指派列（跟改版前完全一樣，只是現在巢狀在型號收合區塊底下）
  function buildAssignRow(k){
    var parts = k.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    var label = escapeHtml(style)+'-'+escapeHtml(color)+'-'+escapeHtml(size);
    var rowR = state.recounts[k];

    // 第二輪格子不走指派：已經自動歸品牌負責人管，這裡只顯示狀態，不能勾選、也不能再手動改派
    if(isSecondRoundRecount(rowR)){
      var rowOwners = brandOwnersForKey(k);
      var ownerBadgeHtml = rowOwners.length > 0
        ? '<span class="assign-badge assign-badge-second-round">第二輪，已自動歸：'+escapeHtml(rowOwners.join('、'))+'</span>'
        : '<span class="assign-badge assign-badge-second-round no-owner">⚠ 未設定負責人</span>';
      return '<div class="assign-row assign-row-locked">'+
        '<span style="min-width:0; overflow-wrap:break-word;">'+label+'</span>'+
        ownerBadgeHtml+
      '</div>';
    }

    // 已確認(第一輪回寫完，還沒開第二輪)／已定案(第二輪或之後回寫完，不能再開下一輪)：兩者都已經是
    // 複盤的終點狀態，不需要、也不該再被主管指派——這裡直接反灰不可勾，避免主管沒看清楚重複勾選；
    // 要開第二輪走 key in 在彙總明細點「已確認」，不走這個指派頁。判定跟彙總明細那顆按鈕
    // (見 markToggleBtnHtml)同一套邏輯：confirmed && everReopened = 已定案，否則 = 已確認。
    if(rowR && rowR.confirmed){
      var finalStatusText = rowR.everReopened ? '已定案' : '已確認';
      var finalStatusClass = rowR.everReopened ? 'locked-final' : 'confirmed';
      return '<div class="assign-row assign-row-locked">'+
        '<span style="min-width:0; overflow-wrap:break-word;">'+label+'</span>'+
        '<span class="assign-badge '+finalStatusClass+'">'+finalStatusText+'</span>'+
      '</div>';
    }

    var assignedTo = String(state.assignments[k] || "").trim();
    if(assignedTo){
      return '<div class="assign-row assign-row-locked" data-action="assign-reassign-confirm" data-key="'+escapeHtml(k)+'" data-assigned="'+escapeHtml(assignedTo)+'">'+
        '<span style="min-width:0; overflow-wrap:break-word;">'+label+'</span>'+
        '<span class="assign-badge">已派：'+escapeHtml(assignedTo)+'</span>'+
      '</div>';
    }
    // 走到這裡代表沒有第二輪、沒有確認/定案、也沒有指派——才是真正還沒處理、可以勾選指派的格子
    var checked = !!state.assignChecked[k];
    return '<div class="assign-row'+(checked?' checked':'')+'" data-action="assign-toggle-check" data-key="'+escapeHtml(k)+'">'+
      '<span class="assign-check">'+(checked?'☑':'☐')+'</span>'+
      '<span>'+label+'</span>'+
    '</div>';
  }

  // 單一格子的資料如果格式異常，這裡擋下來，只讓那一格顯示錯誤列，不要讓整個指派頁畫不出來
  // ——複盤頁的 safeBuildRecountItem() 已經吃過這個教訓，指派頁比照辦理。
  function safeBuildAssignRow(k){
    try{
      return buildAssignRow(k);
    }catch(e){
      console.error("buildAssignRow failed for key", k, e);
      return '<div class="assign-row assign-row-locked">'+
        '<span style="color:#c0392b;">⚠️ 「'+escapeHtml(k)+'」資料格式異常，暫時無法顯示，不影響其他格子</span>'+
      '</div>';
    }
  }

  // 產生一個型號的收合區塊，標題直接顯示「已勾／未派／共」三個數字，不用展開就能掌握狀態。
  // 第二輪格子跟已確認/已定案的格子都不算進「未派」：前者已經自動歸品牌負責人管，後兩者是複盤
  // 的終點狀態，都不需要、也不能在這裡指派(見 buildAssignRow 的同一套判斷)。
  function buildStyleGroup(styleName, keysForStyle){
    var total = keysForStyle.length;
    var assignableKeys = keysForStyle.filter(function(k){
      var kr = state.recounts[k];
      return !isSecondRoundRecount(kr) && !(kr && kr.confirmed);
    });
    var assignedCount = assignableKeys.filter(function(k){ return !!String(state.assignments[k]||"").trim(); }).length;
    var unassignedCount = assignableKeys.length - assignedCount;
    var checkedCount = assignableKeys.filter(function(k){ return state.assignChecked[k]; }).length;
    var expanded = !!state.assignExpandedStyles[styleName];
    var rowsHtml = keysForStyle.map(safeBuildAssignRow).join("");
    return '<div class="style-group'+(expanded?' expanded':'')+'">'+
      '<div class="style-group-header" data-action="assign-toggle-style" data-style="'+escapeHtml(styleName)+'">'+
        '<div class="sg-left"><div class="sg-name">'+escapeHtml(styleName)+
          '（已勾'+checkedCount+'／未派'+unassignedCount+'／共'+total+'）</div></div>'+
        '<div class="sg-arrow">›</div>'+
      '</div>'+
      '<div class="style-group-body">'+rowsHtml+'</div>'+
    '</div>';
  }

  // 產生一個品牌的收合區塊，底下巢狀放型號收合區塊
  function buildBrandGroup(brandLabel, styleMap){
    var styleNames = Object.keys(styleMap).sort(function(a,b){ return a.localeCompare(b, 'zh-Hant'); });
    var expanded = !!state.assignExpandedBrands[brandLabel];
    var displayLabel = brandLabel === "" ? "未分組" : brandLabel;
    var bodyHtml = styleNames.map(function(styleName){ return buildStyleGroup(styleName, styleMap[styleName]); }).join("");
    return '<div class="brand-group'+(expanded?' expanded':'')+'" data-brand-name="'+escapeHtml(brandLabel)+'">'+
      '<div class="brand-group-header" data-action="assign-toggle-brand" data-brand="'+escapeHtml(brandLabel)+'">'+
        '<div class="bg-left"><div><div class="bg-name">'+escapeHtml(displayLabel)+'</div>'+
          '<div class="bg-meta">'+styleNames.length+' 個型號</div></div></div>'+
        '<div class="bg-arrow">›</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  }

  var listHtml = allKeys.length === 0
    ? emptyStateHtml('目前沒有複盤項目可以指派', '到彙總頁的明細，先把要複盤的品項標記進複盤清單')
    : brandLabels.map(function(b){ return buildBrandGroup(b, byBrandStyle[b]); }).join("");

  var selectedCount = Object.keys(state.assignChecked).filter(function(k){ return state.assignChecked[k]; }).length;

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-recount">‹ 返回</button>'+
    '<div class="brand">複盤分配</div>'+
    '<span style="width:60px"></span>'+
  '</div></div>'+
  '<main>'+
    '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 14px; margin-bottom:12px; background:#fcfbf8; border:1px solid var(--line); border-radius:10px; font-size:14px;">'+
      '<span>指派給：<strong style="color:var(--accent-deep);">'+escapeHtml(state.assignSelectedName||'')+'</strong></span>'+
      '<button class="mini-btn" data-action="assign-change-target">更換</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>Step 2／2：勾選要指派的格子</h2>'+
      '<p class="sub">點品牌／型號展開明細。灰色格子代表已經指派出去，點一下可以改派給目前選擇的人、或取消指派。</p>'+
      listHtml+
    '</div>'+
  '</main>'+
  '<div class="assign-footer">'+
    '<button class="btn" data-action="assign-submit">指派（已勾 '+selectedCount+' 格）</button>'+
  '</div>';
}

// 摘要頁重畫前先記住目前展開的品牌／型號分組，重畫後再展開回來，
// 避免每次標記/取消複盤這類小動作都把使用者原本展開看的明細收合掉
function render_keepExpanded(){
  var expandedBrands = [];
  var expandedStyles = [];
  document.querySelectorAll('.brand-group.expanded').forEach(function(g){
    expandedBrands.push(g.getAttribute('data-brand-name'));
  });
  document.querySelectorAll('.style-group.expanded').forEach(function(sg){

    if(nameEl) expandedStyles.push(nameEl.textContent.trim().split(' ')[0]);
