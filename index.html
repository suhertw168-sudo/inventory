<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>зӣӨй»һе·Ҙе…·</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f7f5f1;
    --card:#ffffff;
    --line:#e3ddd2;
    --accent:#c1572d;
    --accent-deep:#8f3f1f;
    --good:#2f6b4f;
    --muted:#8a8378;
    --shadow: 0 1px 2px rgba(27,31,35,0.04), 0 8px 24px rgba(27,31,35,0.06);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
  }
  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--paper);
    padding:14px 18px 10px;
    border-bottom:1px solid var(--line);
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .brand{
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .icon-btn{
    border:none; background:transparent; color:var(--muted);
    font-size:13px; padding:6px 10px; border-radius:8px; cursor:pointer;
    font-weight:600;
  }
  .icon-btn:active{ background:#ece7dd; }
  .progress-wrap{ margin-top:10px; }
  .progress-bar{
    height:6px; background:#e9e3d6; border-radius:4px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent);
    transition: width .25s ease;
    border-radius:4px;
  }
  .progress-label{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-top:6px;
    font-weight:600;
  }
  main{
    flex:1;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  /* ---- Setup screens ---- */
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }
  .panel h2{
    margin:0 0 4px;
    font-size:19px;
  }
  .panel p.sub{
    margin:0 0 14px;
    font-size:13.5px;
    color:var(--muted);
    line-height:1.5;
  }
  .list-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
    font-size:16px;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row .meta{
    font-size:12.5px; color:var(--muted); margin-top:2px;
  }
  .list-row .left{ flex:1; }
  .chev{ color:var(--muted); font-size:14px; }
  .btn{
    display:block; width:100%;
    background:var(--accent);
    color:#fff; border:none;
    font-size:16px; font-weight:700;
    padding:15px 18px;
    border-radius:12px;
    cursor:pointer;
    text-align:center;
  }
  .btn:active{ background:var(--accent-deep); }
  .btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--line);
  }
  .btn.secondary:active{ background:#ece7dd; }
  .btn.ghost{
    background:transparent;
    color:var(--accent-deep);
    font-weight:700;
    padding:10px;
  }
  .btn[disabled]{ opacity:.4; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12.5px; font-weight:700;
    color:var(--muted); margin-bottom:6px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .field input, .field textarea, .field select{
    width:100%;
    font-size:16px;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ min-height:90px; resize:vertical; line-height:1.5; }
  .row-gap{ display:flex; gap:10px; }
  .row-gap > *{ flex:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .tag{
    background:#efe9dc; color:var(--ink);
    border-radius:20px; padding:6px 12px;
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .tag button{
    border:none; background:transparent; color:var(--accent-deep);
    font-weight:700; cursor:pointer; font-size:14px; line-height:1;
    padding:0;
  }
  /* ---- Counting card ---- */
  .count-card{
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--line);
    padding:24px 20px 20px;
    box-shadow:var(--shadow);
  }
  .ctx-label{
    font-size:13px; color:var(--muted); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .style-name{
    font-size:15px; color:var(--accent-deep); font-weight:700;
    margin-top:2px;
  }
  .size-name{
    font-size:34px; font-weight:800; margin:10px 0 18px;
    letter-spacing:-0.01em;
  }
  .input-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-bottom:18px;
  }
  .num-box{
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:14px 12px 12px;
    background:#fcfbf8;
    min-width:0; /* й—ңйҚөпјҡйҒҝе…Қ grid item иў«е…§е®№ж’җеҲ°и¶…еҮәж¬„еҜ¬ */
    overflow:hidden;
  }
  .num-box label{
    font-size:12.5px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .num-box.focused{ border-color:var(--accent); background:#fff; }
  .warn-btn{
    color:var(--accent-deep) !important;
    border:1.5px solid #e0b8a8 !important;
    background:#fdf3ef !important;
    font-weight:700 !important;
  }
  .warning-banner{
    background:#fdecea;
    border:1.5px solid #e3a89a;
    border-radius:14px;
    padding:16px 18px;
    color:#7a2e1e;
  }
  .warning-banner strong{
    display:block;
    font-size:15px;
    margin-bottom:6px;
  }
  .warning-banner p{
    margin:0;
    font-size:13.5px;
    line-height:1.6;
  }
  /* жЁҷзұӨејҸз®—ејҸз·ЁијҜеҷЁ */
  .expr-chips{
    display:flex; flex-wrap:wrap; gap:5px; align-items:center;
    min-height:48px; margin-top:6px;
    max-width:100%;
  }
  .expr-chiplist{
    display:contents; /* и®“иЈЎйқўзҡ„жЁҷзұӨзӣҙжҺҘеҸғиҲҮ flex дҪҲеұҖ */
  }
  .expr-chip-num{
    background:#fdf3ef; color:var(--accent-deep);
    padding:7px 10px; border-radius:7px;
    font-size:18px; font-weight:800; font-family:inherit;
    border:1.5px solid #f0d8cd; cursor:pointer; line-height:1;
    flex:0 0 auto;
  }
  .expr-chip-num:active{ background:#f7e3d8; }
  .expr-chip-op{
    padding:7px 9px; border-radius:7px;
    font-size:16px; font-weight:800; line-height:1; cursor:pointer;
    flex:0 0 auto;
  }
  .expr-chip-op.op-plus{
    background:#fdf3ef; color:var(--accent-deep); border:1.5px solid #f0d8cd;
  }
  .expr-chip-op.op-times{
    background:#eef4fa; color:#2f5d8a; border:1.5px solid #b9cce0;
  }
  .expr-chip-op:active{ filter:brightness(0.94); }
  .expr-newinput{
    width:54px; font-size:18px; font-weight:800; text-align:center;
    border:1.5px dashed var(--line); border-radius:7px;
    padding:6px 4px; font-family:inherit; color:var(--ink);
    background:#fff; flex:0 0 auto;
  }
  .expr-newinput:focus{ outline:none; border-color:var(--accent); border-style:solid; }
  .expr-addbtns{ display:flex; gap:5px; margin-left:2px; flex:0 0 auto; }
  .expr-addbtn{
    width:30px; height:34px; border-radius:7px; font-size:16px; font-weight:800;
    line-height:1; cursor:pointer; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .expr-addbtn.add-plus{ background:#fff; border:1.5px solid #e0b8a8; color:var(--accent-deep); }
  .expr-addbtn.add-times{ background:#eef4fa; border:1.5px solid #b9cce0; color:#2f5d8a; }
  .expr-addbtn:active{ filter:brightness(0.94); }
  /* й»һжЁҷзұӨеҫҢи·іеҮәзҡ„з·ЁијҜеҪҲзӘ— */
  .chip-editor{
    margin-top:10px; padding:12px;
    background:#faf7f1; border:1.5px solid var(--line); border-radius:10px;
  }
  .chip-editor .ce-label{ font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .chip-editor .ce-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .chip-editor input{
    width:80px; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--line); border-radius:8px; padding:8px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .chip-editor input:focus{ outline:none; border-color:var(--accent); }
  .chip-editor .ce-btn{
    font-size:14px; padding:9px 14px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--line); background:#fff; color:var(--ink); font-weight:700;
  }
  .chip-editor .ce-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip-editor .ce-btn.danger{ color:#a32d2d; border-color:#e3a89a; }
  .sum-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#f1ece1; border-radius:12px;
    padding:13px 16px; margin-bottom:18px;
  }
  .sum-row .sum-label{ font-size:14px; color:var(--muted); font-weight:700; }
  .sum-row .sum-val{ font-size:22px; font-weight:800; color:var(--good); }
  .nav-row{ display:flex; gap:10px; }
  .nav-row .btn{ font-size:15px; padding:14px; }
  .keypad-hint{
    text-align:center; font-size:12px; color:var(--muted); margin-top:10px;
  }
  /* color chip strip */
  .chip-strip{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px;
    -webkit-overflow-scrolling:touch;
  }
  .chip-strip::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto;
    padding:8px 14px; border-radius:20px;
    font-size:13px; font-weight:700;
    border:1.5px solid var(--line);
    background:#fff; color:var(--muted);
    white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.done{ border-color:var(--good); color:var(--good); }
  /* summary table */
  table.summary{
    width:100%; border-collapse:collapse; font-size:13.5px;
  }
  table.summary th, table.summary td{
    border-bottom:1px solid var(--line);
    padding:8px 6px; text-align:left;
  }
  table.summary th{ color:var(--muted); font-weight:700; font-size:12px; }
  table.summary td.num{ text-align:right; font-weight:600; }
  .mini-btn{
    font-size:11px; padding:4px 8px; border-radius:6px;
    border:1.5px solid #b9cce0; background:#eef4fa; color:#2f5d8a;
    font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .mini-btn:active{ background:#2f5d8a; color:#fff; }
  .mini-btn.marked{
    border-color:#2f7a3e; background:#e8f5ec; color:#2f7a3e;
  }
  /* иӨҮзӣӨжё…е–®й …зӣ® */
  .recount-item{
    border:1px solid var(--line); border-radius:12px;
    padding:14px; margin-bottom:12px; background:#fff;
  }
  .recount-item.done{ background:#fafcfb; border-color:#cfe6d7; }
  .recount-item .ri-top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px; gap:8px;
  }
  .recount-item .ri-title{ font-size:15px; font-weight:800; color:var(--ink); }
  .recount-item .ri-assignee{
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:12px;
    background:#eef4fa; color:#2f5d8a; white-space:nowrap; flex:0 0 auto;
  }
  .recount-item .ri-assignee.unassigned{ background:#f1ece1; color:var(--muted); }
  .recount-item .ri-nums{
    display:flex; align-items:flex-end; gap:10px;
  }
  .recount-item .ri-num{ flex:1; text-align:center; }
  .recount-item .ri-num-label{ font-size:11px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .recount-item .ri-num-val{ font-size:20px; font-weight:800; }
  .recount-item .ri-arrow{ color:var(--muted); font-size:16px; padding-bottom:6px; }
  .recount-item .ri-input{
    width:100%; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--accent); border-radius:8px; padding:6px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .recount-item .ri-input:focus{ outline:none; background:#fffdf9; }
  .recount-item .ri-calc-hint{
    font-size:12px; color:var(--good); font-weight:700; text-align:center; margin-top:3px;
  }
  .recount-item .ri-actions{ margin-top:10px; text-align:right; }
  .recount-item .ri-claim{
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    display:flex; align-items:center; gap:6px;
  }
  .recount-item .ri-claim-label{ font-size:13px; color:var(--muted); font-weight:700; flex:0 0 auto; }
  .recount-item .ri-claim-input{
    flex:1; font-size:14px; padding:8px 10px;
    border:1.5px solid var(--line); border-radius:8px;
    font-family:inherit; color:var(--ink); background:#fff; min-width:0;
  }
  .recount-item .ri-claim-input:focus{ outline:none; border-color:var(--accent); }
  .recount-brand-head{
    font-size:15px; font-weight:800; color:var(--accent-deep);
    padding:10px 0 8px; margin-top:6px;
    border-bottom:2px solid #f0d8cd; margin-bottom:12px;
  }
  /* еҪҷзёҪй Ғйқўпјҡе“ҒзүҢеҲҶзө„ж‘әз–Ҡ */
  .brand-group{
    border:1px solid var(--line); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
    background:#fcfbf8;
  }
  .brand-group.has-missing{
    border-left:4px solid #e87a3e;
  }
  .brand-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer;
    background:#fcfbf8; user-select:none;
  }
  .brand-group-header:active{ background:#f5efe3; }
  .brand-group-header .bg-left{
    display:flex; align-items:center; gap:10px;
  }
  .brand-group-header .bg-name{
    font-size:16px; font-weight:800; color:var(--ink);
  }
  .brand-group-header .bg-meta{
    font-size:12px; color:var(--muted); font-weight:600;
  }
  .brand-group-header .bg-totals{
    font-size:13px; font-weight:700; color:var(--accent-deep);
  }
  .brand-group-header .bg-arrow{
    margin-left:8px; color:var(--muted); font-size:14px;
    transition:transform 0.18s ease;
  }
  .brand-group.expanded .bg-arrow{ transform:rotate(90deg); }
  .brand-group-body{
    display:none;
    padding:0 12px 12px;
    background:#fff;
    border-top:1px solid var(--line);
  }
  .brand-group.expanded .brand-group-body{ display:block; }
  /* еһӢиҷҹе°ҸеҚЎзүҮпјҲе“ҒзүҢеә•дёӢпјү */
  .style-group{
    border:1px solid var(--line); border-radius:8px;
    margin:10px 0; overflow:hidden; background:#fff;
  }
  .style-group.has-missing{ border-left:3px solid #e87a3e; }
  .style-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; cursor:pointer; user-select:none;
    background:#fcfbf8;
  }
  .style-group-header:active{ background:#f5efe3; }
  .style-group-header .sg-name{
    font-size:14px; font-weight:800; color:var(--accent-deep);
  }
  .style-group-header .sg-meta{
    font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px;
  }
  .style-group-header .sg-arrow{
    color:var(--muted); font-size:13px; margin-left:8px;
    transition:transform 0.18s ease;
  }
  .style-group.expanded .sg-arrow{ transform:rotate(90deg); }
  .style-group-body{ display:none; padding:0 10px 10px; }
  .style-group.expanded .style-group-body{ display:block; }
  .empty-state{
    text-align:center; padding:40px 16px; color:var(--muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:8px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px;
    border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:var(--shadow); z-index:50;
    opacity:0; transition:opacity .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
  .footer-note{
    text-align:center; font-size:11.5px; color:var(--muted); padding:6px 18px 0;
  }
  .loading{
    display:flex; align-items:center; justify-content:center;
    min-height:60vh; color:var(--muted); font-size:14px;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">ијүе…ҘдёӯвҖҰ</div></div>
<div class="toast" id="toast"></div>

<script>
(function(){

// ---------- Default seed data ----------
var DEFAULT_SIZES_A = ["#6(JS)","#8(JM)","#10(JL)","JXL","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];

var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmO5IsfDIufHan6YCyML-TLBDV4XIiIOmbEuZn6W_TJza6zba5W6s5ht2WUsPnY7XU/exec";

// з®ЎзҗҶе“ЎеҜҶзўјпјҲжҢүеҸідёҠи§’гҖҢз®ЎзҗҶз”ЁиЁӯе®ҡгҖҚжҷӮжңғи©ўе•ҸпјүгҖӮйңҖиҰҒдҝ®ж”№еҜҶзўјжҷӮпјҢзӣҙжҺҘж”№йҖҷдёҖиЎҢзҡ„еј•иҷҹе…§ж–Үеӯ—еҚіеҸҜ
var ADMIN_PASSWORD = "6666";

var state = {
  structure: null,
  counts: {},           // key "style|color|size" -> {shelf, stock}
  recounts: {},         // key "style|color|size" -> {recount, assignee, markedAt} иӨҮзӣӨд»»еӢҷ
  recountFilter: "",    // иӨҮзӣӨжё…е–®зҡ„иӘҚй ҳдәәзҜ©йҒёпјҲз©ә=е…ЁйғЁпјү
  recountBrandFilter: "", // иӨҮзӣӨжё…е–®зҡ„е“ҒзүҢзҜ©йҒёпјҲз©ә=е…ЁйғЁпјү
  view: "home",         // home | brandModels | setup | counting | summary | recount
  curBrandName: "",
  curStyleIdx: 0,
  curColorIdx: 0,
  curSizeIdx: 0,
  exprShelf: "",        // зӣ®еүҚж јдҪҚгҖҢжһ¶дёҠгҖҚзҡ„з®—ејҸеӯ—дёІпјҲжЁҷзұӨз·ЁијҜеҷЁзҡ„иіҮж–ҷдҫҶжәҗпјү
  exprStock: ""         // зӣ®еүҚж јдҪҚгҖҢеә«еӯҳгҖҚзҡ„з®—ејҸеӯ—дёІ
};

function keyFor(style, color, size){ return style + "|" + color + "|" + size; }

function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1600);
}

// ---------- API helpers ----------
async function apiGet(action){
  var url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();
  var res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("API GET failed: " + res.status);
  return await res.json();
}
async function apiPost(payload){
  var res;
  try{
    res = await fetch(APPS_SCRIPT_URL, {
      method:"POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
  }catch(networkErr){
    throw new Error("з¶Іи·ҜйҖЈз·ҡеӨұж•—пјҡ" + networkErr.message);
  }
  if(!res.ok){
    var bodyText = "";
    try{ bodyText = await res.text(); }catch(e){}
    throw new Error("дјәжңҚеҷЁеӣһжҮүйҢҜиӘӨ " + res.status + (bodyText ? "пјҡ" + bodyText.slice(0,200) : ""));
  }
  var json;
  try{
    json = await res.json();
  }catch(e){
    throw new Error("дјәжңҚеҷЁеӣһжҮүж јејҸйҢҜиӘӨпјҲдёҚжҳҜжңүж•Ҳзҡ„ JSONпјү");
  }
  if(json && json.ok === false){
    throw new Error("дјәжңҚеҷЁжӢ’зө•пјҡ" + (json.error || "жңӘзҹҘеҺҹеӣ "));
  }
  return json;
}

  var stockEmpty = (stockRaw === "" || stockRaw === null || stockRaw === undefined);

// ---------- Init ----------
// е“ҒзүҢйЎҜзӨәй ҶеәҸпјҡеҫһеҫҢз«Ҝијүе…ҘпјҲз®ЎзҗҶе“ЎеҸҜеңЁиЁӯе®ҡй ҒиӘҝж•ҙпјүгҖӮеҫҢз«ҜйӮ„жІ’иЁӯе®ҡжҷӮз”ЁйҖҷеҖӢй җиЁӯй ҶеәҸгҖӮ
var BRAND_ORDER = ["SR","CP","AGзҹӯиў–","AGеҶ¬иЎЈ","KY","PL","TH","CAP"];

// еӢ•ж…ӢиЁҲз®—гҖҢе“ҒзүҢеҲҶзө„гҖҚпјҡе®Ңе…Ёж №ж“ҡ state.structure иЈЎжҜҸеҖӢж¬ҫејҸзҡ„ brand еұ¬жҖ§пјҢдёҚеҶҚеҜ«жӯ»д»»дҪ•ж¬ҫејҸеҗҚзЁұ
// жІ’жңүиЁӯе®ҡе“ҒзүҢзҡ„ж¬ҫејҸ вҶ’ еҗ„иҮӘзҚЁз«ӢйЎҜзӨәдёҖж јеңЁйҰ–й Ғ
// иЁӯе®ҡзӣёеҗҢе“ҒзүҢзҡ„ж¬ҫејҸ вҶ’ иҮӘеӢ•иҒҡйӣҶеҲ°и©Іе“ҒзүҢеә•дёӢ
// еӣһеӮіж јејҸпјҡ[{brand: "CP"жҲ–null, styles: [ж¬ҫејҸеҗҚзЁұйҷЈеҲ—]}, ...]
function computeBrandGroups(){
  if(!state.structure) return [];
  var brandMap = {};  // brand -> [style names]
  var standalone = []; // жІ’е“ҒзүҢзҡ„пјҢзҚЁз«ӢйЎҜзӨә
  state.structure.forEach(function(st){
    var b = (st.brand || "").trim();
    if(b){
      if(!brandMap[b]) brandMap[b] = [];
      brandMap[b].push(st.style);
    } else {
      standalone.push(st.style);
    }
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });

  var groups = [];
  // 1) е…Ҳж”ҫгҖҢзҚЁз«ӢйЎҜзӨәгҖҚпјҲжІ’е“ҒзүҢпјүзҡ„ж¬ҫејҸ
  standalone.forEach(function(s){ groups.push({brand:null, styles:[s]}); });
  // 2) еҶҚдҫқ BRAND_ORDER й ҶеәҸгҖҒеҶҚдҫқеӯ—жҜҚй ҶеәҸпјҢж”ҫе“ҒзүҢеҲҶзө„
  var brandNames = Object.keys(brandMap).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  brandNames.forEach(function(name){
    groups.push({brand:name, styles:brandMap[name]});
  });
  return groups;
}

function findBrandGroupForStyle(styleName){
  var groups = computeBrandGroups();
  for(var i=0;i<groups.length;i++){
    if(groups[i].styles.indexOf(styleName) !== -1) return groups[i];
  }
  return null;
}

function sortStructureByStyle(structure){
  // ж”№жҲҗдҫқ BRAND_ORDER жҺ’еәҸпјҡеҗҢе“ҒзүҢзҡ„ж¬ҫејҸиҒҡеңЁдёҖиө·пјҢжІ’е“ҒзүҢзҡ„ж”ҫжңҖеүҚйқўпјҲзҚЁз«ӢйЎҜзӨәпјү
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  return structure.slice().sort(function(a, b){
    var ab = (a.brand || "").trim();
    var bb = (b.brand || "").trim();
    // жІ’е“ҒзүҢзҡ„е„Әе…Ҳ
    if(!ab && bb) return -1;
    if(ab && !bb) return 1;
    if(!ab && !bb) return a.style.localeCompare(b.style, 'zh-Hant');
    var ai = orderMap.hasOwnProperty(ab) ? orderMap[ab] : BRAND_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(bb) ? orderMap[bb] : BRAND_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.style.localeCompare(b.style, 'zh-Hant');
  });
}

// жҠҠеҫҢз«Ҝи®ҖйҖІдҫҶзҡ„зөҗж§ӢжӯЈиҰҸеҢ–пјҡеј·еҲ¶ styleгҖҒйЎҸиүІеҗҚзЁұгҖҒе°әеҜёйғҪжҳҜеӯ—дёІеһӢеҲҘ
// еӣ зӮә Google Sheet жңғиҮӘеӢ•жҠҠзҙ”ж•ёеӯ—е…§е®№еӯҳжҲҗ numberпјҢеүҚз«ҜжҜ”е°ҚжңғеӨұж•—пјҲ"76000" !== 76000пјү
function normalizeStructure(structure){
  if(!Array.isArray(structure)) return structure;
  return structure.map(function(st){
    return {
      style: String(st.style),
      brand: st.brand ? String(st.brand) : "",
      colors: (st.colors || []).map(function(c){
        return {
          name: String(c.name),
          sizes: (c.sizes || []).map(function(s){ return String(s); })
        };
      })
    };
  });
}

// counts зҡ„ key д№ҹиҰҒжӯЈиҰҸеҢ–пјҲеӣ зӮә key иЈЎеҗ«ж¬ҫејҸеҗҚзЁұпјҢеҰӮжһңеӯҳжҲҗж•ёеӯ—д№ҹжңғе°ҚдёҚиө·дҫҶпјү
function normalizeCounts(counts){
  if(!counts || typeof counts !== 'object') return counts || {};
  var out = {};
  Object.keys(counts).forEach(function(k){
    out[String(k)] = counts[k];
  });
  return out;
}

async function init(){
  renderLoadingScreen();
  startLoadTimer();

  var structure = null;
  var counts = {};
  var fetchFailed = false;
  try{
    setLoadStage("йҖЈз·ҡеҲ°йӣІз«ҜиіҮж–ҷеә«вҖҰ");
    var all = await apiGet("all");
    setLoadStage("ж•ҙзҗҶж¬ҫејҸиҲҮзӣӨй»һиіҮж–ҷвҖҰ");
    if(all && Array.isArray(all.structure)){
      structure = all.structure; // еҚідҪҝжҳҜз©әйҷЈеҲ—д№ҹз®—еҗҲжі•пјҲд»ЈиЎЁйҖҷеҖӢ Sheet йӮ„жІ’иЁӯе®ҡд»»дҪ•ж¬ҫејҸпјү
      counts = all.counts || {};
      if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
      if(all.recounts){ state.recounts = all.recounts; }
    } else {
      fetchFailed = true;
    }
  }catch(e){
    console.error("init load failed", e);
    fetchFailed = true;
  }

  stopLoadTimer();

  if(fetchFailed || structure === null){
    renderLoadError();
    return;
  }

  state.structure = sortStructureByStyle(normalizeStructure(structure));
  state.counts = normalizeCounts(counts);
  state.view = "home";
  render();
  startAutoSync(); // е•ҹеӢ•иғҢжҷҜиҮӘеӢ•еҗҢжӯҘ
}

// иҮӘеӢ•еҗҢжӯҘпјҡжҜҸ SYNC_INTERVAL_MS жҜ«з§’еҺ»еҫҢз«ҜжӢүдёҖж¬ЎжңҖж–°иіҮж–ҷпјҢжӣҙж–°е…¶д»–дәәеЎ«зҡ„ж•ёеӯ—еҲ°жң¬ең°з•«йқў
var SYNC_INTERVAL_MS = 30000; // 30 з§’еҗҢжӯҘдёҖж¬Ў
var autoSyncTimer = null;
var isSyncing = false;
var lastSyncTime = null;

function getSyncStatusText(){
  if(!isPageVisible) return "рҹ’Ө е·Іжҡ«еҒңпјҲеҲҮеӣһеүҚжҷҜиҮӘеӢ•жҒўеҫ©пјү";
  if(isIdle) return "рҹ’Ө й–’зҪ®дёӯе·Іжҡ«еҒңпјҲзў°дёҖдёӢз•«йқўеҚіжҒўеҫ©пјү";
  if(isSyncing) return "рҹ”„ еҗҢжӯҘдёӯ...";
  if(!lastSyncTime) return "жҜҸ 30 з§’иҮӘеӢ•еҗҢжӯҘдёҖж¬Ў";
  var diff = Math.floor((Date.now() - lastSyncTime) / 1000);
  if(diff < 5) return "вң“ еүӣеүӣе·ІеҗҢжӯҘ";
  if(diff < 60) return "вң“ " + diff + " з§’еүҚжӣҙж–°";
  return "вң“ " + Math.floor(diff/60) + " еҲҶйҗҳеүҚжӣҙж–°";
}

// еңЁ summary з•«йқўеҸідёҠи§’йЎҜзӨәгҖҢжңүж–°иіҮж–ҷ й»һжӯӨеҲ·ж–°гҖҚжҸҗзӨәпјҢдёҚжңғеј·еҲ¶йҮҚз•«
function showSummaryUpdateHint(){

// иҝҪи№Өй ҒйқўжҳҜеҗҰеңЁеүҚжҷҜпјҲиў«дҪҝз”ЁиҖ…еҜҰйҡӣзңӢи‘—пјү
var isPageVisible = true;
// иҝҪи№ӨжҳҜеҗҰиҷ•ж–јй–’зҪ®зӢҖж…ӢпјҲз•«йқўйӣ–з„¶й–Ӣи‘—дҪҶй•·жҷӮй–“жІ’ж“ҚдҪңпјү
var isIdle = false;
var IDLE_THRESHOLD_MS = 5 * 60 * 1000; // 5 еҲҶйҗҳжІ’ж“ҚдҪңе°ұиҰ–зӮәй–’зҪ®
var lastActivityTime = Date.now();
var idleCheckTimer = null;

function startAutoSync(){
  if(autoSyncTimer) clearInterval(autoSyncTimer);
  autoSyncTimer = setInterval(function(){
    // еҸӘжңүй ҒйқўеңЁеүҚжҷҜдё”дҪҝз”ЁиҖ…жңүеңЁж“ҚдҪңжҷӮжүҚеҗҢжӯҘпјҢиғҢжҷҜжҲ–й–’зҪ®жҷӮи·ійҒҺд»ҘзҜҖзңҒ Apps Script й…ҚйЎҚ
    if(isPageVisible && !isIdle) syncFromBackend();
  }, SYNC_INTERVAL_MS);

  // жҜҸеҲҶйҗҳжӘўжҹҘдёҖж¬ЎжҳҜеҗҰйҖІе…Ҙй–’зҪ®зӢҖж…Ӣ
  if(idleCheckTimer) clearInterval(idleCheckTimer);
  idleCheckTimer = setInterval(function(){
    if(!isIdle && (Date.now() - lastActivityTime > IDLE_THRESHOLD_MS)){
      isIdle = true;
    }
  }, 60000);

  if(!window._visibilityBound){
    window._visibilityBound = true;

    // зӣЈиҒҪй ҒйқўеҸҜиҰӢжҖ§и®ҠеҢ–пјҲжүӢж©ҹйҺ–еұҸгҖҒеҲҮеҲ°е…¶д»– AppгҖҒеҲҮеҲ°е…¶д»–еҲҶй ҒйғҪжңғи§ёзҷјпјү
    document.addEventListener('visibilitychange', function(){
      var nowVisible = !document.hidden;
      if(nowVisible && !isPageVisible){
        // еҫһиғҢжҷҜеӣһеҲ°еүҚжҷҜпјҢз«ӢеҲ»еҗҢжӯҘдёҖж¬ЎпјҢи®“дҪҝз”ЁиҖ…йҰ¬дёҠзңӢеҲ°жңҖж–°иіҮж–ҷ
        isPageVisible = true;
        lastActivityTime = Date.now();
        isIdle = false;
        syncFromBackend();
      } else if(!nowVisible){
        isPageVisible = false;
      }
    });

    // зӣЈиҒҪдҪҝз”ЁиҖ…ж“ҚдҪңпјҡй»һж“ҠгҖҒи§ёжҺ§гҖҒж»‘еӢ•гҖҒжҢүйҚөгҖҒж»ҫеӢ•йғҪз®—гҖҢжңүеңЁз”ЁгҖҚ
    function markActivity(){
      var wasIdle = isIdle;
      lastActivityTime = Date.now();
      if(wasIdle){
        isIdle = false;
        if(isPageVisible) syncFromBackend(); // еҫһй–’зҪ®жҒўеҫ©пјҢз«ӢеҲ»еҗҢжӯҘдёҖж¬Ў
      }
    }
    document.addEventListener('click', markActivity, true);
    document.addEventListener('touchstart', markActivity, {passive:true, capture:true});
    document.addEventListener('keydown', markActivity, true);
    document.addEventListener('scroll', markActivity, {passive:true, capture:true});
  }
}

async function syncFromBackend(){
  if(isSyncing) return; // дёҠж¬ЎйӮ„жІ’и·‘е®Ңе°ұи·ійҒҺйҖҷж¬Ў
  // еңЁгҖҢз®ЎзҗҶз”ЁиЁӯе®ҡгҖҚз•«йқўжҷӮе®Ңе…ЁдёҚеҗҢжӯҘпјҢйҒҝе…ҚиғҢжҷҜиіҮж–ҷиҰҶи“ӢжӯЈеңЁйҖІиЎҢзҡ„е“ҒзүҢ/зөҗж§Ӣз·ЁијҜ
  if(state.view === "setup") return;
  isSyncing = true;
  try{
    var all = await apiGet("all");
    if(!all || !Array.isArray(all.structure)) return;
    if(all.brandOrder && all.brandOrder.length){ BRAND_ORDER = all.brandOrder.map(String); }
    if(all.recounts){ state.recounts = all.recounts; }

    // жҜ”е°Қпјҡи·ҹзӣ®еүҚзҡ„ state жҜ”пјҢзңӢиіҮж–ҷжңүжІ’жңүзңҹзҡ„и®ҠеӢ•пјҲйҒҝе…Қз„Ўи¬Ӯзҡ„гҖҢжңүж–°иіҮж–ҷгҖҚжҸҗзӨәпјү
    var newStructure = normalizeStructure(all.structure);
    var newCountsRaw = normalizeCounts(all.counts || {});
    var hasChange = false;
    // жҜ” countsпјҡе…ҲжҜ” key ж•ёйҮҸпјҢеҶҚйҖҗеҖӢжҜ” total
    var oldKeys = Object.keys(state.counts);
    var newKeys = Object.keys(newCountsRaw);
    if(oldKeys.length !== newKeys.length){
      hasChange = true;
    } else {
      for(var i=0;i<newKeys.length;i++){
        var k = newKeys[i];
        if(!state.counts.hasOwnProperty(k)){ hasChange = true; break; }
        if(Number(state.counts[k].total) !== Number(newCountsRaw[k].total)){ hasChange = true; break; }
      }
    }
    // жҜ”зөҗж§ӢпјҲж¬ҫејҸеҗҚзЁұж•ёйҮҸпјү
    if(!hasChange && newStructure.length !== state.structure.length){
      hasChange = true;
    }

    // жӣҙж–°зөҗж§ӢпјҲеҰӮжһңжңүдәәж–°еўһ/еҲӘйҷӨж¬ҫејҸд№ҹжңғеҗҢжӯҘпјү
    state.structure = sortStructureByStyle(newStructure);

    // жӣҙж–°зӣӨй»һж•ёеӯ—пјҡеҗҲдҪөжңҖж–°еҫҢз«ҜиіҮж–ҷпјҢдҪҶдҝқз•ҷгҖҢзӣ®еүҚжӯЈеңЁз·ЁијҜйҖҷдёҖж јгҖҚзҡ„жң¬ең°жҡ«еӯҳз®—ејҸпјҲйҒҝе…ҚиҰҶи“ӢдҪҝз”ЁиҖ…жӯЈеңЁжү“зҡ„еӯ—пјү
    var newCounts = newCountsRaw;
    var currentEditingKey = null;
    if(state.view === "counting" && state.structure[state.curStyleIdx]){
      var st = state.structure[state.curStyleIdx];
      if(st.colors[state.curColorIdx]){
        var col = st.colors[state.curColorIdx];
        var size = col.sizes[state.curSizeIdx];
        if(size) currentEditingKey = keyFor(st.style, col.name, size);
      }
    }
    // еҰӮжһңдҪҝз”ЁиҖ…жӯЈеңЁз·ЁијҜжҹҗж јгҖҒдё”жң¬ең° state жңүжңӘйҖҒеҮәзҡ„з®—ејҸпјҢдҝқз•ҷжң¬ең°зүҲжң¬
    if(currentEditingKey && state.counts[currentEditingKey]){
      var localCurrent = state.counts[currentEditingKey];
      newCounts[currentEditingKey] = localCurrent;
    }
    state.counts = newCounts;
    lastSyncTime = Date.now();

    // йҮҚз•«з•«йқўпјҲдҪҶдёҚйҮҚз•« counting и·ҹ summaryпјҢйҒҝе…Қз ҙеЈһдҪҝз”ЁиҖ…ж“ҚдҪңзӢҖж…Ӣпјү
    if(state.view === "home"){
      if(hasChange) render();
    } else if(state.view === "brandModels"){
      if(hasChange) render();
    } else if(state.view === "summary"){
      // еҸӘжңүиіҮж–ҷзңҹзҡ„жңүи®ҠеӢ•жҷӮжүҚйЎҜзӨәгҖҢжңүж–°иіҮж–ҷгҖҚжҸҗзӨәпјҢйҒҝе…Қз„Ўи¬Ӯжү“ж“ҫ
      if(hasChange) showSummaryUpdateHint();
    }
    // counting з•«йқўдёӢж•…ж„ҸдёҚйҮҚз•«пјҢзӯүдҪҝз”ЁиҖ…еҲҮжҸӣе°әеҜё/йЎҸиүІжҲ–жҢүдёӢдёҖй …жҷӮжүҚжңғиҮӘз„¶жӣҙж–°
  }catch(e){
    console.error("auto sync failed", e);
    // еҗҢжӯҘеӨұж•—е°ұйқңй»ҳз•ҘйҒҺпјҢдёӢдёҖијӘжңғеҶҚи©Ұ
  }finally{
    isSyncing = false;
  }
}

// ---------- Progress helpers ----------
function totalSizeSlots(structure){
  var n = 0;
  structure.forEach(function(st){ st.colors.forEach(function(c){ n += c.sizes.length; }); });
  return n;
}
// еҲӨж–·жҹҗдёҖж јжҳҜеҗҰгҖҢе®Ңж•ҙеЎ«еҜ«гҖҚпјҡжһ¶дёҠи·ҹеә«еӯҳе…©ж јйғҪиҰҒжңүеҖјпјҲеҗ« 0пјүжүҚз®—е®ҢжҲҗпјҢд»»дёҖж јз©әзҷҪйғҪз®—жңӘе®ҢжҲҗ
function slotComplete(c){
  if(!c) return false;
  var shelfFilled = (c.shelf !== "" && c.shelf !== null && c.shelf !== undefined);
  var stockFilled = (c.stock !== "" && c.stock !== null && c.stock !== undefined);
  return shelfFilled && stockFilled;
}
function doneSizeSlots(structure, counts){
  var n = 0;
  structure.forEach(function(st){
    st.colors.forEach(function(c){
      c.sizes.forEach(function(sz){
        var k = keyFor(st.style, c.name, sz);
        if(slotComplete(counts[k])){ n++; }
      });
    });
  });
  return n;
}
function colorDone(style, color, counts){
  return color.sizes.every(function(sz){ return slotComplete(counts[keyFor(style.style, color.name, sz)]); });
}
function styleProgress(style, counts){
  var total=0, done=0;
  style.colors.forEach(function(c){
    c.sizes.forEach(function(sz){
      total++;
      if(slotComplete(counts[keyFor(style.style, c.name, sz)])) done++;
    });
  });
  return {total:total, done:done};
}

// ---------- Render root ----------
function render(){
  var app = document.getElementById("app");
  if(state.view === "home") app.innerHTML = renderHome();
  else if(state.view === "brandModels") app.innerHTML = renderBrandModels();
  else if(state.view === "setup") app.innerHTML = renderSetup();
  else if(state.view === "counting") app.innerHTML = renderCounting();
  else if(state.view === "summary") app.innerHTML = renderSummary();
  else if(state.view === "recount") app.innerHTML = renderRecount();
  bindEvents();
}

// ---------- HOME ----------
function findStyleIdx(styleName){
  for(var i=0;i<state.structure.length;i++){
    if(state.structure[i].style === styleName) return i;
  }
  return -1;
}

function groupProgress(group, counts){
  var total=0, done=0;
  group.styles.forEach(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return;
    var p = styleProgress(state.structure[idx], counts);
    total += p.total; done += p.done;
  });
  return {total:total, done:done};
}

function renderHome(){
  var structure = state.structure;
  var total = totalSizeSlots(structure);
  var done = doneSizeSlots(structure, state.counts);
  var pct = total ? Math.round(done/total*100) : 0;

  // иӨҮзӣӨд»»еӢҷе…ҘеҸЈпјҡз®—еҮәеҫ…иӨҮзӣӨзӯҶж•ё

    : '';

  var brandGroups = computeBrandGroups();
  var rows = brandGroups.map(function(g){
    if(g.brand === null){
      // зҚЁз«ӢйЎҜзӨәпјҡзӣҙжҺҘй»һйҖІеҺ»зӣӨй»һпјҢдёҚз”Ёе…ҲйҒёе“ҒзүҢ
      var styleName = g.styles[0];
      var idx = findStyleIdx(styleName);
      if(idx === -1) return ""; // и©Іж¬ҫејҸе°ҡжңӘе»әз«ӢеңЁзөҗж§ӢиЈЎпјҢе…ҲдёҚйЎҜзӨә
      var p = styleProgress(structure[idx], state.counts);
      var pct2 = p.total ? Math.round(p.done/p.total*100) : 0;
      return '<div class="list-row" data-action="open-style" data-style-idx="'+idx+'">'+
        '<div class="left">'+escapeHtml(styleName)+
        '<div class="meta">'+structure[idx].colors.length+' иүІ В· е·Іе®ҢжҲҗ '+p.done+'/'+p.total+'пјҲ'+pct2+'%пјү</div>'+
        '</div><div class="chev">вҖә</div></div>';
    } else {
      var gp = groupProgress(g, state.counts);
      var pct3 = gp.total ? Math.round(gp.done/gp.total*100) : 0;
      var existCount = g.styles.filter(function(s){ return findStyleIdx(s) !== -1; }).length;
      return '<div class="list-row" data-action="open-brand" data-brand-name="'+escapeHtml(g.brand)+'">'+
        '<div class="left">'+escapeHtml(g.brand)+
        '<div class="meta">'+existCount+' еҖӢеһӢиҷҹ В· е·Іе®ҢжҲҗ '+gp.done+'/'+gp.total+'пјҲ'+pct3+'%пјү</div>'+
        '</div><div class="chev">вҖә</div></div>';
    }
  }).join("");

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<div class="brand">зӣӨй»һе·Ҙе…·</div>'+
      '<button class="icon-btn warn-btn" data-action="goto-setup">рҹ”’ з®ЎзҗҶз”ЁиЁӯе®ҡ</button>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>ж•ҙй«”йҖІеәҰ '+done+' / '+total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
    '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 16px 10px; font-size:12px; color:var(--muted);">'+
      '<span id="sync-status">'+getSyncStatusText()+'</span>'+
      '<button class="icon-btn" data-action="manual-sync" style="font-size:12px; padding:4px 10px;">рҹ”„ з«ӢеҚіжӣҙж–°</button>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>йҒёж“Үе“ҒзүҢ</h2>'+
      '<p class="sub">й»һе“ҒзүҢйҖІе…ҘйҒёеһӢиҷҹпјҢеҶҚйҖҗиүІйҖҗе°әеҜёеЎ«еҜ«пјҢиіҮж–ҷеҚіжҷӮеҗҢжӯҘпјҢеӨҡдәәеҸҜеҗҢжҷӮйҖІиЎҢдёҚеҗҢж¬ҫејҸжҲ–йЎҸиүІгҖӮ</p>'+

    '</div>'+
    '<button class="btn secondary" data-action="goto-summary">жҹҘзңӢеҪҷзёҪ / еҢҜеҮәиІјеӣһ Sheet</button>'+

  '<div class="footer-note">еЎ«еҜ«зҡ„ж•ёеӯ—жңғеҚіжҷӮеӯҳеҲ°йӣІз«ҜпјҢжүҖжңүдәәе…ұз”ЁеҗҢдёҖд»ҪиіҮж–ҷ</div>';
}

function renderBrandModels(){
  var brandGroups = computeBrandGroups();
  var g = brandGroups.find(function(grp){ return grp.brand === state.curBrandName; });
  if(!g){
    // и©Іе“ҒзүҢе·ІдёҚеӯҳеңЁпјҲеҸҜиғҪиў«йҮҚе‘ҪеҗҚжҲ–еҲӘйҷӨпјүпјҢеӣһйҰ–й Ғ
    state.view = "home";
    return renderHome();
  }
  var structure = state.structure;

  var rows = g.styles.map(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return "";
    var p = styleProgress(structure[idx], state.counts);
    var pct2 = p.total ? Math.round(p.done/p.total*100) : 0;
    return '<div class="list-row" data-action="open-style" data-style-idx="'+idx+'">'+
      '<div class="left">'+escapeHtml(styleName)+
      '<div class="meta">'+structure[idx].colors.length+' иүІ В· е·Іе®ҢжҲҗ '+p.done+'/'+p.total+'пјҲ'+pct2+'%пјү</div>'+
      '</div><div class="chev">вҖә</div></div>';
  }).join("");

  var gp = groupProgress(g, state.counts);
  var pct = gp.total ? Math.round(gp.done/gp.total*100) : 0;

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="goto-home">вҖ№ е“ҒзүҢ</button>'+
      '<div class="brand">'+escapeHtml(g.brand)+'</div>'+
      '<span style="width:60px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(g.brand)+' йҖІеәҰ '+gp.done+' / '+gp.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>йҒёж“ҮеһӢиҷҹ</h2>'+
      (rows || emptyStateHtml('йҖҷеҖӢе“ҒзүҢеә•дёӢйӮ„жІ’жңүеһӢиҷҹ', 'и«Ӣз®ЎзҗҶдәәе“ЎеҲ°гҖҢз®ЎзҗҶз”ЁиЁӯе®ҡгҖҚеҠ е…Ҙ'))+

// жҠҠз®—ејҸеӯ—дёІжӢҶжҲҗ token йҷЈеҲ—пјҢдҫӢеҰӮ "12Г—6+8" -> [{t:'num',v:'12'},{t:'op',v:'Г—'},{t:'num',v:'6'},{t:'op',v:'+'},{t:'num',v:'8'}]
function tokenizeExpr(str){
  if(!str) return [];
  var s = String(str).trim().replace(/[xX]/g, "Г—");
  if(s === "") return [];
  var tokens = [];
  var num = "";
  for(var i=0;i<s.length;i++){
    var ch = s[i];
    if(ch === "+" || ch === "Г—"){
      if(num !== ""){ tokens.push({t:'num', v:num}); num=""; }
      tokens.push({t:'op', v:ch});
    } else if(ch !== " "){
      num += ch;
    }
  }
  if(num !== "") tokens.push({t:'num', v:num});
  return tokens;
}

// жҠҠ token йҷЈеҲ—зө„еӣһеӯ—дёІ
function tokensToStr(tokens){
  return tokens.map(function(tk){ return tk.v; }).join("");
}

// з”ўз”ҹгҖҢжЁҷзұӨејҸз®—ејҸз·ЁијҜеҷЁгҖҚзҡ„ HTMLгҖӮfield зӮә "shelf" жҲ– "stock"
function renderExprEditor(field){
  var html = '<div class="expr-chips" id="'+field+'-chips">';
  html += renderTokenChips(field); // еүҚйқўзҡ„ж•ёеӯ—/йҒӢз®—з¬ҰжЁҷзұӨпјҲйҖҷеЎҠжңғиў«е°ұең°жӣҙж–°пјү
  // еӣәе®ҡдёҚеӢ•зҡ„ж–°еўһеҚҖпјҡијёе…ҘжЎҶ + еҠ иҷҹ/д№ҳиҷҹжҢүйҲ•пјҲDOM дёҚйҮҚе»әпјҢйҚөзӣӨдёҚж”¶иө·пјү
  html += '<input class="expr-newinput" id="'+field+'-newinput" type="text" inputmode="decimal" placeholder="0">';
  html += '<div class="expr-addbtns">'+
    '<button class="expr-addbtn add-plus" data-action="add-token" data-field="'+field+'" data-op="+" type="button">+</button>'+
    '<button class="expr-addbtn add-times" data-action="add-token" data-field="'+field+'" data-op="Г—" type="button">Г—</button>'+
  '</div>';
  html += '</div>';
  html += '<div id="'+field+'-editor"></div>'; // й»һжЁҷзұӨеҫҢзҡ„з·ЁијҜеҪҲзӘ—жңғж”ҫйҖҷиЈЎ
  return html;
}

// еҸӘз”ўз”ҹеүҚйқўйӮЈдёІж•ёеӯ—/йҒӢз®—з¬ҰжЁҷзұӨпјҲдёҚеҗ«ијёе…ҘжЎҶпјүпјҢдҫӣе°ұең°жӣҙж–°з”Ё
function renderTokenChips(field){
  var exprStr = field === 'shelf' ? state.exprShelf : state.exprStock;
  var tokens = tokenizeExpr(exprStr);
  var html = '<span id="'+field+'-chiplist" class="expr-chiplist">';
  tokens.forEach(function(tk, idx){
    if(tk.t === 'num'){
      html += '<span class="expr-chip-num" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    } else {
      var opcls = tk.v === 'Г—' ? 'op-times' : 'op-plus';
      html += '<span class="expr-chip-op '+opcls+'" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    }
  });
  html += '</span>';
  return html;
}

function renderCounting(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key] || {shelf:"", stock:""};
  var p = styleProgress(st, state.counts);
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;

  var chips = col.sizes.map(function(sz, i){
    var k = keyFor(st.style, col.name, sz);
    var cls = "chip";
    if(i === state.curSizeIdx) cls += " active";
    else if(slotComplete(state.counts[k])) cls += " done";
    return '<button class="'+cls+'" data-action="jump-size" data-size-idx="'+i+'">'+escapeHtml(sz)+'</button>';
  }).join("");

  var colorChips = st.colors.map(function(c, i){
    var cls = "chip";
    if(i === state.curColorIdx) cls += " active";
    else if(colorDone(st, c, state.counts)) cls += " done";
    return '<button class="'+cls+'" data-action="jump-color" data-color-idx="'+i+'">'+escapeHtml(c.name)+'</button>';
  }).join("");

  // е„Әе…ҲйЎҜзӨәеҺҹе§Ӣз®—ејҸж–Үеӯ—пјҲеҗҢдёҖж¬Ўй–Ӣе•ҹе·Ҙе…·жңҹй–“йғҪжңғдҝқз•ҷпјүпјҢжІ’жңүзҡ„и©ұжүҚйЎҜзӨәе·Іеӯҳзҡ„ж•ёеӯ—
  var shelfVal = existing.shelfExpr !== undefined ? existing.shelfExpr : (existing.shelf !== undefined ? String(existing.shelf) : "");
  var stockVal = existing.stockExpr !== undefined ? existing.stockExpr : (existing.stock !== undefined ? String(existing.stock) : "");
  // жҠҠзӣ®еүҚж јдҪҚзҡ„з®—ејҸеҗҢжӯҘеҲ° stateпјҢжЁҷзұӨз·ЁијҜеҷЁд»Ҙ state зӮәжә–
  state.exprShelf = shelfVal;
  state.exprStock = stockVal;
  var total = (existing.total !== undefined ? existing.total : (parseExpr(shelfVal) + parseExpr(stockVal)));

  var isFirst = state.curStyleIdx === 0 && state.curColorIdx === 0 && state.curSizeIdx === 0;
  var isLast = isLastSlot();
  var parentGroup = findBrandGroupForStyle(st.style);
  var backAction = (parentGroup && parentGroup.brand !== null) ? 'back-to-brand' : 'goto-home';
  var backLabel = (parentGroup && parentGroup.brand !== null) ? ('вҖ№ '+escapeHtml(parentGroup.brand)) : 'вҖ№ е“ҒзүҢ';

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="'+backAction+'">'+backLabel+'</button>'+
      '<div class="brand">зӣӨй»һдёӯ</div>'+
      '<span style="width:70px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(st.style)+' йҖІеәҰ '+p.done+'/'+p.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="chip-strip">'+colorChips+'</div>'+
    '<div class="count-card">'+
      '<div class="ctx-label">ж¬ҫејҸ / йЎҸиүІ</div>'+
      '<div class="style-name">'+escapeHtml(st.style)+' В· '+escapeHtml(col.name)+'</div>'+
      '<div class="size-name">'+escapeHtml(size)+'</div>'+
      '<div class="input-grid">'+
        '<div class="num-box" id="shelf-box">'+
          '<label>жһ¶дёҠ</label>'+
          renderExprEditor('shelf')+
        '</div>'+
        '<div class="num-box" id="stock-box">'+
          '<label>еә«еӯҳ</label>'+
          renderExprEditor('stock')+
        '</div>'+
      '</div>'+
      '<div class="sum-row"><span class="sum-label">еҠ зёҪ</span><span class="sum-val" id="sum-val">'+total+'</span></div>'+
      '<div class="nav-row">'+
        '<button class="btn secondary" data-action="prev-slot" '+(isFirst?'disabled':'')+'>вҖ№ дёҠдёҖй …</button>'+
        '<button class="btn" data-action="next-slot">'+(isLast?'е®ҢжҲҗ вң“':'дёӢдёҖй … вҖә')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="chip-strip" style="margin-top:-6px;">'+chips+'</div>'+
  '</main>';
}

function isLastSlot(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  return state.curStyleIdx === state.structure.length - 1 &&
         state.curColorIdx === st.colors.length - 1 &&
         state.curSizeIdx === col.sizes.length - 1;
}

// ---------- SUMMARY ----------
function renderSummary(){
  var structure = state.structure;
  var tsvLines = ["ж¬ҫејҸ\tйЎҸиүІ\tе°әеҜё\tжһ¶дёҠ\tеә«еӯҳ\tеҠ зёҪ"];

  // е…ҲжҠҠжүҖжңүиіҮж–ҷжҢүе“ҒзүҢеҲҶзө„
  function buildStyleTableHtml(st){
    var html = '<div style="overflow-x:auto;">'+
      '<table class="summary"><thead><tr><th><span style="display:inline-block; width:7px; height:7px; border-radius:50%; background:#e87a3e; margin-right:4px; vertical-align:middle;"></span>йЎҸиүІ</th><th>е°әеҜё</th><th>жһ¶дёҠ</th><th>еә«еӯҳ</th><th>еҠ зёҪ</th><th>иӨҮзӣӨ</th></tr></thead><tbody>';
    var styleShelf=0, styleStock=0, styleTotal=0, missingCount=0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
        var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
        var isMissing = !(shelfFilled && stockFilled); // д»»дёҖж јжІ’еЎ«йғҪз®—жңӘе®ҢжҲҗ
        if(isMissing) missingCount++;
        var shelf = shelfFilled ? c.shelf : "";
        var stock = stockFilled ? c.stock : "";
        var total = (shelfFilled || stockFilled) ? ((Number(c.shelf)||0)+(Number(c.stock)||0)) : "";
        var rowStyle = isMissing ? ' style="background:#fff4e6;"' : '';
        var colorCell = isMissing
          ? '<td style="color:#c45a1e; font-weight:700; white-space:nowrap;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#e87a3e; margin-right:6px; vertical-align:middle;"></span>'+escapeHtml(col.name)+'</td>'
          : '<td>'+escapeHtml(col.name)+'</td>';
        // жһ¶дёҠгҖҒеә«еӯҳж¬„пјҡжІ’еЎ«зҡ„йӮЈж јйЎҜзӨәзҙ…иүІгҖҢжңӘеЎ«гҖҚпјҢжңүеЎ«йЎҜзӨәж•ёеӯ—
        var shelfCell = shelfFilled
          ? '<td class="num">'+shelf+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">жңӘеЎ«</td>';
        var stockCell = stockFilled
          ? '<td class="num">'+stock+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">жңӘеЎ«</td>';
        // иӨҮзӣӨжЁҷиЁҳж¬„пјҡе·ІжЁҷиЁҳйЎҜзӨәи—ҚеӢҫ(й»һеҸҜеҸ–ж¶Ҳ)пјҢжңӘжЁҷиЁҳйЎҜзӨәжЁҷиЁҳйҲ•
        var isMarked = !!state.recounts[key];
        var recountCell = isMarked
          ? '<td class="num" style="white-space:nowrap;"><button class="mini-btn marked" data-action="unmark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">вң“е·ІжЁҷиЁҳ</button></td>'
          : '<td class="num" style="white-space:nowrap;"><button class="mini-btn" data-action="mark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">жЁҷиЁҳиӨҮзӣӨ</button></td>';
        html += '<tr'+rowStyle+'>'+colorCell+'<td>'+escapeHtml(sz)+'</td>'+
          shelfCell + stockCell +
          '<td class="num"><strong>'+(total===""?'вҖ”':total)+'</strong></td>'+
          recountCell + '</tr>';
        tsvLines.push([st.style, col.name, sz, shelf, stock, total].join("\t"));
        if(c){ styleShelf+=Number(c.shelf)||0; styleStock+=Number(c.stock)||0; styleTotal+=(Number(c.shelf)||0)+(Number(c.stock)||0); }
      });
    });
    html += '<tr style="background:#faf7f1;"><td colspan="2"><strong>е°ҸиЁҲ</strong></td>'+
      '<td class="num"><strong>'+styleShelf+'</strong></td>'+
      '<td class="num"><strong>'+styleStock+'</strong></td>'+
      '<td class="num"><strong>'+styleTotal+'</strong></td><td></td></tr>';
    html += '</tbody></table></div>';
    return {html:html, total:styleTotal, missing:missingCount};
  }

  // иЁҲз®—е–®дёҖж¬ҫејҸзҡ„зёҪиЁҲпјҲеҪҷзёҪз”ЁпјҢдёҚдҫқиіҙдёҠйқўйӮЈеҖӢеҮҪејҸпјү
  function calcStyleTotal(st){
    var t = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var c = state.counts[keyFor(st.style, col.name, sz)];
        if(c) t += Number(c.total)||0;
      });
    });
    return t;
  }

  // дҫқеӢ•ж…ӢиЁҲз®—зҡ„е“ҒзүҢеҲҶзө„зө„иЈқз•«йқўпјҲеҫһ state.structure еҚіжҷӮз®—еҮәпјү
  var groupsHtml = "";
  var grandMissing = 0;
  computeBrandGroups().forEach(function(g){
    var groupStyles = g.styles
      .map(function(name){ return structure.find(function(s){ return s.style === name; }); })
      .filter(function(s){ return s; });
    if(groupStyles.length === 0) return;

    var groupName = g.brand === null ? groupStyles[0].style : g.brand;
    var styleCount = groupStyles.length;
    var groupTotal = 0;
    var groupMissing = 0;
    var bodyHtml = "";

    groupStyles.forEach(function(st){
      var built = buildStyleTableHtml(st);
      groupTotal += built.total;
      groupMissing += built.missing;
      if(g.brand !== null){
        // е“ҒзүҢеә•дёӢеӨҡеҖӢеһӢиҷҹпјҡжҜҸеҖӢеһӢиҷҹеҒҡжҲҗеҸҜж‘әз–Ҡзҡ„е°ҸеҚЎзүҮ
        var styleMissingTag = built.missing > 0 ? ' <span style="background:#e87a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">жңӘијёе…Ҙ '+built.missing+'</span>' : '';
        var styleTotalText = ' В· еҗҲиЁҲ '+built.total;
        bodyHtml += '<div class="style-group'+(built.missing > 0 ? ' has-missing' : '')+'">'+
          '<div class="style-group-header" data-action="toggle-style-group">'+
            '<div class="sg-left">'+
              '<div class="sg-name">'+escapeHtml(st.style)+styleMissingTag+'</div>'+
              '<div class="sg-meta">'+st.colors.length+' иүІ'+styleTotalText+'</div>'+
            '</div>'+
            '<div class="sg-arrow">вҖә</div>'+
          '</div>'+
          '<div class="style-group-body">'+built.html+'</div>'+
        '</div>';
      } else {
        // зҚЁз«Ӣж¬ҫејҸпјҲе“ҒзүҢеҸӘжңүдёҖеҖӢеһӢиҷҹпјүзӣҙжҺҘйЎҜзӨәжҳҺзҙ°
        bodyHtml += built.html;
      }
    });

    grandMissing += groupMissing;
    var metaParts = [];
    if(g.brand !== null) metaParts.push(styleCount + ' еҖӢеһӢиҷҹ');
    if(groupMissing > 0) metaParts.push('<span style="color:#e87a3e; font-weight:700;">жңӘијёе…Ҙ '+groupMissing+' зӯҶ</span>');
    var metaText = metaParts.join(' В· ');
    groupsHtml += '<div class="brand-group'+(groupMissing > 0 ? ' has-missing' : '')+'" data-brand-name="'+escapeHtml(groupName)+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+escapeHtml(groupName)+'</div>'+
            (metaText ? '<div class="bg-meta">'+metaText+'</div>' : '')+
          '</div>'+
        '</div>'+
        '<div style="display:flex; align-items:center; gap:6px;">'+
          '<div class="bg-totals">еҗҲиЁҲ '+groupTotal+'</div>'+
          '<div class="bg-arrow">вҖә</div>'+
        '</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  });

  // ж•ҙй«”зёҪиЁҲ
  var grandTotal = 0;
  structure.forEach(function(st){ grandTotal += calcStyleTotal(st); });

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">вҖ№ иҝ”еӣһ</button>'+
    '<div class="brand">еҪҷзёҪ / еҢҜеҮә</div>'+
    '<button class="icon-btn" data-action="refresh-summary" style="font-size:12px; padding:6px 10px;">рҹ”„ жӣҙж–°</button>'+
  '</div>'+
    '<div id="summary-update-hint" data-action="refresh-summary" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
      'рҹ”” жңүж–°иіҮж–ҷпјҢй»һжӯӨеҲ·ж–°жҳҺзҙ°'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>жӣҙж–° Google Sheet еҪҷзёҪеҲҶй Ғ</h2>'+
      '<p class="sub">жңғеңЁдҪ зҡ„ Google Sheet иЈЎиҮӘеӢ•з”ўз”ҹгҖҢеҪҷзёҪ_ж¬ҫејҸеҗҚзЁұгҖҚеҲҶй ҒпјҲдёҚжңғеӢ•еҲ°еҺҹжң¬ж—ўжңүзҡ„еҲҶй ҒпјүпјҢжҜҸеҖӢе“Ғй …дёҖеҖӢеҲҶй ҒпјҢе…§е®№жҳҜи©Іе“Ғй …жүҖжңүйЎҸиүІгҖҒе°әеҜёзҡ„жһ¶дёҠпјҸеә«еӯҳпјҸеҠ зёҪжҳҺзҙ°иҲҮзёҪиЁҲгҖӮйңҖиҰҒйҮҚж–°ж•ҙзҗҶ Sheet жүҚжңғзңӢеҲ°ж–°еҲҶй ҒгҖӮ</p>'+
      '<button class="btn" data-action="regenerate-sheets">жӣҙж–° Google Sheet еҪҷзёҪеҲҶй Ғ</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>еӮҷз”ЁпјҡдёӢијү Excel еҝ«з…§</h2>'+
      '<p class="sub">еҰӮжһңжғіиҰҒдёҖд»ҪзҚЁз«Ӣзҡ„ Excel жӘ”пјҲдёҚеңЁ Google Sheet иЈЎпјүпјҢеҸҜд»Ҙз”ЁйҖҷеҖӢпјҢзөҗж§Ӣи·ҹдёҠйқўзҡ„еҪҷзёҪеҲҶй ҒдёҖжЁЈгҖӮ</p>'+
      '<button class="btn secondary" data-action="download-xlsx">дёӢијү ExcelпјҲ.xlsxпјү</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>жҳҺзҙ°пјҲдҫқе“ҒзүҢеҲҶзө„пјү</h2>'+
      '<p class="sub">й»һе“ҒзүҢжЁҷйЎҢеұ•й–ӢжҲ–ж”¶еҗҲи©Іе“ҒзүҢзҡ„жҳҺзҙ°гҖӮж•ҙй«”еҠ зёҪпјҡ<strong style="color:var(--accent-deep);">'+grandTotal+'</strong>'+
        (grandMissing > 0 ? ' В· <strong style="color:#e87a3e;">е°ҡжңү '+grandMissing+' зӯҶжңӘијёе…Ҙ</strong>' : ' В· <strong style="color:#2f7a3e;">е·Іе…ЁйғЁијёе…Ҙе®ҢжҲҗ вң“</strong>')+
      '</p>'+
      groupsHtml+
    '</div>'+
  '</main>'+
  '<div id="tsv-data" style="display:none;">'+escapeHtml(tsvLines.join("\n"))+'</div>';
}

// ---------- иӨҮзӣӨжё…е–®з•«йқў ----------
function renderRecount(){
  var keys = Object.keys(state.recounts || {});

  // ж”¶йӣҶжүҖжңүиӘҚй ҳдәә(з”Ёж–јзҜ©йҒё)
  var assignees = [];
  keys.forEach(function(k){
    var a = (state.recounts[k].assignee || "").trim();
    if(a && assignees.indexOf(a) === -1) assignees.push(a);
  });
  assignees.sort(function(a,b){ return a.localeCompare(b, 'zh-Hant'); });

  // еҸ–еҫ—жҹҗеҖӢиӨҮзӣӨй …зӣ®жүҖеұ¬зҡ„е“ҒзүҢеҗҚзЁұ(жІ’е“ҒзүҢеӣһеӮіз©әеӯ—дёІ)
  function brandOfKey(k){
    var style = k.split("|")[0];
    var g = findBrandGroupForStyle(style);
    return (g && g.brand) ? g.brand : "";
  }

  // ж”¶йӣҶжүҖжңүе“ҒзүҢ(з”Ёж–је“ҒзүҢзҜ©йҒё)
  var brands = [];
  keys.forEach(function(k){
    var b = brandOfKey(k);
    if(b && brands.indexOf(b) === -1) brands.push(b);
  });
  // дҫқ BRAND_ORDER жҺ’еәҸе“ҒзүҢ
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  brands.sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var hasNoBrand = keys.some(function(k){ return !brandOfKey(k); });

  // иӘҚй ҳдәәзҜ©йҒёеҷЁ
  var filterBtns = '<button class="chip'+(state.recountFilter===""?" active":"")+'" data-action="recount-filter" data-assignee="">е…ЁйғЁ</button>';
  assignees.forEach(function(a){
    filterBtns += '<button class="chip'+(state.recountFilter===a?" active":"")+'" data-action="recount-filter" data-assignee="'+escapeHtml(a)+'">'+escapeHtml(a)+'</button>';
  });
  var hasUnassigned = keys.some(function(k){ return !(state.recounts[k].assignee || "").trim(); });
  if(hasUnassigned){
    filterBtns += '<button class="chip'+(state.recountFilter==="__none__"?" active":"")+'" data-action="recount-filter" data-assignee="__none__">е°ҡз„ЎдәәиӘҚй ҳ</button>';
  }

  // е“ҒзүҢзҜ©йҒёеҷЁ
  var brandFilterBtns = '<button class="chip'+(state.recountBrandFilter===""?" active":"")+'" data-action="recount-brand-filter" data-brand="">е…ЁйғЁе“ҒзүҢ</button>';
  brands.forEach(function(b){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter===b?" active":"")+'" data-action="recount-brand-filter" data-brand="'+escapeHtml(b)+'">'+escapeHtml(b)+'</button>';
  });
  if(hasNoBrand){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter==="__nobrand__"?" active":"")+'" data-action="recount-brand-filter" data-brand="__nobrand__">жңӘеҲҶзө„</button>';
  }

  // з”ўз”ҹе–®дёҖиӨҮзӣӨй …зӣ®зҡ„ HTML
  function buildRecountItem(k){
    var r = state.recounts[k];
    var assignee = (r.assignee || "").trim();
    var parts = k.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    var c = state.counts[k];
    var firstShelf = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined ? (Number(c.shelf)||0) : null;
    var firstStock = c && c.stock !== "" && c.stock !== null && c.stock !== undefined ? (Number(c.stock)||0) : null;
    var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;
    var recountRaw = (r.recount !== null && r.recount !== undefined) ? String(r.recount) : "";
    var hasRecount = recountRaw.trim() !== "";
    var recountVal = hasRecount ? parseExpr(recountRaw) : null;
    var diffHtml = "";
    if(firstTotal !== null && recountVal !== null){
      var diff = recountVal - firstTotal;
      var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
      var diffText = diff === 0 ? "дёҖиҮҙ вң“" : (diff > 0 ? "+"+diff : ""+diff);
      diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
    } else if(recountVal === null){
      diffHtml = '<span style="color:var(--muted);">еҫ…иӨҮзӣӨ</span>';
    }
    var recountCalcHint = (hasRecount && /[+Г—xX*]/.test(recountRaw))
      ? '<div class="ri-calc-hint">= '+recountVal+'</div>'
      : '';
    return '<div class="recount-item'+(recountVal!==null?' done':'')+'">'+
      '<div class="ri-top">'+
        '<div class="ri-title">'+escapeHtml(style)+' В· '+escapeHtml(color)+' В· '+escapeHtml(size)+'</div>'+
        (assignee ? '<span class="ri-assignee">'+escapeHtml(assignee)+' иҷ•зҗҶ</span>' : '<span class="ri-assignee unassigned">е°ҡз„ЎдәәиӘҚй ҳ</span>')+
      '</div>'+
      '<div class="ri-nums">'+
        '<div class="ri-num"><div class="ri-num-label">з¬¬дёҖж¬Ў</div><div class="ri-num-val">'+(firstTotal!==null?firstTotal:'вҖ”')+'</div></div>'+
        '<div class="ri-arrow">вҶ’</div>'+
        '<div class="ri-num"><div class="ri-num-label">иӨҮзӣӨпјҲеҸҜеҠ еҸҜд№ҳпјү</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(recountRaw)+'" placeholder="еҰӮ 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-action="recount-input">'+
          recountCalcHint+'</div>'+
        '<div class="ri-num"><div class="ri-num-label">е·®з•°</div><div class="ri-num-val">'+diffHtml+'</div></div>'+
      '</div>'+
      '<div class="ri-claim">'+
        '<span class="ri-claim-label">иӨҮзӣӨдәәпјҡ</span>'+
        '<input class="ri-claim-input" type="text" value="'+escapeHtml(assignee)+'" placeholder="еЎ«дҪ зҡ„еҗҚеӯ—" '+
          'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-action="recount-claim">'+
        '<button class="mini-btn" data-action="unmark-recount" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" style="border-color:#e3a89a; background:#fdf3ef; color:var(--accent-deep); margin-left:8px;">з§»йҷӨ</button>'+
      '</div>'+
    '</div>';
  }

  // еҲӨж–·жҹҗ key жҳҜеҗҰйҖҡйҒҺзӣ®еүҚзҡ„зҜ©йҒёжўқд»¶
  function passFilter(k){
    var assignee = (state.recounts[k].assignee || "").trim();
    // иӘҚй ҳдәәзҜ©йҒё
    if(state.recountFilter === "__none__"){ if(assignee) return false; }
    else if(state.recountFilter !== ""){ if(assignee !== state.recountFilter) return false; }
    // е“ҒзүҢзҜ©йҒё
    var b = brandOfKey(k);
    if(state.recountBrandFilter === "__nobrand__"){ if(b) return false; }
    else if(state.recountBrandFilter !== ""){ if(b !== state.recountBrandFilter) return false; }
    return true;
  }

  // жҠҠйҖҡйҒҺзҜ©йҒёзҡ„ key дҫқе“ҒзүҢеҲҶзө„
  var shownCount = 0;
  var byBrand = {}; // brand -> [keys]
  var noBrandKeys = [];
  keys.forEach(function(k){
    if(!passFilter(k)) return;
    shownCount++;
    var b = brandOfKey(k);
    if(b){ if(!byBrand[b]) byBrand[b]=[]; byBrand[b].push(k); }
    else noBrandKeys.push(k);
  });

  // дҫқе“ҒзүҢй ҶеәҸзө„иЈқеҲҶзө„еҚҖеЎҠ
  var rowsHtml = "";
  if(shownCount === 0){
    rowsHtml = emptyStateHtml('жІ’жңүиӨҮзӣӨй …зӣ®', keys.length === 0 ? 'еҲ°еҪҷзёҪй Ғзҡ„жҳҺзҙ°пјҢй»һгҖҢжЁҷиЁҳиӨҮзӣӨгҖҚжҠҠиҰҒиӨҮзӣӨзҡ„е“Ғй …еҠ йҖІдҫҶ' : 'йҖҷеҖӢзҜ©йҒёжўқд»¶дёӢжІ’жңүй …зӣ®');
  } else {
    // жІ’е“ҒзүҢзҡ„жҺ’жңҖеүҚ
    if(noBrandKeys.length > 0){
      noBrandKeys.forEach(function(k){ rowsHtml += buildRecountItem(k); });
    }
    brands.forEach(function(b){
      if(!byBrand[b]) return;
      // йҖҷеҖӢе“ҒзүҢжңүе№ҫзӯҶгҖҒе№ҫзӯҶе·ІиӨҮзӣӨ
      var total = byBrand[b].length;
      var doneN = byBrand[b].filter(function(k){
        var rc = state.recounts[k].recount;
        return rc !== "" && rc !== null && rc !== undefined && String(rc).trim() !== "";
      }).length;
      rowsHtml += '<div class="recount-brand-head">'+escapeHtml(b)+
        ' <span style="font-weight:600; color:var(--muted); font-size:12px;">пјҲ'+doneN+'/'+total+' е·ІиӨҮзӣӨпјү</span></div>';
      byBrand[b].forEach(function(k){ rowsHtml += buildRecountItem(k); });
    });
  }

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">вҖ№ иҝ”еӣһ</button>'+
    '<div class="brand">иӨҮзӣӨд»»еӢҷ</div>'+
    '<button class="icon-btn" data-action="manual-sync-recount" style="font-size:12px; padding:6px 10px;">рҹ”„ жӣҙж–°</button>'+
  '</div></div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>иӨҮзӣӨжё…е–®</h2>'+

// ---------- Excel export (one worksheet per ж¬ҫејҸ) ----------
function sanitizeSheetName(name, usedNames){
  var clean = String(name).replace(/[\\\/\?\*\[\]:]/g, "_").slice(0,31);
  if(!clean) clean = "Sheet";
  var base = clean, n = 1;
  while(usedNames[clean]){
    n++;
    var suffix = "_" + n;
    clean = base.slice(0, 31 - suffix.length) + suffix;
  }
  usedNames[clean] = true;
  return clean;
}

function buildWorkbook(){
  var wb = XLSX.utils.book_new();
  var usedNames = {};
  state.structure.forEach(function(st){
    var rows = [["йЎҸиүІ","е°әеҜё","жһ¶дёҠ","еә«еӯҳ","еҠ зёҪ"]];
    var sumShelf = 0, sumStock = 0, sumTotal = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelf = c && c.shelf !== "" ? Number(c.shelf)||0 : (c ? 0 : "");
        var stock = c && c.stock !== "" ? Number(c.stock)||0 : (c ? 0 : "");
        var total = c ? Number(c.total)||0 : "";
        rows.push([col.name, sz, shelf, stock, total]);
        if(c){
          sumShelf += Number(c.shelf)||0;
          sumStock += Number(c.stock)||0;
          sumTotal += Number(c.total)||0;
        }
      });
    });
    rows.push(["зёҪиЁҲ", "", sumShelf, sumStock, sumTotal]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:8},{wch:8},{wch:8}];
    var sheetName = sanitizeSheetName(st.style, usedNames);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  return wb;
}

function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

function downloadWorkbook(){
  if(typeof XLSX === "undefined"){
    showToast("Excel еҮҪејҸеә«ијүе…ҘеӨұж•—пјҢи«ӢжӘўжҹҘз¶Іи·ҜеҫҢйҮҚи©Ұ");
    return;
  }
  var wb = buildWorkbook();
  XLSX.writeFile(wb, "зӣӨй»һзөҗжһң_" + dateStr() + ".xlsx");
}

// ---------- Helpers ----------
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

      }

      else if(action === 'compact-raw'){
        el.disabled = true;
        el.textContent = "ж•ҙзҗҶдёӯвҖҰ";
        try{
          await apiPost({ action:"compactRaw" });
          showToast("е·Іж•ҙзҗҶе®ҢжҲҗпјҢиЎЁж је·Іи®Ҡе°Ҹ");
        }catch(e){
          console.error("compact raw failed", e);
          showToast("ж•ҙзҗҶеӨұж•—пјҡ" + (e && e.message ? e.message : "жңӘзҹҘйҢҜиӘӨ"));
        }
        el.disabled = false;
        el.textContent = "ж•ҙзҗҶеҺҹе§ӢиіҮж–ҷ";
      }

      else if(action === 'clear-counts'){
        if(!confirm('вҡ пёҸ зўәе®ҡиҰҒжё…з©әжүҖжңүдәәе·Із¶“ијёе…Ҙзҡ„зӣӨй»һж•ёеӯ—е—Һпјҹ\n\nйҖҷеҖӢеӢ•дҪңз„Ўжі•еҫ©еҺҹгҖӮ')){
          return;
        }
        await clearAllCountsRemote();
        state.counts = {};
        showToast("е·Іжё…з©әжүҖжңүзӣӨй»һж•ёеӯ—");
        render();
      }

      else if(action === 'download-xlsx'){
        downloadWorkbook();
      }

      else if(action === 'toggle-brand-group'){
        var group = el.closest('.brand-group');
        if(group){
          group.classList.toggle('expanded');
        }
      }

      else if(action === 'toggle-style-group'){
        var sgroup = el.closest('.style-group');
        if(sgroup){
          sgroup.classList.toggle('expanded');
        }
      }

      else if(action === 'regenerate-sheets'){
        el.disabled = true;
        el.textContent = "жӣҙж–°дёӯвҖҰ";
        var ok = await regenerateSummarySheetsRemote();
        if(ok){ showToast("е·ІеңЁ Google Sheet з”ўз”ҹеҪҷзёҪеҲҶй Ғ"); }
        el.disabled = false;
        el.textContent = "жӣҙж–° Google Sheet еҪҷзёҪеҲҶй Ғ";
      }

      else if(action === 'copy-tsv'){
        var data = document.getElementById('tsv-data').textContent;
        try{
          await navigator.clipboard.writeText(data);
          showToast("е·ІиӨҮиЈҪпјҢеҲ° Sheet иІјдёҠеҚіеҸҜ");
        }catch(e){
          showToast("иӨҮиЈҪеӨұж•—пјҢи«ӢжүӢеӢ•йҒёеҸ–ж–Үеӯ—");
        }
      }
    });

    // жЁҷзұӨз·ЁијҜеҷЁпјҡз”ЁдәӢд»¶е§”жҙҫиҷ•зҗҶгҖҢжңҖеҫҢж–°еўһијёе…ҘжЎҶгҖҚзҡ„ Enter йҚөпјҲеӢ•ж…Ӣж–°еўһд№ҹжңүж•Ҳпјү
    app.addEventListener('keydown', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput') && ev.key === 'Enter'){
        var field = t.id === 'shelf-newinput' ? 'shelf' : (t.id === 'stock-newinput' ? 'stock' : null);
        if(field){ ev.preventDefault(); commitNewInput(field); }
      }
    });

    // жҜҸжү“дёҖеҖӢеӯ—е°ұеҚіжҷӮжӣҙж–°еҠ зёҪпјҢйҖЈгҖҢйӮ„жІ’жҢү+гҖҒйӮ„жІ’жҸӣж јгҖҚзҡ„жңҖеҫҢдёҖеҖӢж•ёеӯ—д№ҹз®—йҖІеҺ»
    app.addEventListener('input', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        refreshSum();
      }
      // иӨҮзӣӨз®—ејҸијёе…ҘжҷӮпјҢеҚіжҷӮеңЁијёе…ҘжЎҶдёӢж–№йЎҜзӨәз®—еҮәзҡ„еҗҲиЁҲ
      if(t && t.classList && t.classList.contains('ri-input')){
        var raw = t.value.trim();
        var wrap = t.parentNode; // .ri-num
        var hint = wrap.querySelector('.ri-calc-hint');
        var isExpr = /[+Г—xX*]/.test(raw);
        if(isExpr && raw !== ""){
          if(!hint){
            hint = document.createElement('div');
            hint.className = 'ri-calc-hint';
            wrap.appendChild(hint);
          }
          hint.textContent = '= ' + parseExpr(raw);
        } else if(hint){
          hint.textContent = "";
        }
      }
    });

    // е®үе…Ёз¶Іпјҡијёе…ҘжЎҶеӨұз„ҰжҷӮпјҲеҲҮеҲ°еҲҘзҡ„ең°ж–№гҖҒж”¶иө·йҚөзӣӨпјүиҮӘеӢ•жҠҠжңҖеҫҢдёҖеҖӢж•ёеӯ—ж”¶йҖІеҺ»дёҰеӯҳжӘ”
    app.addEventListener('blur', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        persistCurrentInputs();
      }
      // иӨҮзӣӨз®—ејҸијёе…ҘжЎҶеӨұз„ҰжҷӮеӯҳжӘ”дёҰжӣҙж–°е·®з•°
      if(t && t.classList && t.classList.contains('ri-input')){
        var style = t.getAttribute('data-style');
        var color = t.getAttribute('data-color');
        var size = t.getAttribute('data-size');
        var val = t.value.trim(); // зӣҙжҺҘеӯҳз®—ејҸж–Үеӯ—пјҲеҰӮ "50+30"пјүпјҢе°Қз…§жҷӮз”Ё parseExpr з®—
        (async function(){
          await saveRecountValueRemote(style, color, size, val);
          if(state.view === "recount") render();
        })();
      }
      // иӘҚй ҳдәәијёе…ҘжЎҶеӨұз„ҰжҷӮеӯҳеҗҚеӯ—(еӯҳйҖІ assignee)
      if(t && t.classList && t.classList.contains('ri-claim-input')){
        var cstyle = t.getAttribute('data-style');
        var ccolor = t.getAttribute('data-color');
        var csize = t.getAttribute('data-size');
        var cname = t.value.trim();
        (async function(){
          await markRecountRemote(cstyle, ccolor, csize, cname);
          if(state.view === "recount") render();
        })();
      }
    }, true); // з”Ё captureпјҢеӣ зӮә blur дёҚжңғеҶ’жіЎ

    // жү№ж¬ЎеҢҜе…ҘпјҡйҒёдәҶжӘ”жЎҲеҫҢиҮӘеӢ•и®ҖеҸ–е…§е®№пјҢеЎ«йҖІж–Үеӯ—жЎҶ
    app.addEventListener('change', function(ev){
      var t = ev.target;
      if(t && t.id === 'bulk-import-file' && t.files && t.files[0]){
        var reader = new FileReader();
        reader.onload = function(e){
          document.getElementById('bulk-import-data').value = e.target.result;
          showToast("е·Іи®ҖеҸ–жӘ”жЎҲгҖҢ"+t.files[0].name+"гҖҚпјҢжҢүдёӢйқўзҡ„гҖҢеҢҜе…ҘйҖҷдёҖж®өгҖҚеҚіеҸҜ");
        };
        reader.onerror = function(){
          showToast("и®ҖеҸ–жӘ”жЎҲеӨұж•—пјҢи«Ӣж”№з”ЁиІјдёҠж–Үеӯ—зҡ„ж–№ејҸ");
        };
        reader.readAsText(t.files[0], 'utf-8');
      }
    });
  }

  refreshSum();
}

// йҮҚж–°иЁҲз®—дёҰйЎҜзӨәеҠ зёҪпјҡе·Іж”¶йҖІз®—ејҸзҡ„йғЁеҲҶ + е…©еҖӢж¬„дҪҚгҖҢйӮ„жІ’йҖҒеҮәгҖҚзҡ„з•¶еүҚијёе…Ҙе…§е®№
function refreshSum(){
  var sumEl = document.getElementById('sum-val');
  if(!sumEl) return;
  var shelfPending = document.getElementById('shelf-newinput');
  var stockPending = document.getElementById('stock-newinput');
  var shelfTotal = parseExpr(state.exprShelf) + (shelfPending ? parseExpr(shelfPending.value) : 0);
  var stockTotal = parseExpr(state.exprStock) + (stockPending ? parseExpr(stockPending.value) : 0);
  sumEl.textContent = shelfTotal + stockTotal;
}

function getExpr(field){ return field === 'shelf' ? state.exprShelf : state.exprStock; }
function setExpr(field, val){ if(field === 'shelf') state.exprShelf = val; else state.exprStock = val; }

// е°ұең°жӣҙж–°пјҡеҸӘжҸӣеүҚйқўзҡ„жЁҷзұӨдёІпјҢијёе…ҘжЎҶ DOM дёҚеӢ•пјҢжё…з©әе…§е®№дёҰз¶ӯжҢҒз„Ұй»һпјҲжүӢж©ҹйҚөзӣӨдёҚжңғж”¶иө·пјү
function updateChipsInPlace(field, keepFocus){
  var list = document.getElementById(field+'-chiplist');
  if(list){
    list.outerHTML = renderTokenChips(field);
  }
  var inp = document.getElementById(field+'-newinput');
  if(inp){
    inp.value = "";
    if(keepFocus){ inp.focus(); }
  }
  // й»һжЁҷзұӨзҡ„з·ЁијҜеҪҲзӘ—иӢҘй–Ӣи‘—пјҢй—ңжҺү
  var editor = document.getElementById(field+'-editor');
  if(editor) editor.innerHTML = "";
  refreshSum();
}

// жҠҠжңҖеҫҢијёе…ҘжЎҶиЈЎзҡ„ж•ёеӯ—пјҢе…Ҳж”¶йҖІз®—ејҸпјҲеҰӮжһңжңүжү“жқұиҘҝзҡ„и©ұпјү
function commitNewInput(field){
  var inp = document.getElementById(field+'-newinput');
  if(!inp) return;
  var v = inp.value.trim();
  if(v === "") return;
  var tokens = tokenizeExpr(getExpr(field));
  // еҰӮжһңзӣ®еүҚзөҗе°ҫжҳҜйҒӢз®—з¬ҰжҲ–з©әзҡ„пјҢзӣҙжҺҘжҺҘж•ёеӯ—пјӣеҗҰеүҮй җиЁӯз”Ё + йҖЈжҺҘ
  if(tokens.length === 0){
    tokens.push({t:'num', v:v});
  } else if(tokens[tokens.length-1].t === 'op'){
    tokens.push({t:'num', v:v});
  } else {
    tokens.push({t:'op', v:'+'});
    tokens.push({t:'num', v:v});
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// жҢүдәҶ + жҲ– Г— ж–°еўһпјҡе…ҲжҠҠијёе…ҘжЎҶе…§е®№ж”¶йҖІеҺ»пјҢеҶҚиЈңдёҠйҒӢз®—з¬ҰпјҢзӯүеҫ…дёӢдёҖеҖӢж•ёеӯ—
function addTokenToExpr(field, op){
  var inp = document.getElementById(field+'-newinput');
  var pending = inp ? inp.value.trim() : "";
  var tokens = tokenizeExpr(getExpr(field));
  if(pending !== ""){
    if(tokens.length > 0 && tokens[tokens.length-1].t === 'num'){
      tokens.push({t:'op', v:'+'});
    }
    if(tokens.length === 0 || tokens[tokens.length-1].t === 'op'){
      tokens.push({t:'num', v:pending});
    }
  }
  // зөҗе°ҫиӢҘе·ІжҳҜйҒӢз®—з¬Ұе°ұе…Ҳз§»йҷӨпјҢйҒҝе…ҚйҖЈзәҢе…©еҖӢйҒӢз®—з¬Ұ
  if(tokens.length > 0 && tokens[tokens.length-1].t === 'op'){
    tokens.pop();
  }
  if(tokens.length === 0) return; // йӮ„жІ’жңүд»»дҪ•ж•ёеӯ—пјҢдёҚиғҪе…Ҳж”ҫйҒӢз®—з¬Ұ
  tokens.push({t:'op', v:op});
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// й»һжҹҗеҖӢ token жү“й–Ӣз·ЁијҜеҪҲзӘ—
function openTokenEditor(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  var tk = tokens[idx];
  var editor = document.getElementById(field+'-editor');
  if(!editor) return;
  var html = '<div class="chip-editor">';
  if(tk.t === 'num'){
    html += '<div class="ce-label">дҝ®ж”№йҖҷеҖӢж•ёеӯ—</div>';
    html += '<div class="ce-row">';
    html += '<input id="'+field+'-edit-input" type="text" inputmode="decimal" value="'+escapeHtml(tk.v)+'">';
    html += '<button class="ce-btn primary" data-action="apply-token-num" data-field="'+field+'" data-idx="'+idx+'">ж”№еҘҪ</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">еҲӘйҷӨ</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">еҸ–ж¶Ҳ</button>';
    html += '</div>';
  } else {
    var other = tk.v === 'Г—' ? '+' : 'Г—';
    html += '<div class="ce-label">йҖҷеҖӢйҒӢз®—з¬ҰпјҲзӣ®еүҚжҳҜ '+escapeHtml(tk.v)+'пјү</div>';
    html += '<div class="ce-row">';
    html += '<button class="ce-btn primary" data-action="apply-token-op" data-field="'+field+'" data-idx="'+idx+'" data-op="'+other+'">ж”№жҲҗ '+other+'</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">еҲӘйҷӨпјҲйҖЈеҗҢеҫҢйқўж•ёеӯ—пјү</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">еҸ–ж¶Ҳ</button>';
    html += '</div>';
  }
  html += '</div>';
  editor.innerHTML = html;
  var inp = document.getElementById(field+'-edit-input');
  if(inp){ inp.focus(); inp.select(); }
}

function applyTokenNum(field, idx){
  var inp = document.getElementById(field+'-edit-input');
  if(!inp) return;
  var v = inp.value.trim();
  var tokens = tokenizeExpr(getExpr(field));
  if(v === ""){ deleteToken(field, idx); return; }
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'num'){
    tokens[idx].v = v;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

function applyTokenOp(field, idx, op){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'op'){
    tokens[idx].v = op;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

// еҲӘйҷӨ tokenпјҡеҲӘж•ёеӯ—жҷӮйҖЈеҗҢе®ғеүҚйқўзҡ„йҒӢз®—з¬ҰдёҖиө·жӢҝжҺүпјӣеҲӘйҒӢз®—з¬ҰжҷӮйҖЈеҗҢеҫҢйқўзҡ„ж•ёеӯ—дёҖиө·жӢҝжҺү
function deleteToken(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  if(tokens[idx].t === 'num'){
    // еҲӘж•ёеӯ—пјҡиӢҘеүҚйқўжңүйҒӢз®—з¬ҰдёҖиө·еҲӘпјҢеҗҰеүҮиӢҘеҫҢйқўжңүйҒӢз®—з¬Ұд№ҹдёҖиө·еҲӘ
    if(idx > 0 && tokens[idx-1].t === 'op'){
      tokens.splice(idx-1, 2);
    } else if(idx+1 < tokens.length && tokens[idx+1].t === 'op'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  } else {
    // еҲӘйҒӢз®—з¬ҰпјҡйҖЈеҗҢеҫҢйқўйӮЈеҖӢж•ёеӯ—дёҖиө·еҲӘ
    if(idx+1 < tokens.length && tokens[idx+1].t === 'num'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, false);
}

// жҠҠеғҸ "65+65+96" жҲ– "12Г—6+8" йҖҷзЁ®з®—ејҸжҸӣз®—жҲҗзёҪе’ҢпјҢГ— зҡ„йҒӢз®—е„Әе…Ҳж–ј +пјҲдҫӢеҰӮ 12Г—6+8 = 80пјү
function parseExpr(str){
  if(str === null || str === undefined) return 0;
  var s = String(str).trim().replace(/[xX]/g, "Г—"); // е®№иЁұз”ЁиӢұж–Үеӯ—жҜҚ x д»Јжӣҝ Г—
  if(s === "") return 0;
  var terms = s.split("+");
  var sum = 0;
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("Г—");
    var product = null;
    for(var j=0;j<factors.length;j++){
      var n = parseFloat(factors[j].trim());
      if(isNaN(n)) continue;
      product = (product === null) ? n : product * n;
    }
    if(product !== null) sum += product;
  }
  return sum;
}

async function persistCurrentInputs(){
  if(state.view !== "counting") return;
  // е…ҲжҠҠе…©еҖӢж¬„дҪҚгҖҢжңҖеҫҢијёе…ҘжЎҶгҖҚе°ҡжңӘйҖҒеҮәзҡ„ж•ёеӯ—ж”¶йҖІз®—ејҸ
  commitNewInput('shelf');
  commitNewInput('stock');
  var shelfRaw = state.exprShelf || "";
  var stockRaw = state.exprStock || "";
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key];
  // е…©ж јйғҪз©әгҖҒиҖҢдё”д№ӢеүҚд№ҹжІ’еӯҳйҒҺжқұиҘҝ вҶ’ з•ҘйҒҺпјҲйҒҝе…ҚйҖҒеҮәжҜ«з„Ўж„Ҹзҫ©зҡ„з©әзҷҪиЁҳйҢ„пјү
  // дҪҶиӢҘд№ӢеүҚжңүеӯҳйҒҺжқұиҘҝгҖҒзҸҫеңЁиў«жё…з©ә вҶ’ еҝ…й ҲйҖҒеҮәпјҢжҠҠеҫҢз«Ҝзҡ„иҲҠеҖји“ӢжҺү
  if(shelfRaw === "" && stockRaw === "" && !existing) return;
  await saveCount(st.style, col.name, size, shelfRaw, stockRaw);
}

function advanceSlot(dir){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  state.curSizeIdx += dir;

  if(state.curSizeIdx >= col.sizes.length){
    state.curColorIdx++;
    state.curSizeIdx = 0;
    if(state.curColorIdx >= st.colors.length){
      state.curStyleIdx++;
      state.curColorIdx = 0;
      if(state.curStyleIdx >= state.structure.length){
        // finished everything
        state.curStyleIdx = state.structure.length - 1;
        state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
        state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
        showToast("йҖҷеҖӢж¬ҫејҸе·Із¶“зӣӨе®ҢдәҶ рҹҺү");
        state.view = "home";
        render();
        return;
      }
    }
  } else if(state.curSizeIdx < 0){
    state.curColorIdx--;
    if(state.curColorIdx < 0){
      state.curStyleIdx--;
      if(state.curStyleIdx < 0){ state.curStyleIdx = 0; state.curColorIdx = 0; state.curSizeIdx = 0; render(); return; }
      state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
    }
    state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
  }
  render();
}

init();
})();
</script>
