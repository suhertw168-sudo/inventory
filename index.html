      // 第二行是現行 confirmedBy/confirmedAt(最新一次修正)，兩段歷史都留著，不會因為修正
      // 覆蓋掉原本回寫人是誰。
      var origAtText = r.originalConfirmedAt ? formatConfirmedAt(r.originalConfirmedAt) : "";
      html = '<div class="ri-confirmed-status ri-confirmed-status-corrected">'+
        '<div class="ri-confirmed-line">複盤回寫：'+escapeHtml(r.originalConfirmedBy || "")+(origAtText ? '（'+origAtText+'）' : '')+'</div>'+
        '<div class="ri-confirmed-line">主管修正：'+escapeHtml(r.confirmedBy || "")+(confirmedAtText ? '（'+confirmedAtText+'）' : '')+' <span class="ri-corrected-tag">⚙已修正</span></div>'+
      '</div>';
    } else {
      html = '<div class="ri-confirmed-status">已回寫（'+escapeHtml(r.confirmedBy || "")+(confirmedAtText ? '，'+confirmedAtText : '')+'）</div>';
    }
    // 主管修正：已完結格子的架上/庫存輸入框對主管開放編輯(見 canEditRecountKey，主管一律 true)，
    // 這裡比對「目前輸入框算出來的值」跟「目前彙總(state.counts)現值」，不同才代表主管真的改動過
    // 數字，補上「完成回寫」按鈕讓主管再走一次 confirmRecount(帶 isCorrection)；不用另外存一個
    // 「有沒有改過」的狀態，數字改回原值按鈕就自動消失，跟原本未確認時「兩格填完才出現按鈕」同一套精神。
    if(isManager() && editable !== false && recountVal !== null){
      var cnt = state.counts[keyFor(style, color, size)];
      var confirmedShelf = (cnt && cnt.shelf !== "" && cnt.shelf !== null && cnt.shelf !== undefined) ? Number(cnt.shelf) : null;
      var confirmedStock = (cnt && cnt.stock !== "" && cnt.stock !== null && cnt.stock !== undefined) ? Number(cnt.stock) : null;
      var curShelf = parseExpr(String(r.shelf || ""));
      var curStock = parseExpr(String(r.stock || ""));
      var changed = !(curShelf === confirmedShelf && curStock === confirmedStock);
      if(changed){
        html += '<button class="btn secondary ri-confirm-btn" data-action="confirm-recount" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'">完成回寫（更新彙總）</button>';
      }
    }
    return html;
  } else if(recountVal !== null && editable !== false){
    return '<button class="btn secondary ri-confirm-btn" data-action="confirm-recount" data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'">完成回寫（更新彙總）</button>';
  }
  return "";
}

// ---------- Events ----------
function bindEvents(){
  var app = document.getElementById("app");

  if(!app._delegated){
    app._delegated = true;
    app.addEventListener('click', async function(ev){
      var el = ev.target.closest('[data-action]');
      if(!el || !app.contains(el)) return;
      var action = el.getAttribute('data-action');

      if(action === 'goto-home'){ state.view = "home"; render(); }
      else if(action === 'back-to-brand'){
        var st2 = state.structure[state.curStyleIdx];
        var g2 = findBrandGroupForStyle(st2.style);
        if(g2 && g2.brand !== null){
          state.curBrandName = g2.brand;
          state.view = "brandModels";
        } else {
          state.view = "home";
        }
        render();
      }
      else if(action === 'manual-sync'){
        var statusEl = document.getElementById('sync-status');
        if(statusEl) statusEl.textContent = "🔄 同步中...";
        // 按下瞬間先給視覺回饋：文字換成「更新中…」+ 轉圈 spinner + disabled 防連點。成功的話下面會整頁
        // render()，按鈕本身會被換成全新節點，這裡的還原動作作用在已經丟棄的舊節點上、沒有副作用；
        // 失敗的話 finally 負責把文字/狀態還原，不會卡死在「更新中…」。
        var syncBtnText = el.textContent;
        el.disabled = true;
        el.innerHTML = '<span class="btn-spinner"></span>更新中…';
        try{
          await syncFromBackend();
          // 首頁不能只靠 syncFromBackend() 內部的 hasChange 判斷要不要重畫——使用者主動點更新，
          // 就該保證看到當下最新狀態，不能因為判斷「沒變化」就沒重畫，導致新指派的複盤任務
          // 徽章沒有立刻出現(要退回首頁重進才看得到)。
          render();
          showToast("已更新");
        } finally {
          el.disabled = false;
          el.textContent = syncBtnText;
        }
      }

      else if(action === 'refresh-summary'){
        await syncFromBackend();
        render_keepExpanded(); // 記住目前展開的品牌跟型號，刷新後重新展開（不破壞使用者的操作狀態）
        showToast("明細已更新");
      }

      else if(action === 'goto-setup'){
        var pwd = prompt('請輸入管理員密碼：');
        if(pwd === null) return; // 使用者按取消
        if(pwd !== ADMIN_PASSWORD){
          showToast("密碼錯誤");
          return;
        }
        state.view = "setup";
        render();
      }
      else if(action === 'goto-summary'){ state.view = "summary"; render(); }

      else if(action === 'goto-recount'){
        state.view = "recount"; state.recountFilter = ""; state.recountBrandFilter = ""; state.recountStyleFilter = "";
        ensureRecountUserName();
        render();
      }

      else if(action === 'change-recount-username'){
        if(state.people && state.people.length > 0){
          // 名單非空：走選單重選，選完（或按「返回」取消）都會回到目前這個畫面
          state.pickIdentityReturn = state.view;
          state.view = "pickIdentity";
          render();
        } else {
          // 名單是空的，維持原本的手動輸入
          var currentName = getRecountUserName();
          var newName = prompt('請輸入你的名字（用來標記「這格是誰盤的」，之後這台手機的初盤／複盤操作都會自動帶上這個名字）：', currentName || '');
          if(newName === null) return; // 取消
          setRecountUserName(newName);
          showToast(newName.trim() ? '已設定盤點身分為「'+newName.trim()+'」' : '已清空盤點身分');
          render();
        }
      }

      else if(action === 'recount-assign'){
        if(!isManager()) return; // 按鈕本來就只有主管看得到，這裡多擋一次防呆
        // 每次重新進頁面都重設勾選跟展開狀態，避免帶著上次沒送出的殘留選擇；固定從 Step 1（選人）開始
        state.assignChecked = {};
        state.assignExpandedBrands = {};
        state.assignExpandedStyles = {};
        state.assignStep = "target";
        state.view = "assign";
        render();
      }

      else if(action === 'assign-pick-target'){
        // 換人就清空勾選，避免搞混「這幾格是勾給誰的」
        state.assignSelectedName = el.getAttribute('data-name');
        state.assignChecked = {};
        state.assignStep = "checklist";
        render();
      }

      else if(action === 'assign-change-target'){
        state.assignStep = "target";
        render();
      }

      else if(action === 'assign-toggle-brand'){
        var toggleBrand = el.getAttribute('data-brand');
        state.assignExpandedBrands[toggleBrand] = !state.assignExpandedBrands[toggleBrand];
        render();
      }

      else if(action === 'assign-toggle-style'){
        var toggleStyle = el.getAttribute('data-style');
        state.assignExpandedStyles[toggleStyle] = !state.assignExpandedStyles[toggleStyle];
        render();
      }

      else if(action === 'assign-toggle-check'){
        var toggleKey = el.getAttribute('data-key');
        state.assignChecked[toggleKey] = !state.assignChecked[toggleKey];
        render();
      }

      else if(action === 'assign-reassign-confirm'){
        var aKey = el.getAttribute('data-key');
        var assignedTo = el.getAttribute('data-assigned');
        var aParts = aKey.split("|");
        var target = state.assignSelectedName;
        if(target){
          if(confirm('此格已派給「'+assignedTo+'」，要改派給「'+target+'」嗎？')){
            await assignRecountRemote(aParts[0], aParts[1], aParts[2], target);
            showToast('已改派給「'+target+'」');
            render();
            return;
          }
        }
        if(confirm('要取消「'+assignedTo+'」在這一格的指派嗎？')){
          await unassignRecountRemote(aParts[0], aParts[1], aParts[2]);
          showToast('已取消指派');
          render();
        }
      }

      else if(action === 'assign-submit'){
        if(!state.assignSelectedName){ showToast('請先選擇要指派的人'); return; }
        // 第二輪、已確認、已定案的格子都不走指派，過濾掉萬一殘留在勾選狀態裡的這幾種 key
        // （正常情況下 buildAssignRow 不會讓這幾種格子顯示可勾選列，這裡只是防呆）
        var keysToAssign = Object.keys(state.assignChecked).filter(function(k){
          if(!state.assignChecked[k]) return false;
          var kr = state.recounts[k];
          return !isSecondRoundRecount(kr) && !(kr && kr.confirmed);
        });
        if(keysToAssign.length === 0){ showToast('請勾選要指派的格子'); return; }

        el.disabled = true;
        el.textContent = '指派中…';
        await Promise.all(keysToAssign.map(function(k){
          var kParts = k.split("|");
          return assignRecountRemote(kParts[0], kParts[1], kParts[2], state.assignSelectedName);
        }));
        showToast('已指派 '+keysToAssign.length+' 格給「'+state.assignSelectedName+'」');
        state.assignChecked = {};
        render();
      }

      else if(action === 'pick-identity-select'){
        var pickedName = el.getAttribute('data-name');
        setRecountUserName(pickedName);
        state.view = state.pickIdentityReturn || "home";
        state.pickIdentityReturn = null;
        showToast('已設定盤點身分為「'+pickedName+'」');
        render();
      }

      else if(action === 'pick-identity-cancel'){
        // 取消不變更身分，回到原本要去的畫面（跟舊版 prompt 按取消的行為一致：不擋住繼續使用）
        state.view = state.pickIdentityReturn || "home";
        state.pickIdentityReturn = null;
        render();
      }

      else if(action === 'toggle-claim'){
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var claimStyleName = el.getAttribute('data-style');
        if(state.claims[claimStyleName]){
          unclaimStyleRemote(claimStyleName);
          showToast('已取消認領「'+claimStyleName+'」');
        } else {
          claimStyleRemote(claimStyleName);
          showToast('已認領「'+claimStyleName+'」');
        }
        // 用 render_keepExpanded：認領按鈕現在放在彙總明細頁的品牌/型號摺疊區塊裡，
        // 點認領不該把使用者原本展開看的明細收合掉
        render_keepExpanded();
      }

      else if(action === 'verify-style'){
        // key in 核對 ERP 資料無差異，點下去直接算核對完成，不用二次確認(跟認領/標記複盤等其他
        // 正向動作一致)；要取消才需要確認，見 unverify-style-confirm
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var verifyStyleName = el.getAttribute('data-style');
        verifyStyleRemote(verifyStyleName);
        showToast('已核對「'+verifyStyleName+'」');
        render_keepExpanded();
      }

      else if(action === 'unverify-style-confirm'){
        // 「✓ 已核對」誤點時的回頭路：需要二次確認才會真的取消，避免手滑點掉核對紀錄
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var unverifyStyleName = el.getAttribute('data-style');
        if(!confirm('確定要取消「'+unverifyStyleName+'」的核對完成狀態嗎？\n\n取消後這個型號會變回「待核對」，需要重新核對一次。')){
          return;
        }
        unverifyStyleRemote(unverifyStyleName);
        showToast('已取消「'+unverifyStyleName+'」的核對狀態');
        render_keepExpanded();
      }

      else if(action === 'mark-recount'){
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        // 不問指派,直接加入清單(認領制:之後有空的人自己填名字)
        // 不 await：markRecountRemote 內部本地狀態已經樂觀更新過了，畫面立刻反映，網路請求在背景送出
        markRecountRemote(style, color, size, "");
        showToast('已加入複盤清單');
        render_keepExpanded(); // 停留原畫面，不收合目前展開的品牌／型號
        // 標記完不自動彈備註視窗，只顯示「✎備註」按鈕，需要登打線索時再手動點開（見 open-recount-note-modal）
      }

      else if(action === 'unmark-recount'){
        // 彙總明細的「已標記」按鈕：要不要複盤是 key in 人員依 ERP 比對在這裡決定的，
        // 所以取消也在這裡做（點擊即取消），需要二次確認避免手滑誤按（見 buildUnmarkRecountConfirmMessage）
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var style = el.getAttribute('data-style');
        var color = el.getAttribute('data-color');
        var size = el.getAttribute('data-size');
        if(!confirm(buildUnmarkRecountConfirmMessage(style, color, size))){
          return;
        }
        unmarkRecountRemote(style, color, size);
        showToast('已取消複盤標記');
        render_keepExpanded();
      }

      else if(action === 'open-recount-note-modal'){
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        // 只是打開一個獨立於 #app 之外的 fixed 彈窗，不觸發任何重畫，
        // 表格的橫向捲動位置、展開狀態都完全不受影響（見 openRecountNoteModal）
        openRecountNoteModal(el.getAttribute('data-style'), el.getAttribute('data-color'), el.getAttribute('data-size'));
      }

      else if(action === 'remark-recount-next-round'){
        // 彙總明細的「已複盤」按鈕：不是取消，是開啟第二輪——上一輪的確認紀錄會保留。
        // 真的要整筆刪掉已確認紀錄的例外情況，目前沒有入口（複盤清單頁的「取消複盤」已移除，
        // 取消標記的權責統一收回彙總明細的「已標記→取消」）。
        // 防呆：這顆按鈕理論上只有 key in 身分(或主管)看得到，這裡再擋一次避免繞過畫面觸發
        if(!canOperateSummary()) return;
        var rmStyle = el.getAttribute('data-style');
        var rmColor = el.getAttribute('data-color');
        var rmSize = el.getAttribute('data-size');
        if(!confirm('此格已複盤。若 ERP 重登後數字仍不符，將開啟第二輪複盤並自動交由品項負責人處理，確認？')){
          return;
        }
        await remarkRecountForNextRoundRemote(rmStyle, rmColor, rmSize);
        showToast('已開始新一輪複盤');
        render_keepExpanded();
      }

      else if(action === 'confirm-recount'){
        var cfStyle = el.getAttribute('data-style');
        var cfColor = el.getAttribute('data-color');
        var cfSize = el.getAttribute('data-size');
        var cfKey = keyFor(cfStyle, cfColor, cfSize);
        var cfR = state.recounts[cfKey];
        if(!cfR) return;
        // 防呆：這格如果已經被鎖住(第二輪的非負責人)，按鈕理論上不會出現，這裡再擋一次避免繞過畫面
        if(!canEditRecountKey(cfKey, cfR)){
          showToast('這一格已鎖定，只有品牌負責人或主管能操作');
          return;
        }
        var cfShelfVal = parseExpr(String(cfR.shelf || ""));
        var cfStockVal = parseExpr(String(cfR.stock || ""));
        var cfC = state.counts[cfKey];
        var cfFirstShelfText = (cfC && cfC.shelf !== "" && cfC.shelf !== null && cfC.shelf !== undefined) ? cfC.shelf : "—";
        var cfFirstStockText = (cfC && cfC.stock !== "" && cfC.stock !== null && cfC.stock !== undefined) ? cfC.stock : "—";
        // 這格已經回寫過(r.confirmed)還按得到這顆鈕，代表是主管的修正流程(見 buildRecountConfirmSectionHtml
        // 的「數字改動才出現按鈕」判斷)，走同一個 confirm-recount 入口，只是確認文案跟帶給後端的
        // isCorrection 旗標不同，不另造新的回寫路徑。
        var cfIsCorrection = !!cfR.confirmed;
        var cfConfirmMsg = cfIsCorrection
          ? '將以修正數字重新回寫彙總（架上'+cfShelfVal+'／庫存'+cfStockVal+'，原回寫：架上'+cfFirstShelfText+'／庫存'+cfFirstStockText+'）。\n\n請確認數字無誤。\n\n確定要修正回寫嗎？'
          : '將以複盤數字（架上'+cfShelfVal+'／庫存'+cfStockVal+'）更新彙總，原初盤（架上'+cfFirstShelfText+'／庫存'+cfFirstStockText+'）將被取代。\n\n回寫後此項目將從您的清單移除，請確認數字無誤。\n\n確定要確認嗎？';
        if(!confirm(cfConfirmMsg)){
          return;
        }
        try{
          await confirmRecountRemote(cfStyle, cfColor, cfSize, cfIsCorrection);
          showToast(cfIsCorrection ? '已修正回寫並更新彙總' : '已確認並更新彙總');
        }catch(e){
          // confirmRecountRemote 內部已經還原樂觀更新並顯示錯誤 toast，這裡不用重複處理
        }
        render_keepExpanded();
      }

      else if(action === 'open-recount-progress-modal'){
        openRecountProgressModal(el.getAttribute('data-style'));
      }

      else if(action === 'recount-filter'){
        state.recountFilter = el.getAttribute('data-assignee');
        render();
      }

      else if(action === 'recount-brand-filter'){
        state.recountBrandFilter = el.getAttribute('data-brand');
        state.recountStyleFilter = ""; // 品牌篩選一變動，第二層的型號篩選就跟著重置回「全部」
        render();
      }

      else if(action === 'recount-style-filter'){
        state.recountStyleFilter = el.getAttribute('data-style');
        render();
      }

      else if(action === 'toggle-show-finalized'){
        // 純前端 UI 狀態，不用同步後端，重整頁面就會回到預設關閉
        state.showFinalizedRecounts = !state.showFinalizedRecounts;
        render();
      }

      else if(action === 'manual-sync-recount'){
        // 按下瞬間先給視覺回饋，理由同首頁「立即更新」：文字換成「更新中…」+ 轉圈 spinner + disabled
        // 防連點，成功會整頁 render() 把按鈕換成全新節點(這裡的還原對已丟棄的舊節點無副作用)，
        // 失敗則靠 finally 把按鈕還原，不會卡住。
        var syncBtnText = el.textContent;
        el.disabled = true;
        el.innerHTML = '<span class="btn-spinner"></span>更新中…';
        try{
          await syncFromBackend();
          render();
          showToast('已更新');
        } finally {
          el.disabled = false;
          el.textContent = syncBtnText;
        }
      }
      else if(action === 'refresh-recount-list'){
        // 使用者主動點了「清單有變動」提示才重畫：資料在背景同步當下就已經寫進 state.recounts，
        // 這裡完全不重新打後端，只是把清單重新畫出來，重畫時 renderRecount() 會自動重設變動基準點，
        // 橫幅（連同這個 DOM 節點本身）跟著被換掉、自然消失，不用手動還原文字/狀態。
        // render() 是同步的字串組裝＋innerHTML 賦值，資料量大時可能有感延遲；直接接著呼叫的話瀏覽器
        // 來不及先畫出「更新中…」就被這段同步工作卡住，使用者會看不到任何回饋、以為沒點到而重複點——
        // 這裡先鎖住這個節點防止重複觸發，再用兩層 requestAnimationFrame 讓瀏覽器有機會先畫出載入狀態，
        // 才進真正耗時的重畫；同時量測這段耗時，印到 console 方便回報實際數字、判斷要不要優化。
        if(el.dataset.refreshing === '1') return;
        el.dataset.refreshing = '1';
        el.style.cursor = 'default';
        el.innerHTML = '<span class="btn-spinner"></span>更新中…';
        await new Promise(function(resolve){
          requestAnimationFrame(function(){ requestAnimationFrame(resolve); });
        });
        var refreshT0 = (window.performance && performance.now) ? performance.now() : Date.now();
        render();
        var refreshElapsed = ((window.performance && performance.now) ? performance.now() : Date.now()) - refreshT0;
        console.log('[perf] 複盤清單重畫耗時 ' + refreshElapsed.toFixed(1) + ' ms（' + visibleRecountKeys().length + ' 筆可見複盤項目）');
      }

      else if(action === 'clear-recounts'){
        if(!confirm('⚠️ 確定要清空所有複盤任務嗎？\n\n這會移除所有複盤標記跟已填的複盤數字（不影響第一次盤點的資料）。此動作無法復原。')){
          return;
        }
        await clearRecountsRemote();
        showToast('已清空複盤任務');
        render();
      }

      else if(action === 'open-brand'){
        state.curBrandName = el.getAttribute('data-brand-name');
        state.view = "brandModels";
        render();
      }

      else if(action === 'open-style'){
        state.curStyleIdx = Number(el.getAttribute('data-style-idx'));
        state.curColorIdx = 0;
        state.curSizeIdx = 0;
        state.view = "counting";
        ensureRecountUserName();
        render();
      }

      else if(action === 'jump-color'){
        // 樂觀更新：畫面立刻換格，存檔在背景進行；但算式格式錯誤時擋下換格，留在原地讓使用者修正
        if(persistCurrentInputs()){
          state.curColorIdx = Number(el.getAttribute('data-color-idx'));
          state.curSizeIdx = 0;
          render();

      }

      else if(action === 'apply-token-num'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        applyTokenNum(field, idx);
      }

      else if(action === 'apply-token-op'){

        var idx = Number(el.getAttribute('data-idx'));
        var op = el.getAttribute('data-op');
        applyTokenOp(field, idx, op);

        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));

      else if(action === 'bulk-import'){

        // 合併：同名款式覆蓋更新，其他款式不受影響
        var merged = state.structure.slice();
        var nameToIdx = {};
        merged.forEach(function(item, idx){ nameToIdx[item.style] = idx; });
        var addedNames = [];
        parsed.forEach(function(item){
          if(nameToIdx.hasOwnProperty(item.style)){
            merged[nameToIdx[item.style]] = item;

            nameToIdx[item.style] = merged.length;
            merged.push(item);
          }
          addedNames.push(item.style);

      else if(action === 'move-brand-up' || action === 'move-brand-down'){
        var brand = el.getAttribute('data-brand');
        // 取得目前實際使用中的品牌順序
        var activeBrands = [];
        computeBrandGroups().forEach(function(g){
          if(g.brand !== null && activeBrands.indexOf(g.brand) === -1) activeBrands.push(g.brand);
        });
        var pos = activeBrands.indexOf(brand);
        if(pos === -1) return;
        var swapWith = action === 'move-brand-up' ? pos - 1 : pos + 1;
        if(swapWith < 0 || swapWith >= activeBrands.length) return;
        // 交換
        var tmp = activeBrands[pos];
        activeBrands[pos] = activeBrands[swapWith];
        activeBrands[swapWith] = tmp;
        BRAND_ORDER = activeBrands;
        render(); // 先即時更新畫面
        try{
          await apiPost({ action:"saveBrandOrder", order: BRAND_ORDER });
        }catch(e){
          console.error("save brand order failed", e);
          showToast("順序已更新，但儲存到雲端失敗，請檢查網路");

      else if(action === 'set-style-brand'){

        var brandName = document.getElementById('set-brand-name').value.trim();
        if(!styleName){ showToast("請選擇要設定的款式"); return; }
        var item = state.structure.find(function(s){ return s.style === styleName; });
        if(!item){ showToast("找不到該款式"); return; }
        item.brand = brandName;
        el.disabled = true;
        el.textContent = "儲存中…";
        var ok = false;
        try{

        }catch(e){
          console.error("set-style-brand failed", e);

        el.textContent = "套用品牌設定";
        if(ok){
          state.structure = sortStructureByStyle(state.structure);
          showToast(brandName ? ('已將「'+styleName+'」設為品牌「'+brandName+'」') : ('「'+styleName+'」已設為獨立顯示'));
          render();
        } else {
          // 儲存失敗，回復原本的設定

      else if(action === 'rename-style'){
        var oldName = document.getElementById('rename-old').value.trim();
        var newName = document.getElementById('rename-new').value.trim();
        if(!oldName || !newName){ showToast("請填入目前名稱跟新名稱"); return; }
        if(!confirm('確定要把「'+oldName+'」改名成「'+newName+'」嗎？已填過的盤點數字會一起搬過去。')){

          if(result && result.ok){
            var item = state.structure.find(function(s){ return s.style === oldName; });
            if(item) item.style = newName;
            state.structure = sortStructureByStyle(state.structure);
            var newCounts = {};
            Object.keys(state.counts).forEach(function(k){
              if(k.indexOf(oldName+"|") === 0){
                newCounts[newName+"|"+k.slice(oldName.length+1)] = state.counts[k];
              } else {
                newCounts[k] = state.counts[k];
              }
            });
            state.counts = newCounts;
            showToast("已改名，結構 "+result.structChanged+" 筆、盤點記錄 "+result.rawChanged+" 筆");

          } else {

          console.error("rename style failed", e);
          showToast("改名失敗：" + (e && e.message ? e.message : "未知錯誤"));

    // 標籤編輯器：用事件委派處理「最後新增輸入框」的 Enter 鍵（動態新增也有效）
    app.addEventListener('keydown', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput') && ev.key === 'Enter'){
        var field = t.id === 'shelf-newinput' ? 'shelf' : (t.id === 'stock-newinput' ? 'stock' : null);
        if(field){ ev.preventDefault(); commitNewInput(field); }
      }
    });

    // 每打一個字就即時更新加總，連「還沒按+、還沒換格」的最後一個數字也算進去
    app.addEventListener('input', function(ev){
      var t = ev.target;
      // 選擇身分頁的搜尋框：打字即時過濾，只換清單區塊的 HTML，不整頁重畫，輸入框才不會失焦
      if(t && t.id === 'identity-search'){
        var listEl = document.getElementById('identity-list');
        if(listEl) listEl.innerHTML = renderIdentityListItems(t.value);
        return;
      }
      // 複盤分配頁「指派給誰」的搜尋框：同一套即時過濾寫法
      if(t && t.id === 'assign-target-search'){
        var targetListEl = document.getElementById('assign-target-list');
        if(targetListEl) targetListEl.innerHTML = renderAssignTargetListItems(t.value);
        return;
      }
      if(t && t.classList && t.classList.contains('expr-newinput')){
        refreshSum();
      }
      // 複盤算式輸入時，即時在輸入框下方顯示算出的合計；格式看不懂就顯示紅字提示，不要顯示誤導的數字
      if(t && t.classList && t.classList.contains('ri-input')){
        var raw = t.value.trim();
        var wrap = t.parentNode; // .ri-num
        var hint = wrap.querySelector('.ri-calc-hint');
        var err = raw !== "" ? validateExpr(raw) : null;
        var isExpr = raw !== "" && /[+×xX*＊＋]/.test(raw);
        if(err){
          if(!hint){
            hint = document.createElement('div');
            hint.className = 'ri-calc-hint';
            wrap.appendChild(hint);
          }
          hint.textContent = '⚠ 格式看不懂';
          hint.classList.add('ri-calc-hint-error');
        } else if(isExpr){
          if(!hint){
            hint = document.createElement('div');
            hint.className = 'ri-calc-hint';
            wrap.appendChild(hint);
          }
          hint.textContent = '= ' + parseExpr(raw);
          hint.classList.remove('ri-calc-hint-error');
        } else if(hint){
          hint.textContent = "";
          hint.classList.remove('ri-calc-hint-error');
        }
      }
    });

    // 複盤架上/庫存輸入框一聚焦，就送出「開始複盤這一格」的提醒(背景送出，不等回應、不重畫)，
    // 讓別人的手機看到「OO 複盤中」。用 capture 是因為 focus 不會冒泡。
    app.addEventListener('focus', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('ri-input')){
        startEditingRecountRemote(t.getAttribute('data-style'), t.getAttribute('data-color'), t.getAttribute('data-size'));
      }
    }, true);

    // 安全網：輸入框失焦時（切到別的地方、收起鍵盤）自動把最後一個數字收進去並存檔
    app.addEventListener('blur', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        persistCurrentInputs();
      }
      // 複盤算式輸入框（架上／庫存）失焦時存檔並更新差異；格式錯誤就擋下不存，明確提示
      if(t && t.classList && t.classList.contains('ri-input')){
        var style = t.getAttribute('data-style');
        var color = t.getAttribute('data-color');
        var size = t.getAttribute('data-size');
        var field = t.getAttribute('data-field'); // "shelf" 或 "stock"
        var val = t.value.trim(); // 直接存算式文字（如 "50+30"），對照時用 parseExpr 算
        var recountKey = keyFor(style, color, size);
        // 防呆：這格如果已經被鎖住(第二輪的非負責人)，就算輸入框在 disabled 生效前已經打了字，
        // 失焦也不存檔，避免繞過畫面上的鎖
        if(!canEditRecountKey(recountKey, state.recounts[recountKey])){
          return;
        }
        var errKey = recountKey + "::" + field;
        var err = validateExpr(val);
        if(err){
          showValidationError(errKey, style, color, size, "複盤欄位（"+(field==='shelf'?'架上':'庫存')+"）："+err);
        } else {
          clearValidationError(errKey);
          // 樂觀更新＋就地更新畫面：跟初盤 updateChipsInPlace() 同一套精神，不整頁重畫，
          // 輸入框 DOM 完全不動，手機鍵盤在輸入框之間切換時不會被重畫打斷而收起。
          var wasDone = isRecountFilled(state.recounts[recountKey]);
          // saveRecountValueRemote 內部會同步先把 state.recounts 更新好，才去背景送出 apiPost，
          // 這裡不 await 它，本地差異比對可以立刻算出來顯示，不用等後端存檔的網路來回
          // （存檔照樣在背景進行，失敗會另外 toast 提示）。
          saveRecountValueRemote(style, color, size, field, val);
          var isDoneNow = isRecountFilled(state.recounts[recountKey]);
          patchRecountItemDisplay(t.closest('.recount-item'), recountKey, wasDone, isDoneNow);
        }
      }
      // 複盤備註輸入框失焦時存檔；純文字，選填，不做算式驗證，也不影響差異比對或完成進度，
      // 畫面上沒有其他地方需要跟著變，所以直接背景存檔、不重畫（輸入框 DOM 不動，鍵盤不收起）。
      if(t && t.classList && t.classList.contains('ri-note-input')){
        var nstyle = t.getAttribute('data-style');
        var ncolor = t.getAttribute('data-color');
        var nsize = t.getAttribute('data-size');
        var nval = t.value.trim();
        saveRecountNoteRemote(nstyle, ncolor, nsize, nval);
      }
    }, true); // 用 capture，因為 blur 不會冒泡

    // 批次匯入：選了檔案後自動讀取內容，填進文字框
    app.addEventListener('change', function(ev){
      var t = ev.target;
      if(t && t.id === 'bulk-import-file' && t.files && t.files[0]){
        var reader = new FileReader();
        reader.onload = function(e){
          document.getElementById('bulk-import-data').value = e.target.result;
          showToast("已讀取檔案「"+t.files[0].name+"」，按下面的「匯入這一段」即可");
        };
        reader.onerror = function(){
          showToast("讀取檔案失敗，請改用貼上文字的方式");
        };
        reader.readAsText(t.files[0], 'utf-8');
      }
    });

    // 電腦版：讓所有 .chip-strip 可以用滑鼠按住左右拖曳來捲動(手機本來就能滑)
    var dragState = null;
    app.addEventListener('mousedown', function(ev){
      // 點 +/× 按鈕時，先擋掉焦點轉移：讓輸入框不失焦、不觸發失焦存檔，
      // 版面才不會在滑鼠放開前移動（否則按鈕位移會吃掉這次點擊，變成要點兩次）
      var addBtn = ev.target.closest ? ev.target.closest('[data-action="add-token"]') : null;
      if(addBtn){ ev.preventDefault(); return; }

      var strip = ev.target.closest ? ev.target.closest('.chip-strip') : null;
      if(!strip) return;
      dragState = {
        strip: strip,
        startX: ev.pageX,
        startScroll: strip.scrollLeft,
        moved: false
      };
      strip.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', function(ev){
      if(!dragState) return;
      var dx = ev.pageX - dragState.startX;
      if(Math.abs(dx) > 4) dragState.moved = true; // 超過 4px 才算拖曳
      dragState.strip.scrollLeft = dragState.startScroll - dx;
      if(dragState.moved) ev.preventDefault();
    });
    document.addEventListener('mouseup', function(ev){
      if(!dragState) return;
      dragState.strip.style.cursor = '';
      // 若剛剛有拖曳,攔截接下來的 click(避免拖完手放開誤觸選到某個顏色)
      if(dragState.moved){
        var swallow = function(e){ e.stopPropagation(); e.preventDefault(); document.removeEventListener('click', swallow, true); };
        document.addEventListener('click', swallow, true);
        setTimeout(function(){ document.removeEventListener('click', swallow, true); }, 50);
      }
      dragState = null;
    });
  }

  refreshSum();
}

// 重新計算並顯示加總：已收進算式的部分 + 兩個欄位「還沒送出」的當前輸入內容
function refreshSum(){
  var sumEl = document.getElementById('sum-val');
  if(!sumEl) return;
  var shelfPending = document.getElementById('shelf-newinput');
  var stockPending = document.getElementById('stock-newinput');
  var shelfTotal = parseExpr(state.exprShelf) + (shelfPending ? parseExpr(shelfPending.value) : 0);
  var stockTotal = parseExpr(state.exprStock) + (stockPending ? parseExpr(stockPending.value) : 0);
  sumEl.textContent = shelfTotal + stockTotal;
}

function getExpr(field){ return field === 'shelf' ? state.exprShelf : state.exprStock; }
function setExpr(field, val){ if(field === 'shelf') state.exprShelf = val; else state.exprStock = val; }

// 就地更新：只換前面的標籤串，輸入框 DOM 不動，清空內容並維持焦點（手機鍵盤不會收起）
function updateChipsInPlace(field, keepFocus){
  var list = document.getElementById(field+'-chiplist');
  if(list){
    list.outerHTML = renderTokenChips(field);
  }
  var inp = document.getElementById(field+'-newinput');
  if(inp){
    inp.value = "";
    if(keepFocus){ inp.focus(); }
  }
  // 點標籤的編輯彈窗若開著，關掉
  var editor = document.getElementById(field+'-editor');
  if(editor) editor.innerHTML = "";
  refreshSum();
}

// 把最後輸入框裡的數字，先收進算式（如果有打東西的話）
function commitNewInput(field, keepFocus){
  if(keepFocus === undefined) keepFocus = true; // 預設保持焦點(Enter鍵、按+號的情境)
  var inp = document.getElementById(field+'-newinput');
  if(!inp) return;
  var v = inp.value.trim();
  if(v === "") return;
  var tokens = tokenizeExpr(getExpr(field));
  // 如果目前結尾是運算符或空的，直接接數字；否則預設用 + 連接
  if(tokens.length === 0){
    tokens.push({t:'num', v:v});
  } else if(tokens[tokens.length-1].t === 'op'){
    tokens.push({t:'num', v:v});
  } else {
    tokens.push({t:'op', v:'+'});
    tokens.push({t:'num', v:v});
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, keepFocus);
}

// 按了 + 或 × 新增：先把輸入框內容收進去，再補上運算符，等待下一個數字
function addTokenToExpr(field, op){
  var inp = document.getElementById(field+'-newinput');
  var pending = inp ? inp.value.trim() : "";
  var tokens = tokenizeExpr(getExpr(field));
  if(pending !== ""){
    if(tokens.length > 0 && tokens[tokens.length-1].t === 'num'){
      tokens.push({t:'op', v:'+'});
    }
    if(tokens.length === 0 || tokens[tokens.length-1].t === 'op'){
      tokens.push({t:'num', v:pending});
    }
  }
  // 結尾若已是運算符就先移除，避免連續兩個運算符
  if(tokens.length > 0 && tokens[tokens.length-1].t === 'op'){
    tokens.pop();
  }
  if(tokens.length === 0) return; // 還沒有任何數字，不能先放運算符
  tokens.push({t:'op', v:op});
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// 點某個 token 打開編輯彈窗
function openTokenEditor(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  var tk = tokens[idx];
  var editor = document.getElementById(field+'-editor');
  if(!editor) return;
  var html = '<div class="chip-editor">';
  if(tk.t === 'num'){
    html += '<div class="ce-label">修改這個數字</div>';
    html += '<div class="ce-row">';
    html += '<input id="'+field+'-edit-input" type="text" inputmode="decimal" value="'+escapeHtml(tk.v)+'">';
    html += '<button class="ce-btn primary" data-action="apply-token-num" data-field="'+field+'" data-idx="'+idx+'">改好</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  } else {
    var other = tk.v === '×' ? '+' : '×';
    html += '<div class="ce-label">這個運算符（目前是 '+escapeHtml(tk.v)+'）</div>';
    html += '<div class="ce-row">';
    html += '<button class="ce-btn primary" data-action="apply-token-op" data-field="'+field+'" data-idx="'+idx+'" data-op="'+other+'">改成 '+other+'</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除（連同後面數字）</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  }
  html += '</div>';
  editor.innerHTML = html;
  var inp = document.getElementById(field+'-edit-input');
  if(inp){ inp.focus(); inp.select(); }
}

function applyTokenNum(field, idx){
  var inp = document.getElementById(field+'-edit-input');
  if(!inp) return;
  var v = inp.value.trim();
  var tokens = tokenizeExpr(getExpr(field));
  if(v === ""){ deleteToken(field, idx); return; }
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'num'){
    tokens[idx].v = v;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

function applyTokenOp(field, idx, op){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'op'){
    tokens[idx].v = op;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

// 刪除 token：刪數字時連同它前面的運算符一起拿掉；刪運算符時連同後面的數字一起拿掉
function deleteToken(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  if(tokens[idx].t === 'num'){
    // 刪數字：若前面有運算符一起刪，否則若後面有運算符也一起刪
    if(idx > 0 && tokens[idx-1].t === 'op'){
      tokens.splice(idx-1, 2);
    } else if(idx+1 < tokens.length && tokens[idx+1].t === 'op'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  } else {
    // 刪運算符：連同後面那個數字一起刪
    if(idx+1 < tokens.length && tokens[idx+1].t === 'num'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, false);
}

// 把像 "65+65+96" 或 "12×6+8" 這種算式換算成總和，× 的運算優先於 +（例如 12×6+8 = 80）
// 乘號同時接受 × * x X ＊，加號同時接受 + ＋（跟 tokenizeExpr 共用同一套正規化）。
// 這個函式對無法解析的片段採寬鬆處理（跳過不計），純粹用來計算數字或即時預覽；
// 真正要擋下格式錯誤、不讓它默默存成 0，請在存檔前先呼叫 validateExpr() 檢查。
function parseExpr(str){
  if(str === null || str === undefined) return 0;
  var s = normalizeExprSymbols(str).replace(/\s+/g, "");
  if(s === "") return 0;
  var terms = s.split("+");
  var sum = 0;
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("×");
    var product = null;
    for(var j=0;j<factors.length;j++){
      var n = parseFloat(factors[j]);
      if(isNaN(n)) continue;
      product = (product === null) ? n : product * n;
    }
    if(product !== null) sum += product;
  }
  return sum;
}

// 樂觀更新：把目前這格的輸入收進畫面並立刻更新，背景存檔不會擋住呼叫端的後續操作（例如換格）
// 樂觀更新：把目前這格的輸入收進畫面並立刻更新，背景存檔不會擋住呼叫端的後續操作（例如換格）
// 回傳 true = 可以放心換格／離開；回傳 false = 算式格式有誤，已擋下存檔，呼叫端不該繼續換格
function persistCurrentInputs(){
  if(state.view !== "counting") return true;
  // 先把兩個欄位「最後輸入框」尚未送出的數字收進算式
  // 傳 false = 不搶回焦點（這裡多半是使用者點了別的欄位觸發的，搶焦點會害他要點兩次）
  commitNewInput('shelf', false);
  commitNewInput('stock', false);
  var shelfRaw = state.exprShelf || "";
  var stockRaw = state.exprStock || "";
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);

  // 存檔前先驗證算式格式，看不懂的算式不能默默存成 0，要擋下來並明確提示
  var shelfErr = validateExpr(shelfRaw);
  var stockErr = validateExpr(stockRaw);
  if(shelfErr || stockErr){
    var msgParts = [];
    if(shelfErr) msgParts.push("架上："+shelfErr);
    if(stockErr) msgParts.push("庫存："+stockErr);
    showValidationError(key, st.style, col.name, size, msgParts.join("；"));
    return false;
  }
  clearValidationError(key);

  var existing = state.counts[key];
  // 兩格都空、而且之前也沒存過東西 → 略過（避免送出毫無意義的空白記錄）
  // 但若之前有存過東西、現在被清空 → 必須送出，把後端的舊值蓋掉
  if(shelfRaw === "" && stockRaw === "" && !existing) return true;
  saveCountOptimistic(st.style, col.name, size, shelfRaw, stockRaw);
  return true;
}

function advanceSlot(dir){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  state.curSizeIdx += dir;

  if(state.curSizeIdx >= col.sizes.length){
    state.curColorIdx++;
    state.curSizeIdx = 0;
    if(state.curColorIdx >= st.colors.length){
      state.curStyleIdx++;
      state.curColorIdx = 0;
      if(state.curStyleIdx >= state.structure.length){
        // finished everything
        state.curStyleIdx = state.structure.length - 1;
        state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
        state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
        showToast("這個款式已經盤完了 🎉");
        state.view = "home";
        render();
        return;
      }
    }
  } else if(state.curSizeIdx < 0){
    state.curColorIdx--;
    if(state.curColorIdx < 0){
      state.curStyleIdx--;
      if(state.curStyleIdx < 0){ state.curStyleIdx = 0; state.curColorIdx = 0; state.curSizeIdx = 0; render(); return; }
      state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
    }
    state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
  }
  render();
}

init();
})();
</script>
