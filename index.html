<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盤點工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1b1f23;
    --paper:#f7f5f1;
    --card:#ffffff;
    --line:#e3ddd2;
    --accent:#c1572d;
    --accent-deep:#8f3f1f;
    --good:#2f6b4f;
    --muted:#8a8378;
    --shadow: 0 1px 2px rgba(27,31,35,0.04), 0 8px 24px rgba(27,31,35,0.06);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
  }
  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--paper);
    padding:14px 18px 10px;
    border-bottom:1px solid var(--line);
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .brand{
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .icon-btn{
    border:none; background:transparent; color:var(--muted);
    font-size:13px; padding:6px 10px; border-radius:8px; cursor:pointer;
    font-weight:600;
  }
  .icon-btn:active{ background:#ece7dd; }
  .progress-wrap{ margin-top:10px; }
  .progress-bar{
    height:6px; background:#e9e3d6; border-radius:4px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent);
    transition: width .25s ease;
    border-radius:4px;
  }
  .progress-label{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-top:6px;
    font-weight:600;
  }
  main{
    flex:1;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  /* ---- Setup screens ---- */
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }
  .panel h2{
    margin:0 0 4px;
    font-size:19px;
  }
  .panel p.sub{
    margin:0 0 14px;
    font-size:13.5px;
    color:var(--muted);
    line-height:1.5;
  }
  .list-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
    font-size:16px;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row .meta{
    font-size:12.5px; color:var(--muted); margin-top:2px;
  }
  .list-row .left{ flex:1; }
  .chev{ color:var(--muted); font-size:14px; }
  .btn{
    display:block; width:100%;
    background:var(--accent);
    color:#fff; border:none;
    font-size:16px; font-weight:700;
    padding:15px 18px;
    border-radius:12px;
    cursor:pointer;
    text-align:center;
  }
  .btn:active{ background:var(--accent-deep); }
  .btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--line);
  }
  .btn.secondary:active{ background:#ece7dd; }
  .btn.ghost{
    background:transparent;
    color:var(--accent-deep);
    font-weight:700;
    padding:10px;
  }
  .btn[disabled]{ opacity:.4; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12.5px; font-weight:700;
    color:var(--muted); margin-bottom:6px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .field input, .field textarea, .field select{
    width:100%;
    font-size:16px;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ min-height:90px; resize:vertical; line-height:1.5; }
  .row-gap{ display:flex; gap:10px; }
  .row-gap > *{ flex:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .tag{
    background:#efe9dc; color:var(--ink);
    border-radius:20px; padding:6px 12px;
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .tag button{
    border:none; background:transparent; color:var(--accent-deep);
    font-weight:700; cursor:pointer; font-size:14px; line-height:1;
    padding:0;
  }
  /* ---- Counting card ---- */
  .count-card{
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--line);
    padding:24px 20px 20px;
    box-shadow:var(--shadow);
  }
  .ctx-label{
    font-size:13px; color:var(--muted); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .style-name{
    font-size:15px; color:var(--accent-deep); font-weight:700;
    margin-top:2px;
  }
  .size-name{
    font-size:34px; font-weight:800; margin:10px 0 18px;
    letter-spacing:-0.01em;
  }
  .input-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-bottom:18px;
  }
  .num-box{
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:14px 12px 12px;
    background:#fcfbf8;
    min-width:0; /* 關鍵：避免 grid item 被內容撐到超出欄寬 */
    overflow:hidden;
  }
  .num-box label{
    font-size:12.5px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .num-box.focused{ border-color:var(--accent); background:#fff; }
  .warn-btn{
    color:var(--accent-deep) !important;
    border:1.5px solid #e0b8a8 !important;
    background:#fdf3ef !important;
    font-weight:700 !important;
  }
  .warning-banner{
    background:#fdecea;
    border:1.5px solid #e3a89a;
    border-radius:14px;
    padding:16px 18px;
    color:#7a2e1e;
  }
  .warning-banner strong{
    display:block;
    font-size:15px;
    margin-bottom:6px;
  }
  .warning-banner p{
    margin:0;
    font-size:13.5px;
    line-height:1.6;
  }
  /* 標籤式算式編輯器 */
  .expr-chips{
    display:flex; flex-wrap:wrap; gap:5px; align-items:center;
    min-height:48px; margin-top:6px;
    max-width:100%;
  }
  .expr-chiplist{
    display:contents; /* 讓裡面的標籤直接參與 flex 佈局 */
  }
  .expr-chip-num{
    background:#fdf3ef; color:var(--accent-deep);
    padding:7px 10px; border-radius:7px;
    font-size:18px; font-weight:800; font-family:inherit;
    border:1.5px solid #f0d8cd; cursor:pointer; line-height:1;
    flex:0 0 auto;
  }
  .expr-chip-num:active{ background:#f7e3d8; }
  .expr-chip-op{
    padding:7px 9px; border-radius:7px;
    font-size:16px; font-weight:800; line-height:1; cursor:pointer;
    flex:0 0 auto;
  }
  .expr-chip-op.op-plus{
    background:#fdf3ef; color:var(--accent-deep); border:1.5px solid #f0d8cd;
  }
  .expr-chip-op.op-times{
    background:#eef4fa; color:#2f5d8a; border:1.5px solid #b9cce0;
  }
  .expr-chip-op:active{ filter:brightness(0.94); }
  .expr-newinput{
    width:54px; font-size:18px; font-weight:800; text-align:center;
    border:1.5px dashed var(--line); border-radius:7px;
    padding:6px 4px; font-family:inherit; color:var(--ink);
    background:#fff; flex:0 0 auto;
  }
  .expr-newinput:focus{ outline:none; border-color:var(--accent); border-style:solid; }
  .expr-addbtns{ display:flex; gap:5px; margin-left:2px; flex:0 0 auto; }
  .expr-addbtn{
    width:30px; height:34px; border-radius:7px; font-size:16px; font-weight:800;
    line-height:1; cursor:pointer; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .expr-addbtn.add-plus{ background:#fff; border:1.5px solid #e0b8a8; color:var(--accent-deep); }
  .expr-addbtn.add-times{ background:#eef4fa; border:1.5px solid #b9cce0; color:#2f5d8a; }
  .expr-addbtn:active{ filter:brightness(0.94); }
  /* 點標籤後跳出的編輯彈窗 */
  .chip-editor{
    margin-top:10px; padding:12px;
    background:#faf7f1; border:1.5px solid var(--line); border-radius:10px;
  }
  .chip-editor .ce-label{ font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .chip-editor .ce-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .chip-editor input{
    width:80px; font-size:20px; font-weight:800; text-align:center;
    border:1.5px solid var(--line); border-radius:8px; padding:8px 4px;
    font-family:inherit; color:var(--ink); background:#fff;
  }
  .chip-editor input:focus{ outline:none; border-color:var(--accent); }
  .chip-editor .ce-btn{
    font-size:14px; padding:9px 14px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--line); background:#fff; color:var(--ink); font-weight:700;
  }
  .chip-editor .ce-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip-editor .ce-btn.danger{ color:#a32d2d; border-color:#e3a89a; }
  .sum-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#f1ece1; border-radius:12px;
    padding:13px 16px; margin-bottom:18px;
  }
  .sum-row .sum-label{ font-size:14px; color:var(--muted); font-weight:700; }
  .sum-row .sum-val{ font-size:22px; font-weight:800; color:var(--good); }
  .nav-row{ display:flex; gap:10px; }
  .nav-row .btn{ font-size:15px; padding:14px; }
  .keypad-hint{
    text-align:center; font-size:12px; color:var(--muted); margin-top:10px;
  }
  /* color chip strip */
  .chip-strip{
    display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px;
    -webkit-overflow-scrolling:touch;
  }
  .chip-strip::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto;
    padding:8px 14px; border-radius:20px;
    font-size:13px; font-weight:700;
    border:1.5px solid var(--line);
    background:#fff; color:var(--muted);
    white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.done{ border-color:var(--good); color:var(--good); }
  /* summary table */
  table.summary{
    width:100%; border-collapse:collapse; font-size:13.5px;
  }
  table.summary th, table.summary td{
    border-bottom:1px solid var(--line);
    padding:8px 6px; text-align:left;
  }
  table.summary th{ color:var(--muted); font-weight:700; font-size:12px; }
  table.summary td.num{ text-align:right; font-weight:600; }
  /* 彙總頁面：品牌分組摺疊 */
  .brand-group{
    border:1px solid var(--line); border-radius:10px;
    margin-bottom:10px; overflow:hidden;
    background:#fcfbf8;
  }
  .brand-group.has-missing{
    border-left:4px solid #e87a3e;
  }
  .brand-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer;
    background:#fcfbf8; user-select:none;
  }
  .brand-group-header:active{ background:#f5efe3; }
  .brand-group-header .bg-left{
    display:flex; align-items:center; gap:10px;
  }
  .brand-group-header .bg-name{
    font-size:16px; font-weight:800; color:var(--ink);
  }
  .brand-group-header .bg-meta{
    font-size:12px; color:var(--muted); font-weight:600;
  }
  .brand-group-header .bg-totals{
    font-size:13px; font-weight:700; color:var(--accent-deep);
  }
  .brand-group-header .bg-arrow{
    margin-left:8px; color:var(--muted); font-size:14px;
    transition:transform 0.18s ease;
  }
  .brand-group.expanded .bg-arrow{ transform:rotate(90deg); }
  .brand-group-body{
    display:none;
    padding:0 12px 12px;
    background:#fff;
    border-top:1px solid var(--line);
  }
  .brand-group.expanded .brand-group-body{ display:block; }
  /* 型號小卡片（品牌底下） */
  .style-group{
    border:1px solid var(--line); border-radius:8px;
    margin:10px 0; overflow:hidden; background:#fff;
  }
  .style-group.has-missing{ border-left:3px solid #e87a3e; }
  .style-group-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; cursor:pointer; user-select:none;
    background:#fcfbf8;
  }
  .style-group-header:active{ background:#f5efe3; }
  .style-group-header .sg-name{
    font-size:14px; font-weight:800; color:var(--accent-deep);
  }
  .style-group-header .sg-meta{
    font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px;
  }
  .style-group-header .sg-arrow{
    color:var(--muted); font-size:13px; margin-left:8px;
    transition:transform 0.18s ease;
  }
  .style-group.expanded .sg-arrow{ transform:rotate(90deg); }
  .style-group-body{ display:none; padding:0 10px 10px; }
  .style-group.expanded .style-group-body{ display:block; }
  .empty-state{
    text-align:center; padding:40px 16px; color:var(--muted);
  }
  .empty-state .big{ font-size:40px; margin-bottom:8px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px;
    border-radius:10px; font-size:14px; font-weight:600;
    box-shadow:var(--shadow); z-index:50;
    opacity:0; transition:opacity .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
  .footer-note{
    text-align:center; font-size:11.5px; color:var(--muted); padding:6px 18px 0;
  }
  .loading{
    display:flex; align-items:center; justify-content:center;
    min-height:60vh; color:var(--muted); font-size:14px;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">載入中…</div></div>
<div class="toast" id="toast"></div>

<script>
(function(){

// ---------- Default seed data ----------
var DEFAULT_SIZES_A = ["#6(JS)","#8(JM)","#10(JL)","JXL","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];

var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmO5IsfDIufHan6YCyML-TLBDV4XIiIOmbEuZn6W_TJza6zba5W6s5ht2WUsPnY7XU/exec";

// 管理員密碼（按右上角「管理用設定」時會詢問）。需要修改密碼時，直接改這一行的引號內文字即可
var ADMIN_PASSWORD = "6666";

var state = {
  structure: null,
  counts: {},           // key "style|color|size" -> {shelf, stock}
  view: "home",         // home | brandModels | setup | counting | summary
  curBrandIdx: 0,
  curStyleIdx: 0,
  curColorIdx: 0,
  curSizeIdx: 0,
  exprShelf: "",        // 目前格位「架上」的算式字串（標籤編輯器的資料來源）
  exprStock: ""         // 目前格位「庫存」的算式字串
};

function keyFor(style, color, size){ return style + "|" + color + "|" + size; }

function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1600);
}

// ---------- API helpers ----------
async function apiGet(action){
  var url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();
  var res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("API GET failed: " + res.status);
  return await res.json();
}
async function apiPost(payload){
  var res;
  try{
    res = await fetch(APPS_SCRIPT_URL, {
      method:"POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
  }catch(networkErr){
    throw new Error("網路連線失敗：" + networkErr.message);
  }
  if(!res.ok){
    var bodyText = "";
    try{ bodyText = await res.text(); }catch(e){}
    throw new Error("伺服器回應錯誤 " + res.status + (bodyText ? "：" + bodyText.slice(0,200) : ""));
  }
  var json;
  try{
    json = await res.json();
  }catch(e){
    throw new Error("伺服器回應格式錯誤（不是有效的 JSON）");
  }
  if(json && json.ok === false){
    throw new Error("伺服器拒絕：" + (json.error || "未知原因"));
  }
  return json;
}

// ---------- Storage (backed by Google Sheet via Apps Script) ----------
async function loadStructure(){
  try{
    var data = await apiGet("structure");
    if(data && data.length){ return data; }
  }catch(e){ console.error("loadStructure failed", e); showToast("讀取結構失敗，請檢查網路"); }
  return null;
}
async function saveStructure(structure){
  try{
    await apiPost({ action:"saveStructure", structure: structure });
    return true;
  }catch(e){
    console.error("save structure failed", e);
    showToast("儲存結構失敗：" + (e && e.message ? e.message : "未知錯誤"));
    return false;
  }
}
async function loadAllCounts(structure){
  try{
    var counts = await apiGet("counts");
    return counts || {};
  }catch(e){ console.error("loadAllCounts failed", e); showToast("讀取盤點資料失敗，請檢查網路"); }
  return {};
}
async function saveCount(style, color, size, shelfRaw, stockRaw){
  var key = keyFor(style, color, size);
  var shelfNum = parseExpr(shelfRaw);
  var stockNum = parseExpr(stockRaw);
  var val = {
    shelf: shelfNum, stock: stockNum, total: shelfNum + stockNum,
    shelfExpr: shelfRaw, stockExpr: stockRaw // 原始算式文字，僅保留在本次開啟工具的記憶體中
  };
  state.counts[key] = val; // optimistic local update so UI feels instant
  try{
    await apiPost({ action:"saveCount", style:style, color:color, size:size, shelf:shelfNum, stock:stockNum });
  }catch(e){ console.error("save count failed", e); showToast("儲存失敗，請檢查網路"); }
}
async function clearAllCountsRemote(){
  try{
    await apiPost({ action:"clearCounts" });
  }catch(e){ console.error("clear counts failed", e); showToast("清空失敗，請檢查網路"); }
}
async function regenerateSummarySheetsRemote(){
  try{
    await apiPost({ action:"regenerate" });
    return true;
  }catch(e){ console.error("regenerate failed", e); showToast("更新彙總分頁失敗，請檢查網路"); return false; }
}

// ---------- Init ----------
// 品牌分組：brand 為 null 代表「獨立顯示」（只有一個型號，點了直接進盤點，不用先選品牌）
var BRAND_GROUPS = [
  { brand: null, styles: ["UA2350"] },
  { brand: null, styles: ["GILDAN-76000系列"] },
  { brand: "SR", styles: ["SR230","SR_SH2301"] },
  { brand: "CP", styles: ["CP101","CP102","CP103","CP104","CP105","CP106"] },
  { brand: "AG短袖", styles: ["AG18000","AG21000","AG_L210","AG24000","AG28000"] },
  { brand: "AG冬衣", styles: ["AG1000","AG2000","AG3000"] },
  { brand: "KY", styles: ["KY T-24","KY T-L28"] },
  { brand: "PL", styles: ["PL01","PL02","PL03","PL04","PL05"] },
  { brand: "TH", styles: ["TH02","TH03","TH04"] },
  { brand: "CAP", styles: ["CAP-510","CAP-520","CAP-6","CAP-BH"] },
  { brand: null, styles: ["備品"] }
];

var CUSTOM_STYLE_ORDER = [];
BRAND_GROUPS.forEach(function(g){ CUSTOM_STYLE_ORDER = CUSTOM_STYLE_ORDER.concat(g.styles); });

function findBrandGroupForStyle(styleName){
  for(var i=0;i<BRAND_GROUPS.length;i++){
    if(BRAND_GROUPS[i].styles.indexOf(styleName) !== -1) return BRAND_GROUPS[i];
  }
  return null;
}

function sortStructureByStyle(structure){
  var orderMap = {};
  CUSTOM_STYLE_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  return structure.slice().sort(function(a, b){
    var ai = orderMap.hasOwnProperty(a.style) ? orderMap[a.style] : CUSTOM_STYLE_ORDER.length + 1000;
    var bi = orderMap.hasOwnProperty(b.style) ? orderMap[b.style] : CUSTOM_STYLE_ORDER.length + 1000;
    if(ai !== bi) return ai - bi;
    return a.style.localeCompare(b.style, 'zh-Hant');
  });
}

async function init(){
  var structure = null;
  var counts = {};
  var fetchFailed = false;
  try{
    var all = await apiGet("all");
    if(all && Array.isArray(all.structure)){
      structure = all.structure; // 即使是空陣列也算合法（代表這個 Sheet 還沒設定任何款式）
      counts = all.counts || {};
    } else {
      fetchFailed = true;
    }
  }catch(e){
    console.error("init load failed", e);
    fetchFailed = true;
  }

  if(fetchFailed || structure === null){
    renderLoadError();
    return;
  }

  state.structure = sortStructureByStyle(structure);
  state.counts = counts;
  state.view = "home";
  render();
}

// ---------- Progress helpers ----------
function totalSizeSlots(structure){
  var n = 0;
  structure.forEach(function(st){ st.colors.forEach(function(c){ n += c.sizes.length; }); });
  return n;
}
function doneSizeSlots(structure, counts){
  var n = 0;
  structure.forEach(function(st){
    st.colors.forEach(function(c){
      c.sizes.forEach(function(sz){
        var k = keyFor(st.style, c.name, sz);
        if(counts[k] !== undefined){ n++; }
      });
    });
  });
  return n;
}
function colorDone(style, color, counts){
  return color.sizes.every(function(sz){ return counts[keyFor(style.style, color.name, sz)] !== undefined; });
}
function styleProgress(style, counts){
  var total=0, done=0;
  style.colors.forEach(function(c){
    c.sizes.forEach(function(sz){
      total++;
      if(counts[keyFor(style.style, c.name, sz)] !== undefined) done++;
    });
  });
  return {total:total, done:done};
}

// ---------- Render root ----------
function render(){
  var app = document.getElementById("app");
  if(state.view === "home") app.innerHTML = renderHome();
  else if(state.view === "brandModels") app.innerHTML = renderBrandModels();
  else if(state.view === "setup") app.innerHTML = renderSetup();
  else if(state.view === "counting") app.innerHTML = renderCounting();
  else if(state.view === "summary") app.innerHTML = renderSummary();
  bindEvents();
}

// ---------- HOME ----------
function findStyleIdx(styleName){
  for(var i=0;i<state.structure.length;i++){
    if(state.structure[i].style === styleName) return i;
  }
  return -1;
}

function groupProgress(group, counts){
  var total=0, done=0;
  group.styles.forEach(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return;
    var p = styleProgress(state.structure[idx], counts);
    total += p.total; done += p.done;
  });
  return {total:total, done:done};
}

// ---------- COUNTING ----------

// 把算式字串拆成 token 陣列，例如 "12×6+8" -> [{t:'num',v:'12'},{t:'op',v:'×'},{t:'num',v:'6'},{t:'op',v:'+'},{t:'num',v:'8'}]
function tokenizeExpr(str){
  if(!str) return [];
  var s = String(str).trim().replace(/[xX]/g, "×");
  if(s === "") return [];
  var tokens = [];
  var num = "";
  for(var i=0;i<s.length;i++){
    var ch = s[i];
    if(ch === "+" || ch === "×"){
      if(num !== ""){ tokens.push({t:'num', v:num}); num=""; }
      tokens.push({t:'op', v:ch});
    } else if(ch !== " "){
      num += ch;
    }
  }
  if(num !== "") tokens.push({t:'num', v:num});
  return tokens;
}

// 把 token 陣列組回字串
function tokensToStr(tokens){
  return tokens.map(function(tk){ return tk.v; }).join("");
}

// 產生「標籤式算式編輯器」的 HTML。field 為 "shelf" 或 "stock"
function renderExprEditor(field){
  var html = '<div class="expr-chips" id="'+field+'-chips">';
  html += renderTokenChips(field); // 前面的數字/運算符標籤（這塊會被就地更新）
  // 固定不動的新增區：輸入框 + 加號/乘號按鈕（DOM 不重建，鍵盤不收起）
  html += '<input class="expr-newinput" id="'+field+'-newinput" type="text" inputmode="decimal" placeholder="0">';
  html += '<div class="expr-addbtns">'+
    '<button class="expr-addbtn add-plus" data-action="add-token" data-field="'+field+'" data-op="+" type="button">+</button>'+
    '<button class="expr-addbtn add-times" data-action="add-token" data-field="'+field+'" data-op="×" type="button">×</button>'+
  '</div>';
  html += '</div>';
  html += '<div id="'+field+'-editor"></div>'; // 點標籤後的編輯彈窗會放這裡
  return html;
}

// 只產生前面那串數字/運算符標籤（不含輸入框），供就地更新用
function renderTokenChips(field){
  var exprStr = field === 'shelf' ? state.exprShelf : state.exprStock;
  var tokens = tokenizeExpr(exprStr);
  var html = '<span id="'+field+'-chiplist" class="expr-chiplist">';
  tokens.forEach(function(tk, idx){
    if(tk.t === 'num'){
      html += '<span class="expr-chip-num" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    } else {
      var opcls = tk.v === '×' ? 'op-times' : 'op-plus';
      html += '<span class="expr-chip-op '+opcls+'" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    }
  });
  html += '</span>';
  return html;
}

function renderCounting(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key] || {shelf:"", stock:""};
  var p = styleProgress(st, state.counts);
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;

  var chips = col.sizes.map(function(sz, i){
    var k = keyFor(st.style, col.name, sz);
    var cls = "chip";
    if(i === state.curSizeIdx) cls += " active";
    else if(state.counts[k] !== undefined) cls += " done";
    return '<button class="'+cls+'" data-action="jump-size" data-size-idx="'+i+'">'+escapeHtml(sz)+'</button>';
  }).join("");

  var colorChips = st.colors.map(function(c, i){
    var cls = "chip";
    if(i === state.curColorIdx) cls += " active";
    else if(colorDone(st, c, state.counts)) cls += " done";
    return '<button class="'+cls+'" data-action="jump-color" data-color-idx="'+i+'">'+escapeHtml(c.name)+'</button>';
  }).join("");

  // 優先顯示原始算式文字（同一次開啟工具期間都會保留），沒有的話才顯示已存的數字
  var shelfVal = existing.shelfExpr !== undefined ? existing.shelfExpr : (existing.shelf !== undefined ? String(existing.shelf) : "");
  var stockVal = existing.stockExpr !== undefined ? existing.stockExpr : (existing.stock !== undefined ? String(existing.stock) : "");
  // 把目前格位的算式同步到 state，標籤編輯器以 state 為準
  state.exprShelf = shelfVal;
  state.exprStock = stockVal;
  var total = (existing.total !== undefined ? existing.total : (parseExpr(shelfVal) + parseExpr(stockVal)));

  var isFirst = state.curStyleIdx === 0 && state.curColorIdx === 0 && state.curSizeIdx === 0;
  var isLast = isLastSlot();
  var parentGroup = findBrandGroupForStyle(st.style);
  var backAction = (parentGroup && parentGroup.brand !== null) ? 'back-to-brand' : 'goto-home';
  var backLabel = (parentGroup && parentGroup.brand !== null) ? ('‹ '+escapeHtml(parentGroup.brand)) : '‹ 品牌';

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="'+backAction+'">'+backLabel+'</button>'+
      '<div class="brand">盤點中</div>'+
      '<span style="width:70px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(st.style)+' 進度 '+p.done+'/'+p.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="chip-strip">'+colorChips+'</div>'+
    '<div class="count-card">'+
      '<div class="ctx-label">款式 / 顏色</div>'+
      '<div class="style-name">'+escapeHtml(st.style)+' · '+escapeHtml(col.name)+'</div>'+
      '<div class="size-name">'+escapeHtml(size)+'</div>'+
      '<div class="input-grid">'+
        '<div class="num-box" id="shelf-box">'+
          '<label>架上</label>'+
          renderExprEditor('shelf')+
        '</div>'+
        '<div class="num-box" id="stock-box">'+
          '<label>庫存</label>'+
          renderExprEditor('stock')+
        '</div>'+
      '</div>'+

      '<div class="nav-row">'+
        '<button class="btn secondary" data-action="prev-slot" '+(isFirst?'disabled':'')+'>‹ 上一項</button>'+
        '<button class="btn" data-action="next-slot">'+(isLast?'完成 ✓':'下一項 ›')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="chip-strip" style="margin-top:-6px;">'+chips+'</div>'+
  '</main>';
}

function isLastSlot(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  return state.curStyleIdx === state.structure.length - 1 &&
         state.curColorIdx === st.colors.length - 1 &&
         state.curSizeIdx === col.sizes.length - 1;
}

      '<td class="num"><strong>'+styleShelf+'</strong></td>'+
      '<td class="num"><strong>'+styleStock+'</strong></td>'+
      '<td class="num"><strong>'+styleTotal+'</strong></td></tr>';
    html += '</tbody></table></div>';
    return {html:html, total:styleTotal, missing:missingCount};
  }

  // 計算單一款式的總計（彙總用，不依賴上面那個函式）
  function calcStyleTotal(st){
    var t = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var c = state.counts[keyFor(st.style, col.name, sz)];
        if(c) t += Number(c.total)||0;
      });
    });
    return t;
  }

  // 依 BRAND_GROUPS 順序組裝畫面
  var groupsHtml = "";
  var grandMissing = 0;
  BRAND_GROUPS.forEach(function(g){
    var groupStyles = g.styles
      .map(function(name){ return structure.find(function(s){ return s.style === name; }); })
      .filter(function(s){ return s; });
    if(groupStyles.length === 0) return;

    var groupName = g.brand === null ? groupStyles[0].style : g.brand;
    var styleCount = groupStyles.length;
    var groupTotal = 0;
    var groupMissing = 0;
    var bodyHtml = "";

    groupStyles.forEach(function(st){
      var built = buildStyleTableHtml(st);
      groupTotal += built.total;
      groupMissing += built.missing;
      if(g.brand !== null){
        // 品牌底下多個型號：每個型號做成可摺疊的小卡片
        var styleMissingTag = built.missing > 0 ? ' <span style="background:#e87a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">未輸入 '+built.missing+'</span>' : '';
        var styleTotalText = ' · 合計 '+built.total;
        bodyHtml += '<div class="style-group'+(built.missing > 0 ? ' has-missing' : '')+'">'+
          '<div class="style-group-header" data-action="toggle-style-group">'+
            '<div class="sg-left">'+
              '<div class="sg-name">'+escapeHtml(st.style)+styleMissingTag+'</div>'+
              '<div class="sg-meta">'+st.colors.length+' 色'+styleTotalText+'</div>'+
            '</div>'+
            '<div class="sg-arrow">›</div>'+
          '</div>'+
          '<div class="style-group-body">'+built.html+'</div>'+
        '</div>';
      } else {
        // 獨立款式（品牌只有一個型號）直接顯示明細
        bodyHtml += built.html;
      }
    });

    grandMissing += groupMissing;
    var metaParts = [];
    if(g.brand !== null) metaParts.push(styleCount + ' 個型號');
    if(groupMissing > 0) metaParts.push('<span style="color:#e87a3e; font-weight:700;">未輸入 '+groupMissing+' 筆</span>');
    var metaText = metaParts.join(' · ');
    groupsHtml += '<div class="brand-group'+(groupMissing > 0 ? ' has-missing' : '')+'" data-brand-name="'+escapeHtml(groupName)+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+escapeHtml(groupName)+'</div>'+
            (metaText ? '<div class="bg-meta">'+metaText+'</div>' : '')+
          '</div>'+
        '</div>'+
        '<div style="display:flex; align-items:center; gap:6px;">'+
          '<div class="bg-totals">合計 '+groupTotal+'</div>'+
          '<div class="bg-arrow">›</div>'+
        '</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  });

  // 整體總計
  var grandTotal = 0;
  structure.forEach(function(st){ grandTotal += calcStyleTotal(st); });

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
    '<div class="brand">彙總 / 匯出</div>'+
    '<span style="width:60px"></span>'+
  '</div></div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>更新 Google Sheet 彙總分頁</h2>'+
      '<p class="sub">會在你的 Google Sheet 裡自動產生「彙總_款式名稱」分頁（不會動到原本既有的分頁），每個品項一個分頁，內容是該品項所有顏色、尺寸的架上／庫存／加總明細與總計。需要重新整理 Sheet 才會看到新分頁。</p>'+
      '<button class="btn" data-action="regenerate-sheets">更新 Google Sheet 彙總分頁</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>備用：下載 Excel 快照</h2>'+
      '<p class="sub">如果想要一份獨立的 Excel 檔（不在 Google Sheet 裡），可以用這個，結構跟上面的彙總分頁一樣。</p>'+
      '<button class="btn secondary" data-action="download-xlsx">下載 Excel（.xlsx）</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>明細（依品牌分組）</h2>'+
      '<p class="sub">點品牌標題展開或收合該品牌的明細。整體加總：<strong style="color:var(--accent-deep);">'+grandTotal+'</strong>'+
        (grandMissing > 0 ? ' · <strong style="color:#e87a3e;">尚有 '+grandMissing+' 筆未輸入</strong>' : ' · <strong style="color:#2f7a3e;">已全部輸入完成 ✓</strong>')+
      '</p>'+
      groupsHtml+
    '</div>'+
  '</main>'+
  '<div id="tsv-data" style="display:none;">'+escapeHtml(tsvLines.join("\n"))+'</div>';
}

// ---------- Excel export (one worksheet per 款式) ----------
function sanitizeSheetName(name, usedNames){
  var clean = String(name).replace(/[\\\/\?\*\[\]:]/g, "_").slice(0,31);
  if(!clean) clean = "Sheet";
  var base = clean, n = 1;
  while(usedNames[clean]){
    n++;
    var suffix = "_" + n;
    clean = base.slice(0, 31 - suffix.length) + suffix;
  }
  usedNames[clean] = true;
  return clean;
}

function buildWorkbook(){
  var wb = XLSX.utils.book_new();
  var usedNames = {};
  state.structure.forEach(function(st){
    var rows = [["顏色","尺寸","架上","庫存","加總"]];
    var sumShelf = 0, sumStock = 0, sumTotal = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelf = c && c.shelf !== "" ? Number(c.shelf)||0 : (c ? 0 : "");
        var stock = c && c.stock !== "" ? Number(c.stock)||0 : (c ? 0 : "");
        var total = c ? Number(c.total)||0 : "";
        rows.push([col.name, sz, shelf, stock, total]);
        if(c){
          sumShelf += Number(c.shelf)||0;
          sumStock += Number(c.stock)||0;
          sumTotal += Number(c.total)||0;
        }
      });
    });
    rows.push(["總計", "", sumShelf, sumStock, sumTotal]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:8},{wch:8},{wch:8}];
    var sheetName = sanitizeSheetName(st.style, usedNames);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  return wb;
}

function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

function downloadWorkbook(){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var wb = buildWorkbook();
  XLSX.writeFile(wb, "盤點結果_" + dateStr() + ".xlsx");
}

// ---------- Helpers ----------
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

// ---------- Events ----------
function bindEvents(){
  var app = document.getElementById("app");

  if(!app._delegated){
    app._delegated = true;
    app.addEventListener('click', async function(ev){
      var el = ev.target.closest('[data-action]');
      if(!el || !app.contains(el)) return;
      var action = el.getAttribute('data-action');

      if(action === 'goto-home'){ state.view = "home"; render(); }
      else if(action === 'back-to-brand'){
        var st2 = state.structure[state.curStyleIdx];
        var g2 = findBrandGroupForStyle(st2.style);
        if(g2 && g2.brand !== null){
          state.curBrandIdx = BRAND_GROUPS.indexOf(g2);
          state.view = "brandModels";
        } else {
          state.view = "home";
        }
        render();
      }
      else if(action === 'goto-setup'){
        var pwd = prompt('請輸入管理員密碼：');
        if(pwd === null) return; // 使用者按取消
        if(pwd !== ADMIN_PASSWORD){
          showToast("密碼錯誤");
          return;
        }
        state.view = "setup";
        render();
      }
      else if(action === 'goto-summary'){ state.view = "summary"; render(); }

      else if(action === 'open-brand'){
        state.curBrandIdx = Number(el.getAttribute('data-brand-idx'));
        state.view = "brandModels";
        render();
      }

      else if(action === 'open-style'){
        state.curStyleIdx = Number(el.getAttribute('data-style-idx'));
        state.curColorIdx = 0;
        state.curSizeIdx = 0;
        state.view = "counting";
        render();
      }

      else if(action === 'jump-color'){
        state.curColorIdx = Number(el.getAttribute('data-color-idx'));
        state.curSizeIdx = 0;
        await persistCurrentInputs();
        render();
      }
      else if(action === 'jump-size'){
        await persistCurrentInputs();
        state.curSizeIdx = Number(el.getAttribute('data-size-idx'));
        render();
      }

      else if(action === 'add-token'){
        var field = el.getAttribute('data-field');
        var op = el.getAttribute('data-op');
        addTokenToExpr(field, op);
      }

      else if(action === 'edit-token'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        openTokenEditor(field, idx);
      }

      else if(action === 'apply-token-num'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        applyTokenNum(field, idx);
      }

      else if(action === 'apply-token-op'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        var op = el.getAttribute('data-op');
        applyTokenOp(field, idx, op);
      }

      else if(action === 'delete-token'){
        var field = el.getAttribute('data-field');
        var idx = Number(el.getAttribute('data-idx'));
        deleteToken(field, idx);
      }

      else if(action === 'cancel-token-edit'){
        var field = el.getAttribute('data-field');
        document.getElementById(field+'-editor').innerHTML = "";
      }

      else if(action === 'next-slot'){
        await persistCurrentInputs();
        advanceSlot(1);
      }
      else if(action === 'prev-slot'){
        await persistCurrentInputs();
        advanceSlot(-1);
      }

      else if(action === 'bulk-import'){
        var raw = document.getElementById('bulk-import-data').value.trim();
        if(!raw){ showToast("請先貼上資料"); return; }
        var parsed;
        try{
          parsed = JSON.parse(raw);
        }catch(e){
          showToast("JSON 格式錯誤，請確認這一段有完整複製（開頭要有 [ 結尾要有 ]）");
          return;
        }
        if(!Array.isArray(parsed) || parsed.length===0){
          showToast("資料格式不正確（應該是一個陣列）");
          return;
        }

        // 合併：同名款式覆蓋更新，其他款式不受影響
        var merged = state.structure.slice();
        var nameToIdx = {};
        merged.forEach(function(item, idx){ nameToIdx[item.style] = idx; });
        var addedNames = [];
        parsed.forEach(function(item){
          if(nameToIdx.hasOwnProperty(item.style)){
            merged[nameToIdx[item.style]] = item;
          } else {
            nameToIdx[item.style] = merged.length;
            merged.push(item);
          }
          addedNames.push(item.style);
        });

        if(!confirm('這一段有 '+parsed.length+' 個款式（'+addedNames.slice(0,5).join('、')+(addedNames.length>5?'...':'')+'），會加入或更新到現有清單，合併後總共 '+merged.length+' 個款式。確定繼續嗎？')){
          return;
        }
        el.disabled = true;
        el.textContent = "匯入中…";
        var ok = false;
        try{
          ok = await saveStructure(merged);
        }catch(e){
          console.error("bulk-import unexpected error", e);
          ok = false;
        }
        el.disabled = false;
        el.textContent = "匯入這一段（加入現有款式）";
        if(ok){
          state.structure = sortStructureByStyle(merged);
          document.getElementById('bulk-import-data').value = "";
          showToast("已加入這段，目前共 "+merged.length+" 個款式");
          render();
        }else{
          showToast("匯入失敗，資料沒有寫入，請重試或檢查網路");
        }
        return;
      }

      else if(action === 'add-style'){
        var name = document.getElementById('new-style-name').value.trim();
        var colorsRaw = document.getElementById('new-style-colors').value;
        var sizesRaw = document.getElementById('new-style-sizes').value;
        var colors = colorsRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean);
        var sizes = sizesRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean);
        if(!name || colors.length===0 || sizes.length===0){
          showToast("請填入款式名稱、至少一個顏色與一個尺寸");
          return;
        }
        state.structure.push({
          style: name,
          colors: colors.map(function(cn){ return {name: cn, sizes: sizes.slice()}; })
        });
        state.structure = sortStructureByStyle(state.structure);
        await saveStructure(state.structure);
        showToast("已新增「"+name+"」");
        render();
      }

      else if(action === 'delete-style'){
        var idx = Number(el.getAttribute('data-style-idx'));
        var styleName = state.structure[idx].style;
        var colorCount = state.structure[idx].colors.length;
        if(!confirm('⚠️ 確定要刪除「'+styleName+'」嗎？\n\n這個款式有 '+colorCount+' 個顏色，刪除後畫面上會看不到（已輸入過的盤點數字會保留在後端）。')){
          return;
        }
        state.structure.splice(idx,1);
        await saveStructure(state.structure);
        showToast("已刪除「"+styleName+"」");
        render();
      }

      else if(action === 'rename-style'){
        var oldName = document.getElementById('rename-old').value.trim();
        var newName = document.getElementById('rename-new').value.trim();
        if(!oldName || !newName){ showToast("請填入目前名稱跟新名稱"); return; }
        if(!confirm('確定要把「'+oldName+'」改名成「'+newName+'」嗎？已填過的盤點數字會一起搬過去。')){
          return;
        }
        el.disabled = true;
        el.textContent = "處理中…";
        try{
          var result = await apiPost({ action:"renameStyle", oldName:oldName, newName:newName });
          if(result && result.ok){
            var item = state.structure.find(function(s){ return s.style === oldName; });
            if(item) item.style = newName;
            state.structure = sortStructureByStyle(state.structure);
            var newCounts = {};
            Object.keys(state.counts).forEach(function(k){
              if(k.indexOf(oldName+"|") === 0){
                newCounts[newName+"|"+k.slice(oldName.length+1)] = state.counts[k];
              } else {
                newCounts[k] = state.counts[k];
              }
            });
            state.counts = newCounts;
            showToast("已改名，結構 "+result.structChanged+" 筆、盤點記錄 "+result.rawChanged+" 筆");
            render();
          } else {
            showToast("改名失敗：" + (result && result.error ? result.error : "未知原因"));
          }
        }catch(e){
          console.error("rename style failed", e);
          showToast("改名失敗：" + (e && e.message ? e.message : "未知錯誤"));
        }
        el.disabled = false;
        el.textContent = "重新命名";
      }

      else if(action === 'compact-raw'){
        el.disabled = true;
        el.textContent = "整理中…";
        try{
          await apiPost({ action:"compactRaw" });
          showToast("已整理完成，表格已變小");
        }catch(e){
          console.error("compact raw failed", e);
          showToast("整理失敗：" + (e && e.message ? e.message : "未知錯誤"));
        }
        el.disabled = false;
        el.textContent = "整理原始資料";
      }

      else if(action === 'clear-counts'){
        if(!confirm('⚠️ 確定要清空所有人已經輸入的盤點數字嗎？\n\n這個動作無法復原。')){
          return;
        }
        await clearAllCountsRemote();
        state.counts = {};
        showToast("已清空所有盤點數字");
        render();
      }

      else if(action === 'download-xlsx'){
        downloadWorkbook();
      }

      else if(action === 'toggle-brand-group'){
        var group = el.closest('.brand-group');
        if(group){
          group.classList.toggle('expanded');
        }
      }

      else if(action === 'toggle-style-group'){
        var sgroup = el.closest('.style-group');
        if(sgroup){
          sgroup.classList.toggle('expanded');
        }
      }

      else if(action === 'regenerate-sheets'){
        el.disabled = true;
        el.textContent = "更新中…";
        var ok = await regenerateSummarySheetsRemote();
        if(ok){ showToast("已在 Google Sheet 產生彙總分頁"); }
        el.disabled = false;
        el.textContent = "更新 Google Sheet 彙總分頁";
      }

      else if(action === 'copy-tsv'){
        var data = document.getElementById('tsv-data').textContent;
        try{
          await navigator.clipboard.writeText(data);
          showToast("已複製，到 Sheet 貼上即可");
        }catch(e){
          showToast("複製失敗，請手動選取文字");
        }
      }
    });

    // 標籤編輯器：用事件委派處理「最後新增輸入框」的 Enter 鍵（動態新增也有效）
    app.addEventListener('keydown', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput') && ev.key === 'Enter'){
        var field = t.id === 'shelf-newinput' ? 'shelf' : (t.id === 'stock-newinput' ? 'stock' : null);
        if(field){ ev.preventDefault(); commitNewInput(field); }
      }
    });

    // 每打一個字就即時更新加總，連「還沒按+、還沒換格」的最後一個數字也算進去
    app.addEventListener('input', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        refreshSum();
      }
    });

    // 安全網：輸入框失焦時（切到別的地方、收起鍵盤）自動把最後一個數字收進去並存檔
    app.addEventListener('blur', function(ev){
      var t = ev.target;
      if(t && t.classList && t.classList.contains('expr-newinput')){
        persistCurrentInputs();
      }
    }, true); // 用 capture，因為 blur 不會冒泡

    // 批次匯入：選了檔案後自動讀取內容，填進文字框
    app.addEventListener('change', function(ev){
      var t = ev.target;
      if(t && t.id === 'bulk-import-file' && t.files && t.files[0]){
        var reader = new FileReader();
        reader.onload = function(e){
          document.getElementById('bulk-import-data').value = e.target.result;
          showToast("已讀取檔案「"+t.files[0].name+"」，按下面的「匯入這一段」即可");
        };
        reader.onerror = function(){
          showToast("讀取檔案失敗，請改用貼上文字的方式");
        };
        reader.readAsText(t.files[0], 'utf-8');
      }
    });
  }

  refreshSum();
}

// 重新計算並顯示加總：已收進算式的部分 + 兩個欄位「還沒送出」的當前輸入內容
function refreshSum(){
  var sumEl = document.getElementById('sum-val');
  if(!sumEl) return;
  var shelfPending = document.getElementById('shelf-newinput');
  var stockPending = document.getElementById('stock-newinput');
  var shelfTotal = parseExpr(state.exprShelf) + (shelfPending ? parseExpr(shelfPending.value) : 0);
  var stockTotal = parseExpr(state.exprStock) + (stockPending ? parseExpr(stockPending.value) : 0);
  sumEl.textContent = shelfTotal + stockTotal;
}

function getExpr(field){ return field === 'shelf' ? state.exprShelf : state.exprStock; }
function setExpr(field, val){ if(field === 'shelf') state.exprShelf = val; else state.exprStock = val; }

// 就地更新：只換前面的標籤串，輸入框 DOM 不動，清空內容並維持焦點（手機鍵盤不會收起）
function updateChipsInPlace(field, keepFocus){
  var list = document.getElementById(field+'-chiplist');
  if(list){
    list.outerHTML = renderTokenChips(field);
  }
  var inp = document.getElementById(field+'-newinput');
  if(inp){
    inp.value = "";
    if(keepFocus){ inp.focus(); }
  }
  // 點標籤的編輯彈窗若開著，關掉
  var editor = document.getElementById(field+'-editor');
  if(editor) editor.innerHTML = "";
  refreshSum();
}

// 把最後輸入框裡的數字，先收進算式（如果有打東西的話）
function commitNewInput(field){
  var inp = document.getElementById(field+'-newinput');
  if(!inp) return;
  var v = inp.value.trim();
  if(v === "") return;
  var tokens = tokenizeExpr(getExpr(field));
  // 如果目前結尾是運算符或空的，直接接數字；否則預設用 + 連接
  if(tokens.length === 0){
    tokens.push({t:'num', v:v});
  } else if(tokens[tokens.length-1].t === 'op'){
    tokens.push({t:'num', v:v});
  } else {
    tokens.push({t:'op', v:'+'});
    tokens.push({t:'num', v:v});
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// 按了 + 或 × 新增：先把輸入框內容收進去，再補上運算符，等待下一個數字
function addTokenToExpr(field, op){
  var inp = document.getElementById(field+'-newinput');
  var pending = inp ? inp.value.trim() : "";
  var tokens = tokenizeExpr(getExpr(field));
  if(pending !== ""){
    if(tokens.length > 0 && tokens[tokens.length-1].t === 'num'){
      tokens.push({t:'op', v:'+'});
    }
    if(tokens.length === 0 || tokens[tokens.length-1].t === 'op'){
      tokens.push({t:'num', v:pending});
    }
  }
  // 結尾若已是運算符就先移除，避免連續兩個運算符
  if(tokens.length > 0 && tokens[tokens.length-1].t === 'op'){
    tokens.pop();
  }
  if(tokens.length === 0) return; // 還沒有任何數字，不能先放運算符
  tokens.push({t:'op', v:op});
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, true);
}

// 點某個 token 打開編輯彈窗
function openTokenEditor(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  var tk = tokens[idx];
  var editor = document.getElementById(field+'-editor');
  if(!editor) return;
  var html = '<div class="chip-editor">';
  if(tk.t === 'num'){
    html += '<div class="ce-label">修改這個數字</div>';
    html += '<div class="ce-row">';
    html += '<input id="'+field+'-edit-input" type="text" inputmode="decimal" value="'+escapeHtml(tk.v)+'">';
    html += '<button class="ce-btn primary" data-action="apply-token-num" data-field="'+field+'" data-idx="'+idx+'">改好</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  } else {
    var other = tk.v === '×' ? '+' : '×';
    html += '<div class="ce-label">這個運算符（目前是 '+escapeHtml(tk.v)+'）</div>';
    html += '<div class="ce-row">';
    html += '<button class="ce-btn primary" data-action="apply-token-op" data-field="'+field+'" data-idx="'+idx+'" data-op="'+other+'">改成 '+other+'</button>';
    html += '<button class="ce-btn danger" data-action="delete-token" data-field="'+field+'" data-idx="'+idx+'">刪除（連同後面數字）</button>';
    html += '<button class="ce-btn" data-action="cancel-token-edit" data-field="'+field+'">取消</button>';
    html += '</div>';
  }
  html += '</div>';
  editor.innerHTML = html;
  var inp = document.getElementById(field+'-edit-input');
  if(inp){ inp.focus(); inp.select(); }
}

function applyTokenNum(field, idx){
  var inp = document.getElementById(field+'-edit-input');
  if(!inp) return;
  var v = inp.value.trim();
  var tokens = tokenizeExpr(getExpr(field));
  if(v === ""){ deleteToken(field, idx); return; }
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'num'){
    tokens[idx].v = v;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

function applyTokenOp(field, idx, op){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx >= 0 && idx < tokens.length && tokens[idx].t === 'op'){
    tokens[idx].v = op;
    setExpr(field, tokensToStr(tokens));
  }
  updateChipsInPlace(field, false);
}

// 刪除 token：刪數字時連同它前面的運算符一起拿掉；刪運算符時連同後面的數字一起拿掉
function deleteToken(field, idx){
  var tokens = tokenizeExpr(getExpr(field));
  if(idx < 0 || idx >= tokens.length) return;
  if(tokens[idx].t === 'num'){
    // 刪數字：若前面有運算符一起刪，否則若後面有運算符也一起刪
    if(idx > 0 && tokens[idx-1].t === 'op'){
      tokens.splice(idx-1, 2);
    } else if(idx+1 < tokens.length && tokens[idx+1].t === 'op'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  } else {
    // 刪運算符：連同後面那個數字一起刪
    if(idx+1 < tokens.length && tokens[idx+1].t === 'num'){
      tokens.splice(idx, 2);
    } else {
      tokens.splice(idx, 1);
    }
  }
  setExpr(field, tokensToStr(tokens));
  updateChipsInPlace(field, false);
}

// 把像 "65+65+96" 或 "12×6+8" 這種算式換算成總和，× 的運算優先於 +（例如 12×6+8 = 80）
function parseExpr(str){
  if(str === null || str === undefined) return 0;
  var s = String(str).trim().replace(/[xX]/g, "×"); // 容許用英文字母 x 代替 ×
  if(s === "") return 0;
  var terms = s.split("+");
  var sum = 0;
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("×");
    var product = null;
    for(var j=0;j<factors.length;j++){
      var n = parseFloat(factors[j].trim());
      if(isNaN(n)) continue;
      product = (product === null) ? n : product * n;
    }
    if(product !== null) sum += product;
  }
  return sum;
}

async function persistCurrentInputs(){
  if(state.view !== "counting") return;
  // 先把兩個欄位「最後輸入框」尚未送出的數字收進算式
  commitNewInput('shelf');
  commitNewInput('stock');
  var shelfRaw = state.exprShelf || "";
  var stockRaw = state.exprStock || "";
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key];
  // 兩格都空、而且之前也沒存過東西 → 略過（避免送出毫無意義的空白記錄）
  // 但若之前有存過東西、現在被清空 → 必須送出，把後端的舊值蓋掉
  if(shelfRaw === "" && stockRaw === "" && !existing) return;
  await saveCount(st.style, col.name, size, shelfRaw, stockRaw);
}

function advanceSlot(dir){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  state.curSizeIdx += dir;

  if(state.curSizeIdx >= col.sizes.length){
    state.curColorIdx++;
    state.curSizeIdx = 0;
    if(state.curColorIdx >= st.colors.length){
      state.curStyleIdx++;
      state.curColorIdx = 0;
      if(state.curStyleIdx >= state.structure.length){
        // finished everything
        state.curStyleIdx = state.structure.length - 1;
        state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
        state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
        showToast("這個款式已經盤完了 🎉");
        state.view = "home";
        render();
        return;
      }
    }
  } else if(state.curSizeIdx < 0){
    state.curColorIdx--;
    if(state.curColorIdx < 0){
      state.curStyleIdx--;
      if(state.curStyleIdx < 0){ state.curStyleIdx = 0; state.curColorIdx = 0; state.curSizeIdx = 0; render(); return; }
      state.curColorIdx = state.structure[state.curStyleIdx].colors.length - 1;
    }
    state.curSizeIdx = state.structure[state.curStyleIdx].colors[state.curColorIdx].sizes.length - 1;
  }
  render();
}

init();
})();
