  render();
  expandedBrands.forEach(function(name){
    document.querySelectorAll('.brand-group').forEach(function(g){
      if(g.getAttribute('data-brand-name') === name) g.classList.add('expanded');
    });
  });
  expandedStyles.forEach(function(name){
    document.querySelectorAll('.style-group').forEach(function(sg){
      var nameEl = sg.querySelector('.sg-name');
      if(nameEl && nameEl.textContent.trim().split(' ')[0] === name){
        sg.classList.add('expanded');
      }
    });
  });
}

// ---------- HOME ----------
function findStyleIdx(styleName){
  for(var i=0;i<state.structure.length;i++){
    if(state.structure[i].style === styleName) return i;
  }
  return -1;
}

function groupProgress(group, counts){
  var total=0, done=0;
  group.styles.forEach(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return;
    var p = styleProgress(state.structure[idx], counts);
    total += p.total; done += p.done;
  });
  return {total:total, done:done};
}

function renderHome(){
  var structure = state.structure;
  var total = totalSizeSlots(structure);
  var done = doneSizeSlots(structure, state.counts);
  var pct = total ? Math.round(done/total*100) : 0;

  // 複盤任務入口：算出待複盤筆數。非主管只算指派給自己的筆數，跟點進複盤頁看到的數字一致。
  var recountKeys = visibleRecountKeys();
  var recountCount = recountKeys.length;
  var recountEntryHtml = recountCount > 0
    ? '<button class="btn secondary" data-action="goto-recount" style="border-color:#e0b8a8; color:var(--accent-deep); margin-top:10px;">📋 複盤任務（'+recountCount+' 筆待處理）</button>'
    : '';

  var brandGroups = computeBrandGroups();
  var rows = brandGroups.map(function(g){
    if(g.brand === null){
      // 獨立顯示：直接點進去盤點，不用先選品牌
      var styleName = g.styles[0];
      var idx = findStyleIdx(styleName);
      if(idx === -1) return ""; // 該款式尚未建立在結構裡，先不顯示
      var p = styleProgress(structure[idx], state.counts);
      var pct2 = p.total ? Math.round(p.done/p.total*100) : 0;
      return '<div class="list-row" data-action="open-style" data-style-idx="'+idx+'">'+
        '<div class="left">'+escapeHtml(styleName)+
        '<div class="meta">'+structure[idx].colors.length+' 色 · 已完成 '+p.done+'/'+p.total+'（'+pct2+'%）</div>'+
        '</div><div class="chev">›</div></div>';
    } else {
      var gp = groupProgress(g, state.counts);
      var pct3 = gp.total ? Math.round(gp.done/gp.total*100) : 0;
      var existCount = g.styles.filter(function(s){ return findStyleIdx(s) !== -1; }).length;
      return '<div class="list-row" data-action="open-brand" data-brand-name="'+escapeHtml(g.brand)+'">'+
        '<div class="left">'+escapeHtml(g.brand)+
        '<div class="meta">'+existCount+' 個型號 · 已完成 '+gp.done+'/'+gp.total+'（'+pct3+'%）</div>'+
        '</div><div class="chev">›</div></div>';
    }
  }).join("");

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<div class="brand">盤點工具</div>'+
      '<button class="icon-btn warn-btn" data-action="goto-setup">🔒 管理用設定</button>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>整體進度 '+done+' / '+total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
    '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 16px 10px; font-size:12px; color:var(--muted);">'+
      '<span id="sync-status">'+getSyncStatusText()+'</span>'+
      '<button class="icon-btn" data-action="manual-sync" style="font-size:12px; padding:4px 10px;">🔄 立即更新</button>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<button class="btn secondary" data-action="goto-summary">查看彙總 / 匯出貼回 Sheet</button>'+
    recountEntryHtml+
    '<div class="panel">'+
      '<h2>選擇品牌</h2>'+
      '<p class="sub">點品牌進入選型號，再逐色逐尺寸填寫，資料即時同步，多人可同時進行不同款式或顏色。</p>'+
      (rows || emptyStateHtml('還沒有設定款式', '請管理人員到「管理用設定」加入款式、顏色與尺寸'))+
    '</div>'+
  '</main>'+
  '<div class="footer-note">填寫的數字會即時存到雲端，所有人共用同一份資料</div>';
}

function renderBrandModels(){
  var brandGroups = computeBrandGroups();
  var g = brandGroups.find(function(grp){ return grp.brand === state.curBrandName; });
  if(!g){
    // 該品牌已不存在（可能被重命名或刪除），回首頁
    state.view = "home";
    return renderHome();
  }
  var structure = state.structure;

  var rows = g.styles.map(function(styleName){
    var idx = findStyleIdx(styleName);
    if(idx === -1) return "";
    var p = styleProgress(structure[idx], state.counts);
    var pct2 = p.total ? Math.round(p.done/p.total*100) : 0;
    return '<div class="list-row" data-action="open-style" data-style-idx="'+idx+'">'+
      '<div class="left">'+escapeHtml(styleName)+

      '</div><div class="chev">›</div></div>';
  }).join("");

  var gp = groupProgress(g, state.counts);
  var pct = gp.total ? Math.round(gp.done/gp.total*100) : 0;

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="goto-home">‹ 品牌</button>'+
      '<div class="brand">'+escapeHtml(g.brand)+'</div>'+
      '<span style="width:60px"></span>'+
    '</div>'+
    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(g.brand)+' 進度 '+gp.done+' / '+gp.total+'</span><span>'+pct+'%</span></div>'+

  '</div>'+

}

// ---------- 算式共用邏輯（初盤標籤編輯器、複盤輸入框都用同一套） ----------

// 把可能的運算符號統一正規化成標準的 + 和 ×：
// 乘號同時接受 × * x X ＊（全形星號）；加號同時接受 + ＋（全形加號）
function normalizeExprSymbols(str){
  return String(str).replace(/[×xX*＊]/g, "×").replace(/＋/g, "+");
}

// 驗證一個算式字串是否合法（可加可乘，例如 "12×6+8"）。
// 空字串（或只有空白）視為合法，代表「還沒填」，回傳 null；
// 格式有問題（看不懂的符號、運算符前後沒有數字）回傳錯誤訊息文字。
function validateExpr(str){
  if(str === null || str === undefined) return null;
  var s = normalizeExprSymbols(str).replace(/\s+/g, "");
  if(s === "") return null;
  if(/[^0-9.+×]/.test(s)){
    return "「"+str+"」有看不懂的符號，只能用數字、加號（+）或乘號（×／*／x）";
  }
  var terms = s.split("+");
  for(var i=0;i<terms.length;i++){
    var factors = terms[i].split("×");
    for(var j=0;j<factors.length;j++){
      var f = factors[j];
      if(f === "" || isNaN(Number(f))){
        return "「"+str+"」算式沒打完整，請確認每個 + 或 × 前後都有數字";
      }
    }
  }
  return null;
}

// 把算式字串拆成 token 陣列，例如 "12×6+8" -> [{t:'num',v:'12'},{t:'op',v:'×'},{t:'num',v:'6'},{t:'op',v:'+'},{t:'num',v:'8'}]
function tokenizeExpr(str){
  if(!str) return [];
  var s = normalizeExprSymbols(str).replace(/\s+/g, "");
  if(s === "") return [];
  var tokens = [];
  var num = "";
  for(var i=0;i<s.length;i++){
    var ch = s[i];
    if(ch === "+" || ch === "×"){
      if(num !== ""){ tokens.push({t:'num', v:num}); num=""; }
      tokens.push({t:'op', v:ch});
    } else {
      num += ch;
    }
  }
  if(num !== "") tokens.push({t:'num', v:num});
  return tokens;
}

// 把 token 陣列組回字串
function tokensToStr(tokens){
  return tokens.map(function(tk){ return tk.v; }).join("");
}

// 產生「標籤式算式編輯器」的 HTML。field 為 "shelf" 或 "stock"
function renderExprEditor(field){
  var html = '<div class="expr-chips" id="'+field+'-chips">';
  html += renderTokenChips(field); // 前面的數字/運算符標籤（這塊會被就地更新）
  // 固定不動的新增區：輸入框 + 加號/乘號按鈕（DOM 不重建，鍵盤不收起）
  html += '<input class="expr-newinput" id="'+field+'-newinput" type="text" inputmode="decimal" placeholder="0">';
  html += '<div class="expr-addbtns">'+
    '<button class="expr-addbtn add-plus" data-action="add-token" data-field="'+field+'" data-op="+" type="button">+</button>'+
    '<button class="expr-addbtn add-times" data-action="add-token" data-field="'+field+'" data-op="×" type="button">×</button>'+
  '</div>';
  html += '</div>';
  html += '<div id="'+field+'-editor"></div>'; // 點標籤後的編輯彈窗會放這裡
  return html;
}

// 只產生前面那串數字/運算符標籤（不含輸入框），供就地更新用
function renderTokenChips(field){
  var exprStr = field === 'shelf' ? state.exprShelf : state.exprStock;
  var tokens = tokenizeExpr(exprStr);
  var html = '<span id="'+field+'-chiplist" class="expr-chiplist">';
  tokens.forEach(function(tk, idx){
    if(tk.t === 'num'){
      html += '<span class="expr-chip-num" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    } else {
      var opcls = tk.v === '×' ? 'op-times' : 'op-plus';
      html += '<span class="expr-chip-op '+opcls+'" data-action="edit-token" data-field="'+field+'" data-idx="'+idx+'">'+escapeHtml(tk.v)+'</span>';
    }
  });
  html += '</span>';
  return html;
}

function renderCounting(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  var size = col.sizes[state.curSizeIdx];
  var key = keyFor(st.style, col.name, size);
  var existing = state.counts[key] || {shelf:"", stock:""};
  var p = styleProgress(st, state.counts);
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;

  var chips = col.sizes.map(function(sz, i){
    var k = keyFor(st.style, col.name, sz);
    var cls = "chip";
    if(i === state.curSizeIdx) cls += " active";
    else if(state.failedSaveKeys[k]) cls += " save-failed";
    else if(slotComplete(state.counts[k])) cls += " done";
    return '<button class="'+cls+'" data-action="jump-size" data-size-idx="'+i+'">'+escapeHtml(sz)+'</button>';
  }).join("");

  var colorChips = st.colors.map(function(c, i){
    var cls = "chip";
    if(i === state.curColorIdx) cls += " active";
    else if(colorDone(st, c, state.counts)) cls += " done";

  // 優先顯示原始算式文字（同一次開啟工具期間都會保留），沒有的話才顯示已存的數字
  var shelfVal = existing.shelfExpr !== undefined ? existing.shelfExpr : (existing.shelf !== undefined ? String(existing.shelf) : "");
  var stockVal = existing.stockExpr !== undefined ? existing.stockExpr : (existing.stock !== undefined ? String(existing.stock) : "");
  // 把目前格位的算式同步到 state，標籤編輯器以 state 為準
  state.exprShelf = shelfVal;
  state.exprStock = stockVal;

  var isFirst = state.curStyleIdx === 0 && state.curColorIdx === 0 && state.curSizeIdx === 0;
  var isLast = isLastSlot();

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+

      '<div class="brand">盤點中</div>'+
      '<span style="width:70px"></span>'+

    '<div class="progress-wrap">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label"><span>'+escapeHtml(st.style)+' 進度 '+p.done+'/'+p.total+'</span><span>'+pct+'%</span></div>'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 14px; margin-bottom:10px; background:#fcfbf8; border:1px solid var(--line); border-radius:10px; font-size:12px;">'+
      '<span style="color:var(--muted);">你的盤點身分：<strong style="color:var(--ink);">'+(getRecountUserName() ? escapeHtml(getRecountUserName()) : '尚未設定')+'</strong></span>'+
      '<button class="mini-btn" data-action="change-recount-username">'+(getRecountUserName() ? '改名字' : '設定名字')+'</button>'+
    '</div>'+
    '<div class="chip-strip">'+colorChips+'</div>'+
    '<div class="count-card">'+
      '<div class="ctx-label">款式 / 顏色</div>'+
      '<div class="style-name">'+escapeHtml(st.style)+' · '+escapeHtml(col.name)+'</div>'+
      '<div class="size-name">'+escapeHtml(size)+'</div>'+
      '<div class="input-grid">'+
        '<div class="num-box" id="shelf-box">'+
          '<label>架上</label>'+
          renderExprEditor('shelf')+
        '</div>'+
        '<div class="num-box" id="stock-box">'+
          '<label>庫存</label>'+
          renderExprEditor('stock')+
        '</div>'+
      '</div>'+
      '<div class="sum-row"><span class="sum-label">加總</span><span class="sum-val" id="sum-val">'+total+'</span></div>'+
      '<div class="nav-row">'+
        '<button class="btn secondary" data-action="prev-slot" '+(isFirst?'disabled':'')+'>‹ 上一項</button>'+
        '<button class="btn" data-action="next-slot">'+(isLast?'完成 ✓':'下一項 ›')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="chip-strip" style="margin-top:-6px;">'+chips+'</div>'+
  '</main>';
}

function isLastSlot(){
  var st = state.structure[state.curStyleIdx];
  var col = st.colors[state.curColorIdx];
  return state.curStyleIdx === state.structure.length - 1 &&
         state.curColorIdx === st.colors.length - 1 &&
         state.curSizeIdx === col.sizes.length - 1;
}

// ---------- SUMMARY ----------
function renderSummary(){
  var structure = state.structure;
  var tsvLines = ["款式\t顏色\t尺寸\t架上\t庫存\t加總"];

  // ERP 匯出用的款式下拉選單
  var erpStyleOptions = structure.map(function(st){
    return '<option value="'+escapeHtml(st.style)+'">'+escapeHtml(st.style)+'</option>';
  }).join("");

  // 先把所有資料按品牌分組
  function buildStyleTableHtml(st){
    var html = '<div style="overflow-x:auto;">'+
      '<table class="summary"><thead><tr><th><span style="display:inline-block; width:7px; height:7px; border-radius:50%; background:#e87a3e; margin-right:4px; vertical-align:middle;"></span>顏色</th><th>尺寸</th><th>架上</th><th>庫存</th><th>加總</th><th>複盤</th></tr></thead><tbody>';
    var styleShelf=0, styleStock=0, styleTotal=0, missingCount=0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
        var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
        var isMissing = !(shelfFilled && stockFilled); // 任一格沒填都算未完成
        if(isMissing) missingCount++;
        var shelf = shelfFilled ? c.shelf : "";
        var stock = stockFilled ? c.stock : "";
        var total = (shelfFilled || stockFilled) ? ((Number(c.shelf)||0)+(Number(c.stock)||0)) : "";
        var rowStyle = isMissing ? ' style="background:#fff4e6;"' : '';
        var colorCell = isMissing
          ? '<td style="color:#c45a1e; font-weight:700; white-space:nowrap;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#e87a3e; margin-right:6px; vertical-align:middle;"></span>'+escapeHtml(col.name)+'</td>'
          : '<td>'+escapeHtml(col.name)+'</td>';
        // 架上、庫存欄：沒填的那格顯示紅色「未填」，有填顯示數字
        var shelfCell = shelfFilled
          ? '<td class="num">'+shelf+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        var stockCell = stockFilled
          ? '<td class="num">'+stock+'</td>'
          : '<td class="num" style="color:#e87a3e; font-weight:700;">未填</td>';
        // 複盤標記欄：要不要複盤是 key in 人員依 ERP 比對在這裡決定的，所以標記/取消/再標記都在這裡做。
        // 四種狀態：未標記(標記)／已標記未確認(已標記，點了取消)／已確認(第一輪確認，點了開啟第二輪，
        // 第二輪功能關閉中則變成不可點的純標籤，見 ENABLE_SECOND_ROUND)／已定案(第二輪或之後確認過，
        // 不能再點開下一輪)。已確認的格子不再能從這裡整筆刪除——真的要修正已回寫錯誤的數字，
        // 改到複盤頁「顯示已完結」清單裡讓主管修正回寫（見 buildRecountConfirmSectionHtml）。
        var recountR = state.recounts[key];
        var isMarked = !!recountR;
        var recountCell;
        // 全員可看，只有 key in 身分(或主管)能點——這一整塊複盤標記/取消/備註的按鈕都受這個判定管控，
        // 非 key in 身分看到的一律換成不可點的 <span>，文字/配色不變，資訊照樣透明。
        var canOpRecount = canOperateSummary();
        if(isMarked){
          // key in 人員是唯一知道 ERP 差異線索的人（例如「差1箱，可能庫存漏點」），這裡讓他能直接記下來。
          // 備註編輯走置中彈出的視窗（見 openRecountNoteModal），不是格子內展開——表格有橫向捲動，
          // 展開在格子裡常常會落在螢幕外找不到，改用 fixed 定位的彈窗就不受橫向捲動位置影響。
          var rNote = String(recountR.note || "").trim();
          var noteBtnHtml = canOpRecount
            ? '<button class="mini-btn'+(rNote?' marked':'')+'" data-action="open-recount-note-modal" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">'+(rNote?'✎有備註':'✎備註')+'</button>'
            : '<span class="mini-btn'+(rNote?' marked':'')+'" style="cursor:default;">'+(rNote?'✎有備註':'✎備註')+'</span>';
          // 按鈕文字盡量短：欄寬是由這欄最寬的子元素撐出來的，文字越短欄位越窄，橫向捲動距離越少
          // 第一輪回寫完顯示「已複盤」（不是「已確認」——避免被誤讀成整個流程已經結束，其實只是
          // 完成了複盤這一步，還要 key in 重登 ERP 確認數字才算真的收尾），配色維持綠色不變；
          // 已標記但還沒確認（中繼狀態）改用琥珀色，呼應「複盤處理中」徽章的顏色——兩顆按鈕顏色差
          // 夠多，不會誤按。
          // 已定案(第二輪或之後的確認)改成不可點的 <span>，不是 <button>，避免被誤觸開出不存在的第三輪入口；
          // 判定用後端的 everReopened 旗標(一旦開過下一輪就永久是 true)，不用數值比對猜，避免複盤結果
          // 剛好跟原數字一樣時誤判成「還是第一輪」。
          var markToggleBtnHtml;
          if(recountR.confirmed && recountR.everReopened){
            markToggleBtnHtml = '<span class="mini-btn locked-final" title="第二輪(或之後)確認回寫的最終定案，不能再開下一輪">已定案</span>';
          } else if(recountR.confirmed && !ENABLE_SECOND_ROUND){
            // 第二輪功能關閉中：這裡只變成不可點的純標籤，不開放再開下一輪(見 ENABLE_SECOND_ROUND)
            markToggleBtnHtml = '<span class="mini-btn marked" title="第二輪複盤功能目前關閉中" style="cursor:default;">已複盤</span>';
          } else if(recountR.confirmed){
            markToggleBtnHtml = canOpRecount
              ? '<button class="mini-btn marked" data-action="remark-recount-next-round" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">已複盤</button>'
              : '<span class="mini-btn marked" style="cursor:default;">已複盤</span>';
          } else {
            markToggleBtnHtml = canOpRecount
              ? '<button class="mini-btn pending-mark" data-action="unmark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">已標記</button>'
              : '<span class="mini-btn pending-mark" style="cursor:default;">已標記</span>';
          }
          recountCell = '<td class="num" style="white-space:nowrap;">'+
            '<div style="display:flex; flex-direction:column; gap:4px; align-items:flex-end;">'+
              markToggleBtnHtml+
              noteBtnHtml+
            '</div>'+
          '</td>';
        } else {
          recountCell = canOpRecount
            ? '<td class="num" style="white-space:nowrap;"><button class="mini-btn" data-action="mark-recount" data-style="'+escapeHtml(st.style)+'" data-color="'+escapeHtml(col.name)+'" data-size="'+escapeHtml(sz)+'">標記</button></td>'
            : '<td class="num" style="white-space:nowrap;"><span class="mini-btn" style="cursor:default;">標記</span></td>';
        }
        html += '<tr'+rowStyle+'>'+colorCell+'<td>'+escapeHtml(sz)+'</td>'+
          shelfCell + stockCell +
          '<td class="num"><strong>'+(total===""?'—':total)+'</strong></td>'+
          recountCell + '</tr>';
        tsvLines.push([st.style, col.name, sz, shelf, stock, total].join("\t"));
        if(c){ styleShelf+=Number(c.shelf)||0; styleStock+=Number(c.stock)||0; styleTotal+=(Number(c.shelf)||0)+(Number(c.stock)||0); }
      });
    });
    html += '<tr style="background:#faf7f1;"><td colspan="2"><strong>小計</strong></td>'+
      '<td class="num"><strong>'+styleShelf+'</strong></td>'+
      '<td class="num"><strong>'+styleStock+'</strong></td>'+
      '<td class="num"><strong>'+styleTotal+'</strong></td><td></td></tr>';
    html += '</tbody></table></div>';
    return {html:html, total:styleTotal, missing:missingCount};
  }

  // 計算單一款式的總計（彙總用，不依賴上面那個函式）
  function calcStyleTotal(st){
    var t = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var c = state.counts[keyFor(st.style, col.name, sz)];
        if(c) t += Number(c.total)||0;
      });
    });
    return t;
  }

  // 依動態計算的品牌分組組裝畫面（從 state.structure 即時算出）
  var groupsHtml = "";
  var grandMissing = 0;
  computeBrandGroups().forEach(function(g){
    var groupStyles = g.styles
      .map(function(name){ return structure.find(function(s){ return s.style === name; }); })
      .filter(function(s){ return s; });
    if(groupStyles.length === 0) return;

    var groupName = g.brand === null ? groupStyles[0].style : g.brand;
    var styleCount = groupStyles.length;
    var groupTotal = 0;
    var groupMissing = 0;
    var bodyHtml = "";

    groupStyles.forEach(function(st){
      var built = buildStyleTableHtml(st);
      groupTotal += built.total;
      groupMissing += built.missing;
      if(g.brand !== null){
        // 品牌底下多個型號：每個型號做成可摺疊的小卡片
        var styleMissingTag = built.missing > 0 ? ' <span style="background:#e87a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">未輸入 '+built.missing+'</span>' : '';
        var styleTotalText = ' · 合計 '+built.total;
        var styleClaimBtnHtml = buildClaimBtnHtml(st.style);
        var styleConfirmStatusHtml = buildConfirmStatusBadgeHtml(st.style);
        var styleVerifyBtnHtml = buildVerifyBtnHtml(st.style);
        bodyHtml += '<div class="style-group'+(built.missing > 0 ? ' has-missing' : '')+'">'+
          '<div class="style-group-header" data-action="toggle-style-group">'+
            '<div class="sg-left">'+
              '<div class="sg-name">'+escapeHtml(st.style)+styleMissingTag+'</div>'+
              '<div class="sg-meta">'+st.colors.length+' 色'+styleTotalText+'</div>'+
            '</div>'+
            '<div class="hdr-right">'+
              styleConfirmStatusHtml+
              styleClaimBtnHtml+
              styleVerifyBtnHtml+
              '<div class="sg-arrow">›</div>'+
            '</div>'+
          '</div>'+
          '<div class="style-group-body">'+built.html+'</div>'+
        '</div>';
      } else {
        // 獨立款式（品牌只有一個型號）直接顯示明細
        bodyHtml += built.html;
      }
    });

    grandMissing += groupMissing;
    var metaParts = [];
    if(g.brand !== null) metaParts.push(styleCount + ' 個型號');
    if(groupMissing > 0) metaParts.push('<span style="color:#e87a3e; font-weight:700;">未輸入 '+groupMissing+' 筆</span>');
    var metaText = metaParts.join(' · ');
    // 沒有品牌分組的獨立款式：這一層 brand-group 其實就代表單一型號，所以認領按鈕跟登錄狀態放在這裡；
    // 有品牌分組的話，這兩個都已經放在上面每個型號各自的 style-group-header 裡，這裡不重複放
    var groupClaimBtnHtml = g.brand === null ? buildClaimBtnHtml(groupName) : '';
    var groupConfirmStatusHtml = g.brand === null ? buildConfirmStatusBadgeHtml(groupName) : '';
    var groupVerifyBtnHtml = g.brand === null ? buildVerifyBtnHtml(groupName) : '';
    // 品牌層(未展開就看得到的最外層)狀態標籤：三個訊號都直接從 groupStyles 算——這就是這次迴圈
    // 實際拿來畫這個品牌底下型號列表的同一份陣列，不再另外呼叫獨立函式重新分組一次(之前「全部認領」
    // 判定不出來的 bug 就是這樣造成的)，兩邊保證是同一份資料，不會對不起來。
    // 認領≠完成：認領只是登了 ERP，還要 key in 核對資料無差異(或走複盤鏈)才算真的完成
    // (見 computeStyleConfirmStatus)，所以這裡分開算「全部認領」跟「全部完成」兩個獨立訊號，
    // 再用優先序組字：
    //   1. 品牌底下任一型號還有未解決的複盤(⚠處理中或🔔可重新登錄) → 一定顯示「⚠ 複盤處理中」
    //      (不管認領/核對完了沒，這是最需要主管注意的訊號，優先權最高，避免誤以為認領完=複盤也結束了)；
    //      這時如果剛好也全部認領了，額外加顯示「🔎 核對中」，讓主管知道 ERP 端至少都登過了，
    //      卡住的是複盤。
    //   2. 沒有未解決的複盤，且底下所有型號都達到「✅ 完成」→ 顯示「✅ 已完成」。
    //   3. 沒有未解決的複盤，全部認領但不是全部完成(還有型號認領了但還沒核對、也還沒標記複盤)
    //      → 顯示「🔎 核對中」，明示還沒結束，不要讓「全部認領」被誤讀成「全部完成」。
    //   4. 其餘(還沒全部認領、複盤也沒問題) → 維持不顯示標籤。
    var brandAllClaimed = g.brand !== null && groupStyles.length > 0 && groupStyles.every(function(st){
      return !!state.claims[st.style];
    });
    var brandAllDone = g.brand !== null && groupStyles.length > 0 && groupStyles.every(function(st){
      return computeStyleConfirmStatus(st.style).status === "done";
    });
    var brandHasUnresolvedRecount = g.brand !== null && groupStyles.some(function(st){
      var s = computeStyleConfirmStatus(st.style).status;
      return s === "pending" || s === "needsRelog";
    });
    var brandClaimTag = "";
    if(brandHasUnresolvedRecount){
      if(brandAllClaimed){
        brandClaimTag += ' <span style="background:#f0e9fb; color:#6a3fa0; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">🔎 核對中</span>';
      }
      brandClaimTag += ' <span style="background:#fdf0e4; color:#c45a1e; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">⚠ 複盤處理中</span>';
    } else if(brandAllDone){
      brandClaimTag = ' <span style="background:#2f7a3e; color:#fff; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">✅ 已完成</span>';
    } else if(brandAllClaimed){
      brandClaimTag = ' <span style="background:#f0e9fb; color:#6a3fa0; font-size:11px; padding:2px 7px; border-radius:6px; font-weight:700;">🔎 核對中</span>';
    }
    groupsHtml += '<div class="brand-group'+(groupMissing > 0 ? ' has-missing' : '')+'" data-brand-name="'+escapeHtml(groupName)+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+escapeHtml(groupName)+brandClaimTag+'</div>'+
            (metaText ? '<div class="bg-meta">'+metaText+'</div>' : '')+
          '</div>'+
        '</div>'+
        '<div class="hdr-right">'+
          '<div class="bg-totals">合計 '+groupTotal+'</div>'+
          groupConfirmStatusHtml+
          groupClaimBtnHtml+
          groupVerifyBtnHtml+
          '<div class="bg-arrow">›</div>'+
        '</div>'+
      '</div>'+
      '<div class="brand-group-body">'+bodyHtml+'</div>'+
    '</div>';
  });

  // 整體總計
  var grandTotal = 0;
  structure.forEach(function(st){ grandTotal += calcStyleTotal(st); });

  return ''+
  '<div class="topbar"><div class="topbar-row">'+
    '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
    '<div class="brand">彙總 / 匯出</div>'+
    '<button class="icon-btn" data-action="refresh-summary" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
  '</div>'+
    '<div id="summary-update-hint" data-action="refresh-summary" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
      '🔔 有新資料，點此刷新明細'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div class="panel">'+
      '<h2>匯出 ERP 匯入格式（品號／數量／倉別）</h2>'+
      '<p class="sub">選一個款式，匯出成 ERP 可匯入的格式。品號會自動組成（如 101-01#XS），數量用第一次盤點的架上+庫存加總，倉別依款式自動帶入（AG1000/2000/3000、TH 系列為 A02，其餘 A01）。只匯出有盤過的格。</p>'+
      '<div class="field">'+
        '<label>選擇款式</label>'+
        '<select id="erp-export-style">'+erpStyleOptions+'</select>'+
      '</div>'+
      '<button class="btn secondary" data-action="download-erp">匯出這個款式（ERP 格式）</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>明細（依品牌分組）</h2>'+
      '<p class="sub">點品牌標題展開或收合該品牌的明細。整體加總：<strong style="color:var(--accent-deep);">'+grandTotal+'</strong>'+
        (grandMissing > 0 ? ' · <strong style="color:#e87a3e;">尚有 '+grandMissing+' 筆未輸入</strong>' : ' · <strong style="color:#2f7a3e;">已全部輸入完成 ✓</strong>')+
      '</p>'+
      groupsHtml+
    '</div>'+
    '<div class="panel">'+
      '<h2>更新 Google Sheet 彙總分頁</h2>'+
      '<p class="sub">會在你的 Google Sheet 裡自動產生「彙總_款式名稱」分頁（不會動到原本既有的分頁），每個品項一個分頁，內容是該品項所有顏色、尺寸的架上／庫存／加總明細與總計。需要重新整理 Sheet 才會看到新分頁。</p>'+
      '<button class="btn" data-action="regenerate-sheets">更新 Google Sheet 彙總分頁</button>'+
    '</div>'+
    '<div class="panel">'+
      '<h2>備用：下載 Excel 快照</h2>'+
      '<p class="sub">如果想要一份獨立的 Excel 檔（不在 Google Sheet 裡），可以用這個，結構跟上面的彙總分頁一樣。</p>'+
      '<button class="btn secondary" data-action="download-xlsx">下載 Excel（.xlsx）</button>'+
    '</div>'+
  '</main>'+
  '<div id="tsv-data" style="display:none;">'+escapeHtml(tsvLines.join("\n"))+'</div>';
}

// ---------- 複盤進度總覽（依品牌/款式彙總，只讀 state，不影響複盤存檔/樂觀更新/自動同步） ----------
// 複盤是否已填完成：架上、庫存兩格都要填才算完成（跟第一次盤點的完成判斷邏輯一致），
// 備註欄不算在內——沒填備註不影響完成進度。
function isRecountFilled(r){
  if(!r) return false;
  var shelfFilled = r.shelf !== null && r.shelf !== undefined && String(r.shelf).trim() !== "";
  var stockFilled = r.stock !== null && r.stock !== undefined && String(r.stock).trim() !== "";
  return shelfFilled && stockFilled;
}

// 這一格是否留著「快照」：只要原初盤架上(beforeShelf)有值，就代表這格曾經被確認回寫過至少一輪。
// 是「第一次(原)」顯示條件（已確認+有快照）和「第二輪」判定（未確認+有快照）共用的底層訊號，
// 兩處都用同一個函式，避免各寫一份邏輯之後跑掉不同步。
function hasRecountSnapshot(r){
  return !!r && r.beforeShelf !== "" && r.beforeShelf !== null && r.beforeShelf !== undefined;
}
// 第二輪：曾經確認回寫過(有快照)，但現在還沒確認——可能是剛被重新標記(markRecount 開啟第二輪時
// 會把 confirmed 重設成 false)，也可能複盤數字還沒填完/填完但還沒按「完成回寫」。
function isSecondRoundRecount(r){
  return !!r && !r.confirmed && hasRecountSnapshot(r);
}

// 「初盤」該讀哪一組快照：優先用首輪原始快照(veryFirst，有史以來第一次確認的值，之後不管開第幾輪、
// 確認幾次都不會被覆蓋)，沒有(這次改動之前就已經確認過的舊格子)才退回 before 值(Q/R/S，這一輪確認前
// 的即時值)相容——只經過一輪的格子兩者本來就是同一個值，只有進到第三輪以上才可能有落差。
// 已確認卡片的「第一次（原）」、第二輪卡片新增的「初盤」欄位都共用這個函式，確保同一套「原始值」概念
// 全站一致，不會不同畫面各算各的。
function resolveVeryFirstSnapshot(r){
  var hasVeryFirst = r.veryFirstShelf !== "" && r.veryFirstShelf !== null && r.veryFirstShelf !== undefined;
  if(hasVeryFirst){
    return { shelf: r.veryFirstShelf, stock: r.veryFirstStock, countedBy: r.veryFirstCountedBy };
  }
  return { shelf: r.beforeShelf, stock: r.beforeStock, countedBy: r.beforeCountedBy };
}

// 取得某個複盤 key（"款式|顏色|尺寸"）所屬的品牌名稱(沒品牌回傳空字串)
// 跟 renderRecount() 內部的 brandOfKey 是同一套邏輯，這裡另外開一個全域版本給就地更新用
function brandOfRecountKey(key){
  var style = key.split("|")[0];
  var g = findBrandGroupForStyle(style);
  return (g && g.brand) ? g.brand : "";
}

// 取得某個複盤 key 所屬品牌的負責人名單（最多兩位，沒設定品牌負責人或沒品牌回傳空陣列）——
// 第二輪格子的「自動可見範圍」(visibleRecountKeys)跟「誰能填數字」(canEditRecountKey)共用
// 同一份判斷，避免各寫一份邏輯之後跑掉不同步。
function brandOwnersForKey(key){
  var brand = brandOfRecountKey(key);
  if(!brand) return [];
  return (state.brandOwners[brand] || []).filter(function(n){ return !!n; });
}

// 主管視角「這一格算誰的」——複盤清單「依複盤人篩選」的比對來源，跟 visibleRecountKeys() 判斷
// 非主管看不看得到同一格是同一套依據：第一輪看指派紀錄(state.assignments，不管盤了沒)，
// 第二輪不走指派，直接看品牌負責人(自動歸戶)。故意不比對 recounts[k].assignee(誰實際填了數字)，
// 那個欄位要盤完才有值，拿來篩人的話「指派了但還沒盤」的格子永遠篩不到，主管想追蹤的對象反而消失。
function recountResponsibleNames(key){
  var r = state.recounts[key];
  if(isSecondRoundRecount(r)) return brandOwnersForKey(key);
  var a = String(state.assignments[key] || "").trim();
  return a ? [a] : [];
}

// 目前這台手機的身分是否可以填寫某一格的複盤數字：主管一律可以；第二輪格子(isSecondRoundRecount)
// 不再走指派，只有這格所屬品牌的負責人可以，其他人一律鎖住——即使因為畫面還沒重整而看得到這格
// (見 patchRecountItemDisplay 的鎖定就地更新)，也不能填。第一輪格子沒有額外的編輯限制：
// 看得到清單(visibleRecountKeys)就代表已經被指派，跟現行規則一致。
function canEditRecountKey(key, r){
  if(isManager()) return true;
  if(isSecondRoundRecount(r)){
    var myName = getRecountUserName();
    return !!myName && brandOwnersForKey(key).indexOf(myName) !== -1;
  }
  return true;
}

// 就地更新單一複盤項目的「複盤加總」「差異」顯示，跟初盤 updateChipsInPlace() 同一套精神：
// 輸入框 DOM 完全不動、不整頁重畫，手機鍵盤不會因為重畫而收起。
// wasDone/isDoneNow 是這格「架上+庫存是否都已填」在這次修改前後的狀態，用來同步調整
// 品牌標題那一行「（X/Y 已複盤）」的計數（只有跨越「完成/未完成」門檻時才需要調整）。
function patchRecountItemDisplay(itemEl, key, wasDone, isDoneNow){
  if(!itemEl) return;
  var r = state.recounts[key];
  if(!r) return;
  // 第二輪/負責人/編輯權限：清單本身不會因背景同步增減項目(見上面呼叫端的說明)，但格子的
  // 「能不能編輯」會因為別人把這格推進第二輪而改變，所以這裡要先算好，後面同時拿來鎖輸入框、
  // 更新完成回寫按鈕、更新主管視角的指派徽章。
  var secondRoundNow = isSecondRoundRecount(r);
  var keyOwners = secondRoundNow ? brandOwnersForKey(key) : [];
  var editableNow = canEditRecountKey(key, r);
  var c = state.counts[key];
  // 已確認且有快照的格子改讀快照，不讀 state.counts——跟 buildRecountItem() 是同一套邏輯，
  // 這裡另外複製一份是因為背景同步的就地更新完全不會經過 buildRecountItem()，兩邊都要改才不會
  // 在下一輪同步時被這裡的舊邏輯把已經修好的「第一次」畫面蓋回去。
  var hasSnapshot = !!r.confirmed && hasRecountSnapshot(r);
  var firstSource = hasSnapshot ? resolveVeryFirstSnapshot(r) : c;
  var firstShelf = firstSource && firstSource.shelf !== "" && firstSource.shelf !== null && firstSource.shelf !== undefined ? (Number(firstSource.shelf)||0) : null;
  var firstStock = firstSource && firstSource.stock !== "" && firstSource.stock !== null && firstSource.stock !== undefined ? (Number(firstSource.stock)||0) : null;
  var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;
  var countedBy = (firstSource && firstSource.countedBy) ? String(firstSource.countedBy).trim() : "";

  var shelfRaw = (r.shelf !== null && r.shelf !== undefined) ? String(r.shelf) : "";
  var stockRaw = (r.stock !== null && r.stock !== undefined) ? String(r.stock) : "";
  var noteRaw = (r.note !== null && r.note !== undefined) ? String(r.note) : "";
  var recountShelfValPatch = isDoneNow ? parseExpr(shelfRaw) : null;
  var recountStockValPatch = isDoneNow ? parseExpr(stockRaw) : null;
  var recountVal = isDoneNow ? (recountShelfValPatch + recountStockValPatch) : null;

  // 就地更新架上／庫存／備註三個輸入框本身：同一套迴圈邏輯，不要各寫各的（備註沒有算式提示，
  // 用 hasCalcHint 開關跳過那段就好，邏輯還是共用同一份）。
  // 如果這個輸入框現在剛好是使用者正在打字的那一格（document.activeElement），就跳過不動它，
  // 避免背景同步把打到一半的內容蓋掉；沒在打字的那一格才同步成最新值——包含同步成空字串，
  // 這樣 A 機刪掉備註之後，B 機才會真的跟著清空，不會被「空字串是 falsy」擋下來。
  [
    {field:'shelf', raw:shelfRaw, selector:'.ri-input[data-field="shelf"]', hasCalcHint:true},
    {field:'stock', raw:stockRaw, selector:'.ri-input[data-field="stock"]', hasCalcHint:true},
    {field:'note',  raw:noteRaw,  selector:'.ri-note-input',                hasCalcHint:false}
  ].forEach(function(entry){
    var inputEl = itemEl.querySelector(entry.selector);
    if(!inputEl) return;
    // 架上/庫存輸入框的鎖定狀態要立刻反映，即使使用者正在打字也要鎖（代表權限已經被收回，
    // 瀏覽器會自動把焦點移開，這是預期行為，不是誤觸）；備註欄不鎖，不受這裡影響
    if(entry.field !== 'note') inputEl.disabled = !editableNow;
    if(document.activeElement === inputEl) return;
    if(inputEl.value !== entry.raw) inputEl.value = entry.raw;
    if(!entry.hasCalcHint) return;
    // 算式提示（例如「= 80」）跟著同步：有算式符號才顯示，沒有就把提示拿掉
    var numEl = inputEl.closest('.ri-num');
    var hintEl = numEl ? numEl.querySelector('.ri-calc-hint') : null;
    var hasCalc = entry.raw.trim() !== "" && /[+×xX*＊＋]/.test(entry.raw);
    if(hasCalc){
      if(!hintEl && numEl){
        hintEl = document.createElement('div');
        hintEl.className = 'ri-calc-hint';
        numEl.appendChild(hintEl);
      }
      if(hintEl) hintEl.textContent = '= ' + parseExpr(entry.raw);
    } else if(hintEl){
      hintEl.remove();
    }
  });

  // 「第一次」跟「初盤：OO」都是唯讀顯示（沒有輸入框，不用防呆保護），直接同步成最新值即可，
  // 避免 A 機重新初盤或改了初盤人、或另一台手機確認回寫之後，B 機這裡還卡著舊資料。
  var firstValEl = itemEl.querySelector('.ri-first-val');
  if(firstValEl) firstValEl.textContent = (firstTotal !== null ? firstTotal : '—');
  // 「初盤：OO」人名標籤只在第一輪顯示，跟 buildRecountItem() 是同一套邏輯——第二輪這裡讀到的
  // 其實是「第一輪複盤人」不是真正的初盤人，語意錯誤，乾脆不顯示。狀態可能在畫面顯示中途改變
  // (這格剛好被推進第二輪)，所以要能新增/移除整個元素，不能只清空文字留著空白標籤。
  var countedByEl = itemEl.querySelector('.ri-countedby');
  if(secondRoundNow){
    if(countedByEl) countedByEl.remove();
  } else {
    if(!countedByEl){
      var titleEl = itemEl.querySelector('.ri-title');
      if(titleEl){
        countedByEl = document.createElement('span');
        countedByEl.className = 'ri-countedby';
        countedByEl.style.cssText = 'font-weight:400; color:var(--muted); font-size:12px; margin-left:8px;';
        titleEl.appendChild(countedByEl);
      }
    }
    if(countedByEl) countedByEl.textContent = '初盤：' + (countedBy || '未記錄');
  }

  // 就地補上/移除「架上X／庫存Y」breakdown 小字跟「第一次（原）」標籤——有快照才顯示，
  // 邏輯跟 buildRecountItem() 一致，這裡是背景同步時就地更新版本（不整段重畫、輸入框不受影響）
  function syncNumSub(valEl, subText){
    if(!valEl) return;
    var numEl = valEl.closest('.ri-num');
    if(!numEl) return;
    var subEl = numEl.querySelector('.ri-num-sub');
    if(subText){
      if(!subEl){
        subEl = document.createElement('div');
        subEl.className = 'ri-num-sub';
        numEl.appendChild(subEl);
      }
      subEl.textContent = subText;
    } else if(subEl){
      subEl.remove();
    }
  }
  // 第一次/上一輪複盤/複盤加總 這三塊要不要顯示「架上X／庫存Y」細項，第二輪進行中(secondRoundNow)
  // 跟已確認且有快照(hasSnapshot)是同一批需要細項的狀態，統一用 showBreakdown 判斷，
  // 跟 buildRecountItem() 是同一套邏輯，避免各寫一份漏掉。
  var showBreakdown = hasSnapshot || secondRoundNow;
  var firstLabelEl = firstValEl ? firstValEl.closest('.ri-num').querySelector('.ri-num-label') : null;
  if(firstLabelEl) firstLabelEl.textContent = secondRoundNow ? '第一輪複盤' : (hasSnapshot ? '第一次（原）' : '第一次');
  syncNumSub(firstValEl, showBreakdown ? ('架上'+(firstShelf!==null?firstShelf:'—')+'／庫存'+(firstStock!==null?firstStock:'—')) : '');

  // 就地補上/移除「初盤」這一塊(只在第二輪進行中才出現)：插在「第一輪複盤」前面，帶一個箭頭，
  // 用 resolveVeryFirstSnapshot() 讀首輪原始快照，跟 buildRecountItem() 是同一套邏輯
  var numsEl = firstValEl ? firstValEl.closest('.ri-nums') : itemEl.querySelector('.ri-nums');
  var firstNumEl = firstValEl ? firstValEl.closest('.ri-num') : null;
  var veryFirstNumEl = numsEl ? numsEl.querySelector('.ri-veryfirst-num') : null;
  var veryFirstArrowEl = numsEl ? numsEl.querySelector('.ri-veryfirst-arrow') : null;
  if(secondRoundNow && numsEl && firstNumEl){
    var vf = resolveVeryFirstSnapshot(r);
    var vfShelf = vf.shelf !== "" && vf.shelf !== null && vf.shelf !== undefined ? (Number(vf.shelf)||0) : null;
    var vfStock = vf.stock !== "" && vf.stock !== null && vf.stock !== undefined ? (Number(vf.stock)||0) : null;
    var vfTotal = (vfShelf !== null || vfStock !== null) ? ((vfShelf||0)+(vfStock||0)) : null;
    if(!veryFirstNumEl){
      veryFirstNumEl = document.createElement('div');
      veryFirstNumEl.className = 'ri-num ri-veryfirst-num';
      veryFirstNumEl.innerHTML = '<div class="ri-num-label">初盤</div><div class="ri-num-val"></div><div class="ri-num-sub"></div>';
      veryFirstArrowEl = document.createElement('div');
      veryFirstArrowEl.className = 'ri-arrow ri-veryfirst-arrow';
      veryFirstArrowEl.textContent = '→';
      numsEl.insertBefore(veryFirstArrowEl, firstNumEl);
      numsEl.insertBefore(veryFirstNumEl, veryFirstArrowEl);
    }
    veryFirstNumEl.querySelector('.ri-num-val').textContent = (vfTotal !== null ? vfTotal : '—');
    veryFirstNumEl.querySelector('.ri-num-sub').textContent = '架上'+(vfShelf!==null?vfShelf:'—')+'／庫存'+(vfStock!==null?vfStock:'—');
  } else {
    if(veryFirstNumEl) veryFirstNumEl.remove();
    if(veryFirstArrowEl) veryFirstArrowEl.remove();
  }

  var diffHtml = "";
  if(firstTotal !== null && recountVal !== null){
    var diff = recountVal - firstTotal;
    var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
    var diffText = diff === 0 ? "一致 ✓" : (diff > 0 ? "+"+diff : ""+diff);
    diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
  } else if(recountVal === null){
    diffHtml = '<span style="color:var(--muted);">待複盤</span>';
  }

  itemEl.classList.toggle('done', isDoneNow);
  var totalEl = itemEl.querySelector('.ri-total-val');
  if(totalEl) totalEl.textContent = (recountVal !== null ? recountVal : '—');
  var totalLabelEl = totalEl ? totalEl.closest('.ri-num').querySelector('.ri-num-label') : null;
  if(totalLabelEl) totalLabelEl.textContent = secondRoundNow ? '第二輪複盤加總' : '複盤加總';
  syncNumSub(totalEl, showBreakdown ? ('架上'+(recountShelfValPatch!==null?recountShelfValPatch:'—')+'／庫存'+(recountStockValPatch!==null?recountStockValPatch:'—')) : '');
  var diffEl = itemEl.querySelector('.ri-diff-val');
  if(diffEl) diffEl.innerHTML = diffHtml;

  // 就地補上/移除「完成回寫」按鈕：架上/庫存兩格填完的當下就要能按，不用等使用者手動點「更新」整頁重畫；
  // 沒有編輯權限(第二輪的非負責人)一律不顯示按鈕，即使剛好兩格都有值
  var confirmSectionEl = itemEl.querySelector('.ri-confirm-section');
  if(confirmSectionEl){
    var keyParts = key.split("|");
    confirmSectionEl.innerHTML = buildRecountConfirmSectionHtml(r, keyParts[0], keyParts[1], keyParts[2], recountVal, editableNow);
  }

  // 就地補上/移除鎖定提示：權限狀態改變時（例如這格剛被別人推進第二輪，畫面還沒手動重整）要立刻反映，
  // 不能讓使用者以為自己還能填
  var fieldsEl = itemEl.querySelector('.ri-fields');
  var lockNoteEl = fieldsEl ? fieldsEl.querySelector('.ri-lock-note') : null;
  if(!editableNow){
    var lockText = '🔒 ' + (keyOwners.length > 0 ? '限負責人：'+keyOwners.join('、')+' 可填寫' : '限品牌負責人可填寫（尚未設定負責人）');
    if(!lockNoteEl && fieldsEl){
      lockNoteEl = document.createElement('div');
      lockNoteEl.className = 'ri-lock-note';
      fieldsEl.appendChild(lockNoteEl);
    }
    if(lockNoteEl) lockNoteEl.textContent = lockText;
  } else if(lockNoteEl){
    lockNoteEl.remove();
  }

  // 就地更新主管視角的指派徽章：第二輪格子現在只有「沒設定負責人」這個例外狀況才顯示(標紅提醒主管
  // 去綁定)，有負責人就完全不顯示——自動歸品牌負責人是制度，不用逐格標人名，卡片上已經有短標籤
  // 「⚠ 第二輪複盤」講過了。狀態會變(例如負責人剛好在這時候被設定/移除)，所以要能新增/移除整個
  // 元素，不能只改文字，不然會留著一個內容清空但還在佔位的空白圓角框。
  var assignBadgeEl = itemEl.querySelector('.ri-assign-badge');
  if(isManager()){
    var wantNoOwnerBadge = secondRoundNow && keyOwners.length === 0;
    if(secondRoundNow && !wantNoOwnerBadge){
      // 第二輪且有負責人：不顯示徽章
      if(assignBadgeEl) assignBadgeEl.remove();
    } else {
      if(!assignBadgeEl){
        assignBadgeEl = document.createElement('span');
        assignBadgeEl.className = 'ri-assign-badge';
        var hdrRightEl = itemEl.querySelector('.hdr-right');
        if(hdrRightEl) hdrRightEl.insertBefore(assignBadgeEl, hdrRightEl.firstChild);
      }
      if(wantNoOwnerBadge){
        assignBadgeEl.className = 'ri-assign-badge no-owner';
        assignBadgeEl.textContent = '⚠ 未設定負責人';
      } else {
        var assignedToNow = String(state.assignments[key] || "").trim();
        assignBadgeEl.className = 'ri-assign-badge' + (assignedToNow ? '' : ' unassigned');
        assignBadgeEl.textContent = assignedToNow ? '已派：'+assignedToNow : '未指派';
      }
    }
  } else if(assignBadgeEl){
    assignBadgeEl.remove();
  }

  // 就地更新狀態小標籤（尚無人複盤／OO 處理中／OO 複盤中／已由 OO 複盤）
  var badge = computeRecountBadge(r, isDoneNow);
  var badgeEl = itemEl.querySelector('.ri-assignee');
  if(badgeEl){
    badgeEl.className = 'ri-assignee' + (badge.cls ? ' '+badge.cls : '');
    badgeEl.textContent = badge.text;
  }

  // 就地補上/移除「⚠ 第二輪複盤」標籤，跟 buildRecountItem() 的順序一致：插在狀態小標籤(.ri-assignee)之前
  var secondRoundTagEl = itemEl.querySelector('.ri-second-round-tag');
  if(secondRoundNow){
    if(!secondRoundTagEl && badgeEl){
      secondRoundTagEl = document.createElement('span');
      secondRoundTagEl.className = 'ri-second-round-tag';
      badgeEl.parentNode.insertBefore(secondRoundTagEl, badgeEl);
    }
    if(secondRoundTagEl) secondRoundTagEl.textContent = '⚠ 第二輪複盤';
  } else if(secondRoundTagEl){
    secondRoundTagEl.remove();
  }

  // 這格從「未完成→完成」或「完成→未完成」時，順便把所屬品牌標題的計數 +1/-1（不用整段重算）
  if(wasDone !== isDoneNow){
    var brand = brandOfRecountKey(key);
    if(brand){
      var headEls = document.querySelectorAll('.recount-brand-head');
      for(var i=0;i<headEls.length;i++){
        if(headEls[i].getAttribute('data-brand') === brand){
          var doneN = (parseInt(headEls[i].getAttribute('data-done'),10) || 0) + (isDoneNow ? 1 : -1);
          var totalN = parseInt(headEls[i].getAttribute('data-total'),10) || 0;
          headEls[i].setAttribute('data-done', doneN);
          var countEl = headEls[i].querySelector('.rb-count');
          if(countEl) countEl.textContent = '（'+doneN+'/'+totalN+' 已複盤）';
          break;
        }
      }
    }
  }
}

// 依款式彙總複盤進度：只統計「有標記複盤格子」且「自己看得到」的款式（非主管只算指派給自己的格子，
// 跟複盤清單看到的範圍一致，避免總覽區塊透露出跟自己無關的其他人格子）。
// confirmed 是額外附加的統計（已確認回寫的格數），不影響 done/total 這個完成度定義本身。
// 回傳 { 款式名: { total, done, confirmed, missing:[{color,size},...] } }
function computeRecountStyleProgress(){
  var byStyle = {};
  visibleRecountKeys().forEach(function(key){
    var parts = key.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    if(!byStyle[style]) byStyle[style] = { total:0, done:0, confirmed:0, missing:[] };
    var entry = byStyle[style];
    entry.total++;
    if(isRecountFilled(state.recounts[key])){ entry.done++; }
    else { entry.missing.push({color:color, size:size}); }
    if(state.recounts[key].confirmed){ entry.confirmed++; }
  });
  return byStyle;
}

// 把款式進度依品牌分組：[{brand, styles:[{style,total,done,complete,missing}], doneCount, totalCount}, ...]
// brand === "" 代表未分組，排最前面；其餘依 BRAND_ORDER 排序。每組內未完成款式排前面、已完成排後面。
function computeRecountBrandProgress(){
  var styleProgress = computeRecountStyleProgress();
  var byBrand = {};
  Object.keys(styleProgress).forEach(function(styleName){
    var g = findBrandGroupForStyle(styleName);
    var brandLabel = (g && g.brand) ? g.brand : "";
    if(!byBrand[brandLabel]) byBrand[brandLabel] = [];
    var p = styleProgress[styleName];
    byBrand[brandLabel].push({
      style: styleName,
      total: p.total,
      done: p.done,
      confirmed: p.confirmed,
      complete: p.done === p.total,
      missing: p.missing
    });
  });
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  var brandNames = Object.keys(byBrand).filter(function(b){ return b !== ""; }).sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var result = [];
  if(byBrand[""]) result.push({ brand:"", styles: byBrand[""] });
  brandNames.forEach(function(b){ result.push({ brand:b, styles: byBrand[b] }); });
  result.forEach(function(g){
    g.styles.sort(function(a,b){
      if(a.complete !== b.complete) return a.complete ? 1 : -1; // 未完成優先
      return a.style.localeCompare(b.style, 'zh-Hant');
    });
    g.doneCount = g.styles.filter(function(s){ return s.complete; }).length;
    g.totalCount = g.styles.length;
  });
  return result;
}

// 把某款式「還差哪些格子」組成顯示文字，同色的尺寸合併，例如「藏青色 M、L」，多色用「；」分隔
function formatMissingSlots(missing){
  var byColor = {};
  var colorOrder = [];
  missing.forEach(function(m){
    if(!byColor[m.color]){ byColor[m.color] = []; colorOrder.push(m.color); }
    byColor[m.color].push(m.size);
  });
  return colorOrder.map(function(c){
    return escapeHtml(c) + ' ' + byColor[c].map(escapeHtml).join('、');
  }).join('；');
}

function renderRecountProgressOverview(){
  var groups = computeRecountBrandProgress();
  if(groups.length === 0) return "";

  var groupsHtml = groups.map(function(g){
    var label = g.brand === "" ? "未分組" : g.brand;
    var allDone = g.totalCount > 0 && g.doneCount === g.totalCount;

    var pendingStyles = g.styles.filter(function(s){ return !s.complete; });
    var doneStyles = g.styles.filter(function(s){ return s.complete; });

    var pendingHtml = pendingStyles.map(function(s){
      return '<div class="rp-pending-item">'+
        '<div class="rp-pending-top">'+
          '<span class="rp-pending-name">'+escapeHtml(s.style)+'</span>'+
          '<span class="rp-pending-count">'+s.done+'/'+s.total+(s.confirmed>0?'（已確認 '+s.confirmed+'）':'')+'</span>'+
        '</div>'+
        '<div class="rp-pending-missing">還差：'+formatMissingSlots(s.missing)+'</div>'+
      '</div>';
    }).join("");

    // 已完成（填完）不等於已確認回寫，兩者分開標示，方便主管一眼看出哪些款式雖然填完但還沒回寫彙總
    var doneHtml = doneStyles.length === 0 ? "" :
      '<div class="rp-done-wrap">'+
        '<div class="rp-done-header" data-action="toggle-rp-done">✓ 已完成 '+doneStyles.length+' 款（點此展開/收合）<span class="sg-arrow">›</span></div>'+
        '<div class="rp-done-body">'+
          doneStyles.map(function(s){
            var confirmTag = s.confirmed === s.total ? '（已確認 '+s.confirmed+'/'+s.total+'）' : '（已確認 '+s.confirmed+'/'+s.total+'，尚未全部回寫）';
            return '<div class="rp-done-item">✓ '+escapeHtml(s.style)+' <span style="color:var(--muted); font-weight:600;">'+confirmTag+'</span></div>';
          }).join("")+
        '</div>'+
      '</div>';

    return '<div class="brand-group rp-brand-group'+(allDone ? '' : ' has-missing')+'">'+
      '<div class="brand-group-header" data-action="toggle-brand-group">'+
        '<div class="bg-left">'+
          '<div>'+
            '<div class="bg-name">'+(allDone ? '✅ ' : '')+escapeHtml(label)+'</div>'+
            '<div class="bg-meta">'+g.doneCount+'/'+g.totalCount+' 款完成</div>'+
          '</div>'+
        '</div>'+
        '<div class="bg-arrow">›</div>'+
      '</div>'+
      '<div class="brand-group-body">'+pendingHtml+doneHtml+'</div>'+
    '</div>';
  }).join("");

  return '<div class="panel">'+
    '<h2>複盤進度總覽</h2>'+
    '<p class="sub">依品牌統計「已標記複盤」的款式完成情形（分母只計入有標記複盤格子的款式）。點品牌可展開查看細項。</p>'+
    groupsHtml+
  '</div>';
}

// 這個型號底下有沒有任何一格複盤任務(不分顏色/尺寸)。給「要不要顯示核對完成按鈕」用——
// 一個型號二選一：有差異就標記複盤(走複盤鏈)，無差異就核對完成，已經走複盤鏈的型號不用、
// 也不該再顯示核對完成按鈕(見彙總明細 buildStyleTableHtml 呼叫端)。
function styleHasRecountTasks(styleName){
  return Object.keys(state.recounts).some(function(key){
    return key.split("|")[0] === styleName;
  });
}

// ---------- 型號登錄狀態判定（給彙總明細頁看，判斷這個型號要不要提醒 key in 人員處理） ----------
// 實際流程是「key in 登 ERP(認領) → 核對 ERP 有沒有差異 → 有差異才標記複盤 → 複盤確認回寫 → 通知
// key in 重登」，複盤是核對後發現有差異才走的例外處理，不是必經流程，所以這裡刻意分成四態：
//   "none"       - 這個型號沒有任何複盤任務、也還沒認領(還沒登 ERP)：正常，不用顯示徽章
//   "pending"    - 有複盤任務還沒確認回寫：「⚠ 複盤處理中」，附上還差幾格
//   "needsRelog" - 複盤任務全部確認回寫完畢，但還有格子沒標記重登：「🔔 可重新登錄」，通知 key in 重登 ERP
//   "done"       - 最終態「✅ 已完成」，兩種情況都算：
//                  (a) 有複盤任務，且全部確認回寫、全部重登(key in 點掉最後一個「可重新登錄」的那一刻起)
//                  (b) 沒有任何複盤任務，但「已認領且已核對」(登了 ERP、也核對過資料無差異，才算真的
//                      處理完——只認領還沒核對的空窗期不算完成，避免主管誤以為認領=結束，見 state.verified)
// 跟複盤頁的 visibleRecountKeys() 是不同用途：彙總頁是給任何要登 ERP 的人看整體狀態，
// 所以這裡故意讀「全部」複盤任務（不套用複盤頁「指派給自己才看得到」的過濾）。
// confirmed/relogged 都是「格子等級」的旗標（見後端 Code.gs 的說明），不是型號等級的單一狀態——
// 這樣「取消複盤=整列刪除」「重新標記複盤=全新一列」這兩個既有機制，就能讓下一輪複盤時徽章自然重新出現，
// 「已完成」也會自動退回「⚠ 處理中」，不需要額外寫「重置」邏輯：開新一輪時該格 confirmed 會被重設成
// false，下次算這裡就自然變回 pending。
function computeStyleConfirmStatus(styleName){
  var pending = 0;
  var hasAny = false;
  var needsRelog = false;
  Object.keys(state.recounts).forEach(function(key){
    if(key.split("|")[0] !== styleName) return;
    hasAny = true;
    var r = state.recounts[key];
    if(!r.confirmed){ pending++; }
    else if(!r.relogged){ needsRelog = true; }
  });
  if(!hasAny) return { status: (state.claims[styleName] && state.verified[styleName]) ? "done" : "none" };
  if(pending > 0) return { status:"pending", pending:pending };
  if(needsRelog) return { status:"needsRelog" };
  return { status:"done" };
}

// 把型號登錄狀態組成徽章 HTML，"none" 不顯示徽章（還沒登錄，不用打擾 key in 人員）。
// "pending"／"needsRelog" 都是可點擊的按鈕，點了開啟「複盤進度細節」唯讀彈窗（見 openRecountProgressModal）；
// "needsRelog" 原本的「完成重登」動作搬進彈窗裡的按鈕，避免「看細節」跟「完成重登」這兩種點擊意圖打架。
function buildConfirmStatusBadgeHtml(styleName){
  var cs = computeStyleConfirmStatus(styleName);
  if(cs.status === "pending"){
    return '<button type="button" class="confirm-status-badge pending" data-action="open-recount-progress-modal" data-style="'+escapeHtml(styleName)+'">⚠ 複盤處理中(差'+cs.pending+'格)</button>';
  }
  if(cs.status === "needsRelog"){
    return '<button type="button" class="confirm-status-badge relog" data-action="open-recount-progress-modal" data-style="'+escapeHtml(styleName)+'">🔔 可重新登錄</button>';
  }
  if(cs.status === "done"){
    return '<span class="confirm-status-badge done">✅ 已完成</span>';
  }
  return "";
}

// 「認領」按鈕／「✓ 已認領」標籤：全員看得到，只有 key in 身分(或主管)按得動——認領是 key in 人員
// 登 ERP 的動作紀錄，一般成員只需要知道有沒有人在處理，不該手滑誤觸。沒有操作權限時原樣保留文字/
// 配色，只是換成不可點的 <span>(不帶 data-action)，跟「已定案」等既有唯讀狀態同一套視覺語言。
function buildClaimBtnHtml(styleName){
  var claimed = !!state.claims[styleName];
  var cls = 'mini-btn' + (claimed ? ' claimed' : ' unclaimed');
  var text = claimed ? '✓ 已認領' : '未認領';
  if(!canOperateSummary()){
    return '<span class="'+cls+'" style="cursor:default;">'+text+'</span>';
  }
  return '<button class="'+cls+'" data-action="toggle-claim" data-style="'+escapeHtml(styleName)+'">'+text+'</button>';
}

// 「核對完成」按鈕／「✓ 已核對」標籤：只在「已認領＋沒有複盤任務」才顯示——一個型號二選一，
// 有差異就標記複盤(走複盤鏈，不用核對)，沒差異就核對完成，這裡不重複跟複盤鏈的徽章搶位置。
// 「✓ 已核對」保留可點擊(不是純文字)，點了跳確認對話框才會真的取消，給誤點一個回頭路
// (見 unverify-style-confirm 的 click handler)。非 key in(且非主管)身分比照認領按鈕，
// 文字/配色不變，只是換成不可點的 <span>。
function buildVerifyBtnHtml(styleName){
  if(!state.claims[styleName]) return "";
  if(styleHasRecountTasks(styleName)) return "";
  var verified = state.verified[styleName];
  if(!canOperateSummary()){
    return verified
      ? '<span class="mini-btn verified" style="cursor:default;">✓ 已核對</span>'
      : '<span class="mini-btn" style="cursor:default;">核對完成</span>';
  }
  return verified
    ? '<button class="mini-btn verified" data-action="unverify-style-confirm" data-style="'+escapeHtml(styleName)+'">✓ 已核對</button>'
    : '<button class="mini-btn" data-action="verify-style" data-style="'+escapeHtml(styleName)+'">核對完成</button>';
}

// ---------- 複盤清單畫面 ----------
function renderRecount(){
  var manager = isManager();
  // 唯一的過濾點：主管看全部格子，非主管只看指派給自己的格子。下面的認領人篩選、品牌篩選、
  // 清單內容、空狀態訊息全部從這個已過濾好的 keys 往下算，不用各自重複判斷。
  var keys = visibleRecountKeys();
  // 記錄這次真的把清單畫出來時，畫面上有哪些品項，當作之後判斷「清單有沒有變動」的基準點
  recountRenderedKeys = keys.slice();

  // 收集所有篩選用人名，來源是 recountResponsibleNames()（指派紀錄／品牌負責人），不是
  // recounts[k].assignee（誰實際填了數字）——這樣「指派了但還沒盤」的人也會出現在篩選列。
  // 姓名不分大小寫視為同一人（例如 "Amy" 跟 "amy" 歸類成同一個篩選項目），顯示用大小寫取第一次出現的那個寫法。
  var assigneeCanonical = {}; // 小寫 -> 顯示用原始大小寫
  keys.forEach(function(k){
    recountResponsibleNames(k).forEach(function(a){
      var lower = a.toLowerCase();
      if(!assigneeCanonical.hasOwnProperty(lower)) assigneeCanonical[lower] = a;
    });
  });
  var assignees = Object.keys(assigneeCanonical).map(function(lower){ return assigneeCanonical[lower]; });
  assignees.sort(function(a,b){ return a.localeCompare(b, 'zh-Hant'); });

  // 取得某個複盤項目所屬的品牌名稱(沒品牌回傳空字串)
  function brandOfKey(k){
    var style = k.split("|")[0];
    var g = findBrandGroupForStyle(style);
    return (g && g.brand) ? g.brand : "";
  }

  // 收集所有品牌(用於品牌篩選)
  var brands = [];
  keys.forEach(function(k){
    var b = brandOfKey(k);
    if(b && brands.indexOf(b) === -1) brands.push(b);
  });
  // 依 BRAND_ORDER 排序品牌
  var orderMap = {};
  BRAND_ORDER.forEach(function(name, idx){ orderMap[name] = idx; });
  brands.sort(function(a,b){
    var ai = orderMap.hasOwnProperty(a) ? orderMap[a] : 9999;
    var bi = orderMap.hasOwnProperty(b) ? orderMap[b] : 9999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b, 'zh-Hant');
  });
  var hasNoBrand = keys.some(function(k){ return !brandOfKey(k); });

  // 認領人篩選器：順序固定「全部」→「尚未指派」→ 其他人名，
  // 尚未指派排第二個是刻意的，不跟著人名數量往後擠，才好找
  var filterBtns = '<button class="chip'+(state.recountFilter===""?" active":"")+'" data-action="recount-filter" data-assignee="">全部</button>';
  var hasUnassigned = keys.some(function(k){ return recountResponsibleNames(k).length === 0; });
  if(hasUnassigned){
    filterBtns += '<button class="chip'+(state.recountFilter==="__none__"?" active":"")+'" data-action="recount-filter" data-assignee="__none__">尚未指派</button>';
  }
  assignees.forEach(function(a){
    var isActive = state.recountFilter !== "" && state.recountFilter !== "__none__" && state.recountFilter.toLowerCase() === a.toLowerCase();
    filterBtns += '<button class="chip'+(isActive?" active":"")+'" data-action="recount-filter" data-assignee="'+escapeHtml(a)+'">'+escapeHtml(a)+'</button>';
  });

  // 品牌篩選器
  var brandFilterBtns = '<button class="chip'+(state.recountBrandFilter===""?" active":"")+'" data-action="recount-brand-filter" data-brand="">全部品牌</button>';
  brands.forEach(function(b){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter===b?" active":"")+'" data-action="recount-brand-filter" data-brand="'+escapeHtml(b)+'">'+escapeHtml(b)+'</button>';
  });
  if(hasNoBrand){
    brandFilterBtns += '<button class="chip'+(state.recountBrandFilter==="__nobrand__"?" active":"")+'" data-action="recount-brand-filter" data-brand="__nobrand__">未分組</button>';
  }

  // 這一格是否屬於目前選定的品牌篩選（passFilter 跟型號篩選器的分組都共用這條，避免各寫一套）
  function keyMatchesBrandFilter(k){
    var b = brandOfKey(k);
    if(state.recountBrandFilter === "__nobrand__") return !b;
    if(state.recountBrandFilter !== "") return b === state.recountBrandFilter;
    return true;
  }

  // 型號篩選器（第二層，只在選了特定品牌／未分組時才出現——「全部品牌」底下型號太多，列出來沒意義）。
  // 範圍是「目前可見（已套身分過濾）＋目前品牌篩選」內有複盤格子的型號，不受複盤人篩選影響，
  // 這樣切換複盤人篩選時型號 chips 的選項/數字不會一直跳動。依款式結構順序排列，跟彙總頁一致。
  var styleFilterBtns = "";
  var hasStyleFilterRow = state.recountBrandFilter !== "";
  if(hasStyleFilterRow){
    var styleCounts = {}; // style -> 格數
    var styleOrder = [];
    keys.forEach(function(k){
      if(!keyMatchesBrandFilter(k)) return;
      var style = k.split("|")[0];
      if(!styleCounts.hasOwnProperty(style)){ styleCounts[style] = 0; styleOrder.push(style); }
      styleCounts[style]++;
    });
    var structureOrderMap = {};
    state.structure.forEach(function(s, idx){ structureOrderMap[s.style] = idx; });
    styleOrder.sort(function(a,b){
      var ai = structureOrderMap.hasOwnProperty(a) ? structureOrderMap[a] : 9999;
      var bi = structureOrderMap.hasOwnProperty(b) ? structureOrderMap[b] : 9999;
      if(ai !== bi) return ai - bi;
      return a.localeCompare(b, 'zh-Hant');
    });
    styleFilterBtns = '<button class="chip'+(state.recountStyleFilter===""?" active":"")+'" data-action="recount-style-filter" data-style="">全部</button>';
    styleOrder.forEach(function(style){
      var isActive = state.recountStyleFilter === style;
      styleFilterBtns += '<button class="chip'+(isActive?" active":"")+'" data-action="recount-style-filter" data-style="'+escapeHtml(style)+'">'+escapeHtml(style)+'('+styleCounts[style]+')</button>';
    });
  }

  // 產生單一複盤項目的 HTML
  function buildRecountItem(k){
    var r = state.recounts[k];
    var parts = k.split("|");
    var style = parts[0], color = parts[1], size = parts[2];
    var c = state.counts[k];
    // 已確認的格子改讀確認當下存的快照，不讀 state.counts——確認回寫是 append 進「_盤點原始資料」，
    // counts 馬上就會變成複盤值本身，「第一次」如果還讀 counts 就會變成初盤=複盤、差異歸零，
    // 稽核意義消失。沒有快照（這次改動之前就確認過的舊格子）或還沒確認，維持現行讀法，不報錯、不擋畫面。
    var hasSnapshot = !!r.confirmed && hasRecountSnapshot(r);
    // 已確認且有快照：優先讀首輪原始快照(永遠不變的初盤原值)，沒有才退回 before 值(這一輪確認前的
    // 即時值，只經過一輪的格子兩者本來就相同，只有進第三輪以上才會有落差)——見 resolveVeryFirstSnapshot。
    var firstSource = hasSnapshot ? resolveVeryFirstSnapshot(r) : c;
    var firstShelf = firstSource && firstSource.shelf !== "" && firstSource.shelf !== null && firstSource.shelf !== undefined ? (Number(firstSource.shelf)||0) : null;
    var firstStock = firstSource && firstSource.stock !== "" && firstSource.stock !== null && firstSource.stock !== undefined ? (Number(firstSource.stock)||0) : null;
    var firstTotal = (firstShelf !== null || firstStock !== null) ? ((firstShelf||0)+(firstStock||0)) : null;

    var shelfRaw = (r.shelf !== null && r.shelf !== undefined) ? String(r.shelf) : "";
    var stockRaw = (r.stock !== null && r.stock !== undefined) ? String(r.stock) : "";
    var noteRaw = (r.note !== null && r.note !== undefined) ? String(r.note) : "";
    var shelfFilled = shelfRaw.trim() !== "";
    var stockFilled = stockRaw.trim() !== "";
    var recountShelfVal = shelfFilled ? parseExpr(shelfRaw) : null;
    var recountStockVal = stockFilled ? parseExpr(stockRaw) : null;
    // 兩格都填了才算複盤完成，跟第一次盤點的完成判斷邏輯一致；備註不算在內
    var recountVal = (shelfFilled && stockFilled) ? (recountShelfVal + recountStockVal) : null;

    var diffHtml = "";
    if(firstTotal !== null && recountVal !== null){
      var diff = recountVal - firstTotal;
      var diffColor = diff === 0 ? "#2f7a3e" : "#c0392b";
      var diffText = diff === 0 ? "一致 ✓" : (diff > 0 ? "+"+diff : ""+diff);
      diffHtml = '<span style="color:'+diffColor+'; font-weight:700;">'+diffText+'</span>';
    } else if(recountVal === null){
      diffHtml = '<span style="color:var(--muted);">待複盤</span>';
    }
    var shelfCalcHint = (shelfFilled && /[+×xX*＊＋]/.test(shelfRaw)) ? '<div class="ri-calc-hint">= '+recountShelfVal+'</div>' : '';
    var stockCalcHint = (stockFilled && /[+×xX*＊＋]/.test(stockRaw)) ? '<div class="ri-calc-hint">= '+recountStockVal+'</div>' : '';
    var badge = computeRecountBadge(r, recountVal !== null);
    var countedBy = (firstSource && firstSource.countedBy) ? String(firstSource.countedBy).trim() : "";
    // 第二輪判定跟負責人名單：第二輪格子不走指派，這裡先算出來給指派徽章、鎖定提示、完成回寫按鈕共用
    var secondRoundNow = isSecondRoundRecount(r);
    var keyOwners = secondRoundNow ? brandOwnersForKey(k) : [];
    var editable = canEditRecountKey(k, r);
    // 指派標籤：只有主管看得到（非主管看到的本來就只有自己有權限的格子，不用再標一次）。
    // 第二輪格子不再逐格標負責人姓名——自動歸品牌負責人是制度，不用每格重複講一次，
    // 卡片上已經有「⚠ 第二輪複盤」這個短標籤(見 secondRoundTagHtml)。只有沒設定負責人(無主格)
    // 這個例外狀況才留標紅警示，因為這是需要主管處理的異常，不是常態。
    var assignedTo = String(state.assignments[k] || "").trim();
    var assignBadgeHtml = "";
    if(manager){
      if(secondRoundNow){
        assignBadgeHtml = keyOwners.length > 0
          ? ""
          : '<span class="ri-assign-badge no-owner">⚠ 未設定負責人</span>';
      } else {
        assignBadgeHtml = '<span class="ri-assign-badge'+(assignedTo?'':' unassigned')+'">'+(assignedTo?'已派：'+escapeHtml(assignedTo):'未指派')+'</span>';
      }
    }

    // 完成回寫：所有有權限的複盤人都看得到(不只主管)，架上/庫存複盤都填完才能按；
    // 已確認的格子改顯示狀態；沒有編輯權限(第二輪的非負責人)一律不顯示按鈕
    var confirmSectionHtml = buildRecountConfirmSectionHtml(r, style, color, size, recountVal, editable);

    // 取消複盤的入口權責在彙總明細（key in 人員依 ERP 比對決定要不要複盤）。複盤清單頁不再提供主管
    // 「取消複盤」的例外後路——要修正已回寫錯誤的數字改走下面的「完成回寫」修正流程，不是整筆刪除。

    // 第二輪標籤：曾經確認回寫過(有快照)，現在又還沒確認，代表這格被重新標記進入下一輪
    var secondRoundTagHtml = secondRoundNow ? '<span class="ri-second-round-tag">⚠ 第二輪複盤</span>' : '';

    // 鎖定提示：第二輪格子只有品牌負責人跟主管能填，其他人（例如畫面還沒重整、還留著這張卡片的
    // 原第一輪指派者）架上/庫存輸入框反灰鎖定，用文字說明原因，不是無聲失敗
    var lockNoteHtml = editable ? "" : '<div class="ri-lock-note">🔒 '+
      (keyOwners.length > 0 ? '限負責人：'+escapeHtml(keyOwners.join('、'))+' 可填寫' : '限品牌負責人可填寫（尚未設定負責人）')+
      '</div>';

    // 第二輪進行中：多顯示一塊「初盤」——讀首輪原始快照(veryFirst，有史以來第一次確認的值，
    // 之後不管開幾輪都不會被覆蓋)，沒有就退回 before 值相容舊資料。緊接著的「上一輪複盤」沿用
    // firstTotal 現有算法(=目前的 counts 現值，在下一輪確認前正好等於上一輪定案值)，不用改。
    var veryFirstNumHtml = "";
    if(secondRoundNow){
      var vf = resolveVeryFirstSnapshot(r);
      var vfShelf = vf.shelf !== "" && vf.shelf !== null && vf.shelf !== undefined ? (Number(vf.shelf)||0) : null;
      var vfStock = vf.stock !== "" && vf.stock !== null && vf.stock !== undefined ? (Number(vf.stock)||0) : null;
      var vfTotal = (vfShelf !== null || vfStock !== null) ? ((vfShelf||0)+(vfStock||0)) : null;
      // class 要跟 patchRecountItemDisplay() 就地更新時找的選擇器(.ri-veryfirst-num/.ri-veryfirst-arrow)
      // 完全一致——少了這個標記，背景同步會找不到這裡已經畫出來的「初盤」區塊，誤判成沒畫過而重複插入
      // 一份，變成「初盤、初盤、上一輪複盤、複盤加總」的重複 bug。
      veryFirstNumHtml = '<div class="ri-num ri-veryfirst-num"><div class="ri-num-label">初盤</div><div class="ri-num-val">'+(vfTotal!==null?vfTotal:'—')+'</div>'+
          '<div class="ri-num-sub">架上'+(vfShelf!==null?vfShelf:'—')+'／庫存'+(vfStock!==null?vfStock:'—')+'</div>'+
        '</div>'+
        '<div class="ri-arrow ri-veryfirst-arrow">→</div>';
    }
    // 第一次/上一輪複盤/複盤加總 這三塊要不要顯示「架上X／庫存Y」細項，第二輪進行中(secondRoundNow)
    // 跟已確認且有快照(hasSnapshot)是同一批需要細項的狀態，統一用 showBreakdown 判斷，避免各寫各的漏掉。
    var showBreakdown = hasSnapshot || secondRoundNow;

    // 「初盤：OO」人名標籤只在第一輪顯示；第二輪這裡讀到的其實是「第一輪複盤人」(見 firstSource/c
    // 的取值邏輯)，標成「初盤」語意是錯的，乾脆不顯示——第二輪卡片只留數字：初盤→第一輪複盤→
    // 第二輪複盤加總→差異，不需要人名。
    var countedByTagHtml = secondRoundNow ? "" :
      '<span class="ri-countedby" style="font-weight:400; color:var(--muted); font-size:12px; margin-left:8px;">初盤：'+escapeHtml(countedBy || '未記錄')+'</span>';

    return '<div class="recount-item'+(recountVal!==null?' done':'')+'" data-key="'+escapeHtml(k)+'">'+
      '<div class="ri-top">'+
        '<div class="ri-title">'+escapeHtml(style)+' · '+escapeHtml(color)+' · '+escapeHtml(size)+
          countedByTagHtml+
        '</div>'+
        '<div class="hdr-right">'+
          assignBadgeHtml+
          secondRoundTagHtml+
          '<span class="ri-assignee'+(badge.cls?' '+badge.cls:'')+'">'+escapeHtml(badge.text)+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="ri-nums">'+
        veryFirstNumHtml+
        '<div class="ri-num"><div class="ri-num-label">'+(secondRoundNow?'第一輪複盤':(hasSnapshot?'第一次（原）':'第一次'))+'</div><div class="ri-num-val ri-first-val">'+(firstTotal!==null?firstTotal:'—')+'</div>'+
          (showBreakdown ? '<div class="ri-num-sub">架上'+(firstShelf!==null?firstShelf:'—')+'／庫存'+(firstStock!==null?firstStock:'—')+'</div>' : '')+
        '</div>'+
        '<div class="ri-arrow">→</div>'+
        '<div class="ri-num"><div class="ri-num-label">'+(secondRoundNow?'第二輪複盤加總':'複盤加總')+'</div><div class="ri-num-val ri-total-val">'+(recountVal!==null?recountVal:'—')+'</div>'+
          (showBreakdown ? '<div class="ri-num-sub">架上'+(recountShelfVal!==null?recountShelfVal:'—')+'／庫存'+(recountStockVal!==null?recountStockVal:'—')+'</div>' : '')+
        '</div>'+
        '<div class="ri-arrow">=</div>'+
        '<div class="ri-num"><div class="ri-num-label">差異</div><div class="ri-num-val ri-diff-val">'+diffHtml+'</div></div>'+
      '</div>'+
      '<div class="ri-confirm-section">'+confirmSectionHtml+'</div>'+
      '<div class="ri-fields">'+
        '<div class="ri-num"><div class="ri-num-label">架上（可加可乘）</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(shelfRaw)+'" placeholder="如 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-field="shelf" data-action="recount-input"'+(editable?'':' disabled')+'>'+
          shelfCalcHint+'</div>'+
        '<div class="ri-num"><div class="ri-num-label">庫存（可加可乘）</div>'+
          '<input class="ri-input" type="text" inputmode="text" value="'+escapeHtml(stockRaw)+'" placeholder="如 50+30" '+
            'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-field="stock" data-action="recount-input"'+(editable?'':' disabled')+'>'+
          stockCalcHint+'</div>'+
        lockNoteHtml+
      '</div>'+
      '<div class="ri-note">'+
        '<span class="ri-claim-label">備註：</span>'+
        '<input class="ri-note-input" type="text" value="'+escapeHtml(noteRaw)+'" placeholder="" '+
          'data-style="'+escapeHtml(style)+'" data-color="'+escapeHtml(color)+'" data-size="'+escapeHtml(size)+'" data-action="recount-note">'+
      '</div>'+
    '</div>';
  }

  // 單一格位的資料如果格式異常，這裡擋下來，只讓那一格顯示錯誤卡片，不要讓整頁複盤清單畫不出來
  function safeBuildRecountItem(k){
    try{
      return buildRecountItem(k);
    }catch(e){
      console.error("buildRecountItem failed for key", k, e);
      return '<div class="recount-item" data-key="'+escapeHtml(k)+'">'+
        '<div class="ri-top"><div class="ri-title">'+escapeHtml(k)+'</div></div>'+
        '<div style="color:#c0392b; font-size:13px;">⚠️ 這一格資料格式異常，暫時無法顯示，不影響其他品項</div>'+
      '</div>';
    }
  }

  // 判斷某 key 是否通過目前的篩選條件
  function passFilter(k){
    // 認領人篩選：比對來源是 recountResponsibleNames()（指派紀錄／品牌負責人），
    // 不論這格盤完了沒都算——主管篩人要看的是「派給他的」，不是「他已經交回的」。
    // 姓名不分大小寫視為同一人。
    var names = recountResponsibleNames(k);
    if(state.recountFilter === "__none__"){ if(names.length > 0) return false; }
    else if(state.recountFilter !== ""){
      var target = state.recountFilter.toLowerCase();
      var matches = names.some(function(n){ return n.toLowerCase() === target; });
      if(!matches) return false;
    }
    // 品牌篩選
    if(!keyMatchesBrandFilter(k)) return false;
    // 型號篩選（第二層，交集關係，見 keyMatchesBrandFilter 上方的說明）
    if(state.recountStyleFilter !== "" && k.split("|")[0] !== state.recountStyleFilter) return false;
    return true;
  }

  // 把通過篩選的 key 依品牌分組
  var shownCount = 0;
  var byBrand = {}; // brand -> [keys]
  var noBrandKeys = [];
  keys.forEach(function(k){
    if(!passFilter(k)) return;
    shownCount++;
    var b = brandOfKey(k);
    if(b){ if(!byBrand[b]) byBrand[b]=[]; byBrand[b].push(k); }
    else noBrandKeys.push(k);
  });

  // 未完成／已回寫完成分兩批：未完成(還沒按「完成回寫」，主管要追的)排前面，
  // 已回寫完成(r.confirmed，已經交回的)排後面，中間插分隔線，一眼分開「還欠的 vs 交回的」。
  // 沒填數字跟填了數字但還沒按確認，都算「未完成」——真正回寫進彙總才算數。
  function splitOutstandingDone(arr){
    var outstanding = [], done = [];
    arr.forEach(function(k){
      (state.recounts[k].confirmed ? done : outstanding).push(k);
    });
    return { outstanding: outstanding, done: done };
  }
  function renderGroupRows(keysArr){
    var split = splitOutstandingDone(keysArr);
    var html = "";
    split.outstanding.forEach(function(k){ html += safeBuildRecountItem(k); });
    if(split.done.length > 0){
      if(split.outstanding.length > 0) html += '<div class="recount-divider">已回寫完成</div>';
      split.done.forEach(function(k){ html += safeBuildRecountItem(k); });
    }
    return html;
  }

  // 依品牌順序組裝分組區塊
  var rowsHtml = "";
  if(shownCount === 0){
    rowsHtml = emptyStateHtml('沒有複盤項目', keys.length === 0 ? '到彙總頁的明細，點「標記複盤」把要複盤的品項加進來' : '這個篩選條件下沒有項目');
  } else {
    // 沒品牌的排最前
    if(noBrandKeys.length > 0){
      rowsHtml += renderGroupRows(noBrandKeys);
    }
    brands.forEach(function(b){
      if(!byBrand[b]) return;
      // 這個品牌有幾筆、幾筆已複盤
      var total = byBrand[b].length;
      var doneN = byBrand[b].filter(function(k){
        return isRecountFilled(state.recounts[k]);
      }).length;
      rowsHtml += '<div class="recount-brand-head" data-brand="'+escapeHtml(b)+'" data-done="'+doneN+'" data-total="'+total+'">'+escapeHtml(b)+
        ' <span class="rb-count" style="font-weight:600; color:var(--muted); font-size:12px;">（'+doneN+'/'+total+' 已複盤）</span></div>';
      rowsHtml += renderGroupRows(byBrand[b]);
    });
  }

  return ''+
  '<div class="topbar">'+
    '<div class="topbar-row">'+
      '<button class="icon-btn" data-action="goto-home">‹ 返回</button>'+
      '<div class="brand">複盤任務</div>'+
      '<button class="icon-btn" data-action="manual-sync-recount" style="font-size:12px; padding:6px 10px;">🔄 更新</button>'+
    '</div>'+
    '<div id="recount-update-hint" data-action="refresh-recount-list" style="display:none; cursor:pointer; background:#fff4e6; border-bottom:1px solid #f0d8cd; padding:8px 16px; font-size:13px; color:#c45a1e; text-align:center; font-weight:700;">'+
    '</div>'+
  '</div>'+
  '<main>'+
    '<div style="display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:8px; padding:10px 14px; margin-bottom:12px; background:#fcfbf8; border:1px solid var(--line); border-radius:10px; font-size:13px;">'+
      '<span style="color:var(--muted); min-width:0; overflow-wrap:break-word;">你的盤點身分：<strong style="color:var(--ink);">'+(getRecountUserName() ? escapeHtml(getRecountUserName()) : '尚未設定')+'</strong></span>'+
      '<div style="display:flex; flex-wrap:wrap; gap:6px;">'+
        (manager ? '<button class="mini-btn" data-action="recount-assign">複盤分配</button>' : '')+
        (manager ? '<button class="mini-btn'+(state.showFinalizedRecounts?' marked':'')+'" data-action="toggle-show-finalized" title="已完結(已回寫／已定案)的格子預設不列出，開啟後可查閱，也可以在這裡修正回寫錯誤的數字">'+(state.showFinalizedRecounts?'✓ 顯示已完結':'顯示已完結')+'</button>' : '')+
        '<button class="mini-btn" data-action="change-recount-username">'+(getRecountUserName() ? '改名字' : '設定名字')+'</button>'+
      '</div>'+
    '</div>'+
    renderRecountProgressOverview()+
    '<div class="panel">'+
      '<h2>複盤清單</h2>'+
      '<p class="sub">共 '+keys.length+' 筆。填入架上、庫存的複盤數字（都可以加可以乘），兩格都填了會自動跟第一次盤點的加總對照差異。備註為選填，沒填不影響完成進度。誰實際填了數字，複盤人就自動記成誰，不用手動輸入；打字時如果別人也在盤同一格，旁邊會提醒「OO 複盤中」（僅提醒，不會鎖住輸入）。</p>'+
      '<div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;">依品牌篩選</div>'+
      '<div class="chip-strip" style="margin-bottom:12px;">'+brandFilterBtns+'</div>'+
      (hasStyleFilterRow ? (
        '<div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;">依型號篩選</div>'+
        '<div class="chip-strip" style="margin-bottom:12px;">'+styleFilterBtns+'</div>'
      ) : '')+
      '<div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;">依複盤人篩選</div>'+
      '<div class="chip-strip" style="margin-bottom:16px;">'+filterBtns+'</div>'+
      rowsHtml+
    '</div>'+
  '</main>';
}

// ---------- Excel export (one worksheet per 款式) ----------
function sanitizeSheetName(name, usedNames){
  var clean = String(name).replace(/[\\\/\?\*\[\]:]/g, "_").slice(0,31);
  if(!clean) clean = "Sheet";
  var base = clean, n = 1;
  while(usedNames[clean]){
    n++;
    var suffix = "_" + n;
    clean = base.slice(0, 31 - suffix.length) + suffix;
  }
  usedNames[clean] = true;
  return clean;
}

function buildWorkbook(){
  var wb = XLSX.utils.book_new();
  var usedNames = {};
  state.structure.forEach(function(st){
    var rows = [["顏色","尺寸","架上","庫存","加總"]];
    var sumShelf = 0, sumStock = 0, sumTotal = 0;
    st.colors.forEach(function(col){
      col.sizes.forEach(function(sz){
        var key = keyFor(st.style, col.name, sz);
        var c = state.counts[key];
        var shelf = c && c.shelf !== "" ? Number(c.shelf)||0 : (c ? 0 : "");
        var stock = c && c.stock !== "" ? Number(c.stock)||0 : (c ? 0 : "");
        var total = c ? Number(c.total)||0 : "";
        rows.push([col.name, sz, shelf, stock, total]);
        if(c){
          sumShelf += Number(c.shelf)||0;
          sumStock += Number(c.stock)||0;
          sumTotal += Number(c.total)||0;
        }
      });
    });
    rows.push(["總計", "", sumShelf, sumStock, sumTotal]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:8},{wch:8},{wch:8}];
    var sheetName = sanitizeSheetName(st.style, usedNames);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  return wb;
}

function pad2(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

// ---------- ERP 匯入格式匯出 ----------
// 尺寸對照：工具寫法 → ERP 品號寫法
var ERP_SIZE_MAP = {
  "#6": "6 (120cm)",
  "#8": "8 (130cm)",
  "#10": "10 (140cm)",
  "JS": "JS (120cm)",
  "JM": "JM (130cm)",
  "JL": "JL (140cm)",
  "JXL": "JXL (150cm)",
  "7XL": "7L",
  "2XL": "2L",
  "3XL": "3L",
  "4XL": "4L",
  "5XL": "5L",
  "6XL": "6L"
  // XS/S/M/L/XL/F 不用轉，直接原樣
};

function erpSize(sz){
  return ERP_SIZE_MAP.hasOwnProperty(sz) ? ERP_SIZE_MAP[sz] : sz;
}

// 76000 專用：顏色編號數字 → ERP 完整編號(帶字母,不固定 C/H/N,故寫死對照)
var ERP_76000_COLOR = {
  "10":"10C","12":"12C","20":"20C","24":"24C","26":"26C","29":"29C","30":"30N",
  "32":"32C","33":"33C","36":"36C","37":"37C","38":"38C","40":"40C","42":"42C",
  "51":"51C","69":"69C","71":"71C","81":"81C","83":"83C","93":"93H","98":"98C",
  "105":"105C","106":"106C","108":"108C","109":"109C","167":"167C","188":"188C",
  "193":"193C","215":"215C","218":"218C","232":"232C","234":"234C","263":"263C",
  "295":"295H","445":"445C","765":"765C"
};

// ---------- ERP 品牌規則設定表 ----------
// 每一列＝一個品牌／款式群組的 ERP 匯出規則，欄位都可省略，沒填就套用 ERP_RULE_DEFAULTS。
//   match       — {prefix: /正則/}：款式名稱開頭比對；或 {styles:["精確款式名",...]}：精確比對
//   styleNumber — 品號前綴轉換方式：
//                   "asis"（預設，原樣不變）
//                   "digitsOnly"（只留數字，CP103 → 103）
//                   "dashToUnderscore"（橫線換底線，CAP-510 → CAP_510）
//                   "insertUnderscoreAfterPrefix"（在符合 match.prefix 那段文字後插底線，PL01 → PL_01；已有底線就不重複插）
//   colorWidth  — 顏色編號補零位數（預設 2）
//   colorMap    — 顏色編號對照表，優先於補零規則使用（例如 76000 系列查表；查不到就回傳原始數字、不補零）
//   warehouse   — 倉別代碼（預設 "A01"）
//
// 比對順序：先掃全表找「精確款式名稱（match.styles）」符合的列，找不到才依序找「前綴（match.prefix）」符合的列。
// 所以像 TH02/03/04 這種「屬於 TH 系列、但倉別是例外」的列，放在陣列裡的前後順序不影響結果。
//
// 新增品牌只要在這個陣列加一列即可，不用改下面任何函式。
var ERP_BRAND_RULES = [
  { name:"76000",   match:{prefix:/^76000/i},                 colorMap: ERP_76000_COLOR },
  { name:"CP",      match:{prefix:/^CP/i},                     styleNumber:"digitsOnly" },
  { name:"CAP/T",   match:{prefix:/^(CAP|T[-_])/i},            styleNumber:"dashToUnderscore" },
  { name:"PL",      match:{prefix:/^PL/i},                     styleNumber:"insertUnderscoreAfterPrefix" },
  { name:"UA2350",  match:{prefix:/^UA2350/i},                 colorWidth:3 },
  { name:"TH02-04", match:{styles:["TH02","TH03","TH04"]},     colorWidth:3, warehouse:"A02" },
  { name:"TH",      match:{prefix:/^TH/i},                     colorWidth:3 },
  { name:"AG倉別",   match:{styles:["AG1000","AG2000","AG3000"]}, warehouse:"A02" }
];
var ERP_RULE_DEFAULTS = { styleNumber:"asis", colorWidth:2, warehouse:"A01", colorMap:null };

// 依款式名稱找出對應的規則列（缺的欄位補上預設值；完全找不到就回傳純預設值）
function resolveErpRule(style){
  var s = String(style);
  for(var i=0;i<ERP_BRAND_RULES.length;i++){
    var r = ERP_BRAND_RULES[i];
    if(r.match.styles && r.match.styles.indexOf(s) !== -1) return mergeErpRule(r);
  }
  for(var j=0;j<ERP_BRAND_RULES.length;j++){
    var r2 = ERP_BRAND_RULES[j];
    if(r2.match.prefix && r2.match.prefix.test(s)) return mergeErpRule(r2);
  }
  return mergeErpRule({});
}
function mergeErpRule(rule){
  return {
    name: rule.name || "(預設)",
    match: rule.match || null,
    styleNumber: rule.styleNumber || ERP_RULE_DEFAULTS.styleNumber,
    colorWidth: rule.colorWidth || ERP_RULE_DEFAULTS.colorWidth,
    colorMap: rule.colorMap || ERP_RULE_DEFAULTS.colorMap,
    warehouse: rule.warehouse || ERP_RULE_DEFAULTS.warehouse
  };
}

// 依規則列的 styleNumber 類型，把款式名稱轉成 ERP 品號前綴
function applyStyleNumberTransform(style, rule){
  var s = String(style);
  if(rule.styleNumber === "digitsOnly"){
    return s.replace(/[^0-9]/g, ""); // CP103 → 103
  }
  if(rule.styleNumber === "dashToUnderscore"){
    return s.replace(/-/g, "_"); // CAP-510 → CAP_510、T-24 → T_24
  }
  if(rule.styleNumber === "insertUnderscoreAfterPrefix"){
    if(s.indexOf("_") !== -1) return s; // 已有底線就不重複插
    var prefixRe = (rule.match && rule.match.prefix) || /^[A-Za-z]+/;
    var m = s.match(prefixRe);
    if(m) return s.slice(0, m[0].length) + "_" + s.slice(m[0].length); // PL01 → PL_01
    return s;
  }
  return s; // "asis"：原樣保留
}

// 從顏色名稱尾巴抽出 ERP 編號。
//  - 有 colorMap：抽數字後查對照表（查不到就回傳原始數字，不補零）
//  - 數字+字母尾（工具顏色名本身就帶字母）：整段原樣抽出
//  - 純數字尾：補到指定位數
function erpColorCode(colorName, rule){
  var s = String(colorName);
  if(rule.colorMap){
    var mm = s.match(/(\d+)\s*$/);
    if(mm){
      var num = mm[1];
      return rule.colorMap.hasOwnProperty(num) ? rule.colorMap[num] : num;
    }
    return "";
  }
  var m2 = s.match(/(\d+[A-Za-z]+)\s*$/);
  if(m2) return m2[1]; // 顏色名本身帶字母
  var m1 = s.match(/(\d+)\s*$/);
  if(m1){
    var n = m1[1];
    while(n.length < rule.colorWidth) n = "0" + n;
    return n;
  }
  return "";
}

// 組合 ERP 品號：款式前綴 - 顏色編號 # 尺寸(ERP寫法)
function erpItemCode(style, colorName, size){
  var rule = resolveErpRule(style);
  var s = applyStyleNumberTransform(style, rule);
  var cc = erpColorCode(colorName, rule);
  var sz = erpSize(size);
  return s + "-" + cc + "#" + sz;
}

// 產生單一款式的 ERP 匯入格式工作表資料(品號/數量/倉別)。數量=第一次盤點加總
// 依款式決定倉別：規則表裡沒設 warehouse 的一律是 A01
function erpWarehouse(style){
  return resolveErpRule(style).warehouse;
}

function buildErpRows(st){
  var rows = [["品號","數量","倉別"]];
  var wh = erpWarehouse(st.style);
  st.colors.forEach(function(col){
    col.sizes.forEach(function(sz){
      var key = keyFor(st.style, col.name, sz);
      var c = state.counts[key];
      // 只匯出有填過的格(架上或庫存至少一格有值)
      var shelfFilled = c && c.shelf !== "" && c.shelf !== null && c.shelf !== undefined;
      var stockFilled = c && c.stock !== "" && c.stock !== null && c.stock !== undefined;
      if(!shelfFilled && !stockFilled) return; // 沒盤過的不匯出
      var total = (Number(c.shelf)||0) + (Number(c.stock)||0);
      rows.push([erpItemCode(st.style, col.name, sz), total, wh]);
    });
  });
  return rows;
}

// 匯出單一款式的 ERP 格式 Excel
function downloadErpWorkbook(styleName){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var st = state.structure.find(function(s){ return s.style === styleName; });
  if(!st){ showToast("找不到款式 "+styleName); return; }
  var rows = buildErpRows(st);
  if(rows.length <= 1){ showToast("這個款式還沒有盤點資料，無法匯出"); return; }
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws, "工作表1");
  XLSX.writeFile(wb, styleName + "-匯入盤點表.xlsx");
}

function downloadWorkbook(){
  if(typeof XLSX === "undefined"){
    showToast("Excel 函式庫載入失敗，請檢查網路後重試");
    return;
  }
  var wb = buildWorkbook();
  XLSX.writeFile(wb, "盤點結果_" + dateStr() + ".xlsx");
}

// ---------- Helpers ----------
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}

// 把確認時間的 ISO 字串格式化成簡短的「月/日 時:分」，格式異常就回傳空字串（不擋畫面）
function formatConfirmedAt(iso){
  try{
    var d = new Date(iso);
    if(isNaN(d.getTime())) return "";
    var hh = String(d.getHours()).padStart(2,'0');
    var mi = String(d.getMinutes()).padStart(2,'0');
    return (d.getMonth()+1)+'/'+d.getDate()+' '+hh+':'+mi;
  }catch(e){ return ""; }
}

// 完成回寫區塊的 HTML：buildRecountItem() 首次畫出、patchRecountItemDisplay() 就地更新都呼叫這裡，
// 避免兩處各寫各的邏輯之後互相漂移——這是修「複盤數字填完，完成回寫按鈕沒有立刻出現，還要手動按更新」
// 這個問題的關鍵：填完架上/庫存兩格觸發就地更新時，按鈕要能跟著補上來，不用等使用者手動整頁刷新。
// editable 沒帶(undefined)時預設當作 true，維持這個函式在其他呼叫點的原本行為；
// 只有 buildRecountItem/patchRecountItemDisplay 會明確傳入 canEditRecountKey() 算出來的結果。
function buildRecountConfirmSectionHtml(r, style, color, size, recountVal, editable){
  if(r.confirmed){
    var confirmedAtText = r.confirmedAt ? formatConfirmedAt(r.confirmedAt) : "";
    var html;
    if(r.corrected){
      // 修正過的格子：雙行呈現，第一行是最原始的複盤回寫紀錄(讀 Y,Z 欄快照，永遠不再變動)，
